                document.head.appendChild(style);
            }

            card.querySelector('button').addEventListener('click', () => {
                overlay.remove();
                this.isPaused = false;
                // 恢复所有怪物移动tween（只恢复仍然存活的怪物的tween）
                this.monsters.forEach(m => {
                    if(m && m.active) {
                        this.tweens.getAllTweens().forEach(tw => {
                            if(tw.targets && tw.targets.includes(m) && tw.isPaused()) {
                                tw.resume();
                            }
                        });
                    }
                });
                this.applyDestinyEvent(evt);
            });
        }

        applyDestinyEvent(evt) {
            switch(evt.id) {
                case 'spirit_blessing':
                    const spiritGain = Math.floor(GameData.tree.spiritCapacity * 0.3);
                    GameData.tree.spirit = Math.min(GameData.tree.spiritCapacity, GameData.tree.spirit + spiritGain);
                    this.showMsg(`✨ 灵气恩赐! +${spiritGain}灵气`);
                    // 灵气回复特效
                    const spiritFx = this.add.circle(this.treeX, this.treeY, 20, 0x5CBF7C, 0.6);
                    this.tweens.add({ targets: spiritFx, scale: 3, alpha: 0, duration: 800, onComplete: () => spiritFx.destroy() });
                    break;

                case 'stone_rain':
                    GameData.player.spiritStones += 50;
                    this.showMsg('💎 灵石雨! +50灵石');
                    // 灵石雨特效
                    for(let i = 0; i < 8; i++) {
                        const sx = this.treeX + Phaser.Math.Between(-80, 80);
                        const sy = this.treeY - 100;
                        const stone = this.add.circle(sx, sy, 4, 0xFFD700, 0.9);
                        this.tweens.add({ targets: stone, y: sy + 80, alpha: 0, duration: 600 + i * 100, onComplete: () => stone.destroy() });
                    }
                    break;

                case 'formation_enhance':
                    this.formations.forEach(slot => {
                        if(slot.formation && slot.formation.durability > 0) {
                            slot.formation.durability = slot.formation.maxDurability;
                            this.updateDurabilityBar(slot);
                            // 阵法恢复特效
                            const fxF = this.add.circle(slot.x, slot.y, 15, 0xFFD700, 0.5);
                            this.tweens.add({ targets: fxF, scale: 2, alpha: 0, duration: 500, onComplete: () => fxF.destroy() });
                        }
                    });
                    this.showMsg('⭕ 阵法加持! 所有阵法恢复满耐久');
                    break;

                case 'exp_surge':
                    const expGain = 30 + GameData.battle.currentWave * 2;
                    GameData.tree.exp += expGain;
                    this.checkTreeLevelUp();
                    this.showMsg(`📖 悟道顿悟! +${expGain}经验`);
                    break;

                case 'talisman_gift':
                    const types = Object.keys(TALISMAN_TYPES);
                    const giftType = types[Math.floor(Math.random() * types.length)];
                    const owned = GameData.talismans.owned.find(t => t.type === giftType);
                    if(owned) { owned.count++; } else { GameData.talismans.owned.push({ type: giftType, count: 1, cooldown: 0, maxCooldown: TALISMAN_TYPES[giftType].cooldown }); }
                    this.showMsg(`📜 仙符降世! 获得${TALISMAN_TYPES[giftType].name}`);
                    this.updateTalismanUI();
                    break;

                case 'monster_weaken':
                    // 设置本波怪物减半标记，影响当前及后续新生怪物
                    GameData.battle.weakenActive = true;
                    this.monsters.slice().forEach(m => {
                        if(m && m.active) {
                            const hp = m.getData('hp');
                            const newHp = Math.floor(hp * 0.5);
                            m.setData('hp', newHp);
                            // 更新血条
                            const maxHp = m.getData('maxHp');
                            const hpBar = m.getData('hpBar');
                            const hpBarWidth = m.getData('hpBarWidth');
                            const isBoss = m.getData('isBoss');
                            const hpBarHeight = isBoss ? 7 : 5;
                            if(hpBar && hpBar.active) hpBar.setDisplaySize(Math.max(1, hpBarWidth * (newHp / maxHp)), hpBarHeight);
                        }
                    });
                    this.showMsg('💫 妖气衰退! 本波妖兽HP减半');
                    break;

                case 'spirit_drain':
                    const spiritLoss = Math.floor(GameData.tree.spirit * 0.2);
                    GameData.tree.spirit = Math.max(1, GameData.tree.spirit - spiritLoss);
                    this.showMsg(`🌑 灵气枯竭! -${spiritLoss}灵气`);
                    // 暗色特效
                    const drainFx = this.add.circle(this.treeX, this.treeY, 40, 0x333366, 0.5);
                    this.tweens.add({ targets: drainFx, scale: 2, alpha: 0, duration: 600, onComplete: () => drainFx.destroy() });
                    break;

                case 'monster_surge':
                    const sw = this.cameras.main.width, sh = this.cameras.main.height;
                    for(let i = 0; i < 3; i++) {
                        this.time.delayedCall(i * 500, () => {
                            if(!this.isGameOver) this.spawnMonster(sw, sh, false);
                        });
                    }
                    this.showMsg('👹 妖气弥漫! 额外3只妖兽来袭!');
                    break;

                case 'formation_decay':
                    this.formations.slice().forEach(slot => {
                        if(slot.formation && slot.formation.durability > 0) {
                            slot.formation.durability = Math.max(0, slot.formation.durability - slot.formation.maxDurability * 0.3);
                            this.updateDurabilityBar(slot);
                            if(slot.formation.durability <= 0) this.destroyFormation(slot);
                        }
                    });
                    this.showMsg('⚠️ 阵法腐蚀! 所有阵法损失30%耐久');
                    break;

                case 'cooldown_reset':
                    GameData.talismans.owned.forEach(t => { t.cooldown = 0; });
                    // 同时重置灵兽技能冷却
                    if(GameData.spiritBeast.contracted) GameData.spiritBeast.contracted.skillCooldown = 0;
                    this.updateTalismanUI();
                    this.showMsg('🌀 天道试炼! 符箓与灵兽冷却已重置');
                    break;
            }
            this.updateUI();
        }

        damageMonster(monster, damage, isEffective) {
            if(!monster || !monster.active) return;

            // Boss五行免疫
            const immuneElement = monster.getData('elementImmune');
            if(immuneElement) {
                // 如果攻击来源的五行和免疫五行相同，伤害减半
                // 简化处理：免疫时伤害减80%
                damage = Math.floor(damage * 0.2);
                this.showMsg(`🛡️ 五行免疫! 伤害大幅降低!`);
            }

            // 妖兽特殊技能：石甲(armor)减少30%伤害
            if(monster.getData('special') === 'armor') {
                damage = Math.floor(damage * 0.7);
            }

            // 玄龟特殊：HP<30%时龟缩
            if(monster.getData('special') === 'shell') {
                const hp = monster.getData('hp');
                const maxHp = monster.getData('maxHp');
                if(hp / maxHp < 0.3 && !monster.getData('shellActive')) {
                    monster.setData('shellActive', true);
                    damage = Math.floor(damage * 0.2);
                    this.showMsg('🐢 玄龟龟缩! 伤害大幅减少!');
                    // 3秒后解除
                    this.time.delayedCall(3000, () => { if(monster.active) monster.setData('shellActive', false); });
                }
            }

            // Boss技能效果：阴气（鬼母使Boss受伤减少）
            if(monster.getData('isRealBoss') && monster.getData('bossKey') === 'ghost_parade') {
                const ghostCount = this.monsters.filter(m => m.active && m.getData('special') === 'summon').length;
                const reduction = Math.min(0.5, ghostCount * 0.05);
                if(reduction > 0) {
                    damage = Math.floor(damage * (1 - reduction));
                }
            }

            // Boss吸血（血魔老祖）
            if(monster.getData('isRealBoss') && monster.getData('bossKey') === 'blood_ancestor') {
                const healAmt = Math.floor(damage * 0.3);
                const curHp = monster.getData('hp');
                const maxHp2 = monster.getData('maxHp');
                monster.setData('hp', Math.min(maxHp2, curHp + healAmt));
            }

            // Boss天劫（万妖至尊：HP每降25%触发）
            if(monster.getData('isRealBoss') && monster.getData('bossKey') === 'demon_emperor') {
                const hpBefore = monster.getData('hp');
                const maxHp3 = monster.getData('maxHp');
                const pctBefore = hpBefore / maxHp3;
                const pctAfter = (hpBefore - damage) / maxHp3;
                if(pctBefore > 0.75 && pctAfter <= 0.75 && !monster.getData('tribulation75')) {
                    monster.setData('tribulation75', true);
                    this._triggerTribulation(monster);
                } else if(pctBefore > 0.5 && pctAfter <= 0.5 && !monster.getData('tribulation50')) {
                    monster.setData('tribulation50', true);
                    this._triggerTribulation(monster);
                } else if(pctBefore > 0.25 && pctAfter <= 0.25 && !monster.getData('tribulation25')) {
                    monster.setData('tribulation25', true);
                    this._triggerTribulation(monster);
                }
            }

            // 追踪总伤害
            GameData.battle.totalDamageDealt += damage;

            let hp = monster.getData('hp') - damage;
            monster.setData('hp', hp);

            const maxHp = monster.getData('maxHp');
            const hpBar = monster.getData('hpBar');
            const hpBarWidth = monster.getData('hpBarWidth');
            if(hpBar && hpBar.active) {
                const pct = Math.max(0, hp / maxHp);
                const isBossMonster = monster.getData('isBoss');
                const hpBarHeight = isBossMonster ? 7 : 5;
                hpBar.setDisplaySize(hpBarWidth * pct, hpBarHeight);
                if(pct < 0.3) hpBar.setFillStyle(0xFF0000);
                else if(pct < 0.6) hpBar.setFillStyle(0xFFAA00);
                else hpBar.setFillStyle(0x44FF44);
            }

            const icon = monster.getData('icon');
            const hpBg = monster.getData('hpBg');
            const nameTag = monster.getData('nameTag');
            const outerGlow = monster.getData('outerGlow');
            const innerRing = monster.getData('innerRing');

            // 受伤闪白效果
            monster.setFillStyle(0xFFFFFF, 1);
            this.time.delayedCall(80, () => {
                if(monster && monster.active) {
                    const elColor = parseInt(ELEMENTS[monster.getData('element')].color.replace('#', ''), 16);
                    monster.setFillStyle(elColor, 1);
                }
            });

            // 受击震动
            const origX = monster.x, origY = monster.y;
            this.tweens.add({
                targets: monster, x: origX + Phaser.Math.Between(-4, 4), y: origY + Phaser.Math.Between(-3, 3),
                duration: 50, yoyo: true, repeat: 2,
                onComplete: () => { if(monster && monster.active) monster.setPosition(origX, origY); }
            });

            // 伤害数字飘字
            const dmgText = this.add.text(monster.x + Phaser.Math.Between(-10, 10), monster.y - 20, `-${damage}`, {
                fontSize: isEffective ? '18px' : '13px',
                color: isEffective ? '#FFD700' : '#FF6347',
                fontStyle: 'bold',
                stroke: '#000', strokeThickness: isEffective ? 3 : 2
            }).setOrigin(0.5).setDepth(800);
            this.tweens.add({
                targets: dmgText, y: monster.y - 65, alpha: 0, scaleX: isEffective ? 1.3 : 1, scaleY: isEffective ? 1.3 : 1,
                duration: isEffective ? 1000 : 800,
                onComplete: () => dmgText.destroy()
            });

            // 五行克制时额外闪光
            if(isEffective) {
                const burstFx = this.add.circle(monster.x, monster.y, 15, 0xFFD700, 0.7);
                this.tweens.add({ targets: burstFx, scale: 3, alpha: 0, duration: 400, onComplete: () => burstFx.destroy() });
            }

            if(isEffective) this.showMsg('✦ 克制!');

            // Boss狂暴检测（天魔：HP<50%时攻击×2移速×1.5）
            if(monster.getData('special') === 'frenzy' && !monster.getData('frenzyActive')) {
                if(hp / maxHp < 0.5) {
                    monster.setData('frenzyActive', true);
                    monster.setData('damage', Math.floor(monster.getData('damage') * 2));
                    this.showMsg('👿 天魔狂暴! 攻击力翻倍!');
                }
            }

            // Boss分裂（血魔老祖：HP<50%时分裂出幻影）
            if(monster.getData('isRealBoss') && monster.getData('bossKey') === 'blood_ancestor' && !monster.getData('hasSplit')) {
                if(hp / maxHp < 0.5) {
                    monster.setData('hasSplit', true);
                    // 分裂出1只幻影（普通蛟龙类型，但属性是Boss的一半）
                    this.time.delayedCall(500, () => {
                        if(this.isWaveActive && !this.isGameOver) {
                            const w2 = this.cameras.main.width, h2 = this.cameras.main.height;
                            const side = Math.random() < 0.5 ? 0 : 1;
                            const x = side === 0 ? -30 : w2 + 30;
                            const y2 = Phaser.Math.Between(h2 * 0.2, h2 * 0.45);
                            const mt = MONSTER_TYPES[11]; // 蛟龙
                            this._createMonsterEntity(x, y2, side, mt, true, false, null);
                            this.showMsg('🧛 血魔幻影出现!');
                        }
                    });
                }
            }

            if(hp <= 0) {
                // 先停止移动tween，避免死亡后仍产生拖尾粒子
                this.tweens.killTweensOf(monster);

                const reward = monster.getData('reward');
                const spiritDropRange = monster.getData('spiritDrop');
                const expDropRange = monster.getData('expDrop');
                const isBoss = monster.getData('isBoss');
                const isRealBoss = monster.getData('isRealBoss');
                const bossKey = monster.getData('bossKey');

                // Boss击杀特殊奖励
                if(isRealBoss && bossKey) {
                    const bossCfg = BOSS_CONFIGS[bossKey];
                    if(bossCfg) {
                        // 灵石奖励
                        GameData.player.spiritStones += bossCfg.reward;
                        GameData.battle.totalSpiritsEarned += bossCfg.reward;

                        // 仙玉奖励
                        if(bossCfg.gems > 0) {
                            GameData.lobby.spiritGems += bossCfg.gems;
                            this.showMsg(`💎 +${bossCfg.gems}灵晶!`);
                        }

                        // 特殊掉落
                        this._grantBossSpecialDrop(bossCfg);

                        // 清除Boss技能定时器
                        if(this.bossSkillTimers) {
                            this.bossSkillTimers.forEach(t => { if(t) t.remove(); });
                            this.bossSkillTimers = [];
                        }
                        this.activeBossSkillEffects = [];
                        this.currentBossRef = null;

                        // Boss击杀特效（更华丽）
                        for(let i = 0; i < 3; i++) {
                            const delay = i * 200;
                            this.time.delayedCall(delay, () => {
                                const bigFx = this.add.circle(monster.x, monster.y, 25, 0xFFD700, 0.9);
                                this.tweens.add({ targets: bigFx, scale: 6, alpha: 0, duration: 800, onComplete: () => bigFx.destroy() });
                            });
                        }
                        this.showMsg(`👑 ${bossCfg.name}陨落! +${bossCfg.reward}💎 +${bossCfg.expReward}✦`);
                    }
                }

                // 灵石奖励（非RealBoss用旧逻辑）
                if(!isRealBoss) {
                    GameData.player.spiritStones += reward;
                    GameData.battle.totalSpiritsEarned += reward;
                }

                // 灵气掉落
                const spiritDrop = Phaser.Math.Between(spiritDropRange[0], spiritDropRange[1]);
                GameData.tree.spirit = Math.min(GameData.tree.spirit + spiritDrop, GameData.tree.spiritCapacity);

                // 灵木经验掉落
                const expDrop = Phaser.Math.Between(expDropRange[0], expDropRange[1]);
                GameData.tree.exp += expDrop;

                GameData.battle.monstersKilled++;
                GameData.battle.killedThisWave++;
                this.updateUI();

                // 灵兽获取经验
                this.addBeastExp(Math.ceil(reward / 3));

                // 检查灵木是否可以升级
                this.checkTreeLevelUp();

                const hpBar2 = monster.getData('hpBar');
                const hpBg2 = monster.getData('hpBg');
                const nameTag2 = monster.getData('nameTag');
                const bossGlow2 = monster.getData('bossGlow');
                const iceOverlay2 = monster.getData('iceOverlay');
                const outerGlow2 = monster.getData('outerGlow');
                const innerRing2 = monster.getData('innerRing');
                const elementGlow2 = monster.getData('elementGlow');
                const skillTag2 = monster.getData('skillTag');

                // 妖王击杀特效（旧妖王逻辑，非RealBoss）
                if(isBoss && !isRealBoss) {
                    const bossFx = this.add.circle(monster.x, monster.y, 20, 0xFFD700, 0.9);
                    this.tweens.add({ targets: bossFx, scale: 5, alpha: 0, duration: 600, onComplete: () => bossFx.destroy() });
                    const randomType = ['attack', 'slow', 'shield'][Math.floor(Math.random() * 3)];
                    const t = GameData.talismans.owned.find(t => t.type === randomType);
                    if(t) t.count++;
                    this.showMsg(`👑 妖王陨落! 获得${TALISMAN_TYPES[randomType].icon}!`);
                }

                // 死亡粒子爆散
                const deathElColor = parseInt(ELEMENTS[monster.getData('element')].color.replace('#', ''), 16);
                const particleCount = isRealBoss ? 20 : (isBoss ? 12 : 6);
                for(let i = 0; i < particleCount; i++) {
                    const angle = (i / particleCount) * Math.PI * 2 + Math.random() * 0.5;
                    const speed = isRealBoss ? 120 : (isBoss ? 80 : 50);
                    const pSize = isRealBoss ? 6 : (isBoss ? 5 : 3);
                    const dp = this.add.circle(monster.x, monster.y, pSize, i % 2 === 0 ? deathElColor : 0xFFFFFF, 0.8);
                    this.tweens.add({
                        targets: dp,
                        x: monster.x + Math.cos(angle) * speed,
                        y: monster.y + Math.sin(angle) * speed,
                        alpha: 0, scale: 0.2, duration: isRealBoss ? 800 : (isBoss ? 600 : 400),
                        onComplete: () => dp.destroy()
                    });
                }
                const deathFlash = this.add.circle(monster.x, monster.y, isRealBoss ? 40 : (isBoss ? 30 : 15), 0xFFFFFF, 0.7);
                this.tweens.add({ targets: deathFlash, scale: 2, alpha: 0, duration: 250, onComplete: () => deathFlash.destroy() });

                const destroyList = [monster, icon, hpBar2, hpBg2, nameTag2, bossGlow2, iceOverlay2, outerGlow2, innerRing2, elementGlow2, skillTag2].filter(Boolean);
                this.tweens.add({
                    targets: destroyList, alpha: 0, scale: 0, duration: 300,
                    onComplete: () => {
                        destroyList.forEach(o => { if(o) o.destroy(); });
                    }
                });

                if(!isRealBoss) {
                    this.showMsg(`+${reward}💎 +${spiritDrop}🌿 +${expDrop}✦`);
                }

                const idx = this.monsters.indexOf(monster);
                if(idx > -1) this.monsters.splice(idx, 1);

                // 判断波次结束
                const allSpawned = GameData.battle.spawnedThisWave >= GameData.battle.totalThisWave;
                if(allSpawned && this.monsters.length === 0) {
                    this.time.delayedCall(500, () => this.endWave());
                }
            }
        }

        // Boss特殊掉落
        _grantBossSpecialDrop(bossCfg) {
            const itemType = bossCfg.specialItem;
            switch(itemType) {
                case 'talisman': // 随机符箓×1
                    const tTypes = ['attack', 'slow', 'shield'];
                    const tType = tTypes[Math.floor(Math.random() * tTypes.length)];
                    const t = GameData.talismans.owned.find(t => t.type === tType);
                    if(t) t.count++;
                    this.showMsg(`🎁 获得${TALISMAN_TYPES[tType].icon}×1!`);
                    break;
                case 'spirit_pill': // 灵气丹(+50灵气)
                    GameData.tree.spirit = Math.min(GameData.tree.spirit + 50, GameData.tree.spiritCapacity);
                    this.showMsg('🎁 灵气丹! +50灵气!');
                    break;
                case 'formation_scroll': // 阵法残卷(免费+1)
                    GameData.player.freeFormationTokens = (GameData.player.freeFormationTokens || 0) + 1;
                    this.showMsg('🎁 阵法残卷! 免费放置+1!');
                    break;
                case 'formation_upgrade': // 随机阵法+1级
                    if(this.formations.length > 0) {
                        const f = this.formations[Math.floor(Math.random() * this.formations.length)];
                        const lv = f.formation ? f.formation.level : 1;
                        if(lv < 5) {
                            if(f.formation) f.formation.level = lv + 1;
                            // 同步更新levelBadge显示
                            if(f.formation && f.formation.levelBadge && f.formation.levelBadge.active) {
                                f.formation.levelBadge.setText('Lv.' + f.formation.level);
                            }
                            this.showMsg('🎁 随机阵法升级+1!');
                        }
                    }
                    break;
                case 'random_art': // 随机功法
                    if(CULTIVATION_ARTS && CULTIVATION_ARTS.length > 0) {
                        const unowned = CULTIVATION_ARTS.filter(a => !GameData.arts.learned.includes(a.id));
                        if(unowned.length > 0) {
                            const art = unowned[Math.floor(Math.random() * unowned.length)];
                            GameData.arts.learned.push(art.id);
                            this.showMsg(`🎁 获得功法: ${art.name}!`);
                        } else {
                            GameData.player.spiritStones += 100;
                            this.showMsg('🎁 功法已全，转化为100灵石!');
                        }
                    }
                    break;
                case 'full_repair': // 全阵法恢复满耐久
                    this.formations.forEach(f => {
                        if(f && f.formation) {
                            const maxDur = f.formation.maxDurability || 100;
                            f.formation.durability = maxDur;
                            this.updateDurabilityBar(f);
                        }
                    });
                    this.showMsg('🎁 全阵法耐久恢复!');
                    break;
                case 'beast_exp': // 灵兽经验+100
                    this.addBeastExp(100);
                    this.showMsg('🎁 灵兽经验+100!');
                    break;
                case 'all_upgrade': // 全阵法升级1级
                    this.formations.forEach(f => {
                        if(f && f.formation) {
                            const lv = f.formation.level || 1;
                            if(lv < 5) {
                                f.formation.level = lv + 1;
                                if(f.formation.levelBadge && f.formation.levelBadge.active) {
                                    f.formation.levelBadge.setText('Lv.' + f.formation.level);
                                }
                                // 升级回满耐久
                                const baseDur = this.getFormationBaseDurability();
                                f.formation.maxDurability = baseDur + (f.formation.level - 1) * 20;
                                f.formation.durability = f.formation.maxDurability;
                                this.updateDurabilityBar(f);
                            }
                        }
                    });
                    this.showMsg('🎁 全阵法升级+1!');
                    break;
                case 'tree_level': // 灵木+1级
                    if(GameData.tree.level < TREE_LEVELS.length - 1) {
                        const nextLv = GameData.tree.level + 1;
                        GameData.tree.level = nextLv;
                        GameData.tree.spiritCapacity = TREE_LEVELS[nextLv].capacity;
                        this.checkTreeLevelUp();
                        this.showMsg('🎁 灵木等级+1!');
                    } else {
                        GameData.player.spiritStones += 500;
                        this.showMsg('🎁 灵木已满级，转化为500灵石!');
                    }
                    break;
                case 'victory': // 通关全奖励
                    GameData.player.spiritStones += 10000;
                    GameData.lobby.spiritGems += 50;
                    this.showMsg('🏆 通关! 万妖至尊陨落! +10000💎 +50灵晶!');
                    break;
            }
        }

        // 万妖至尊天劫触发
        _triggerTribulation(boss) {
            this.showMsg('⚡ 天劫降临!');
            // 天劫效果1：召唤4只天魔
            for(let i = 0; i < 4; i++) {
                this.time.delayedCall(i * 600, () => {
                    if(boss.active && this.isWaveActive) {
                        this.spawnMonsterByType(this.cameras.main.width, this.cameras.main.height, 10); // 天魔=索引10
                    }
                });
            }
            // 天劫效果2：全场阵法受损
            this.formations.forEach(f => {
                if(f && f.formation) {
                    const dur = f.formation.durability || 100;
                    f.formation.durability = Math.max(0, dur - 30);
                    this.updateDurabilityBar(f);
                }
            });
            // 天劫视觉特效
            const tribFx = this.add.circle(this.treeX, this.treeY, 20, 0xFF6347, 0.8);
            this.tweens.add({ targets: tribFx, scale: 6, alpha: 0, duration: 1000, onComplete: () => tribFx.destroy() });
        }

        endWave() {
            // 防止重复调用
            if(!this.isWaveActive) return;

            if(this.monsterAttackTimer) { this.monsterAttackTimer.remove(); this.monsterAttackTimer = null; }
            if(this.waveEndTimer) { this.waveEndTimer.remove(); this.waveEndTimer = null; }

            // 清除Boss技能定时器
            if(this.bossSkillTimers) {
                this.bossSkillTimers.forEach(t => { if(t) t.remove(); });
                this.bossSkillTimers = [];
            }
            this.activeBossSkillEffects = [];
            this.currentBossRef = null;

            // 清除所有残留的spawn定时器
            this.spawnTimers.forEach(t => { if(t) t.remove(); });
            this.spawnTimers = [];

            // 清除场上残留怪物
            this.monsters.forEach(m => {
                this.tweens.killTweensOf(m);
                const icon = m.getData('icon');
                const hpBar = m.getData('hpBar');
                const hpBg = m.getData('hpBg');
                const nameTag = m.getData('nameTag');
                const bossGlow = m.getData('bossGlow');
                const iceOverlay = m.getData('iceOverlay');
                const outerGlow = m.getData('outerGlow');
                const innerRing = m.getData('innerRing');
                const elementGlow = m.getData('elementGlow');
                const skillTag = m.getData('skillTag');
                [icon, hpBar, hpBg, nameTag, bossGlow, iceOverlay, outerGlow, innerRing, elementGlow, skillTag].forEach(o => { if(o) { this.tweens.killTweensOf(o); o.destroy(); } });
                m.destroy();
            });
            this.monsters = [];

            // 完美防守判定：本波未受伤害
            if(this.waveDamageTaken === 0) {
                GameData.battle.perfectDefenses++;
                const bonus = 50 * GameData.battle.waveCycle;
                GameData.player.spiritStones += bonus;
                this.showMsg(`✨ 完美防守! +${bonus}灵石`);
                const perfectFx = this.add.circle(this.treeX, this.treeY, 30, 0xFFD700, 0.8);
                this.tweens.add({ targets: perfectFx, scale: 4, alpha: 0, duration: 800, onComplete: () => perfectFx.destroy() });
            }

            this.isWaveActive = false;
            this.waveTimer = 15;
            this.updateUI();
            this.updateTimerDisplay();
            this.showMsg('波次结束! 准备下一波');

            // 天命事件：每3波触发一次
            if(GameData.battle.currentWave > 0 && GameData.battle.currentWave % 3 === 0
               && GameData.battle.currentWave !== GameData.destiny.lastEventWave) {
                GameData.destiny.lastEventWave = GameData.battle.currentWave;
                this.time.delayedCall(800, () => this.triggerDestinyEvent());
            }

            if(GameData.battle.currentWave >= 50) this.victory();
        }

        tick() {
            try {
            // 游戏已结束或暂停，停止所有计时逻辑
            if(this.isGameOver || this.isPaused) return;

            // ===== 灵兽技能冷却 =====
            if(GameData.spiritBeast.contracted && GameData.spiritBeast.contracted.skillCooldown > 0) {
                GameData.spiritBeast.contracted.skillCooldown--;
            }

            // ===== 探索冷却 =====
            if(GameData.explore.cooldown > 0) {
                GameData.explore.cooldown--;
            }

            // ===== 渡劫检查 =====
            this.checkTribulation();

            // ===== 昼夜循环系统 =====
            GameData.time.tickAccum++;
            if(GameData.time.tickAccum >= 6) { // 每6秒推进1游戏小时
                GameData.time.tickAccum = 0;
                GameData.time.hour = (GameData.time.hour + 1) % 24;
                const newPeriod = getCurrentPeriod(GameData.time.hour);

                // 昼夜切换通知
                const oldPhase = GameData.time.phase;
                GameData.time.phase = newPeriod.key;
                GameData.time.isNight = newPeriod.key === 'night';

                if(oldPhase !== newPeriod.key) {
                    this.updateSkyColors();
                    this.updateTimeUI();
                    const cw = this.cameras.main.width, ch = this.cameras.main.height;
                    if(newPeriod.key === 'night') {
                        this.showMsg('🌙 幽夜降临! 妖兽×1.5 阵法×0.7 慎守!');
                        // 夜间警告闪烁
                        const warn = this.add.rectangle(cw/2, ch/2, cw, ch, 0x1a0030, 0.3).setDepth(100);
                        this.tweens.add({ targets: warn, alpha: 0, duration: 800, onComplete: () => warn.destroy() });
                    } else if(newPeriod.key === 'dawn') {
                        this.showMsg('🌅 破晓! 灵气回复×1.5 抓紧恢复!');
                        // 破晓金光
                        const dawnFx = this.add.rectangle(cw/2, ch/2, cw, ch, 0x3a2a00, 0.15).setDepth(100);
                        this.tweens.add({ targets: dawnFx, alpha: 0, duration: 600, onComplete: () => dawnFx.destroy() });
                    } else if(newPeriod.key === 'day') {
                        this.showMsg('☀️ 天明! 阵法恢复正常效率!');
                    } else if(newPeriod.key === 'dusk') {
                        this.showMsg('🌇 日暮! 妖兽开始增强(×1.2)，注意防守!');
                    }
                } else {
                    this.updateSkyColors();
                    this.updateTimeUI();
                }
            }

            // 灵气自动恢复（昼夜影响恢复速率）
            const treeLevel = GameData.tree.level;
            let regen = treeLevel < TREE_LEVELS.length ? TREE_LEVELS[treeLevel].regen : 15;
            const period = getCurrentPeriod(GameData.time.hour);
            regen = Math.ceil(regen * period.spiritRegenMult); // 使用ceil避免floor吞掉破晓×1.5加成
            // 卯时额外恢复（即使基础恢复为0也至少恢复1）
            if(period.key === 'dawn' && regen === 0) regen = 1;

            if(regen > 0 && GameData.tree.spirit < GameData.tree.spiritCapacity) {
                // 灵兽被动：灵气回复加成
                if(GameData.spiritBeast.contracted) {
                    const bDef = SPIRIT_BEASTS.find(b => b.id === GameData.spiritBeast.contracted.id);
                    if(bDef && bDef.passiveType === 'spirit_regen') {
                        regen = Math.floor(regen * (1 + bDef.passiveMult));
                    }
                }
                // 功法加成：炼丹术（灵气回复+50%）
                const regenArtBonus = this.getArtBonus('spiritRegen');
                if(regenArtBonus > 0) regen = Math.floor(regen * (1 + regenArtBonus));
                GameData.tree.spirit = Math.min(GameData.tree.spirit + regen, GameData.tree.spiritCapacity);
                this.spiritText.setText(`${Math.max(0, GameData.tree.spirit)}/${GameData.tree.spiritCapacity}`);
            }

            // ===== 灵兽被动：阵法耐久加成 =====
            // (在创建阵法时应用maxDurability加成)

            // ===== 灼烧效果（凤炎·焚）=====
            GameData.talismans.activeEffects.filter(e => e.type === 'burn').forEach(burn => {
                this.monsters.slice().forEach(m => {
                    if(m && m.active) {
                        this.damageMonster(m, burn.power);
                    }
                });
            });

            // ===== 符箓冷却更新 =====
            GameData.talismans.owned.forEach(t => {
                if(t.cooldown > 0) t.cooldown--;
            });
            // 符箓效果持续时间更新
            GameData.talismans.activeEffects = GameData.talismans.activeEffects.filter(e => {
                e.remaining--;
                if(e.remaining <= 0) {
                    // burn类型来自灵兽凤炎·焚，TALISMAN_TYPES中无此键
                    if(e.type === 'burn') {
                        this.showMsg('🔥 灼烧效果结束');
                    } else if(TALISMAN_TYPES[e.type]) {
                        this.showMsg(`${TALISMAN_TYPES[e.type].icon} ${TALISMAN_TYPES[e.type].name}效果结束`);
                    }
                    return false;
                }
                return true;
            });
            this.updateTalismanUI();

            if(this.isWaveActive) return;
            this.waveTimer = Math.max(0, this.waveTimer - 1);
            this.updateTimerDisplay();
            if(this.waveTimer <= 0) {
                this.showMsg('⚔ 准备时间结束，妖兽来袭!');
                this.startWave();
            }
            } catch(err) {
                console.error('❌ tick() error:', err);
                const errDiv = document.createElement('div');
                errDiv.style.cssText = 'position:fixed;bottom:60px;left:10px;max-width:90%;background:rgba(255,0,0,0.9);color:#fff;padding:8px 12px;z-index:9999;font-size:11px;border-radius:6px;word-break:break-all;';
                errDiv.textContent = 'tick Error: ' + err.message + ' (line:' + (err.lineNumber||'?') + ')';
                document.body.appendChild(errDiv);
                setTimeout(() => errDiv.remove(), 10000);
            }
        }

        // 更新昼夜UI
        updateTimeUI() {
            const period = getCurrentPeriod(GameData.time.hour);
            const timeEl = document.getElementById('time-indicator');
            if(timeEl) {
                const iconEl = document.getElementById('time-icon');
                const nameEl = document.getElementById('time-name');
                const hourEl = document.getElementById('time-hour');
                if(iconEl) iconEl.textContent = period.icon;
                if(nameEl) nameEl.textContent = period.name;
                // 时辰名称映射
                const hourNames = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
                const hourIdx = Math.floor(GameData.time.hour / 2);
                const suffix = GameData.time.hour % 2 === 0 ? '时初' : '时正';
                if(hourEl) hourEl.textContent = hourNames[hourIdx] + suffix + ' (' + GameData.time.hour + ':00)';

                // 更新距离下一时段提示
                const progressEl = document.getElementById('time-progress');
                if(progressEl) {
                    const hour = GameData.time.hour;
                    const phaseOrder = [
                        { key: 'dawn', start: 5, label: '🌅破晓' },
                        { key: 'day', start: 7, label: '☀️天明' },
                        { key: 'dusk', start: 17, label: '🌇日暮' },
                        { key: 'night', start: 19, label: '🌙幽夜' }
                    ];
                    let nextPhase = phaseOrder.find(p => p.start > hour);
                    if(!nextPhase) nextPhase = phaseOrder[0]; // wrap around
                    const hoursUntil = nextPhase.start > hour ? nextPhase.start - hour : (24 - hour + nextPhase.start);
                    progressEl.textContent = `${hoursUntil}h→${nextPhase.label}`;
                }

                // 更新时段样式类
                timeEl.className = 'period-' + period.key;

                // 更新效果提示
                const effectsEl = document.getElementById('time-effects');
                if(effectsEl) {
                    const desc = {
                        dawn: '🌅 破晓 — 灵气回升，妖兽蛰伏',
                        day: '☀️ 白天 — 万象平稳',
                        dusk: '🌇 日暮 — 妖兽渐起，阵法微弱',
                        night: '🌙 幽夜 — 妖兽猖獗，阵法式微'
                    };
                    const spiritClass = period.spiritRegenMult > 1 ? 'effect-positive' : period.spiritRegenMult < 1 ? 'effect-negative' : 'effect-neutral';
                    const formClass = period.formationMult > 1 ? 'effect-positive' : period.formationMult < 1 ? 'effect-negative' : 'effect-neutral';
                    const monsClass = period.monsterMult < 1 ? 'effect-positive' : period.monsterMult > 1 ? 'effect-negative' : 'effect-neutral';
                    effectsEl.innerHTML = `
                        <div class="effect-neutral">${desc[period.key]}</div>
                        <div class="${spiritClass}">灵气回复 ×${period.spiritRegenMult}</div>
                        <div class="${formClass}">阵法效率 ×${period.formationMult}</div>
                        <div class="${monsClass}">妖兽强度 ×${period.monsterMult}</div>
                    `;
                }
            }
        }

        // ===== 符箓系统 =====
        initTalismans() {
            // 初始给1个天雷符
            GameData.talismans.owned = [
                { type: 'attack', count: 1, cooldown: 0, maxCooldown: TALISMAN_TYPES.attack.cooldown },
                { type: 'slow',   count: 0, cooldown: 0, maxCooldown: TALISMAN_TYPES.slow.cooldown },
                { type: 'shield', count: 0, cooldown: 0, maxCooldown: TALISMAN_TYPES.shield.cooldown }
            ];
            GameData.talismans.activeEffects = [];
            this.updateTalismanUI();
        }

        updateTalismanUI() {
            const bar = document.getElementById('talisman-bar');
            if(!bar) return;
            bar.innerHTML = '';

            GameData.talismans.owned.forEach((t, idx) => {
                const config = TALISMAN_TYPES[t.type];
                const isOnCooldown = t.cooldown > 0;
                const isUsedUp = t.count <= 0;
                const disabled = isOnCooldown || isUsedUp;

                const slot = document.createElement('div');
                slot.className = 'talisman-slot' + (disabled ? ' on-cooldown' : '');
                slot.innerHTML = `
                    <div class="talisman-icon">${config.icon}</div>
                    <div class="talisman-name">${config.name}</div>
                    <div class="talisman-count">x${t.count}</div>
                    <button class="talisman-shop-btn" data-type="${t.type}">💎${config.cost}</button>
                    ${isOnCooldown ? `<div class="talisman-cooldown-overlay">${t.cooldown}</div>` : ''}
                `;

                // 点击使用符箓
                slot.addEventListener('click', (e) => {
                    if(e.target.classList.contains('talisman-shop-btn')) return;
                    if(disabled) return;
                    this.useTalisman(t.type);
                });

                // 购买按钮
                slot.querySelector('.talisman-shop-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.buyTalisman(t.type);
                });

                bar.appendChild(slot);
            });
        }

        useTalisman(type) {
            if(this.isGameOver) return; // 游戏已结束
            const t = GameData.talismans.owned.find(t => t.type === type);
            if(!t || t.count <= 0 || t.cooldown > 0) return;

            t.count--;
            t.cooldown = t.maxCooldown;

            const config = TALISMAN_TYPES[type];

            if(type === 'attack') {
                // 天雷符：对所有在场妖兽造成伤害
                const dmg = config.power + GameData.tree.level * 20;
                let hitCount = 0;
                this.monsters.slice().forEach(m => {
                    if(m && m.active) {
                        this.damageMonster(m, dmg, true);
                        hitCount++;
                        // 雷击特效
                        const bolt = this.add.circle(m.x, m.y, 30, 0xFFD700, 0.9);
                        this.tweens.add({ targets: bolt, scale: 2, alpha: 0, duration: 400, onComplete: () => bolt.destroy() });
                    }
                });
                this.showMsg(`⚡ 天雷符! ${hitCount}只妖兽受创!`);
                // 全屏闪光
                const flash = this.add.rectangle(this.cameras.main.width/2, this.cameras.main.height/2,
                    this.cameras.main.width, this.cameras.main.height, 0xFFD700, 0.3).setDepth(999);
                this.tweens.add({ targets: flash, alpha: 0, duration: 300, onComplete: () => flash.destroy() });

            } else if(type === 'slow') {
                // 定身符：冻结所有怪物3秒
                GameData.talismans.activeEffects.push({ type: 'slow', remaining: config.power, power: config.power });
                this.monsters.forEach(m => {
                    if(m && m.active) {
                        // 暂停怪物移动tween
                        this.tweens.getAllTweens().forEach(tw => {
                            if(tw.targets && tw.targets.includes(m)) {
                                tw.pause();
                            }
                        });
                        // 冻结视觉效果 - 跟随怪物
                        const iceOverlay = this.add.circle(m.x, m.y, 25, 0x4169E1, 0.3);
                        m.setData('iceOverlay', iceOverlay);
                        // 冰冻overlay跟随怪物移动
                        const iceFollow = this.time.addEvent({
                            delay: 16, loop: true,
                            callback: () => {
                                if(iceOverlay && iceOverlay.active && m && m.active) {
                                    iceOverlay.setPosition(m.x, m.y);
                                } else {
                                    iceFollow.remove();
                                }
                            }
                        });
                        this.tweens.add({ targets: iceOverlay, alpha: 0.1, duration: 500, yoyo: true, repeat: 5 });
                        // 延迟恢复
                        this.time.delayedCall(config.power * 1000, () => {
                            if(iceOverlay && iceOverlay.active) iceOverlay.destroy();
                            // 恢复怪物移动tween
                            this.tweens.getAllTweens().forEach(tw => {
                                if(tw.targets && tw.targets.includes(m) && tw.isPaused()) {
                                    tw.resume();
                                }
                            });
                        });
                    }
                });
                this.showMsg(`❄️ 定身符! 冻结${config.power}秒!`);

            } else if(type === 'shield') {
                // 金钟符：灵木3秒免疫伤害
                GameData.talismans.activeEffects.push({ type: 'shield', remaining: config.power, power: config.power });
                // 金钟视觉
                if(this.treeGlow) {
                    this.treeGlow.setStrokeStyle(4, 0x5CBF7C);
                    this.treeGlow.setFillStyle(0x5CBF7C, 0.2);
                }
                this.time.delayedCall(config.power * 1000, () => {
                    if(this.treeGlow && this.treeGlow.active) {
                        this.treeGlow.setStrokeStyle(0);
                        this.treeGlow.setFillStyle(0x4A7C59, 0.08);
                    }
                });
                this.showMsg(`🛡️ 金钟符! ${config.power}秒护体!`);
            }

            this.updateTalismanUI();
        }

        buyTalisman(type) {
            if(this.isGameOver) return; // 游戏已结束
            const config = TALISMAN_TYPES[type];
            if(GameData.player.spiritStones < config.cost) {
                this.showMsg('灵石不足!');
                return;
            }
            GameData.player.spiritStones -= config.cost;
            const t = GameData.talismans.owned.find(t => t.type === type);
            if(t) t.count++;
            this.updateUI();
            this.updateTalismanUI();
            this.showMsg(`获得${config.icon}${config.name}!`);
        }

        updateUI() {
            this.stoneText.setText(`${GameData.player.spiritStones}`);
            this.spiritText.setText(`${Math.max(0, GameData.tree.spirit)}/${GameData.tree.spiritCapacity}`);
            this.waveText.setText(`波次 ${GameData.battle.currentWave}/50`);

            // 更新经验条
            if(this.expBarFill && this.expBarFill.active) {
                const nextLevelData = GameData.tree.level + 1 < TREE_LEVELS.length ? TREE_LEVELS[GameData.tree.level + 1] : null;
                const expPercent = nextLevelData ? Math.min(1, GameData.tree.exp / nextLevelData.expNeeded) : 1;
                this.expBarFill.setDisplaySize(Math.max(1, 68 * expPercent), 6);
                // 经验条颜色：满变金色
                if(expPercent >= 1) {
                    this.expBarFill.setFillStyle(0xFFD700);
                } else {
                    this.expBarFill.setFillStyle(0x4A7C59);
                }
            }

            // 更新灵木等级文本
            if(this.treeLevelText && this.treeLevelText.active) {
                this.treeLevelText.setText(`Lv.${GameData.tree.level} 灵木`);
            }

            // 更新游戏场景中灵木主体旁的标签
            if(this.treeLabel && this.treeLabel.active) {
                this.treeLabel.setText(`Lv.${GameData.tree.level} ${TREE_LEVELS[GameData.tree.level].name}`);
            }

            // 更新经验数值
            this.updateExpText();

            // 更新阵法位信息
            if(this.slotInfoText && this.slotInfoText.active) {
                const uc = this.getUnlockedSlotCount();
                const pc = this.formations.length;
                this.slotInfoText.setText(`⭕ 阵法位 ${pc}/${uc}`);
            }

            // 更新阵法视觉 - 等级越高外观越强
            this.formations.forEach(slot => {
                if(slot.formation && slot.formation.levelBadge) {
                    const lvl = slot.formation.level;
                    slot.formation.levelBadge.setText(`Lv.${lvl}`);

                    // 阵法尺寸随等级增长
                    const baseSize = 28;
                    const newSize = baseSize + lvl * 3;
                    if(slot.formation.sprite && slot.formation.sprite.active) {
                        slot.formation.sprite.setDisplaySize(newSize * 2, newSize * 2);
                        // 高等级阵法边框更亮
                        if(lvl >= 5) {
                            slot.formation.sprite.setStrokeStyle(3, 0xFFD700);
                        } else if(lvl >= 3) {
                            slot.formation.sprite.setStrokeStyle(2, 0xCCCCCC);
                        }
                    }

                    // 槽位底座也随之变大
                    if(slot.bg && slot.bg.active) {
                        slot.bg.setDisplaySize((newSize + 6) * 2, (newSize + 6) * 2);
                    }

                    // 旋转光环也随之变大
                    if(slot.formation.orbitRing && slot.formation.orbitRing.active) {
                        const ringSize = newSize + 8;
                        slot.formation.orbitRing.setDisplaySize(ringSize * 2, ringSize * 2);
                        // 高等级加速旋转
                        if(lvl >= 5) {
                            this.tweens.killTweensOf(slot.formation.orbitRing, 'angle');
                            this.tweens.add({ targets: slot.formation.orbitRing, angle: 360, duration: 4000, repeat: -1 });
                        }
                    }

                    // 粒子也随之变大
                    if(slot.formation.particles) {
                        const particleRadius = 3 + Math.floor(lvl / 3);
                        slot.formation.particles.forEach(p => {
                            if(p && p.active) p.setDisplaySize(particleRadius * 2, particleRadius * 2);
                        });
                    }
                }
            });
        }

        // ===== 灵木升级系统 =====
        checkTreeLevelUp() {
            const currentLevel = GameData.tree.level;
            if(currentLevel >= TREE_LEVELS.length - 1) return; // 已满级
            const nextLevelData = TREE_LEVELS[currentLevel + 1];
            if(!nextLevelData) return;

            if(GameData.tree.exp >= nextLevelData.expNeeded) {
                GameData.tree.exp -= nextLevelData.expNeeded;
                GameData.tree.level++;
                GameData.tree.spiritCapacity = nextLevelData.capacity;
                // 升级时灵气补满
                GameData.tree.spirit = nextLevelData.capacity;
                this.updateUI();

                // 灵木形态视觉进化
                this.renderTreeByLevel();

                // 升级特效
                this.showTreeLevelUpEffect();
                this.showMsg(`灵木升级! → ${nextLevelData.name}`);

                // 检查是否解锁新阵法位
                this.checkSlotUnlock();

                // 更新境界
                this.updateRealm();
                // 递归检查是否可以连续升级
                this.checkTreeLevelUp();
            }
        }

        // 更新境界显示（灵木等级→修仙境界）
        updateRealm() {
            const level = GameData.tree.level;
            const tribulations = GameData.tribulation.completed.length;
            let realm = '炼气期';
            if(tribulations >= 3) realm = '元婴期';
            else if(tribulations >= 2) realm = '金丹期';
            else if(tribulations >= 1) realm = '筑基期';
            else if(level >= 5) realm = '筑基期';
            else if(level >= 3) realm = '炼气后期';
            GameData.player.realm = realm;
            if(this.realmText && this.realmText.active) {
                this.realmText.setText('✦ ' + realm);
            }
        }

        updateExpText() {
            if(!this.expText || !this.expText.active) return;
            const nextLevelData = GameData.tree.level + 1 < TREE_LEVELS.length ? TREE_LEVELS[GameData.tree.level + 1] : null;
            if(nextLevelData) {
                this.expText.setText(`${GameData.tree.exp}/${nextLevelData.expNeeded}`);
            } else {
                this.expText.setText('MAX');
            }
        }

        showTreeLevelUpEffect() {
            // 灵木升级光效
            const glow = this.add.circle(this.treeX, this.treeY, 60, 0xFFD700, 0.6);
            this.tweens.add({ targets: glow, scale: 3, alpha: 0, duration: 800, onComplete: () => glow.destroy() });

            // 粒子散射
            for(let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const p = this.add.circle(this.treeX, this.treeY, 4, 0xFFD700, 0.8);
                this.tweens.add({
                    targets: p,
                    x: this.treeX + Math.cos(angle) * 120,
                    y: this.treeY + Math.sin(angle) * 120,
                    alpha: 0, scale: 0.3, duration: 600,
                    onComplete: () => p.destroy()
                });
            }
        }

        showTreeUpgradeDialog() {
            const currentLevel = GameData.tree.level;
