        startWave() {
            if(this.isGameOver) return;
            if(this.isWaveActive) { this.showMsg('波次进行中!'); return; }

            // 死亡螺旋保护：所有阵法被毁且灵石不足时，免费赐予一座阵法
            const hasAnyFormation = this.formations.length > 0;
            if(!hasAnyFormation) {
                const elements = ['METAL', 'WOOD', 'WATER', 'FIRE', 'EARTH'];
                const randomElement = elements[Math.floor(Math.random() * elements.length)];
                const firstEmptySlot = this.slots.find(s => !s.occupied);
                if(firstEmptySlot) {
                    const slotIndex = this.slots.indexOf(firstEmptySlot);
                    this.autoPlaceFormation(slotIndex, randomElement);
                    this.showMsg(`✦ 天恩赐阵! 免费放置${ELEMENTS[randomElement].name}阵法!`);
                    this.updateUI();
                }
            }

            this.isWaveActive = true;
            GameData.battle.weakenActive = false; // 新波次清除妖气衰退标记
            this.waveDamageTaken = 0; // 重置波次伤害追踪
            this.currentWaveNum = GameData.battle.currentWave + 1;
            GameData.battle.currentWave = this.currentWaveNum;
            this.updateTimerDisplay();

            // 5波循环：每5波一个周期，第5波为妖王波
            GameData.battle.waveCycle = Math.ceil(this.currentWaveNum / 5);
            const isInCycle = this.currentWaveNum % 5 === 0; // 是否为妖王波

            if(isInCycle) {
                this.showMsg(`⚡ 第${GameData.battle.waveCycle}轮·妖王来袭!`);
            } else {
                this.showMsg(`第${this.currentWaveNum}波妖兽来袭!`);
            }

            // 波次追踪：记录本波唯一ID、应生成总数、已生成/已击杀
            this.currentWaveId++;
            const waveId = this.currentWaveId;
            const w = this.cameras.main.width, h = this.cameras.main.height;
            let count = 5 + Math.floor(this.currentWaveNum / 3);

            // 妖王波：怪物数量翻倍
            if(isInCycle) {
                count = Math.floor(count * 1.5);
            }

            // 夜间额外加成
            const period = getCurrentPeriod(GameData.time.hour);
            if(period.key === 'night') {
                count += 2;
                this.showMsg('🌙 夜间妖兽加成!');
            }

            GameData.battle.totalThisWave = count;
            GameData.battle.spawnedThisWave = 0;
            GameData.battle.killedThisWave = 0;

            // 清除上一波残留的spawn定时器
            this.spawnTimers.forEach(t => { if(t) t.remove(); });
            this.spawnTimers = [];

            for(let i = 0; i < count; i++) {
                const timer = this.time.delayedCall(i * 1200, () => {
                    if(this.currentWaveId === waveId && this.isWaveActive) {
                        this.spawnMonster(w, h, isInCycle && i === count - 1); // 最后一只为妖王
                        GameData.battle.spawnedThisWave++;
                    }
                });
                this.spawnTimers.push(timer);
            }

            this.monsterAttackTimer = this.time.addEvent({
                delay: 1000, callback: this.formationsAttack, callbackScope: this, loop: true
            });
            // 安全上限：60秒后强制结束波次
            this.waveEndTimer = this.time.delayedCall(60000, () => {
                if(this.isWaveActive) this.endWave();
            });
        }

        updateTimerDisplay() {
            if(this.isWaveActive) {
                this.timerText.setText('⚔ 战斗中');
                this.timerText.setColor('#5CBF7C');
                if(this.startCountdownText && this.startCountdownText.active) {
                    this.startCountdownText.setText('⚔ 战斗中');
                    this.startCountdownText.setColor('#5CBF7C');
                    this.startCountdownBg.setStrokeStyle(2, 0x5CBF7C);
                }
            } else {
                this.timerText.setText(`⏱ ${this.waveTimer}秒`);
                this.timerText.setColor('#FF6347');
                if(this.startCountdownText && this.startCountdownText.active) {
                    this.startCountdownText.setText(`⚔ ${this.waveTimer}秒后出战`);
                    this.startCountdownText.setColor('#FFD700');
                    this.startCountdownBg.setStrokeStyle(2, 0xFF6347);
                    // 倒计时5秒内变红并加速脉动
                    if(this.waveTimer <= 5) {
                        this.startCountdownText.setColor('#FF4444');
                        this.startCountdownBg.setStrokeStyle(2, 0xFF4444);
                    }
                }
            }
        }

        spawnMonster(w, h, isBoss = false) {
            const side = Math.random() < 0.5 ? 0 : 1;
            const x = side === 0 ? -30 : w + 30;
            const y = Phaser.Math.Between(h * 0.2, h * 0.45);

            let typeIdx = Math.min(Math.floor(GameData.battle.currentWave / 5), MONSTER_TYPES.length - 1);
            let mt = MONSTER_TYPES[typeIdx];

            // 妖王波：必定为蛟龙
            if(isBoss) {
                mt = MONSTER_TYPES[MONSTER_TYPES.length - 1]; // 蛟龙
            }

            const eColorNum = parseInt(ELEMENTS[mt.element].color.replace('#', ''), 16);

            // 波次缩放
            let waveScale = 1 + (Math.max(1, GameData.battle.currentWave) - 1) * 0.08;
            let scaledHp = Math.floor(mt.hp * waveScale);
            let scaledDamage = Math.floor(mt.damage * waveScale);

            // 昼夜系统：夜间怪物加成
            const period = getCurrentPeriod(GameData.time.hour);
            scaledHp = Math.floor(scaledHp * period.monsterMult);
            scaledDamage = Math.floor(scaledDamage * period.monsterMult);

            // 妖王额外属性
            if(isBoss) {
                scaledHp = Math.floor(scaledHp * 2.5);
                scaledDamage = Math.floor(scaledDamage * 1.8);
            }

            // 天命事件：妖气衰退（本波怪物HP减半）
            if(GameData.battle.weakenActive) {
                scaledHp = Math.floor(scaledHp * 0.5);
            }

            // 怪物大小
            const monsterRadius = isBoss ? 32 : 22;
            const iconSize = isBoss ? '32px' : '22px';

            // 妖兽主体 - 外层元素光环（旋转）
            const outerGlow = this.add.circle(x, y, monsterRadius + 8, eColorNum, 0.15);
            this.tweens.add({ targets: outerGlow, scaleX: 1.3, scaleY: 1.3, alpha: 0.05, duration: 1000, yoyo: true, repeat: -1 });

            // 妖兽主体
            const monster = this.add.circle(x, y, monsterRadius, eColorNum, 1)
                .setStrokeStyle(isBoss ? 4 : 2, isBoss ? 0xFFD700 : eColorNum);

            // 内层纹理（让怪物不再纯色）
            const innerRing = this.add.circle(x, y, monsterRadius * 0.5, 0x000000, 0.2);

            // 怪物图标
            const monsterIcon = this.add.text(x, y, mt.icon, { fontSize: iconSize }).setOrigin(0.5);

            // 血条
            const hpBarWidth = isBoss ? 50 : 36, hpBarHeight = isBoss ? 7 : 5;
            const hpBg = this.add.rectangle(x, y - (isBoss ? 42 : 32), hpBarWidth + 2, hpBarHeight + 2, 0x000000, 0.7).setOrigin(0.5);
            const hpBar = this.add.rectangle(x - hpBarWidth/2, y - (isBoss ? 42 : 32), hpBarWidth, hpBarHeight, 0x44FF44, 1).setOrigin(0, 0.5);

            // 妖兽名字（妖王显示称号）
            const displayName = isBoss ? '妖王·' + mt.name : mt.name;
            const nameTag = this.add.text(x, y - (isBoss ? 54 : 42), displayName, {
                fontSize: isBoss ? '13px' : '11px', color: isBoss ? '#FFD700' : '#FFF',
                stroke: '#000', strokeThickness: 2,
                fontStyle: isBoss ? 'bold' : 'normal'
            }).setOrigin(0.5);

            monster.setData('hp', scaledHp);
            monster.setData('maxHp', scaledHp);
            monster.setData('damage', scaledDamage);
            monster.setData('reward', isBoss ? mt.reward * 3 : mt.reward);
            monster.setData('element', mt.element);
            monster.setData('spiritDrop', mt.spiritDrop);
            monster.setData('expDrop', isBoss ? [mt.expDrop[0] * 3, mt.expDrop[1] * 3] : mt.expDrop);
            monster.setData('icon', monsterIcon);
            monster.setData('hpBar', hpBar);
            monster.setData('hpBg', hpBg);
            monster.setData('nameTag', nameTag);
            monster.setData('isBoss', isBoss);
            monster.setData('hpBarWidth', hpBarWidth);
            monster.setData('outerGlow', outerGlow);
            monster.setData('innerRing', innerRing);
            monster.setData('side', side);
            monster.setData('startX', x);
            monster.setData('progress', 0);
            monster.setData('special', mt.special);
            monster.setData('speed', mt.speed); // 保存妖兽速度数据

            // 妖王光环效果
            if(isBoss) {
                const bossGlow = this.add.circle(x, y, 40, 0xFFD700, 0.15);
                this.tweens.add({ targets: bossGlow, scale: 1.3, alpha: 0.05, duration: 800, yoyo: true, repeat: -1 });
                monster.setData('bossGlow', bossGlow);
            }

            // 符箓效果：定身符 - 新怪物也被冻结
            const slowEffect = GameData.talismans.activeEffects.find(e => e.type === 'slow');
            const moveDuration = slowEffect ? 6000 : 3000; // 冻结时移动极慢

            this.tweens.add({
                targets: [monster, monsterIcon, hpBar, hpBg, nameTag, outerGlow, innerRing].concat(isBoss ? [monster.getData('bossGlow')] : []).filter(Boolean),
                x: this.treeX + (side === 0 ? 60 : -60),
                duration: moveDuration, ease: 'Sine.easeIn',
                onUpdate: () => {
                    // 移动拖尾粒子
                    if(monster.active && Math.random() < 0.3) {
                        const trail = this.add.circle(monster.x, monster.y, isBoss ? 5 : 3, eColorNum, 0.5);
                        this.tweens.add({ targets: trail, alpha: 0, scale: 0.2, duration: 400, onComplete: () => trail.destroy() });
                    }
                    // 更新附属物位置（确保跟随）
                    const icon = monster.getData('icon');
                    const bar = monster.getData('hpBar');
                    const bg = monster.getData('hpBg');
                    const tag = monster.getData('nameTag');
                    const oGlow = monster.getData('outerGlow');
                    const iRing = monster.getData('innerRing');
                    const bGlow = monster.getData('bossGlow');
                    // 更新行进进度（0=出发，1=到达灵木）
                    const startX = monster.getData('startX') || x;
                    const endX = this.treeX + (side === 0 ? 60 : -60);
                    const totalDist = Math.abs(endX - startX);
                    const currentDist = Math.abs(monster.x - startX);
                    monster.setData('progress', totalDist > 0 ? currentDist / totalDist : 0);
                    // tween已经在移动这些对象，无需手动跟随
                },
                onComplete: () => this.monsterAttack(monster)
            });

            // 入场特效：妖兽出生闪光
            const spawnFx = this.add.circle(x, y, monsterRadius, 0xFFFFFF, 0.8);
            this.tweens.add({ targets: spawnFx, scale: 2.5, alpha: 0, duration: 400, onComplete: () => spawnFx.destroy() });

            // 妖王入场特殊特效：红色警告波纹
            if(isBoss) {
                const warnRing = this.add.circle(x, y, 10, 0xFF0000, 0.6);
                this.tweens.add({ targets: warnRing, scale: 8, alpha: 0, duration: 1000, onComplete: () => warnRing.destroy() });
                const warnRing2 = this.add.circle(x, y, 10, 0xFFD700, 0.4);
                this.tweens.add({ targets: warnRing2, scale: 6, alpha: 0, duration: 800, delay: 200, onComplete: () => warnRing2.destroy() });
            }

            this.monsters.push(monster);
        }

        monsterAttack(monster) {
            if(!monster || !monster.active || this.isGameOver) return;

            // 游戏暂停时（天命/渡劫弹窗），延迟重试而不是继续攻击
            if(this.isPaused) {
                this.time.delayedCall(500, () => { if(monster && monster.active && !this.isGameOver) this.monsterAttack(monster); });
                return;
            }

            // 灵兽技能：眩晕中，延迟重试
            if(monster.getData('stunned')) {
                this.time.delayedCall(500, () => { if(monster && monster.active) this.monsterAttack(monster); });
                return;
            }

            // 符箓效果：定身符 - 怪物被冻结，延迟重试
            const slowEffect = GameData.talismans.activeEffects.find(e => e.type === 'slow');
            if(slowEffect) {
                this.time.delayedCall(1000, () => {
                    if(monster && monster.active) this.monsterAttack(monster);
                });
                return;
            }

            // 符箓效果：金钟符 - 免疫伤害，延迟重试
            const shieldEffect = GameData.talismans.activeEffects.find(e => e.type === 'shield');
            if(shieldEffect) {
                this.time.delayedCall(1000, () => {
                    if(monster && monster.active) this.monsterAttack(monster);
                });
                return;
            }

            let dmg = monster.getData('damage');
            // 怪物特殊技能：毒雾(poiseon)额外灵木伤害
            const special = monster.getData('special');

            // 妖兽优先攻击路径上的阵法
            let attackedFormation = false;
            const mSide = monster.getData('side');
            const mProgress = monster.getData('progress') || 0;
            // 只在接近阵法时攻击（progress > 0.5 表示过了半程）
            if(mProgress > 0.4) {
                for(const slot of this.formations) {
                    if(!slot.formation || slot.formation.durability <= 0) continue;
                    const dist = Phaser.Math.Distance.Between(monster.x, monster.y, slot.x, slot.y);
                    if(dist < 80) { // 阵法攻击范围
                        // 攻击阵法
                        slot.formation.durability = Math.max(0, slot.formation.durability - dmg);
                        attackedFormation = true;

                        // 阵法受击震动
                        if(slot.formation.sprite && slot.formation.sprite.active) {
                            this.tweens.add({ targets: slot.formation.sprite, x: slot.x + 3, duration: 50, yoyo: true, repeat: 2,
                                onComplete: () => { if(slot.formation.sprite.active) slot.formation.sprite.x = slot.x; }
                            });
                        }

                        // 更新耐久度条
                        this.updateDurabilityBar(slot);

                        // 阵法被摧毁
                        if(slot.formation.durability <= 0) {
                            this.destroyFormation(slot);
                        }
                        break; // 每次只攻击一个阵法
                    }
                }
            }

            // 没有可攻击的阵法时，攻击灵木
            if(!attackedFormation) {
                GameData.tree.spirit -= dmg;
                this.waveDamageTaken += dmg;

                // 怪物特殊技能：毒雾(poison)额外造成50%灵气伤害
                if(special === 'poison') {
                    const poisonDmg = Math.floor(dmg * 0.5);
                    GameData.tree.spirit -= poisonDmg;
                    this.waveDamageTaken += poisonDmg;
                    this.showMsg(`☠️ 毒雾! 额外-${poisonDmg}灵气`);
                }

                // 灵木受击闪红效果
                if(this.tree && this.tree.active) {
                    const origColor = this.tree.fillColor;
                    this.tree.setFillStyle(0xFF0000, 1);
                    this.time.delayedCall(150, () => {
                        if(this.tree && this.tree.active) this.tree.setFillStyle(origColor, 1);
                    });
                }
                this.showMsg(`-${dmg} 灵气`);
            }

            this.updateUI();

            if(GameData.tree.spirit <= 0) {
                this.gameOver();
                return;
            }

            this.time.delayedCall(1000, () => {
                if(monster && monster.active && !this.isGameOver) this.monsterAttack(monster);
            });
        }

        formationsAttack() {
            if(this.monsters.length === 0 || this.isPaused) return;

            this.formations.forEach(slot => {
                if(!slot.formation) return;
                const fElement = slot.formation.type;
                const level = slot.formation.level;

                // ===== 升级属性 =====
                // 伤害：15 + 10*等级 + 5*等级²（二次方增长，后期可跟上怪物HP缩放）
                const damage = 15 + 10 * level + 5 * level * level;
                // 攻击范围：400 + 80 * 等级（等级越高打得越远）
                const range = 400 + 80 * level;
                // 攻击目标数：1 + floor(等级/2)（1级1目标，2-3级2目标，4-5级3目标...）
                const maxTargets = 1 + Math.floor(level / 2);
                // 弹道大小：5 + 等级 * 2（等级越高弹丸越大）
                const projSize = 5 + level * 2;
                // 弹道速度：250 - level * 15（等级越高越快，最低120）
                const projSpeed = Math.max(120, 250 - level * 15);

                const inRange = this.monsters.filter(m => {
                    if(!m || !m.active) return false;
                    return Phaser.Math.Distance.Between(slot.x, slot.y, m.x, m.y) < range;
                });

                inRange.sort((a, b) =>
                    Phaser.Math.Distance.Between(slot.x, slot.y, a.x, a.y) -
                    Phaser.Math.Distance.Between(slot.x, slot.y, b.x, b.y)
                );

                inRange.slice(0, maxTargets).forEach(target => {
                    if(!target || !target.active) return;
                    const mElement = target.getData('element');
                    const isEffective = ELEMENTS[fElement].beats === mElement;
                    // 被克制：阵法元素被怪物元素克制
                    const isResisted = ELEMENTS[mElement] && ELEMENTS[mElement].beats === fElement;
                    let finalDamage = damage;
                    if(isEffective) finalDamage = Math.floor(damage * 1.5);
                    else if(isResisted) finalDamage = Math.floor(damage * 0.5);

                    // 灵木等级加成：每级+8%伤害（后期核心输出来源）
                    finalDamage = Math.floor(finalDamage * (1 + (GameData.tree.level - 1) * 0.08));

                    // 昼夜系统：夜间阵法效率降低
                    const period = getCurrentPeriod(GameData.time.hour);
                    finalDamage = Math.floor(finalDamage * period.formationMult);

                    // 怪物特殊技能：魅惑(charm)使阵法伤害降低50%
                    if(target.getData('special') === 'charm') {
                        finalDamage = Math.floor(finalDamage * 0.5);
                    }

                    // 灵兽被动：伤害加成
                    if(GameData.spiritBeast.contracted) {
                        const bDef = SPIRIT_BEASTS.find(b => b.id === GameData.spiritBeast.contracted.id);
                        if(bDef && bDef.passiveType === 'damage_boost') {
                            if(bDef.passiveElement === 'ALL' || bDef.passiveElement === fElement) {
                                finalDamage = Math.floor(finalDamage * (1 + bDef.passiveMult));
                            }
                        }
                    }

                    // 功法加成：万剑诀（阵法伤害+25%）
                    const artDmgBonus = this.getArtBonus('formationDamage');
                    if(artDmgBonus > 0) finalDamage = Math.floor(finalDamage * (1 + artDmgBonus));

                    // 功法加成：五行归元（克制伤害额外+50%）
                    if(isEffective && this.getArtBonus('elementalBonus') > 0) {
                        finalDamage = Math.floor(finalDamage * (1 + this.getArtBonus('elementalBonus')));
                    }

                    const eColorNum = parseInt(ELEMENTS[fElement].color.replace('#', ''), 16);

                    // 攻击光束（连线效果，从阵法到目标方向）
                    const beamDist = Math.min(range, Phaser.Math.Distance.Between(slot.x, slot.y, target.x, target.y));
                    if(beamDist > 5) {
                        const beamAngle = Phaser.Math.Angle.Between(slot.x, slot.y, target.x, target.y);
                        const beam = this.add.rectangle(slot.x, slot.y, beamDist, 3 + level, eColorNum, 0.4);
                        beam.setRotation(beamAngle);
                        beam.setOrigin(0, 0.5);
                        this.tweens.add({ targets: beam, alpha: 0, duration: 200, onComplete: () => beam.destroy() });
                    }

                    // 弹道发射效果 - 从阵法中心射出
                    const proj = this.add.circle(slot.x, slot.y, projSize, eColorNum, 1);

                    // 高等级弹丸添加尾焰
                    if(level >= 3) {
                        const trail = this.add.circle(slot.x, slot.y, projSize * 0.6, eColorNum, 0.4);
                        this.tweens.add({
                            targets: trail, x: target.x, y: target.y, duration: projSpeed + 50,
                            alpha: 0, onComplete: () => trail.destroy()
                        });
                    }

                    // 命中爆炸效果
                    const hitEffect = () => {
                        // 检查目标是否还存在
                        if(!target || !target.active) {
                            proj.destroy();
                            return;
                        }
                        // 命中爆炸圆
                        const boom = this.add.circle(target.x, target.y, projSize * 1.5, eColorNum, 0.7);
                        this.tweens.add({ targets: boom, scale: 2, alpha: 0, duration: 200, onComplete: () => boom.destroy() });

                        // 克制效果额外光环
                        if(isEffective) {
                            const effectiveBoom = this.add.circle(target.x, target.y, 20, 0xFFD700, 0.8);
                            this.tweens.add({ targets: effectiveBoom, scale: 3, alpha: 0, duration: 300, onComplete: () => effectiveBoom.destroy() });
                        }
                    };

                    this.tweens.add({
                        targets: proj, x: target.x, y: target.y, duration: projSpeed,
                        onComplete: () => {
                            proj.destroy();
                            if(!target || !target.active) return; // 目标已死亡，不处理
                            hitEffect();
                            this.damageMonster(target, finalDamage, isEffective);
                        }
                    });

                    // 阵法攻击时发光反馈
                    if(slot.formation.sprite && slot.formation.sprite.active) {
                        slot.formation.sprite.setStrokeStyle(3 + level, 0xFFFFFF);
                    }
                    this.time.delayedCall(150, () => {
                        if(slot.formation && slot.formation.sprite && slot.formation.sprite.active) {
                            slot.formation.sprite.setStrokeStyle(2, 0xFFFFFF);
                        }
                    });
                });
            });
        }

        // 更新阵法耐久度条
        updateDurabilityBar(slot) {
            if(!slot.formation) return;
            const dur = slot.formation.durability;
            const maxDur = slot.formation.maxDurability;
            const pct = Math.max(0, dur / maxDur);
            const barWidth = slot.formation.durBarWidth || 36;

            if(slot.formation.durBarFill && slot.formation.durBarFill.active) {
                slot.formation.durBarFill.setDisplaySize(Math.max(1, (barWidth - 2) * pct), 3);
                // 颜色随耐久度变化：绿→黄→红
                if(pct > 0.5) {
                    slot.formation.durBarFill.setFillStyle(0x5CBF7C); // 绿
                } else if(pct > 0.25) {
                    slot.formation.durBarFill.setFillStyle(0xFFD700); // 黄
                } else {
                    slot.formation.durBarFill.setFillStyle(0xFF4444); // 红
                }
            }
        }

        // 阵法被摧毁
        destroyFormation(slot) {
            if(!slot.formation) return;

            // 如果升级弹窗正打开（dialogShown），强制关闭
            if(this.dialogShown) {
                dialogOverlay.classList.remove('active');
                this.dialogShown = false;
            }

            // 摧毁爆炸特效
            const fx = this.add.circle(slot.x, slot.y, 40, 0xFF4444, 0.8);
            this.tweens.add({ targets: fx, scale: 2, alpha: 0, duration: 500, onComplete: () => fx.destroy() });

            // 碎片粒子
            for(let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const p = this.add.circle(slot.x, slot.y, 3, 0xFF6347, 0.8);
                this.tweens.add({
                    targets: p,
                    x: slot.x + Math.cos(angle) * 50,
                    y: slot.y + Math.sin(angle) * 50,
                    alpha: 0, duration: 400,
                    onComplete: () => p.destroy()
                });
            }

            this.showMsg('⚠️ 阵法被摧毁!');

            // 清理阵法视觉
            const f = slot.formation;
            if(f.sprite && f.sprite.active) f.sprite.destroy();
            if(f.icon && f.icon.active) f.icon.destroy();
            if(f.levelBadge && f.levelBadge.active) f.levelBadge.destroy();
            if(f.orbitRing && f.orbitRing.active) f.orbitRing.destroy();
            if(f.runeText && f.runeText.active) f.runeText.destroy();
            if(f.durBarBg && f.durBarBg.active) f.durBarBg.destroy();
            if(f.durBarFill && f.durBarFill.active) f.durBarFill.destroy();
            if(f.particles) f.particles.forEach(p => { if(p && p.active) p.destroy(); });

            // 重置槽位
            slot.occupied = false;
            slot.formation = null;
            slot.bg.setFillStyle(0x1a1a3a, 0.6);
            slot.bg.setStrokeStyle(2, 0x6B6B9B);
            slot.plus.setVisible(true);
            slot.plus.setAlpha(1);

            // 从formations数组移除
            const idx = this.formations.indexOf(slot);
            if(idx >= 0) this.formations.splice(idx, 1);
        }

        // ===== 阵法升级系统 =====
        upgradeFormation(slot) {
            if(!slot.formation) return;
            const level = slot.formation.level;
            if(level >= 5) { this.showMsg('阵法已满级!'); return; }
            const cost = level * 30 + 20;
            if(GameData.player.spiritStones < cost) { this.showMsg('灵石不足!'); return; }
            GameData.player.spiritStones -= cost;
            slot.formation.level++;
            // 耐久度公式：基础值+等级递增，同时保留玄武灵兽加成
            const baseDur = this.getFormationBaseDurability();
            slot.formation.maxDurability = baseDur + (slot.formation.level - 1) * 20;
            slot.formation.durability = slot.formation.maxDurability; // 升级回满耐久
            slot.formation.levelBadge.setText('Lv.' + slot.formation.level);
            this.updateDurabilityBar(slot);
            this.updateUI();
            // 升级特效
            const fx = this.add.circle(slot.x, slot.y, 15, 0xFFD700, 0.7);
            this.tweens.add({ targets: fx, scale: 3, alpha: 0, duration: 500, onComplete: () => fx.destroy() });
            // 升级弹跳
            if(slot.formation.sprite && slot.formation.sprite.active) {
                this.tweens.add({ targets: slot.formation.sprite, scaleX: 1.3, scaleY: 1.3, duration: 150, yoyo: true });
            }
            this.showMsg(`${ELEMENTS[slot.formation.type].name}阵法升至 Lv.${slot.formation.level}!`);
        }

        onFormationClick(slot) {
            if(!slot.formation) return;
            const level = slot.formation.level;
            if(level >= 5) { this.showMsg('阵法已满级!'); return; }
            const cost = level * 30 + 20;
            // 显示升级确认弹窗
            const overlay = document.createElement('div');
            overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;`;
            const card = document.createElement('div');

        contractBeast(beastId) {
            const bDef = SPIRIT_BEASTS.find(b => b.id === beastId);
            if(!bDef) return;
            if(GameData.player.spiritStones < bDef.cost) { this.showMsg('灵石不足!'); return; }
            GameData.player.spiritStones -= bDef.cost;
            GameData.spiritBeast.contracted = { id: beastId, name: bDef.name, icon: bDef.icon, element: bDef.element, level: 1, exp: 0, skillCooldown: 0 };
            GameData.spiritBeast.unlocked = true;
            this.updateUI();
            // 契约特效
            const fx = this.add.circle(this.treeX, this.treeY, 30, 0x9B7ED9, 0.8);
            this.tweens.add({ targets: fx, scale: 5, alpha: 0, duration: 800, onComplete: () => fx.destroy() });
            this.showMsg(`🐯 与${bDef.name}缔结契约!`);
            // 灵兽小图标跟随灵木
            this.createBeastSprite();
        }

        createBeastSprite() {
            if(this.beastSprite) this.beastSprite.destroy();
            const beast = GameData.spiritBeast.contracted;
            if(!beast) return;
            this.beastSprite = this.add.text(this.treeX + 35, this.treeY - 25, beast.icon, { fontSize: '20px' }).setDepth(20).setOrigin(0.5);
            // 浮动动画
            this.tweens.add({ targets: this.beastSprite, y: this.treeY - 35, duration: 1200, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
        }

        useBeastSkill() {
            const beast = GameData.spiritBeast.contracted;
            if(!beast || beast.skillCooldown > 0) return;
            const bDef = SPIRIT_BEASTS.find(b => b.id === beast.id);
            if(!bDef) return;

            switch(beast.id) {
                case 'white_tiger': // 虎啸·杀 - 对最近Boss/最强怪造成3倍伤害
                    const target = this.monsters.reduce((best, m) => {
                        if(!m || !m.active) return best;
                        if(!best) return m;
                        return m.getData('hp') > best.getData('hp') ? m : best;
                    }, null);
                    if(target) {
                        const baseDmg = 20 * 3 * (1 + (beast.level - 1) * 0.3);
                        // 功法加成：驭兽心经
                        const beastArtBonus = this.getArtBonus('beastSkill');
                        const dmg = baseDmg * (1 + beastArtBonus);
                        this.damageMonster(target, dmg);
                        // 虎啸特效
                        const fx = this.add.circle(target.x, target.y, 20, 0xC0C0C0, 0.8);
                        this.tweens.add({ targets: fx, scale: 4, alpha: 0, duration: 400, onComplete: () => fx.destroy() });
                    }
                    this.showMsg('🐯 虎啸·杀!');
                    break;
                case 'azure_dragon': // 龙息·生 - 回复30%灵气
                    const healAmt = Math.floor(GameData.tree.spiritCapacity * 0.3 * (1 + (beast.level - 1) * 0.1));
                    GameData.tree.spirit = Math.min(GameData.tree.spiritCapacity, GameData.tree.spirit + healAmt);
                    const healFx = this.add.circle(this.treeX, this.treeY, 20, 0x4A7C59, 0.6);
                    this.tweens.add({ targets: healFx, scale: 4, alpha: 0, duration: 600, onComplete: () => healFx.destroy() });
                    this.showMsg(`🐲 龙息·生! +${healAmt}灵气`);
                    break;
                case 'vermilion_bird': // 凤炎·焚 - 灼烧全场5秒
                    GameData.talismans.activeEffects.push({ type: 'burn', remaining: 5, power: 15 + beast.level * 5 });
                    this.showMsg('🦅 凤炎·焚! 全场灼烧5秒!');
                    break;
                case 'black_tortoise': // 龟盾·守 - 阵法5秒免疫
                    GameData.talismans.activeEffects.push({ type: 'shield', remaining: 5, power: 1 });
                    this.showMsg('🐢 龟盾·守! 阵法免疫5秒!');
                    break;
                case 'qilin': // 圣威·镇 - 眩晕全场3秒
                    this.monsters.slice().forEach(m => {
                        if(m && m.active) {
                            this.tweens.killTweensOf(m);
                            m.setData('stunned', true);
                            const stunIcon = this.add.text(m.x, m.y - 25, '💫', { fontSize: '12px' }).setOrigin(0.5).setDepth(50);
                            m.setData('stunIcon', stunIcon);
                            this.time.delayedCall(3000, () => {
                                if(m && m.active) {
                                    m.setData('stunned', false);
                                    if(stunIcon && stunIcon.active) stunIcon.destroy();
                                    // 恢复移动
                                    this.resumeMonster(m);
                                }
                            });
                        }
                    });
                    this.showMsg('🦁 圣威·镇! 全场眩晕3秒!');
                    break;
            }

            beast.skillCooldown = Math.max(1, bDef.skillCooldown - (beast.level - 1) * 5);
            this.updateUI();
        }

        resumeMonster(m) {
            if(!m || !m.active || this.isGameOver) return;
            const side = m.getData('side');
            const speed = m.getData('speed') || 5000;
            const w = this.cameras.main.width, h = this.cameras.main.height;
            let tx = this.treeX, ty = this.treeY;
            const dist = Phaser.Math.Distance.Between(m.x, m.y, tx, ty);
            if(dist < 10) { this.monsterAttack(m); return; }
            this.tweens.add({
                targets: m, x: tx, y: ty, duration: (dist / 400) * speed,
                onUpdate: () => {
                    if(m && m.active) {
                        m.setData('progress', 1 - Phaser.Math.Distance.Between(m.x, m.y, this.treeX, this.treeY) / 400);
                        const hpBar = m.getData('hpBar');
                        if(hpBar) hpBar.setPosition(m.x, m.y - 18);
                        const nameTag = m.getData('nameTag');
                        if(nameTag) nameTag.setPosition(m.x, m.y - 28);
                        const iceOverlay = m.getData('iceOverlay');
                        if(iceOverlay) iceOverlay.setPosition(m.x, m.y);
                        const stunIcon = m.getData('stunIcon');
                        if(stunIcon) stunIcon.setPosition(m.x, m.y - 25);
                    }
                },
                onComplete: () => this.monsterAttack(m)
            });
        }

        addBeastExp(amount) {
            const beast = GameData.spiritBeast.contracted;
            if(!beast) return;
            beast.exp += amount;
            // 处理连续升级
            while(beast.exp >= beast.level * 100) {
                beast.exp -= beast.level * 100;
                beast.level++;
                this.showMsg(`🐯 ${beast.name}升至 Lv.${beast.level}!`);
                if(this.beastSprite) {
                    this.tweens.add({ targets: this.beastSprite, scaleX: 1.5, scaleY: 1.5, duration: 200, yoyo: true });
                }
            }
        }

        // ===== 渡劫系统 =====
        checkTribulation() {
            if(GameData.tribulation.inProgress) return;
            if(this.isPaused || this.tribShown) return; // 已有弹窗时不重复触发
            // 暂避冷却中，不弹窗
            if(GameData.tribulation.declinedUntil > 0) {
                GameData.tribulation.declinedUntil--;
                return;
            }
            const level = GameData.tree.level;
            const nextTrib = TRIBULATION_CONFIG.find(t => t.level <= level && !GameData.tribulation.completed.find(c => c.level === t.level));
            if(!nextTrib) return;
            // 灵木达到渡劫等级，弹出渡劫提示
            // 只在波次进行中暂停游戏；准备阶段不暂停（不影响倒计时）
            if(this.isWaveActive) this.isPaused = true;
            this.tribShown = true; // 防止重复弹出
            const overlay = document.createElement('div');
            overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:700;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;`;
            const card = document.createElement('div');
            card.style.cssText = `background:rgba(20,10,5,0.97);border:2px solid #FF6347;border-radius:16px;padding:24px 32px;text-align:center;max-width:320px;animation:destinyIn 0.5s ease;box-shadow:0 0 30px #FF634740;`;
            card.innerHTML = `
                <div style="font-size:40px;margin-bottom:8px">${nextTrib.icon}</div>
                <div style="font-size:20px;color:#FF6347;font-weight:bold;margin-bottom:6px">${nextTrib.name}来临!</div>
                <div style="font-size:13px;color:#ccc;margin-bottom:8px">${nextTrib.desc}</div>
                <div style="font-size:12px;color:#aaa;margin-bottom:4px">持续 ${nextTrib.duration} 秒 | 每秒伤害 ${nextTrib.dmgPerTick}</div>
                <div style="font-size:12px;color:#5CBF7C;margin-bottom:4px">成功奖励：💎${nextTrib.reward.spiritStones} + ${nextTrib.reward.exp}经验</div>
                <div style="font-size:12px;color:#FF6347;margin-bottom:14px">失败惩罚：损失${Math.floor(nextTrib.failPenalty.spiritLoss*100)}%灵气</div>
                <div style="display:flex;gap:10px;justify-content:center">
                    <button id="trib-accept" style="background:#FF6347;color:#fff;border:none;padding:8px 24px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer">迎劫!</button>
                    <button id="trib-decline" style="background:#555;color:#fff;border:none;padding:8px 24px;border-radius:8px;font-size:14px;cursor:pointer">暂避</button>
                </div>
            `;
            overlay.appendChild(card);
            document.body.appendChild(overlay);

            card.querySelector('#trib-accept').addEventListener('click', () => {
                overlay.remove();
                this.tribShown = false;
                this.startTribulation(nextTrib);
            });
            card.querySelector('#trib-decline').addEventListener('click', () => {
                overlay.remove();
                this.tribShown = false;
                this.isPaused = false; // 无条件恢复，防止竞态条件导致永久冻结
                // 设置暂避冷却60秒（60个tick），避免无限弹窗
                GameData.tribulation.declinedUntil = 60;
                this.showMsg('暂时回避了天劫...60秒后再次提醒');
            });
            // 点击背景关闭时也要恢复isPaused
            overlay.addEventListener('click', (e) => {
                if(e.target === overlay) {
                    overlay.remove();
                    this.tribShown = false;
                    this.isPaused = false; // 无条件恢复，防止竞态条件导致永久冻结
                    GameData.tribulation.declinedUntil = 30; // 随意关闭也给较短冷却
                    this.showMsg('暂时回避了天劫...');
                }
            });
        }

        startTribulation(trib) {
            GameData.tribulation.inProgress = true;
            GameData.tribulation.currentTrib = trib;
            GameData.tribulation.timer = trib.duration;

            const w = this.cameras.main.width, h = this.cameras.main.height;
            // 渡劫全屏特效
            this.tribOverlay = this.add.rectangle(w/2, h/2, w, h, 0xFF0000, 0.05).setDepth(100);
            this.tribText = this.add.text(w/2, 60, `${trib.icon} ${trib.name} · ${trib.duration}秒`, {
                fontSize: '16px', color: '#FF6347', stroke: '#000', strokeThickness: 3
            }).setOrigin(0.5).setDepth(101);

            // 渡劫闪烁效果
            this.tribFlashLoop = this.time.addEvent({
                delay: 1000, repeat: trib.duration - 1,
                callback: () => {
                    if(this.isGameOver || !GameData.tribulation.inProgress) { this.endTribulation(false); return; }
                    // 每秒伤害（天劫心法：有30%概率减免当次伤害）
                    let tickDmg = trib.dmgPerTick;
                    const tribArtBonus = this.getArtBonus('tribulation');
                    if(tribArtBonus > 0 && Math.random() < tribArtBonus) {
                        tickDmg = 0; // 天劫心法：30%概率减免当次伤害
                        this.showMsg('⚡ 天劫心法护体!');
                    }
                    GameData.tree.spirit -= tickDmg;
                    GameData.tribulation.timer--;
                    if(this.tribText && this.tribText.active) {
                        this.tribText.setText(`${trib.icon} ${trib.name} · ${GameData.tribulation.timer}秒`);
                    }
                    // 闪红
                    if(this.tribOverlay && this.tribOverlay.active) {
                        this.tribOverlay.setAlpha(0.15);
                        this.tweens.add({ targets: this.tribOverlay, alpha: 0.05, duration: 500 });
                    }
                    // 灵木受击闪红
                    if(this.tree && this.tree.active) {
                        const origTribColor = this.tree.fillColor;
                        this.tree.setFillStyle(0xFF0000, 1);
                        this.time.delayedCall(150, () => { if(this.tree && this.tree.active) this.tree.setFillStyle(origTribColor, 1); });
                    }

                    this.updateUI();
                    if(GameData.tree.spirit <= 0) { this.endTribulation(false); return; }
                    if(GameData.tribulation.timer <= 0) { this.endTribulation(true); }
                }
            });
            this.isPaused = false;
            this.showMsg(`${trib.icon} ${trib.name}降临!`);
        }

        endTribulation(success) {
            GameData.tribulation.inProgress = false;
            const trib = GameData.tribulation.currentTrib;
            if(!trib) return; // 防止重复调用时trib为null

            // 清理特效
            if(this.tribOverlay && this.tribOverlay.active) this.tribOverlay.destroy();
            if(this.tribText && this.tribText.active) this.tribText.destroy();
            if(this.tribFlashLoop) this.tribFlashLoop.remove();

            // 无论成功失败，都加入completed防止无限重复弹出
            GameData.tribulation.completed.push({ level: trib.level, name: trib.name });

            if(success) {
                GameData.player.spiritStones += trib.reward.spiritStones;
                GameData.tree.exp += trib.reward.exp;
                this.checkTreeLevelUp();
                // 成功特效
                const w = this.cameras.main.width, h = this.cameras.main.height;
                const fx = this.add.circle(this.treeX, this.treeY, 30, 0xFFD700, 0.9);
                this.tweens.add({ targets: fx, scale: 6, alpha: 0, duration: 1000, onComplete: () => fx.destroy() });
                this.showMsg(`✨ ${trib.name}渡劫成功! +💎${trib.reward.spiritStones} +${trib.reward.exp}经验`);
                this.addBeastExp(30);
            } else {
                // 失败惩罚（天劫心法减半惩罚）
                const tribArtBonus = this.getArtBonus('tribulation');
                const lossMult = tribArtBonus > 0 ? 0.5 : 1;
                const lossAmt = Math.floor(GameData.tree.spiritCapacity * trib.failPenalty.spiritLoss * lossMult);
                GameData.tree.spirit = Math.max(1, GameData.tree.spirit - lossAmt);
                this.showMsg(`💀 ${trib.name}渡劫失败! -${lossAmt}灵气`);
            }

            GameData.tribulation.currentTrib = null;
            this.updateUI();
        }

                    `).join('')}
                    <div style="font-size:11px;color:#888;padding:4px 8px;background:rgba(74,144,217,0.1);border-radius:6px">...更多</div>
                </div>
                <div style="font-size:14px;color:#5CBF7C;margin-bottom:12px">探索费用：💎30 灵石</div>
                <div style="display:flex;gap:8px;justify-content:center">
                    <button id="explore-go" style="background:#4A90D9;color:#fff;border:none;padding:8px 24px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer">出发探索</button>
                    <button id="explore-close" style="background:#555;color:#fff;border:none;padding:8px 24px;border-radius:8px;font-size:14px;cursor:pointer">返回</button>
                </div>
            `;
            overlay.appendChild(card);
            document.body.appendChild(overlay);

            card.querySelector('#explore-go').addEventListener('click', () => {
                overlay.remove();
                this.doExplore();
            });
            card.querySelector('#explore-close').addEventListener('click', () => overlay.remove());
            overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.remove(); });
        }

        doExplore() {
            if(GameData.player.spiritStones < 30) { this.showMsg('灵石不足!'); return; }
            GameData.player.spiritStones -= 30;
            GameData.explore.timesExplored++;
            GameData.explore.cooldown = 20; // 20秒冷却

            // 按权重随机选择事件
            const totalWeight = EXPLORE_EVENTS.reduce((s, e) => s + e.weight, 0);
            let roll = Math.random() * totalWeight;
            let evt = EXPLORE_EVENTS[0];
            for(const e of EXPLORE_EVENTS) {
                roll -= e.weight;
                if(roll <= 0) { evt = e; break; }
            }

            // 应用奖励
            let rewardTexts = [];
            evt.rewards.forEach(r => {
                const val = Math.floor(Math.random() * (r.max - r.min + 1)) + r.min;
                if(val <= 0 && r.type !== 'spiritStones') return;
                switch(r.type) {
                    case 'spiritStones':
                        GameData.player.spiritStones += val;
                        rewardTexts.push(val >= 0 ? `💎+${val}灵石` : `💎${val}灵石`);
                        break;
                    case 'exp':
                        GameData.tree.exp += val;
                        this.checkTreeLevelUp();
                        rewardTexts.push(`⭐+${val}经验`);
                        break;
                    case 'formationExp':
                        // 随机升级一个阵法
                        if(this.formations.length > 0) {
                            const slot = this.formations[Math.floor(Math.random() * this.formations.length)];
                            if(slot.formation && slot.formation.level < 5) {
                                slot.formation.level += val;
                                if(slot.formation.level > 5) slot.formation.level = 5;
                                slot.formation.levelBadge.setText('Lv.' + slot.formation.level);
                                const expBaseDur = this.getFormationBaseDurability();
                                slot.formation.maxDurability = expBaseDur + (slot.formation.level - 1) * 20;
                                slot.formation.durability = slot.formation.maxDurability;
                                this.updateDurabilityBar(slot);
                                this.updateUI();
                                rewardTexts.push(`📜${ELEMENTS[slot.formation.type].name}阵法+${val}级!`);
                            }
                        }
                        break;
                }
            });

            if(rewardTexts.length === 0) rewardTexts.push('（一无所获）');

            // 显示探索结果
            const overlay = document.createElement('div');
            overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;`;
            const evtColor = evt.rewards.some(r => r.min < 0) ? '#FF6347' : '#5CBF7C';
            const evtBg = evt.rewards.some(r => r.min < 0) ? 'rgba(60,20,20,0.95)' : 'rgba(20,40,30,0.95)';
            const card = document.createElement('div');
            card.style.cssText = `background:${evtBg};border:2px solid ${evtColor};border-radius:14px;padding:20px 28px;text-align:center;max-width:280px;animation:destinyIn 0.4s ease;box-shadow:0 0 20px ${evtColor}40;`;
            card.innerHTML = `
                <div style="font-size:32px;margin-bottom:6px">${evt.icon}</div>
                <div style="font-size:16px;color:${evtColor};font-weight:bold;margin-bottom:6px">${evt.name}</div>
                <div style="font-size:13px;color:#ccc;margin-bottom:10px">${evt.desc}</div>
                <div style="font-size:14px;color:#FFD700;font-weight:bold;margin-bottom:12px">${rewardTexts.join(' ')}</div>
                <button style="background:${evtColor};color:#000;border:none;padding:6px 20px;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer">收下</button>
            `;
            overlay.appendChild(card);
            document.body.appendChild(overlay);
            card.querySelector('button').addEventListener('click', () => overlay.remove());

            this.updateUI();
            this.addBeastExp(5);
        }

        // ===== 修仙功法系统 =====

            const overlay = document.createElement('div');
            overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;`;
            const card = document.createElement('div');
            card.style.cssText = `background:rgba(15,15,25,0.97);border:2px solid #9B7ED9;border-radius:16px;padding:20px;max-width:340px;max-height:80vh;overflow-y:auto;animation:destinyIn 0.3s ease;box-shadow:0 0 30px #9B7ED940;`;
            let artsHTML = `<div style="font-size:18px;color:#9B7ED9;font-weight:bold;margin-bottom:4px;text-align:center">📖 修仙功法</div>

                            <div style="font-size:11px;color:#aaa">${art.desc}</div>

            card.querySelector('#arts-close').addEventListener('click', () => overlay.remove());

            // 参悟按钮事件
            card.querySelectorAll('.art-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const artId = btn.dataset.art;
                    this.learnArt(artId);

                    this.showArtsPanel(); // 刷新面板
                });
