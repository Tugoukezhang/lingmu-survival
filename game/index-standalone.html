        doExplore() {
            if(GameData.player.spiritStones < 30) { this.showMsg('灵石不足!'); return; }
            GameData.player.spiritStones -= 30;
            GameData.explore.timesExplored++;
            GameData.explore.cooldown = 20; // 20秒冷却

            // 按权重随机选择事件
            const totalWeight = EXPLORE_EVENTS.reduce((s, e) => s + e.weight, 0);
            let roll = Math.random() * totalWeight;
            let evt = EXPLORE_EVENTS[0];
            for(const e of EXPLORE_EVENTS) {
                roll -= e.weight;
                if(roll <= 0) { evt = e; break; }
            }

            // 应用奖励
            let rewardTexts = [];
            evt.rewards.forEach(r => {
                const val = Math.floor(Math.random() * (r.max - r.min + 1)) + r.min;
                if(val <= 0 && r.type !== 'spiritStones') return;
                switch(r.type) {
                    case 'spiritStones':
                        GameData.player.spiritStones += val;
                        rewardTexts.push(val >= 0 ? `💎+${val}灵石` : `💎${val}灵石`);
                        break;
                    case 'exp':
                        GameData.tree.exp += val;
                        this.checkTreeLevelUp();
                        rewardTexts.push(`⭐+${val}经验`);
                        break;
                    case 'formationExp':
                        // 随机升级一个阵法
                        if(this.formations.length > 0) {
                            const slot = this.formations[Math.floor(Math.random() * this.formations.length)];
                            if(slot.formation && slot.formation.level < 5) {
                                slot.formation.level += val;
                                if(slot.formation.level > 5) slot.formation.level = 5;
                                slot.formation.levelBadge.setText('Lv.' + slot.formation.level);
                                const expBaseDur = this.getFormationBaseDurability();
                                slot.formation.maxDurability = expBaseDur + (slot.formation.level - 1) * 20;
                                slot.formation.durability = slot.formation.maxDurability;
                                this.updateDurabilityBar(slot);
                                this.updateUI();
                                rewardTexts.push(`📜${ELEMENTS[slot.formation.type].name}阵法+${val}级!`);
                            }
                        }
                        break;
                }
            });

            if(rewardTexts.length === 0) rewardTexts.push('（一无所获）');

            // v4.1: 问道探索有30%概率获得少量低品质灵材（r1灵草），形成资源循环轻入口
            if(Math.random() < 0.3) {
                const lowMats = Object.entries(SPIRIT_MATERIALS).filter(([id, cfg]) => cfg && cfg.rarity === 1);
                if(lowMats.length > 0) {
                    const [matId, matCfg] = lowMats[Math.floor(Math.random() * lowMats.length)];
                    GameData.materials[matId] = (GameData.materials[matId] || 0) + 1;
                    rewardTexts.push(`🌿${matCfg.name}x1`);
                }
            }

            // 显示探索结果
            const overlay = document.createElement('div');
            overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;`;
            const evtColor = evt.rewards.some(r => r.min < 0) ? '#FF6347' : '#5CBF7C';
            const evtBg = evt.rewards.some(r => r.min < 0) ? 'rgba(60,20,20,0.95)' : 'rgba(20,40,30,0.95)';
            const card = document.createElement('div');
            card.style.cssText = `background:${evtBg};border:2px solid ${evtColor};border-radius:14px;padding:20px 28px;text-align:center;max-width:280px;animation:destinyIn 0.4s ease;box-shadow:0 0 20px ${evtColor}40;`;
            card.innerHTML = `
                <div style="font-size:32px;margin-bottom:6px">${evt.icon}</div>
                <div style="font-size:16px;color:${evtColor};font-weight:bold;margin-bottom:6px">${evt.name}</div>
                <div style="font-size:13px;color:#ccc;margin-bottom:10px">${evt.desc}</div>
                <div style="font-size:14px;color:#FFD700;font-weight:bold;margin-bottom:12px">${rewardTexts.join(' ')}</div>
                <button style="background:${evtColor};color:#000;border:none;padding:6px 20px;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer">收下</button>
            `;
            overlay.appendChild(card);
            document.body.appendChild(overlay);
            card.querySelector('button').addEventListener('click', () => overlay.remove());

            this.updateUI();
            this.addBeastExp(5);
        }

        craftPill(pillId) {
            const pill = ALCHEMY_PILLS.find(p => p.id === pillId);
            if(!pill) return;
            if(GameData.tree.level < pill.levelReq) { this.showMsg(`需灵木Lv.${pill.levelReq}!`); return; }

            for(const [mid, need] of Object.entries(pill.ingredients)) {
                if(((GameData.materials||{})[mid]||0) < need) { this.showMsg(`材料不足：${SPIRIT_MATERIALS[mid]?SPIRIT_MATERIALS[mid].name:mid}!`); return; }
            }
            if((GameData.player.spiritStones||0) < pill.costStones) { this.showMsg('灵石不足!'); return; }

            // 扣除材料
            for(const [mid, need] of Object.entries(pill.ingredients)) {
                GameData.materials[mid] -= need;
                if(GameData.materials[mid] <= 0) delete GameData.materials[mid];
            }
            GameData.player.spiritStones -= pill.costStones;

            // 产出丹药（有10%概率双倍炼制）
            let count = 1;
            if(Math.random() < 0.1) { count = 2; }
            GameData.potions[pillId] = (GameData.potions[pillId] || 0) + count;
            savePlayerProfile();

            const bonusText = count > 1 ? ' 🎉 炉火纯青，双倍产出！' : '';
            this.showMsg(`🧪 炼制成功！${pill.icon}${pill.name}×${count}${bonusText}`);
            this.updateUI();

            // 炼丹特效
            const fx = this.add.circle(this.treeX, this.treeY, 25, parseInt(pill.color.replace('#','0x'), 16), 0.8);
            this.tweens.add({ targets: fx, scale: 5, alpha: 0, duration: 1000, onComplete: () => fx.destroy() });
        }

        usePill(pillId) {
            const pill = ALCHEMY_PILLS.find(p => p.id === pillId);
            if(!pill || !GameData.potions[pillId] || GameData.potions[pillId] <= 0) return false;

            // 在探索中使用
            if(this.scene.key === 'Explore') {
                GameData.potions[pillId]--;
                savePlayerProfile();
                return true;
            }

            // 在GameScene中：回灵丹可以直接用（恢复灵木灵气）
            if(pill.effect.type === 'restoreSpirit') {
                GameData.potions[pillId]--;
                const healAmount = Math.floor(GameData.tree.spiritCapacity * pill.effect.value);
                GameData.tree.spirit = Math.min(GameData.tree.spiritCapacity, GameData.tree.spirit + healAmount);
                savePlayerProfile();
                this.updateUI();
                this.showMsg(`${pill.icon} 使用${pill.name}，恢复${healAmount}点灵气！`);
                return true;
            }

            this.showMsg(`💊 ${pill.name}只能在秘境探索中使用`);
            return false;
        }

            if(this.isGameOver) return;
            const beast = GameData.spiritBeast.contracted;

            const overlay = document.createElement('div');

                card.querySelector('#bh-close').addEventListener('click', () => overlay.remove());

            const bDef = SPIRIT_BEASTS.find(b => b.id === beast.id);
            if(!bDef) { overlay.remove(); this.showMsg('灵兽数据异常'); return; }

            // ===== 突破/星级系统核心计算 =====
            const star = beast.star || 0;
            const currentBtIdx = star;  // 当前已突破次数=当前星级
            const maxStar = BEAST_STAR_EFFECTS.length;
            const nextBtLevel = (currentBtIdx < maxStar) ? BEAST_BREAKTHROUGH_LEVELS[currentBtIdx] : null;

            // 是否处于需要突破才能升级的状态（等级达到突破门槛但还没突破）
            const atBreakthroughGate = nextBtLevel !== null && beast.level >= nextBtLevel && beast.level < (BEAST_BREAKTHROUGH_LEVELS[currentBtIdx + 1] || 999);
            const canBreakthroughNow = atBreakthroughGate && beast.level >= nextBtLevel;

            // 计算突破后的总加成
            function calcTotalBonuses(s) {
                let totalAtk = 0, totalHp = 0, totalSkill = 0, totalCDR = 0, totalPassive = 0;
                for(let i = 0; i < s; i++) {
                    const eff = BEAST_STAR_EFFECTS[i];
                    if(eff) { totalAtk += eff.atkMult; totalHp += eff.hpMult; totalSkill += eff.skillBoost; totalCDR += eff.cooldownReduction; totalPassive += eff.passiveBonus; }
                }
                return { totalAtk, totalHp, totalSkill, totalCDR, totalPassive };
            }
            const bonuses = calcTotalBonuses(star);
            const baseAtk = 10 + beast.level * 3;
            const baseHp = 100 + beast.level * 20;
            const finalAtk = Math.floor(baseAtk * (1 + bonuses.totalAtk));
            const finalHp = Math.floor(baseHp * (1 + bonuses.totalHp));

            // 训练费用
            const trainCost = Math.floor(30 * (1 + beast.level * 0.2));
            const trainExp = Math.floor(50 + beast.level * 10);
            const canTrain = (GameData.player.spiritStones || 0) >= trainCost;

            // 碎片数量
            const myShards = (GameData.beastShards || {})[beast.id] || 0;

            // ===== 突破区域 HTML =====
            let btHTML = '';
            if(currentBtIdx < maxStar) {
                const btCost = 200 * (currentBtIdx + 1);
                const shardNeed = 3 + currentBtIdx * 2;
                const nextEffect = BEAST_STAR_EFFECTS[currentBtIdx];
                const canAffordBT = (GameData.player.spiritStones || 0) >= btCost && myShards >= shardNeed;

                btHTML = `<div style="background:linear-gradient(135deg,rgba(218,165,32,0.12),rgba(255,100,50,0.08));border:2px solid ${canBreakthroughNow ? '#DAA520' : '#555'};border-radius:10px;padding:12px;margin-top:8px">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
                        <span style="font-size:15px;color:${nextEffect.color};font-weight:bold">⚡ ${nextEffect.title}</span>
                        ${atBreakthroughGate ? '<span style="font-size:9px;background:#FF6347;color:#fff;padding:1px 6px;border-radius:4px;font-weight:bold">可突破!</span>' : ''}
                    </div>
                    <div style="font-size:11px;color:#aaa;margin-bottom:4px">${nextEffect.desc}</div>
                    <div style="font-size:11px;color:#E8D5A3;margin-bottom:6px">
                        ⚔️+${Math.round(nextEffect.atkMult*100)}%攻击 ❤️+${Math.round(nextEffect.hpMult*100)}%生命 ✦技能+${Math.round(nextEffect.skillBoost*100)}% 冷却-${nextEffect.cooldownReduction}s 被动+${Math.round(nextEffect.passiveBonus*100)}%
                    </div>
                    ${nextEffect.newPassive ? `<div style="font-size:11px;color:#9B7ED9;margin-bottom:6px">🌟 新被动：<b>${nextEffect.newPassive.name}</b> — ${nextEffect.newPassive.desc}</div>` : ''}
                    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px">
                        <span style="font-size:11px;color:#FFD700">💎 ${btCost}灵石</span>
                        <span style="font-size:11px;color:#FFD700">🧩 ${bDef.name}碎片×${shardNeed}</span>
                        <span style="font-size:10px;color:${myShards >= shardNeed ? '#5CBF7C' : '#FF6347'}">(拥有${myShards})</span>
                        <button class="bt-btn" data-bt-idx="${currentBtIdx}" style="margin-left:auto;background:${canAffordBT?(canBreakthroughNow?'#DAA520':'#4A90D9'):'#333'};color:${canAffordBT?'#000':'#666'};border:none;padding:6px 16px;border-radius:8px;font-size:13px;cursor:${canAffordBT?'pointer':'not-allowed'};font-weight:bold">${!canBreakthroughNow?`需达Lv.${nextBtLevel}`:'⚡ 立即突破'}</button>
                    </div>
                </div>`;
            } else {
                // 满星状态
                const maxEff = BEAST_STAR_EFFECTS[maxStar - 1];
                btHTML = `<div style="background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,100,50,0.1));border:2px solid #FFD700;border-radius:10px;padding:12px;margin-top:8px;text-align:center">
                    <div style="font-size:16px;color:#FFD700;font-weight:bold">🌟 ${maxEff.title} · 已满星！</div>

                </div>`;
            }

            // ===== 已解锁星级效果展示 =====
            let unlockedStarsHTML = '';
            if(star > 0) {
                unlockedStarsHTML = '<div style="margin-top:8px"><div style="font-size:12px;color:#DAA520;font-weight:bold;margin-bottom:4px">✨ 已解锁星级效果</div>';

                    const eff = BEAST_STAR_EFFECTS[i];

                        <span style="color:${eff.color};font-weight:bold;font-size:11px">${eff.title}</span>
                        <span style="font-size:10px;color:#888;margin-left:4px">${eff.desc}</span>
                        ${eff.newPassive ? `<div style="font-size:10px;color:#9B7ED9;margin-top:2px">→ 🌟${eff.newPassive.name}: ${eff.newPassive.desc}</div>` : ''}
                    </div>`;
                }
                unlockedStarsHTML += '</div>';
            }

            // 经验条
            const expToNext = beast.level * 100;
            const expPct = Math.min(1, (beast.exp || 0) / expToNext);

            // 星级显示 — 每颗星带颜色渐变
            let starsDisplay = '';
            for(let i = 0; i < maxStar; i++) {
                if(i < star) {
                    const c = BEAST_STAR_EFFECTS[i].color;
                    starsDisplay += `<span style="color:${c};text-shadow:0 0 6px ${c}80;font-size:14px">★</span>`;
                } else {
                    starsDisplay += `<span style="color:#444;font-size:14px">☆</span>`;
                }
            }

            // 品质颜色（基于rarity）
            const rarityColorMap = { 1: '#888', 2: '#4A90D9', 3: '#9B7ED9', 4: '#FF6347' };
            const beastQualityColor = rarityColorMap[bDef.rarity] || '#888';

            card.innerHTML = `
                <div style="font-size:20px;color:#DAA520;font-weight:bold;text-align:center;margin-bottom:2px">🏠 灵兽阁</div>
                <div style="font-size:11px;color:#555;text-align:center;margin-bottom:10px">训练 · 升星 · 突破 · 强化你的灵兽伙伴</div>

                <!-- 灵兽信息卡片 -->
                <div style="background:linear-gradient(135deg,rgba(40,25,15,0.85),rgba(20,10,5,0.9));border:2px solid ${beastQualityColor};border-radius:12px;padding:14px;margin-bottom:8px;position:relative;overflow:hidden">

                        </div>
                    </div>

                    <!-- 经验条 -->
                    <div style="background:rgba(0,0,0,0.5);border-radius:4px;height:8px;overflow:hidden;margin-top:4px">
                        <div style="width:${expPct*100}%;height:100%;background:linear-gradient(90deg,#DAA520,#FFD700,#FFF8DC);border-radius:4px;transition:width 0.3s"></div>
                    </div>
                    <div style="font-size:10px;color:#555;margin-top:1px;text-align:right">EXP ${beast.exp||0}/${expToNext}${atBreakthroughGate ? ' <span style="color:#FF6347">(需突破)</span>' : ''}</div>

                    <!-- 属性面板 -->
                    <div style="display:flex;gap:10px;margin-top:8px;font-size:11px">
                        <div style="flex:1;background:rgba(0,0,0,0.3);border-radius:6px;padding:6px;text-align:center">
                            <div style="color:#FF6347;font-weight:bold">⚔️ ${finalAtk}</div>
                            <div style="color:#555;font-size:9px">攻击 ${bonuses.totalAtk>0?'+'+Math.round(bonuses.totalAtk*100)+'%':''}</div>
                        </div>
                        <div style="flex:1;background:rgba(0,0,0,0.3);border-radius:6px;padding:6px;text-align:center">
                            <div style="color:#5CBF7C;font-weight:bold">❤️ ${finalHp}</div>
                            <div style="color:#555;font-size:9px">生命 ${bonuses.totalHp>0?'+'+Math.round(bonuses.totalHp*100)+'%':''}</div>
                        </div>
                        <div style="flex:1;background:rgba(0,0,0,0.3);border-radius:6px;padding:6px;text-align:center">
                            <div style="color:#DAA520;font-weight:bold">✦ +${Math.round(bonuses.totalSkill*100)}%</div>
                            <div style="color:#555;font-size:9px">技能伤害</div>
                        </div>
                    </div>
                </div>

                <!-- 训练区 -->
                <div style="background:rgba(30,35,45,0.6);border:1px solid #444;border-radius:10px;padding:10px;margin-bottom:6px">
                    <div style="font-size:12px;color:#9B7ED9;font-weight:bold;margin-bottom:4px">🏋️ 训练营</div>

                        <span style="font-size:10px;color:#666">灵石换经验</span>
                        <button id="train-btn" style="margin-left:auto;background:${canTrain?'linear-gradient(135deg,#2a4a6a,#1a3a5a)':'#222'};color:${canTrain?'#8ec8f4':'#444'};border:1px solid ${canTrain?'#4A90D9':'#333'};padding:6px 14px;border-radius:6px;font-size:12px;font-weight:bold;cursor:${canTrain?'pointer':'not-allowed'}">💎${trainCost} → +${trainExp}EXP</button>

                    <span style="color:#FFD700;font-weight:bold">${myShards} 个</span>

                <button id="bh-close" style="width:100%;margin-top:10px;background:rgba(40,35,30,0.9);color:#ccc;border:1px solid #444;padding:8px;border-radius:8px;font-size:13px;cursor:pointer">关闭</button>`;

            overlay.appendChild(card);
            document.body.appendChild(overlay);

            card.querySelector('#bh-close').addEventListener('click', () => overlay.remove());
            overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.remove(); });

            // ===== 训练按钮逻辑 =====
            const trainBtn = card.querySelector('#train-btn');
            if(trainBtn && canTrain) {
                trainBtn.addEventListener('click', () => {
                    GameData.player.spiritStones -= trainCost;
                    GameData.spiritBeast.contracted.exp += trainExp;
                    // 检查升级（不能超过下一个未突破的门槛）
                    while(true) {
                        const lvl = GameData.spiritBeast.contracted.level;
                        const needed = lvl * 100;
                        const nextGate = (star < maxStar) ? BEAST_BREAKTHROUGH_LEVELS[star] : 9999;
                        if(GameData.spiritBeast.contracted.exp >= needed && lvl < nextGate) {
                            GameData.spiritBeast.contracted.exp -= needed;
                            GameData.spiritBeast.contracted.level++;
                        } else break;
                    }
                    savePlayerProfile();
                    this.updateUI();
                    this.addBeastExp(trainExp);
                    overlay.remove();
                    this.showBeastHallPanel(); // 刷新
                });
            }

            // ===== 突破按钮逻辑 =====
            card.querySelectorAll('.bt-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.btIdx);
                    const cost = 200 * (idx + 1);
                    const shardNeed = 3 + idx * 2;
                    if((GameData.player.spiritStones || 0) < cost) { this.showMsg('灵石不足！'); return; }
                    if(myShards < shardNeed) { this.showMsg(`需要更多${bDef.name}碎片！(已有${myShards}/${shardNeed})`); return; }

                    // 扣除消耗
                    GameData.player.spiritStones -= cost;
                    GameData.beastShards[beast.id] -= shardNeed;
                    if(GameData.beastShards[beast.id] <= 0) delete GameData.beastShards[beast.id];

                    // ★★★ 突破成功！提升星级 ★★★
                    const newStar = (beast.star || 0) + 1;
                    GameData.spiritBeast.contracted.star = newStar;
                    const effect = BEAST_STAR_EFFECTS[idx];

                    savePlayerProfile();

                    // ===== 突破成功特效序列 =====
                    this.showMsg(`⚡ ${bDef.name}${effect.title}突破成功！`);
                    const tx = this.treeX, ty = this.treeY;

                    // 第一层：金色扩散圆
                    const fx1 = this.add.circle(tx, ty, 20, 0xDAA520, 0.9);
                    this.tweens.add({ targets: fx1, scale: 8, alpha: 0, duration: 800, ease: 'Cubic.easeOut', onComplete: () => fx1.destroy() });

                    setTimeout(() => {

                        this.tweens.add({ targets: fx2, scale: 5, alpha: 0, duration: 1000, ease: 'Back.easeOut', onComplete: () => fx2.destroy() });
                        // 星级文字飘起
                        const starTxt = this.add.text(tx, ty - 30, `${'★'.repeat(newStar)} ${effect.title}`, {
                            fontSize: '22px', color: effect.color, fontStyle: 'bold',
                            stroke: '#000', strokeThickness: 3
                        }).setOrigin(0.5).setDepth(300);
                        this.tweens.add({
                            targets: starTxt, y: ty - 80, alpha: 0, scale: 1.3,
                            duration: 1500, ease: 'Cubic.easeOut', onComplete: () => starTxt.destroy()
                        });
                    }, 300);

                    // 第三层：粒子爆发
                    setTimeout(() => {
                        for(let p = 0; p < 8; p++) {
                            const angle = (p / 8) * Math.PI * 2;
                            const px = tx + Math.cos(angle) * 30;
                            const py = ty + Math.sin(angle) * 30;
                            const particle = this.add.circle(px, py, 4 + Math.random() * 4,
                                Phaser.Display.Color.HexStringToColor(effect.color).color, 0.8).setDepth(250);
                            this.tweens.add({
                                targets: particle,
                                x: tx + Math.cos(angle) * (80 + Math.random() * 60),
                                y: ty + Math.sin(angle) * (80 + Math.random() * 60),
                                alpha: 0, scale: 0, duration: 600 + Math.random() * 400,
                                ease: 'Cubic.easeOut', onComplete: () => particle.destroy()
                            });
                        }
                    }, 400);

                    // 刷新面板
                    setTimeout(() => { overlay.remove(); this.showBeastHallPanel(); }, 200);
                });
            });
        }

        // 获取灵兽突破总加成的辅助方法（供战斗系统调用）
        getBeastStarBonus(type) {
            const beast = GameData.spiritBeast.contracted;
            if(!beast || !beast.star || beast.star <= 0) return 0;
            let val = 0;
            for(let i = 0; i < beast.star; i++) {
                const eff = BEAST_STAR_EFFECTS[i];
                if(!eff) continue;
                switch(type) {
                    case 'atk': val += eff.atkMult; break;
                    case 'hp': val += eff.hpMult; break;
                    case 'skill': val += eff.skillBoost; break;
                    case 'passive': val += eff.passiveBonus; break;
                }
            }
            return val;
        }

        // 获取灵兽总冷却减免（秒）
        getBeastTotalCDReduction() {
            const beast = GameData.spiritBeast.contracted;
            if(!beast || !beast.star || beast.star <= 0) return 0;
            let cdr = 0;
            for(let i = 0; i < beast.star; i++) {
                const eff = BEAST_STAR_EFFECTS[i];
                if(eff) cdr += eff.cooldownReduction;
            }
            return cdr;
        }

        // 获取已解锁的新被动列表
        getBeastStarPassives() {
            const beast = GameData.spiritBeast.contracted;
            if(!beast || !beast.star || beast.star <= 0) return [];
            const passives = [];
            for(let i = 0; i < beast.star; i++) {
                const eff = BEAST_STAR_EFFECTS[i];
                if(eff && eff.newPassive) passives.push({...eff.newPassive, starLevel: i + 1});
            }
            return passives;
        }

        upgradeArt(artId, overlay) {
            const art = CULTIVATION_ARTS.find(a => a.id === artId);
            if(!art) return;
            if(!GameData.arts.learned.includes(artId)) { this.showMsg('未参悟此功法！'); return; }
            const curLvl = (GameData.artLevels || {})[artId] || 1;
            if(curLvl >= (art.maxLevel || 5)) { this.showMsg('已达满级！'); return; }

            const cost = art.upgradeCostBase * curLvl;
            if((GameData.player.spiritStones || 0) < cost) { this.showMsg('灵石不足！'); return; }

            // 检查材料
            if(art.upgradeMat) {
                const need = Math.ceil(curLvl * 1.5);
                if(((GameData.materials || {})[art.upgradeMat] || 0) < need) { this.showMsg(`材料不足：${SPIRIT_MATERIALS[art.upgradeMat]?SPIRIT_MATERIALS[art.upgradeMat].name:''}`); return; }
                GameData.materials[art.upgradeMat] -= need;
                if(GameData.materials[art.upgradeMat] <= 0) delete GameData.materials[art.upgradeMat];
            }

            GameData.player.spiritStones -= cost;
            if(!GameData.artLevels) GameData.artLevels = {};
            GameData.artLevels[artId] = curLvl + 1;

            const newBonusVal = art.effect.value * (1 + curLvl * 0.3);
            savePlayerProfile();
            this.updateUI();

            this.showMsg(`📚 研究成功！${art.name} → Lv.${curLvl+1}，效果+${Math.floor(newBonusVal*100)}%`);

            // 特效
            const fx = this.add.circle(this.treeX, this.treeY, 25, parseInt(art.color.replace('#','0x'), 16), 0.8);
            this.tweens.add({ targets: fx, scale: 5, alpha: 0, duration: 1000, onComplete: () => fx.destroy() });

            overlay.remove();
            this.showLibraryPanel(); // 刷新
        }

        getArtTotalBonus(type) {
            let bonus = 0;
            GameData.arts.learned.forEach(artId => {
                const art = CULTIVATION_ARTS.find(a => a.id === artId);
                if(art && art.effect.type === type) {
                    const lvl = (GameData.artLevels || {})[artId] || 1;
                    bonus += art.effect.value * (1 + (lvl - 1) * 0.3);
                }
            });
            return bonus;
        }

        learnArt(artId) {
            const art = CULTIVATION_ARTS.find(a => a.id === artId);
            if(!art) return;
            if(GameData.arts.learned.includes(artId)) { this.showMsg('已参悟此功法!'); return; }
            if(GameData.tree.level < art.levelReq) { this.showMsg(`需灵木Lv.${art.levelReq}!`); return; }
            if(GameData.player.spiritStones < art.cost) { this.showMsg('灵石不足!'); return; }

            GameData.arts.learned.push(artId);

        applyArtEffect(art) {
            switch(art.effect.type) {
                case 'spiritCapacity':
                    GameData.tree.spiritCapacity = Math.floor(GameData.tree.spiritCapacity * (1 + art.effect.value));
                    GameData.tree.spirit = Math.min(GameData.tree.spirit, GameData.tree.spiritCapacity);
                    break;
                // 其他效果在对应逻辑中实时检查 GameData.arts.learned
            }
        }

        getArtBonus(type) {
            let bonus = 0;
            GameData.arts.learned.forEach(artId => {
                const art = CULTIVATION_ARTS.find(a => a.id === artId);
                if(art && art.effect.type === type) bonus += art.effect.value;
            });
            return bonus;
        }
        triggerDestinyEvent() {
            if(this.isGameOver) return;

            // 天命弹窗期间暂停游戏逻辑
            this.isPaused = true;

            // 暂停所有怪物移动tween
            this.monsters.forEach(m => {
                if(m && m.active) {
                    this.tweens.getAllTweens().forEach(tw => {
                        if(tw.targets && tw.targets.includes(m) && tw.isPlaying()) {
                            tw.pause();
                        }
                    });
                }
            });

            const evt = rollDestinyEvent();
            GameData.destiny.eventsTriggered++;

            // 显示天命事件弹窗
            const evtColor = evt.type === 'positive' ? '#5CBF7C' : (evt.type === 'negative' ? '#FF4444' : '#FFD700');
            const evtBgColor = evt.type === 'positive' ? 'rgba(20,60,30,0.95)' : (evt.type === 'negative' ? 'rgba(60,20,20,0.95)' : 'rgba(40,40,20,0.95)');

            const overlay = document.createElement('div');
            overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;`;
            const card = document.createElement('div');
            card.style.cssText = `background:${evtBgColor};border:2px solid ${evtColor};border-radius:16px;padding:24px 32px;text-align:center;max-width:320px;animation:destinyIn 0.5s ease;box-shadow:0 0 30px ${evtColor}40;`;
            card.innerHTML = `
                <div style="font-size:36px;margin-bottom:8px">${evt.icon}</div>
                <div style="font-size:20px;color:${evtColor};font-weight:bold;margin-bottom:8px">天命·${evt.name}</div>
                <div style="font-size:14px;color:#ccc;margin-bottom:16px">${evt.desc}</div>
                <button style="background:${evtColor};color:#000;border:none;padding:8px 24px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer">确认</button>
            `;
            overlay.appendChild(card);
            document.body.appendChild(overlay);

            // 动画样式
            if(!document.getElementById('destiny-style')) {
                const style = document.createElement('style');
                style.id = 'destiny-style';
