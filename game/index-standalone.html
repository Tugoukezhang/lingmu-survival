    class ExploreScene extends Phaser.Scene {
        constructor() { super({ key: 'Explore' }); }

        init(data) {
            this.realmId = data.realmId;
            this.realmCfg = REALM_CONFIGS.find(r => r.id === this.realmId);
            this.phase = 'map'; // map / battle / enlightenment / result
            this.rooms = [];
            this.currentRoomIdx = 0;
            this.playerPos = { x: 0, y: 0 };
            this.roomsCleared = 0;
            this.gainedMaterials = {};
            this.gainedSpiritStones = 0;
            this.gainedExp = 0;
            this.enlightenments = [];
            this.battleMonsters = [];
            this.battleTimer = null;
            this.beastCooldowns = {};
            this.playerHP = 100;
            this.playerMaxHP = 100;
            this.battleLog = [];
        }

        create() {
            // 隐藏游戏UI
            const talismanBar = document.getElementById('talisman-bar');
            const timeIndicator = document.getElementById('time-indicator');
            const systemBar = document.getElementById('system-bar');
            if(talismanBar) talismanBar.style.display = 'none';
            if(timeIndicator) timeIndicator.style.display = 'none';
            if(systemBar) systemBar.style.display = 'none';

            if(!this.realmCfg) {
                this.showMsg('秘境数据异常!');
                this.returnToGame();
                return;
            }

            this.generateRooms();
            this.drawMap();
        }

        // ===== 房间生成（Roguelike分支）=====
        generateRooms() {
            const totalRooms = this.realmCfg.rooms;
            this.rooms = [];
            
            // 起始房间
            this.rooms.push({ idx: 0, type: 'start', cleared: true, x: 640, y: 580, connections: [] });

            // 中间房间 - 分层生成（每层2-3个可选分支）
            const midCount = totalRooms - 2; // 去掉start和boss
            const possibleTypes = ['battle','battle','battle','treasure','fate','vein','beast','battle'];
            
            // 计算层数：每层2-3个房间，总共midCount个中间房间
            let layers = [];
            let remaining = midCount;
            let layerIdx = 0;
            
            while(remaining > 0) {
                const layerSize = Math.min(remaining >= 4 ? (Math.random() > 0.3 ? 3 : 2) : Math.min(remaining, 2), remaining);
                const layer = { rooms: [], yBase: 480 - layerIdx * 95 };
                for(let i = 0; i < layerSize; i++) {
                    const type = possibleTypes[Math.floor(Math.random() * possibleTypes.length)];
                    // 横向分散布局
                    const xSpread = layerSize === 1 ? 0 : (layerSize === 2 ? 200 : 260);
                    const xPos = 640 + (i - (layerSize-1)/2) * (xSpread / Math.max(1, layerSize-1));
                    
                    layer.rooms.push(type);
                }
                layers.push(layer);
                remaining -= layerSize;
                layerIdx++;
            }

            // 构建房间和连接
            let globalIdx = 1;
            const prevLayerEndIdx = [0]; // 前一层所有房间的idx

            layers.forEach((layer, li) => {
                layer.rooms.forEach((type, ri) => {
                    const xSpread = layer.rooms.length === 1 ? 0 : (layer.rooms.length === 2 ? 220 : 250);
                    const x = 640 + (ri - (layer.rooms.length-1)/2) * xSpread;
                    const y = layer.yBase + Phaser.Math.Between(-15, 15);
                    
                    // 连接到前一层的1-2个房间
                    let connections = [];
                    if(prevLayerEndIdx.length === 1) {
                        connections = [prevLayerEndIdx[0]];
                    } else if(prevLayerEndIdx.length === 2) {
                        // 连接最近的那个，有概率连接两个
                        const closest = ri <= 0 ? prevLayerEndIdx[0] : prevLayerEndIdx[Math.min(ri, prevLayerEndIdx.length-1)];
                        connections = [closest];
                        if(Math.random() < 0.35 && prevLayerEndIdx.length > 1) {
                            const other = prevLayerEndIdx.find(p => p !== closest);
                            if(other) connections.push(other);
                        }
                    } else {
                        // 3个以上：连接最近的1-2个
                        const sortedPrev = [...prevLayerEndIdx].sort((a,b) => {
                            const pa = this.rooms[a], pb = this.rooms[b];
                            return Math.abs(pa.x - x) - Math.abs(pb.x - x);
                        });
                        connections = [sortedPrev[0]];
                        if(Math.random() < 0.3 && sortedPrev.length > 1) connections.push(sortedPrev[1]);
                    }

                    this.rooms.push({
                        idx: globalIdx, type, cleared: false,
                        x, y, connections,
                        layer: li + 1
                    });
                    globalIdx++;
                });
                
                // 更新前一层索引
                prevLayerEndIdx.length = 0;
                for(let i = globalIdx - layer.rooms.length; i < globalIdx; i++) {
                    prevLayerEndIdx.push(i);
                }
            });

            // Boss房间（汇聚到顶部中央）
            this.rooms.push({
                idx: totalRooms - 1, type: 'boss', cleared: false,
                x: 640, y: Math.max(80, 480 - layerIdx * 95 - 30),
                connections: prevLayerEndIdx.slice(), // 连接最后一层所有房间
                isBossRoom: true
            });

            this.currentRoomIdx = 0;
        }

        // ===== 地图绘制 =====
        drawMap() {
            this.phase = 'map';
            const w = this.cameras.main.width, h = this.cameras.main.height;
            this.children.removeAll();

            // ===== v4.1 视觉差异化：秘境暗紫/暗红配色（区别于GameScene的深蓝/绿） =====
            // 渐变背景：暗紫→深红，营造"异世界秘境"的氛围
            this.add.rectangle(w/2, h/2, w, h, 0x120818);
            // 上方暗红雾气层
            this.add.rectangle(w/2, h * 0.25, w, h * 0.5, 0x2a0815, 0.3);
            // 底部深渊紫层
            this.add.rectangle(w/2, h * 0.82, w, h * 0.36, 0x18082a, 0.35);

            // 秘境标题（带光晕效果）
            const titleGlow = this.add.text(w/2 + 1, 21, `${this.realmCfg.icon} ${this.realmCfg.name}`, {
                fontSize: '24px', color: this.realmCfg.color, fontStyle: 'bold', stroke: '#000', strokeThickness: 6
            }).setOrigin(0.5).setAlpha(0.3);
            this.add.text(w/2, 20, `${this.realmCfg.icon} ${this.realmCfg.name}`, {
                fontSize: '24px', color: this.realmCfg.color, fontStyle: 'bold', stroke: '#000', strokeThickness: 4
            }).setOrigin(0.5);

            // 进度信息栏（暗色底板）
            this.add.rectangle(w/2, 48, 360, 22, 0x0a0512, 0.7).setStrokeStyle(1, 0x442255);
            this.add.text(w/2, 48, `已探索 ${this.roomsCleared}/${this.rooms.length - 1}  💰${this.gainedSpiritStones}  ✨${this.enlightenments.length}顿悟`, {
                fontSize: '12px', color: '#E8D5A3', stroke: '#000', strokeThickness: 1
            }).setOrigin(0.5);

            // 顿悟图标
            if(this.enlightenments.length > 0) {
                const eIcons = this.enlightenments.map(e => e.icon).join(' ');
                this.add.text(w/2, 68, `顿悟: ${eIcons}`, {
                    fontSize: '11px', color: '#9B7ED9', stroke: '#000', strokeThickness: 2
                }).setOrigin(0.5);
            }

            // 连线（按房间connections绘制分支路径）
            const drawnLines = new Set();
            this.rooms.forEach((room, i) => {
                (room.connections || []).forEach(ci => {
                    const key = Math.min(i, ci) + '-' + Math.max(i, ci);
                    if(!drawnLines.has(key) && this.rooms[ci]) {
                        drawnLines.add(key);
                        const r2 = this.rooms[ci];
                        const graphics = this.add.graphics();
                        // v4.1: 秘境连线用暗紫/暗红，区别于GameScene的蓝绿色
                        graphics.lineStyle(2, 0x553355, 0.5);
                        graphics.beginPath();
                        graphics.moveTo(room.x, room.y);
                        graphics.lineTo(r2.x, r2.y);
                        graphics.strokePath();
                        graphics.closePath();

                        // 已走通的路径：紫红高亮
                        if(room.cleared && r2.cleared) {
                            const g2 = this.add.graphics();
                            g2.lineStyle(1.5, 0x9B5B9B, 0.4);
                            g2.beginPath();
                            g2.moveTo(room.x, room.y);
                            g2.lineTo(r2.x, r2.y);
                            g2.strokePath();
                            g2.closePath();
                        }
                    }
                });
            });

            // 房间节点
            this.rooms.forEach((room, i) => {
                const rt = ROOM_TYPES[room.type] || ROOM_TYPES.battle;
                const isCurrent = i === this.currentRoomIdx;
                // 分支地图：检查是否有已清除的前置连接
                const hasClearedConnection = (room.connections || []).some(ci => {
                    const prev = this.rooms[ci];
                    return prev && prev.cleared;
                });
                const canReach = hasClearedConnection || isCurrent || room.cleared;
                const isCleared = room.cleared;

                // 房间背景圆（v4.1: 秘境紫红配色系）
                let bgColor = isCleared ? 0x1a2a1a : (isCurrent ? 0x3a1a3a : 0x1a1025);
                let borderColor = isCleared ? 0x8B6B8B : (isCurrent ? 0xFFD700 : 0x553355);
                const circle = this.add.circle(room.x, room.y, 28, bgColor, 0.9)
                    .setStrokeStyle(2, borderColor);
                
                // 房间图标
                this.add.text(room.x, room.y - 2, rt.icon, { fontSize: '20px' }).setOrigin(0.5);
                
                // 房间名称
                this.add.text(room.x, room.y + 24, rt.name, {
                    fontSize: '9px', color: isCleared ? '#5CBF7C' : '#aaa', stroke: '#000', strokeThickness: 1
                }).setOrigin(0.5);

                // 已清除标记
                if(isCleared) {
                    this.add.text(room.x + 18, room.y - 18, '✓', { fontSize: '12px', color: '#5CBF7C' }).setOrigin(0.5);
                }

                // 可交互（仅下一个房间和当前房间）
                if(canReach && !isCleared) {
                    const hit = this.add.circle(room.x, room.y, 32, 0x000000, 0.001)
                        .setInteractive({ useHandCursor: true });
                    hit.on('pointerover', () => { circle.setStrokeStyle(3, 0xFFD700); });
                    hit.on('pointerout', () => { circle.setStrokeStyle(2, borderColor); });
                    hit.on('pointerdown', () => this.enterRoom(i));
                }
                
                // 当前房间脉冲发光
                if(isCurrent && !isCleared) {
                    const glow = this.add.circle(room.x, room.y, 34, 0xFFD700, 0.15).setDepth(3);
                    this.tweens.add({ targets: glow, scale: 1.3, alpha: 0.05, duration: 800, yoyo: true, repeat: -1 });
                }
            });

            // 底部操作栏（v4.1: 暗紫底，区别GameScene的深蓝）
            const barY = h - 40;
            this.add.rectangle(w/2, barY, w, 60, 0x0d0820, 0.92);
            this.add.rectangle(w/2, barY - 30 + 1, w, 1, 0x663355, 0.3);

            // 返回仙府按钮
            const returnBtn = this.add.rectangle(w/2 - 100, barY, 140, 36, 0x1a1025, 1)
                .setStrokeStyle(1, 0x9B6B9B).setInteractive({ useHandCursor: true });
            this.add.text(w/2 - 100, barY, '🏠 返回仙府', { fontSize: '13px', color: '#9B7ED9' }).setOrigin(0.5);
            returnBtn.on('pointerdown', () => this.returnToGame());

            // 继续探索按钮（如果当前房间已清除且有下一房间）
            if(this.roomsCleared < this.rooms.length - 1) {
                const nextIdx = this.currentRoomIdx + 1;
                if(nextIdx < this.rooms.length) {
                    const nextRoom = this.rooms[nextIdx];
                    const nextType = ROOM_TYPES[nextRoom.type];
                    const nextBtn = this.add.rectangle(w/2 + 100, barY, 170, 36, 0x1a3d2a, 1)
                        .setStrokeStyle(1, 0x5CBF7C).setInteractive({ useHandCursor: true });
                    this.add.text(w/2 + 100, barY, `▶ 前往 ${nextType.name} ${nextType.icon}`, {
                        fontSize: '13px', color: '#5CBF7C', stroke: '#000', strokeThickness: 2
                    }).setOrigin(0.5);
                    nextBtn.on('pointerdown', () => this.enterRoom(nextIdx));
                    nextBtn.on('pointerover', () => nextBtn.setFillStyle(0x2a5d3a, 1));
                    nextBtn.on('pointerout', () => nextBtn.setFillStyle(0x1a3d2a, 1));
                }
            } else {
                const doneBtn = this.add.rectangle(w/2 + 100, barY, 160, 36, 0x3a2a1a, 1)
                    .setStrokeStyle(2, 0xFFD700).setInteractive({ useHandCursor: true });
                this.add.text(w/2 + 100, barY, '🏆 查看结算', {
                    fontSize: '14px', color: '#FFD700', fontStyle: 'bold', stroke: '#000', strokeThickness: 2
                }).setOrigin(0.5);
                doneBtn.on('pointerdown', () => this.showExpeditionSummary(true));
                doneBtn.on('pointerover', () => doneBtn.setFillStyle(0x5a3a2a, 1));
                doneBtn.on('pointerout', () => doneBtn.setFillStyle(0x3a2a1a, 1));
            }
        }

        // ===== 进入房间 =====
        enterRoom(idx) {
            if(idx === 0) { this.drawMap(); return; } // 起始房间点不了
            const room = this.rooms[idx];
            if(!room) return;
            if(room.cleared) { this.drawMap(); return; }
            
            // 检查可达性：至少一个连接的前置房间已清除（或就是起始房间）
            const hasClearedConnection = (room.connections || []).some(ci => {
                const prev = this.rooms[ci];
                return prev && prev.cleared;
            });
            
            // 也允许从当前所在房间直接走到相邻连接的房间
            const currentRoom = this.rooms[this.currentRoomIdx];
            const isDirectlyConnected = currentRoom && (room.connections || []).includes(this.currentRoomIdx);
            
            if(!hasClearedConnection && !isDirectlyConnected) return;
            
            this.currentRoomIdx = idx;

            const rt = ROOM_TYPES[room.type];
            switch(room.type) {
                case 'battle': this.startBattle(room); break;
                case 'boss': this.startBattle(room, true); break;
                case 'treasure': this.openTreasure(room); break;
                case 'fate': this.triggerFate(room); break;
                case 'vein': this.collectVein(room); break;
                case 'beast': this.encounterBeast(room); break;
                default: this.clearRoom(room); break;
            }
        }

        // ===== 战斗系统 =====
        startBattle(room, isBoss = false) {
            this.phase = 'battle';
            const w = this.cameras.main.width, h = this.cameras.main.height;
            
            // 转场动画：淡入战斗界面
            const transitionOverlay = this.add.rectangle(w/2, h/2, w, h, 0x000000, 1).setDepth(300);
            this.tweens.add({ targets: transitionOverlay, alpha: 0, duration: 400, onComplete: () => transitionOverlay.destroy() });

            // 背景（v4.1: 暗红血色，区别于GameScene的深蓝）
            this.add.rectangle(w/2, h/2, w, h, 0x0f0812);
            // 战斗氛围：底部暗红雾
            this.add.rectangle(w/2, h * 0.85, w, h * 0.3, 0x2a0508, 0.25);
            // 顶部暗红
            this.add.rectangle(w/2, h * 0.12, w, h * 0.24, 0x1a0510, 0.2);

            this.add.text(w/2, 20, isBoss ? `👹 Boss战!` : `💀 妖兽来袭!`, {
                fontSize: '22px', color: '#FF4444', fontStyle: 'bold', stroke: '#000', strokeThickness: 4
            }).setOrigin(0.5);

            // 生成怪物
            this.battleMonsters = [];
            const diff = this.realmCfg.difficulty;
            if(isBoss) {
                const bossCfg = REALM_BOSSES[this.realmCfg.bossId];
                if(bossCfg) {
                    this.battleMonsters.push(this.createBattleMonster(bossCfg, w, h, true));
                }
            } else {
                const count = 2 + Math.floor(Math.random() * 2) + diff;
                const monsterKeys = this.realmCfg.monsters;
                for(let i = 0; i < count; i++) {
                    const mKey = monsterKeys[Math.floor(Math.random() * monsterKeys.length)];
                    const mCfg = REALM_MONSTERS[mKey];
                    if(mCfg) this.battleMonsters.push(this.createBattleMonster(mCfg, w, h, false, i));
                }
            }

            // 灵兽（自动战斗）
            this.beastCooldowns = {};
            const beast = GameData.spiritBeast.contracted;
            if(beast) {
                this.beastSprite = this.add.text(w/2, h - 100, beast.icon, { fontSize: '32px' }).setOrigin(0.5).setDepth(10);
                this.beastCooldowns[beast.id] = 0;
            }

            // 玩家HP条
            this.playerHP = 100;
            this.playerMaxHP = 100;
            this.comboCount = 0; // v4.2 连击计数
            this.add.rectangle(w/2, h - 50, 200, 12, 0x333333).setDepth(20);
            this.playerHPBar = this.add.rectangle(w/2 - 100, h - 50, 200, 12, 0x5CBF7C).setOrigin(0, 0.5).setDepth(21);
            this.playerHPText = this.add.text(w/2, h - 50, `${this.playerHP}/${this.playerMaxHP}`, {
                fontSize: '10px', color: '#fff', stroke: '#000', strokeThickness: 2
            }).setOrigin(0.5).setDepth(22);

            // v4.2 连击计数器
            this.comboText = this.add.text(w - 20, h - 80, '', {
                fontSize: '16px', color: '#FFD700', fontStyle: 'bold', stroke: '#000', strokeThickness: 3
            }).setOrigin(1, 0.5).setDepth(30).setAlpha(0);

            // v4.2 技能冷却进度环（仅在有灵兽时显示）
            if(beast) {
                const bDef = SPIRIT_BEASTS.find(b => b.id === beast.id);
                if(bDef) {
                    const skillBtnY = h - 25;
                    const skillBtn = this.add.rectangle(w/2, skillBtnY, 160, 28, 0x3a2a5a, 1)
                        .setStrokeStyle(1, 0x9B7ED9).setInteractive({ useHandCursor: true }).setDepth(30);
                    // 冷却覆盖层
                    this.skillCooldownBar = this.add.rectangle(w/2 - 80, skillBtnY, 0, 28, 0x9B7ED9, 0.25).setOrigin(0, 0.5).setDepth(31);
                    this.skillLabel = this.add.text(w/2, skillBtnY, `${bDef.skillName}`, {
                        fontSize: '12px', color: '#9B7ED9'
                    }).setOrigin(0.5).setDepth(32);
                    this.skillMaxCooldown = bDef.skillCooldown / 10; // tick数
                    this.skillCurrentCooldown = 0;
                    skillBtn.on('pointerdown', () => {
                        if(this.skillCurrentCooldown > 0) {
                            this.showBattleMsg(`⏳ 技能冷却中...`);
                            return;
                        }
                        this.useSkillInBattle();
                        this.skillCurrentCooldown = this.skillMaxCooldown;
                    });
                }
            }

            // 返回按钮
            const retreatBtn = this.add.rectangle(w - 60, 20, 80, 24, 0x1a1a3a, 1)
                .setStrokeStyle(1, 0xFF6347).setInteractive({ useHandCursor: true }).setDepth(30);
            this.add.text(w - 60, 20, '🏃 撤退', { fontSize: '11px', color: '#FF6347' }).setOrigin(0.5).setDepth(31);
            retreatBtn.on('pointerdown', () => this.retreatFromBattle(room));

            // v4.3 丹药使用按钮（探索战斗中）
            const potionBtn = this.add.rectangle(w - 150, 20, 70, 24, 0x1a2d2a, 1)
                .setStrokeStyle(1, 0x5CBF7C).setInteractive({ useHandCursor: true }).setDepth(30);
            this.potionBtnLabel = this.add.text(w - 150, 20, '🧪 丹药', { fontSize: '11px', color: '#5CBF7C' }).setOrigin(0.5).setDepth(31);
            potionBtn.on('pointerdown', () => this.showPotionMenu());
            // 初始化探索增益buff列表
            if(!this.activeBuffs) this.activeBuffs = [];

            // 战斗tick
            this.battleTimer = this.time.addEvent({ delay: 800, callback: this.battleTick, callbackScope: this, loop: true });

            // 消息区
            this.battleMsgText = this.add.text(w/2, h/2, '', {
                fontSize: '20px', color: '#FFD700', fontStyle: 'bold', stroke: '#000', strokeThickness: 4
            }).setOrigin(0.5).setDepth(100).setAlpha(0);
        }

        createBattleMonster(cfg, w, h, isBoss, idx = 0) {
            const x = 200 + (idx % 4) * 220;
            const y = 120 + Math.floor(idx / 4) * 100;
            const hpMult = this.realmCfg.difficulty * 0.5 + 0.5;
            const hp = Math.floor(cfg.hp * hpMult);
            
            // 怪物视觉
            const bgColor = isBoss ? 0x3a1a1a : 0x1a1a2a;
            const borderColor = isBoss ? 0xFF6347 : 0x6B6B9B;
            const size = isBoss ? 36 : 26;
            const circle = this.add.circle(x, y, size, bgColor, 0.9).setStrokeStyle(2, borderColor).setDepth(5);
            
            // Boss额外光环
            if(isBoss) {
                const bossAura = this.add.circle(x, y, size + 12, 0xFF6347, 0.15).setDepth(4);
                this.tweens.add({ targets: bossAura, scale: 1.3, alpha: 0.05, duration: 800, yoyo: true, repeat: -1 });
                circle.setData('aura', bossAura);
                
                // Boss警告动画 - 呼吸效果
                this.tweens.add({
                    targets: circle,
                    scaleX: 1.05, scaleY: 1.05,
                    duration: 500, yoyo: true, repeat: -1
                });
            }
            
            const icon = this.add.text(x, y, cfg.icon, { fontSize: isBoss ? '24px' : '18px' }).setOrigin(0.5).setDepth(6);
            const nameTag = this.add.text(x, y - size - (isBoss ? 14 : 8), isBoss ? '👹 ' + cfg.name : cfg.name, {
                fontSize: isBoss ? '13px' : '10px', color: isBoss ? '#FF6347' : '#ccc', 
                stroke: '#000', strokeThickness: 2, fontStyle: isBoss ? 'bold' : 'normal'
            }).setOrigin(0.5).setDepth(6);
            
            // HP条
            const hpW = isBoss ? 60 : 40;
            this.add.rectangle(x, y + size + 8, hpW + 2, 6, 0x000000, 0.8).setDepth(6);
            const hpBar = this.add.rectangle(x - hpW/2, y + size + 8, hpW, 5, 0xFF4444).setOrigin(0, 0.5).setDepth(7);
            
            // Boss血量50%警戒线
            if(isBoss) {
                const warnLine = this.add.rectangle(x - hpW/2 + hpW*0.5, y + size + 8, 1, 7, 0xFFD700, 0.8).setOrigin(0.5).setDepth(8);
                // 狂暴提示文字
                const rageHint = this.add.text(x, y + size + 20, '[50%进入狂暴]', {
                    fontSize: '8px', color: '#FFD700', stroke: '#000', strokeThickness: 1
                }).setOrigin(0.5).setDepth(8);
            }
            
            const hpText = this.add.text(x, y + size + 8, `${hp}`, {
                fontSize: '8px', color: '#fff', stroke: '#000', strokeThickness: 1
            }).setOrigin(0.5).setDepth(8);

            return { cfg, x, y, hp, maxHp: hp, atk: Math.floor(cfg.atk * hpMult), element: cfg.element,
                     circle, icon, nameTag, hpBar, hpText, hpW, isBoss, alive: true, exp: cfg.exp,
                     enraged: false, bossSkillTick: 0 };
        }

        battleTick() {
            if(this.phase !== 'battle') return;

            // v4.2 技能冷却倒计时
            if(this.skillCurrentCooldown > 0) {
                this.skillCurrentCooldown--;
                if(this.skillCooldownBar && this.skillCooldownBar.active) {
                    const cdPct = this.skillCurrentCooldown / (this.skillMaxCooldown || 1);
                    this.skillCooldownBar.setDisplaySize(160 * cdPct, 28);
                    if(this.skillLabel && this.skillLabel.active) {
                        this.skillLabel.setText(this.skillCurrentCooldown > 0 ? `⏳ ${this.skillCurrentCooldown}` : `${this.skillLabel.text.replace(/^⏳ \d+$/, '')}`)
                    }
                }
            } else if(this.skillCooldownBar && this.skillCooldownBar.active) {
                this.skillCooldownBar.setDisplaySize(0, 28);
                const beast = GameData.spiritBeast.contracted;
                if(beast) {
                    const bDef = SPIRIT_BEASTS.find(b => b.id === beast.id);
                    if(bDef && this.skillLabel && this.skillLabel.active) this.skillLabel.setText(bDef.skillName);
                }
            }

            // 灵兽自动攻击
            const beast = GameData.spiritBeast.contracted;
            if(beast) {
                const bDef = SPIRIT_BEASTS.find(b => b.id === beast.id);
                // 冷却递减
                if(this.beastCooldowns[beast.id] > 0) {
                    this.beastCooldowns[beast.id]--;
                } else {
                    // 自动攻击：找最近的活怪
                    const target = this.battleMonsters.find(m => m.alive);
                    if(target) {
                        let dmg = 10 + beast.level * 3;
                        // 顿悟加成
                        this.enlightenments.forEach(e => {
                            if(e.effect.stat === 'attack') dmg = Math.floor(dmg * (1 + e.effect.value));
                        });
                        // 五行克制
                        if(beast.element && ELEMENTS[beast.element] && ELEMENTS[beast.element].beats === target.element) {
                            dmg = Math.floor(dmg * 1.5);
                        }
                        this.damageBattleMonster(target, dmg);
                        this.showBattleMsg(`${beast.icon} 攻击! -${dmg}`);
                        this.beastCooldowns[beast.id] = 2; // 2tick冷却
                        
                        // 灵兽攻击弹道
                        if(this.beastSprite && this.beastSprite.active && target.circle && target.circle.active) {
                            const proj = this.add.circle(this.beastSprite.x, this.beastSprite.y, 5, 0x9B7ED9, 0.9).setDepth(55);
                            this.tweens.add({
                                targets: proj,
                                x: target.x, y: target.y,
                                duration: 300, ease: 'Sine.easeIn',
                                onComplete: () => {
                                    if(proj && proj.active) proj.destroy();
                                }
                            });
                        }
                    }
                }
            }

            // 怪物攻击玩家
            this.battleMonsters.forEach((m, mi) => {
                if(!m.alive) return;
                
                // Boss特殊机制：血量低于50%进入狂暴状态
                if(m.isBoss && m.hp <= m.maxHp * 0.5 && !m.enraged) {
                    m.enraged = true;
                    m.atk = Math.floor(m.atk * 1.5);
                    if(m.circle && m.circle.active) m.circle.setFillStyle(0x5a1a1a, 1).setStrokeStyle(3, 0xFF0000);
                    if(m.nameTag && m.nameTag.active) m.nameTag.setText('👹 ' + m.cfg.name + ' [狂暴!]');
                    this.showBattleMsg(`⚠️ ${m.cfg.name} 进入狂暴状态!`);
                    // 狂暴特效
                    const rageFx = this.add.rectangle(this.cameras.main.width/2, this.cameras.main.height/2, this.cameras.main.width, this.cameras.main.height, 0xFF0000, 0.2).setDepth(45).setScrollFactor(0);
                    this.tweens.add({ targets: rageFx, alpha: 0, duration: 600, onComplete: () => rageFx.destroy() });
                }
                
                // Boss二阶段技能：每3tick释放一次范围攻击
                if(m.isBoss && m.enraged) {
                    m.bossSkillTick = (m.bossSkillTick || 0) + 1;
                    if(m.bossSkillTick >= 3) {
                        m.bossSkillTick = 0;
                        const aoeDmg = Math.floor(m.atk * 0.8);
                        this.playerHP = Math.max(0, this.playerHP - aoeDmg);
                        this.showBattleMsg(`💥 ${m.cfg.name} 狂暴猛击! -${aoeDmg}`);
                        // AOE特效
                        const aoeFx = this.add.circle(this.cameras.main.width/2, this.cameras.main.height - 100, 80, 0xFF4444, 0.4).setDepth(50);
                        this.tweens.add({ targets: aoeFx, scale: 3, alpha: 0, duration: 500, onComplete: () => aoeFx.destroy() });
                    }
                }
                
                // 概率攻击
                const atkChance = m.isBoss && m.enraged ? 0.6 : (m.isBoss ? 0.45 : 0.4);
                if(Math.random() < atkChance) {
                    let dmg = Math.floor(m.atk * (0.5 + Math.random() * 0.5));
                    // 顿悟减伤
                    this.enlightenments.forEach(e => {
                        if(e.effect.stat === 'damageReduce') dmg = Math.floor(dmg * (1 - e.effect.value));
                    });
                    this.playerHP = Math.max(0, this.playerHP - dmg);
                    this.showBattleMsg(`${m.cfg.icon} 攻击你! -${dmg}`);
                    // 玩家受伤飘字
                    const pDmgFx = this.add.text(this.cameras.main.width/2 + Phaser.Math.Between(-30, 30), this.cameras.main.height - 90, `-${dmg}`, {
                        fontSize: '18px', color: '#FF4444', fontStyle: 'bold', stroke: '#000', strokeThickness: 3
                    }).setOrigin(0.5).setDepth(50);
                    this.tweens.add({ targets: pDmgFx, y: pDmgFx.y - 40, alpha: 0, duration: 800, onComplete: () => pDmgFx.destroy() });
                    // 屏幕红闪
                    const redFlash = this.add.rectangle(this.cameras.main.width/2, this.cameras.main.height/2, this.cameras.main.width, this.cameras.main.height, 0xFF0000, 0.15).setDepth(45).setScrollFactor(0);
                    this.tweens.add({ targets: redFlash, alpha: 0, duration: 300, onComplete: () => redFlash.destroy() });
                }
            });

            // 更新玩家HP（v4.2: 颜色随血量变化）
            if(this.playerHPBar && this.playerHPBar.active) {
                const pct = Math.max(0, this.playerHP / this.playerMaxHP);
                this.playerHPBar.setScale(pct, 1);
                const hpColor = pct > 0.5 ? 0x5CBF7C : pct > 0.25 ? 0xFFD700 : 0xFF4444;
                this.playerHPBar.setFillStyle(hpColor);
                if(this.playerHPText && this.playerHPText.active) {
                    this.playerHPText.setText(`${this.playerHP}/${this.playerMaxHP}`);
                }
            }

            // 检查战斗结束
            if(this.playerHP <= 0) {
                if(this.battleTimer) { this.battleTimer.remove(); this.battleTimer = null; }
                this.showBattleDefeat();
                return;
            }
            if(this.battleMonsters.every(m => !m.alive)) {
                if(this.battleTimer) { this.battleTimer.remove(); this.battleTimer = null; }
                this.showBattleVictory();
            }
        }

        damageBattleMonster(monster, damage, isCrit = false) {
            if(!monster.alive) return;
            monster.hp -= damage;

            // v4.2 连击计数
            this.comboCount = (this.comboCount || 0) + 1;
            if(this.comboText && this.comboText.active) {
                if(this.comboCount >= 3) {
                    const comboColor = this.comboCount >= 10 ? '#FF4444' : this.comboCount >= 6 ? '#FF9900' : '#FFD700';
                    this.comboText.setText(`${this.comboCount} COMBO!`).setColor(comboColor).setAlpha(1);
                    this.tweens.killTweensOf(this.comboText);
                    this.tweens.add({ targets: this.comboText, alpha: 0, duration: 1500 });
                }
            }
            // 连击超过5时清零计时器重置
            if(!this.comboResetTimer) this.comboResetTimer = null;
            if(this.comboResetTimer) this.time.removeEvent(this.comboResetTimer);
            this.comboResetTimer = this.time.delayedCall(1600, () => { this.comboCount = 0; });

            // 更新HP条（v4.2: 颜色随血量变化）
            if(monster.hpBar && monster.hpBar.active) {
                const pct = Math.max(0, monster.hp / monster.maxHp);
                monster.hpBar.setScale(pct, 1);
                const hpColor = pct > 0.5 ? 0xFF4444 : pct > 0.25 ? 0xFF8800 : 0xFF0000;
                monster.hpBar.setFillStyle(hpColor);
            }
            if(monster.hpText && monster.hpText.active) {
                monster.hpText.setText(`${Math.max(0, monster.hp)}`);
            }

            // v4.2 伤害数字颜色分级（普通/高伤/暴击/连击）
            let dmgColor = '#FFD700', dmgSize = '14px';
            if(isCrit || damage >= 80) { dmgColor = '#FF4444'; dmgSize = '20px'; }
            else if(damage >= 50) { dmgColor = '#FF9900'; dmgSize = '17px'; }
            else if(this.comboCount >= 5) { dmgColor = '#FF66CC'; dmgSize = '16px'; }
            const dmgPrefix = (isCrit || damage >= 80) ? '💥' : '';
            const fx = this.add.text(monster.x + Phaser.Math.Between(-15, 15), monster.y - 30, `${dmgPrefix}-${damage}`, {
                fontSize: dmgSize, color: dmgColor, fontStyle: 'bold', stroke: '#000', strokeThickness: 2
            }).setOrigin(0.5).setDepth(50);
            const floatDist = (isCrit || damage >= 80) ? 50 : 35;
            this.tweens.add({ targets: fx, y: fx.y - floatDist, alpha: 0, duration: 900, ease: 'Cubic.easeOut', onComplete: () => fx.destroy() });

            // 受击震动
            if(monster.circle && monster.circle.active) {
                const origX = monster.x;
                this.tweens.add({
                    targets: monster.circle,
                    x: origX + Phaser.Math.Between(-4, 4),
                    duration: 50, yoyo: true, repeat: 3,
                    onComplete: () => { if(monster.circle && monster.circle.active) monster.circle.x = origX; }
                });
            }
            // 怪物受击闪白
            if(monster.circle && monster.circle.active && monster.circle.setFillStyle) {
                const origFill = monster.circle.fillColor;
                monster.circle.setFillStyle(0xFFFFFF);
                this.time.delayedCall(80, () => { if(monster.circle && monster.circle.active) monster.circle.setFillStyle(origFill); });
            }

            // 死亡处理
            if(monster.hp <= 0) {
                monster.hp = 0;
                monster.alive = false;
                // 击杀变暗
                if(monster.circle && monster.circle.active) monster.circle.setFillStyle(0x333333, 0.3);
                if(monster.icon && monster.icon.active) monster.icon.setAlpha(0.3);
                if(monster.nameTag && monster.nameTag.active) monster.nameTag.setAlpha(0.3);
                // 经验
                this.gainedExp += monster.exp;
                // 顿悟击杀回血
                this.enlightenments.forEach(e => {
                    if(e.effect.stat === 'killHeal') {
                        this.playerHP = Math.min(this.playerMaxHP, this.playerHP + Math.floor(this.playerMaxHP * e.effect.value));
                    }
                });
                // 死亡特效
                const deathFx = this.add.circle(monster.x, monster.y, monster.isBoss ? 40 : 25, 0xFF4444, 0.8).setDepth(55);
                this.tweens.add({ targets: deathFx, scale: 3, alpha: 0, duration: 400, onComplete: () => deathFx.destroy() });
                // 粒子爆裂
                const particleCount = monster.isBoss ? 8 : 4;
                for(let p = 0; p < particleCount; p++) {
                    const angle = (p / particleCount) * Math.PI * 2;
                    const particle = this.add.circle(monster.x, monster.y, 4, 0xFFD700, 0.9).setDepth(56);
                    this.tweens.add({
                        targets: particle,
                        x: monster.x + Math.cos(angle) * Phaser.Math.Between(30, 60),
                        y: monster.y + Math.sin(angle) * Phaser.Math.Between(30, 60),
                        alpha: 0, scale: 0.3, duration: 500 + Math.random() * 300,
                        onComplete: () => particle.destroy()
                    });
                }
            }
        }

        useSkillInBattle() {
            const beast = GameData.spiritBeast.contracted;
            if(!beast) return;
            const bDef = SPIRIT_BEASTS.find(b => b.id === beast.id);
            if(!bDef) return;

            // 技能效果
            let dmg = (20 + beast.level * 5) * 2; // 手动技能2倍
            this.enlightenments.forEach(e => {
                if(e.effect.stat === 'attack') dmg = Math.floor(dmg * (1 + e.effect.value));
            });

            const aliveMonsters = this.battleMonsters.filter(m => m.alive);
            const topHpTarget = aliveMonsters.reduce((a, b) => a && a.hp > b.hp ? a : b, null);

            switch(beast.id) {
                case 'white_tiger':
                    if(aliveMonsters[0]) this.damageBattleMonster(aliveMonsters[0], dmg * 3, true);
                    break;
                case 'azure_dragon':
                    this.playerHP = Math.min(this.playerMaxHP, this.playerHP + 30);
                    break;
                case 'vermilion_bird':
                    aliveMonsters.forEach(m => this.damageBattleMonster(m, Math.floor(dmg * 0.5)));
                    break;
                case 'black_tortoise':
                    this.playerHP = Math.min(this.playerMaxHP, this.playerHP + 20);
                    break;
                case 'qilin':
                    aliveMonsters.forEach(m => this.damageBattleMonster(m, Math.floor(dmg * 0.4)));
                    break;
                // v4.2 新灵兽技能
                case 'nine_tail_fox':
                    if(topHpTarget) { topHpTarget.atk = Math.floor(topHpTarget.atk * 0.1); }
                    this.showBattleMsg('🦊 魅惑！最强妖兽攻击-90%!');
                    break;
                case 'ice_phoenix':
                    // 保存原始atk用于正确恢复（避免与狂暴等buff叠加时数值错误）
                    aliveMonsters.forEach(m => { m._origAtk = m.atk; m.atk = Math.floor(m.atk * 0.5); });
                    this.time.delayedCall(3200, () => {
                        aliveMonsters.forEach(m => {
                            if(m.alive && m._origAtk !== undefined) {
                                m.atk = m._origAtk;
                                delete m._origAtk;
                            }
                        });
                    });
                    break;
                case 'thunder_hawk': {
                    const chainTargets = aliveMonsters.slice(0, 3);
                    chainTargets.forEach((m, i) => {
                        this.time.delayedCall(i * 150, () => { if(m.alive) this.damageBattleMonster(m, dmg * 2, true); });
                    });
                    break;
                }
                case 'earth_lion':
                    this.playerHP = Math.min(this.playerMaxHP, this.playerHP + 30);
                    this.showBattleMsg('🦁 护法钢盾！回复30HP!');
                    break;
                case 'wood_deer':
                    GameData.tree.exp = (GameData.tree.exp || 0) + 50;
                    this.playerHP = Math.min(this.playerMaxHP, this.playerHP + 20);
                    break;
                case 'shadow_wolf':
                    if(topHpTarget) {
                        const trueDmg = Math.floor(topHpTarget.hp * 0.25);
                        this.damageBattleMonster(topHpTarget, trueDmg, true);
                    }
                    break;
                case 'flame_snake':
                    if(aliveMonsters[0]) {
                        for(let t = 0; t < 5; t++) {
                            this.time.delayedCall(t * 600, () => {
                                if(aliveMonsters[0] && aliveMonsters[0].alive) {
                                    const burnDmg = Math.floor(aliveMonsters[0].maxHp * 0.05);
                                    this.damageBattleMonster(aliveMonsters[0], burnDmg);
                                }
                            });
                        }
                    }
                    break;
                case 'ancient_turtle':
                    this.playerHP = this.playerMaxHP; // 满血
                    this.showBattleMsg('🐢 玄壁盾！HP全回复!');
                    break;
                case 'star_crane':
                    this.playerHP = Math.min(this.playerMaxHP, this.playerHP + 40);
                    this.showBattleMsg('🕊️ 仙术愈合！+40HP!');
                    break;
                case 'chaos_dragon':
                    aliveMonsters.forEach(m => this.damageBattleMonster(m, dmg * 4, true));
                    break;
            }

            this.showBattleMsg(`${beast.icon} ${bDef.skillName}!`);

            // 特效
            const fx = this.add.circle(this.cameras.main.width/2, this.cameras.main.height - 100, 20, 0x9B7ED9, 0.7).setDepth(60);
            this.tweens.add({ targets: fx, scale: 4, alpha: 0, duration: 500, onComplete: () => fx.destroy() });
        }

        // ===== v4.3 丹药使用菜单（探索战斗中）=====
        showPotionMenu() {
            const w = this.cameras.main.width, h = this.cameras.main.height;
            // 检查已有丹药
            const ownedPills = Object.entries(GameData.potions || {})
                .filter(([id, count]) => count > 0)
                .map(([id, count]) => {
                    const pill = ALCHEMY_PILLS.find(p => p.id === id);
                    return pill ? { ...pill, count } : null;
                })
                .filter(Boolean);

            if(ownedPills.length === 0) {
                this.showBattleMsg('🧪 没有丹药！先去炼丹炉炼制');
                return;
            }

            // 弹出DOM选择面板
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:700;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;';
            const card = document.createElement('div');
            card.style.cssText = 'background:rgba(15,8,25,0.97);border:2px solid #5CBF7C;border-radius:14px;padding:16px;max-width:300px;width:88%;';

            let itemsHTML = '';
            ownedPills.forEach(pill => {
                itemsHTML += `<div data-pill="${pill.id}" style="display:flex;align-items:center;gap:8px;padding:10px;margin-bottom:6px;background:rgba(30,60,45,0.4);border:1px solid ${pill.color};border-radius:8px;cursor:pointer;">
                    <span style="font-size:22px">${pill.icon}</span>
                    <div style="flex:1">
                        <div style="font-size:13px;color:${pill.color};font-weight:bold">${pill.name}</div>
                        <div style="font-size:10px;color:#888">${pill.desc}</div>
                    </div>
                    <span style="font-size:12px;color:#5CBF7C;font-weight:bold">×${pill.count}</span>
                </div>`;
            });

            card.innerHTML = `
                <div style="font-size:16px;color:#5CBF7C;font-weight:bold;text-align:center;margin-bottom:8px">💊 使用丹药</div>
                ${itemsHTML}
                <button id="pot-close" style="width:100%;margin-top:6px;background:#333;color:#aaa;border:none;padding:6px;border-radius:6px;font-size:12px;cursor:pointer">取消</button>
            `;
            overlay.appendChild(card);
            document.body.appendChild(overlay);

            card.querySelectorAll('[data-pill]').forEach(el => {
                el.addEventListener('click', () => {
                    const pid = el.dataset.pill;
                    const pill = ALCHEMY_PILLS.find(p => p.id === pid);
                    if(!pill || !GameData.potions[pid]) return;

                    // 消耗丹药
                    GameData.potions[pid]--;
                    savePlayerProfile();

                    // 应用效果
                    this.applyPillEffect(pill);
                    overlay.remove();
                    this.showBattleMsg(`🧪 使用${pill.name}！`);
                });
            });
            card.querySelector('#pot-close').addEventListener('click', () => overlay.remove());
            overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.remove(); });
        }

        applyPillEffect(pill) {
            switch(pill.effect.type) {
                case 'restoreHP':
                    const healAmt = Math.floor(this.playerMaxHP * pill.effect.value);
                    this.playerHP = Math.min(this.playerMaxHP, this.playerHP + healAmt);
                    this.updatePlayerHPBar();
                    break;
                case 'attackBoost':
                    if(!this.activeBuffs) this.activeBuffs = [];
                    this.activeBuffs.push({ type: 'attackBoost', value: pill.effect.value });
                    this.showBattleMsg(`⚔️ 攻击+${Math.floor(pill.effect.value*100)}%！`);
                    break;
                case 'defenseBoost':
                    if(!this.activeBuffs) this.activeBuffs = [];
                    this.activeBuffs.push({ type: 'defenseBoost', value: pill.effect.value });
                    this.showBattleMsg(`🛡️ 伤害-${Math.floor(pill.effect.value*100)}%！`);
                    break;
                case 'speedBoost':
                    if(!this.activeBuffs) this.activeBuffs = [];
                    this.activeBuffs.push({ type: 'speedBoost', value: pill.effect.value });
                    this.showBattleMsg(`💨 攻速+${Math.floor(pill.effect.value*100)}%！`);
                    break;
                case 'critBoost':
                    if(!this.activeBuffs) this.activeBuffs = [];
                    this.activeBuffs.push({ type: 'critBoost', value: pill.effect.value });
                    this.showBattleMsg(`💥 暴击率+${Math.floor(pill.effect.value*100)}%！`);
                    break;
                case 'elementalBoost':
                    if(!this.activeBuffs) this.activeBuffs = [];
                    this.activeBuffs.push({ type: 'elementalBoost', value: pill.effect.value });
                    this.showBattleMsg(`☯️ 五行克制增强！`);
                    break;
                case 'expBoost':
                    if(!this.activeBuffs) this.activeBuffs = [];
                    this.activeBuffs.push({ type: 'expBoost', value: pill.effect.value });
                    this.showBattleMsg(`🧠 经验+${Math.floor(pill.effect.value*100)}%！`);
                    break;
                case 'cheatDeath':
                    if(!this.activeBuffs) this.activeBuffs = [];
                    this.activeBuffs.push({ type: 'cheatDeath' });
                    this.showBattleMsg(`🌟 不死药激活！免死一次！`);
                    break;
                case 'lootBoost':
                    if(!this.activeBuffs) this.activeBuffs = [];
                    this.activeBuffs.push({ type: 'lootBoost', value: pill.effect.value });
                    this.showBattleMsg(`🎁 探宝丹激活！掉落翻倍！`);
                    break;
            }
        }

        updatePlayerHPBar() {
            if(this.playerHPBar && this.playerHPText) {
                const pct = Math.max(0, this.playerHP / this.playerMaxHP);
                this.playerHPBar.setWidth(200 * pct);
                this.playerHPText.setText(`${this.playerHP}/${this.playerMaxHP}`);
            }
        }

        showBattleMsg(text) {
            if(this.battleMsgText && this.battleMsgText.active) {
                this.battleMsgText.setText(text).setAlpha(1);
                this.tweens.killTweensOf(this.battleMsgText);
                this.tweens.add({ targets: this.battleMsgText, alpha: 0, duration: 1200 });
            }
        }

        showBattleVictory() {
            this.phase = 'victory';
            const w = this.cameras.main.width, h = this.cameras.main.height;
            // 战利品
            const stoneGain = 10 + Math.floor(Math.random() * 20) * this.realmCfg.difficulty;
            this.gainedSpiritStones += stoneGain;
            GameData.player.spiritStones += stoneGain;
            
            // 灵材掉落
            const possibleMats = this.realmCfg.rewards.materials;
            if(possibleMats && possibleMats.length > 0) {
                const matId = possibleMats[Math.floor(Math.random() * possibleMats.length)];
                const matCfg = SPIRIT_MATERIALS[matId];
                if(matCfg && Math.random() < 0.5) {
                    if(!this.gainedMaterials[matId]) this.gainedMaterials[matId] = 0;
                    this.gainedMaterials[matId]++;
                    if(!GameData.materials[matId]) GameData.materials[matId] = 0;
                    GameData.materials[matId]++;
                }
            }

            // 战斗胜利视觉反馈
            const victoryOverlay = this.add.rectangle(w/2, h/2, w, h, 0x000000, 0.5).setDepth(90);
            const victoryText = this.add.text(w/2, h/2, '⚔️ 胜利!', {
                fontSize: '36px', color: '#FFD700', fontStyle: 'bold', stroke: '#000', strokeThickness: 6
            }).setOrigin(0.5).setDepth(91).setAlpha(0).setScale(0.5);
            this.tweens.add({ targets: victoryText, alpha: 1, scaleX: 1.1, scaleY: 1.1, duration: 300, ease: 'Back.easeOut' });
            this.tweens.add({ targets: victoryText, scaleX: 1, scaleY: 1, duration: 200, delay: 300 });
            this.tweens.add({ targets: [victoryOverlay, victoryText], alpha: 0, duration: 300, delay: 800, onComplete: () => { victoryOverlay.destroy(); victoryText.destroy(); } });

            // 顿悟选择
            this.time.delayedCall(1100, () => this.showEnlightenmentChoice());
        }

        showBattleDefeat() {
            this.phase = 'defeat';
            const w = this.cameras.main.width, h = this.cameras.main.height;
            this.add.rectangle(w/2, h/2, w, h, 0x000000, 0.7).setDepth(200);
            this.add.text(w/2, h/2 - 30, '💀 战败!', {
                fontSize: '32px', color: '#FF4444', fontStyle: 'bold', stroke: '#000', strokeThickness: 6
            }).setOrigin(0.5).setDepth(201);
            this.add.text(w/2, h/2 + 10, '损失部分战利品', {
                fontSize: '14px', color: '#aaa', stroke: '#000', strokeThickness: 2
            }).setOrigin(0.5).setDepth(201);
            // 损失一半灵石
            const loss = Math.floor(this.gainedSpiritStones / 2);
            GameData.player.spiritStones = Math.max(0, GameData.player.spiritStones - loss);
            this.gainedSpiritStones = Math.floor(this.gainedSpiritStones / 2);
            
            // 返回地图按钮
            const mapBtn = this.add.rectangle(w/2 - 70, h/2 + 60, 120, 32, 0x1a1a3a, 1)
                .setStrokeStyle(1, 0x9B7ED9).setInteractive({ useHandCursor: true }).setDepth(201);
            this.add.text(w/2 - 70, h/2 + 60, '🗺️ 返回地图', { fontSize: '12px', color: '#9B7ED9' }).setOrigin(0.5).setDepth(202);
            mapBtn.on('pointerdown', () => this.drawMap());
            
            // 返回仙府按钮
            const homeBtn = this.add.rectangle(w/2 + 70, h/2 + 60, 120, 32, 0x1a1a3a, 1)
                .setStrokeStyle(1, 0xFF6347).setInteractive({ useHandCursor: true }).setDepth(201);
            this.add.text(w/2 + 70, h/2 + 60, '🏠 返回仙府', { fontSize: '12px', color: '#FF6347' }).setOrigin(0.5).setDepth(202);
            homeBtn.on('pointerdown', () => this.returnToGame());
        }

        retreatFromBattle(room) {
            if(this.battleTimer) { this.battleTimer.remove(); this.battleTimer = null; }
            this.drawMap();
        }

        // ===== 顿悟选择（Roguelike构筑）=====
        showEnlightenmentChoice() {
            this.phase = 'enlightenment';
            const w = this.cameras.main.width, h = this.cameras.main.height;
            this.children.removeAll();
            this.add.rectangle(w/2, h/2, w, h, 0x0a0a1a);

            this.add.text(w/2, 40, '✨ 天命顿悟 ✨', {
                fontSize: '28px', color: '#9B7ED9', fontStyle: 'bold', stroke: '#000', strokeThickness: 6
            }).setOrigin(0.5);
            this.add.text(w/2, 72, '选择一项顿悟，增强本次探索实力', {
                fontSize: '13px', color: '#aaa', stroke: '#000', strokeThickness: 2
            }).setOrigin(0.5);

            // 随机选3个顿悟
            const qualityWeights = { 1: 50, 2: 35, 3: 12, 4: 3 };
            const shuffled = [...ENLIGHTENMENTS].sort(() => Math.random() - 0.5);
            const choices = shuffled.slice(0, 3);

            const qualityColors = { 1: '#aaaaaa', 2: '#4A90D9', 3: '#9B7ED9', 4: '#FFD700' };
            const qualityNames = { 1: '凡品', 2: '灵品', 3: '仙品', 4: '神品' };

            choices.forEach((enl, i) => {
                const cx = w/2 + (i - 1) * 200;
                const cy = h/2;

                const card = this.add.rectangle(cx, cy, 170, 220, 0x1a1a2e, 0.95)
                    .setStrokeStyle(2, parseInt((qualityColors[enl.quality] || '#888').replace('#', ''), 16))
                    .setInteractive({ useHandCursor: true }).setDepth(10);
                
                // 品质标签
                this.add.text(cx, cy - 90, qualityNames[enl.quality] || '凡品', {
                    fontSize: '11px', color: qualityColors[enl.quality] || '#888'
                }).setOrigin(0.5).setDepth(11);

                // 图标
                this.add.text(cx, cy - 50, enl.icon, { fontSize: '36px' }).setOrigin(0.5).setDepth(11);

                // 名称
                this.add.text(cx, cy, enl.name, {
                    fontSize: '16px', color: '#E8D5A3', fontStyle: 'bold', stroke: '#000', strokeThickness: 2
                }).setOrigin(0.5).setDepth(11);

                // 描述
                this.add.text(cx, cy + 40, enl.desc, {
                    fontSize: '11px', color: '#aaa', stroke: '#000', strokeThickness: 1, align: 'center', wordWrap: { width: 140 }
                }).setOrigin(0.5).setDepth(11);

                // 悬停/点击
                card.on('pointerover', () => card.setFillStyle(0x2a2a4e, 0.95));
                card.on('pointerout', () => card.setFillStyle(0x1a1a2e, 0.95));
                card.on('pointerdown', () => this.selectEnlightenment(enl));

                // 入场动画：交错弹出
                card.setAlpha(0).setScale(0.7);
                this.tweens.add({ targets: card, alpha: 0.95, scaleX: 1, scaleY: 1, duration: 400, delay: i * 120, ease: 'Back.easeOut' });
            });

            // 跳过选项
            const skipBtn = this.add.rectangle(w/2, h - 60, 120, 32, 0x1a1a3a, 1)
                .setStrokeStyle(1, 0x666).setInteractive({ useHandCursor: true });
            this.add.text(w/2, h - 60, '跳过', { fontSize: '12px', color: '#666' }).setOrigin(0.5);
            skipBtn.on('pointerdown', () => this.afterEnlightenment());
        }

        selectEnlightenment(enl) {
            this.enlightenments.push(enl);
            this.showMsg(`✨ 获得 ${enl.name}!`);
            this.afterEnlightenment();
        }

        afterEnlightenment() {
            // 清除当前房间，回到地图
            const room = this.rooms[this.currentRoomIdx];
            if(room) room.cleared = true;
            this.roomsCleared++;
            this.drawMap();
        }

        // ===== 宝箱房间 =====
        openTreasure(room) {
            const possibleMats = this.realmCfg.rewards.materials;
            const stoneGain = 20 + Math.floor(Math.random() * 30) * this.realmCfg.difficulty;
            this.gainedSpiritStones += stoneGain;
            GameData.player.spiritStones += stoneGain;

            let matGain = '';
            if(possibleMats && possibleMats.length > 0) {
                const matId = possibleMats[Math.floor(Math.random() * possibleMats.length)];
                const matCfg = SPIRIT_MATERIALS[matId];
                if(matCfg) {
                    if(!this.gainedMaterials[matId]) this.gainedMaterials[matId] = 0;
                    this.gainedMaterials[matId]++;
                    if(!GameData.materials[matId]) GameData.materials[matId] = 0;
                    GameData.materials[matId]++;
                    matGain = `${matCfg.icon} ${matCfg.name}`;
                }
            }
            
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;';
            const card = document.createElement('div');
            card.style.cssText = 'background:rgba(15,10,25,0.97);border:2px solid #FFD700;border-radius:16px;padding:24px;text-align:center;max-width:300px;animation:destinyIn 0.3s ease;';
            card.innerHTML = `
                <div style="font-size:36px;margin-bottom:8px">🎁</div>
                <div style="font-size:18px;color:#FFD700;font-weight:bold;margin-bottom:8px">发现宝箱!</div>
                <div style="font-size:14px;color:#5CBF7C;margin-bottom:4px">💰 +${stoneGain} 灵石</div>
                ${matGain ? `<div style="font-size:14px;color:#9B7ED9;margin-bottom:4px">${matGain}</div>` : ''}
                <button style="margin-top:12px;background:#FFD700;color:#000;border:none;padding:8px 24px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:bold">收下</button>
            `;
            overlay.appendChild(card);
            document.body.appendChild(overlay);
            this.input.enabled = false;
            card.querySelector('button').addEventListener('click', () => {
                overlay.remove();
                this.input.enabled = true;
                room.cleared = true;
                this.roomsCleared++;
                this.drawMap();
            });
        }

        // ===== 天命房间 =====
        triggerFate(room) {
            // 复用现有EXPLORE_EVENTS
            const totalWeight = EXPLORE_EVENTS.reduce((s, e) => s + e.weight, 0);
            let roll = Math.random() * totalWeight;
            let evt = EXPLORE_EVENTS[0];
            for(const e of EXPLORE_EVENTS) { roll -= e.weight; if(roll <= 0) { evt = e; break; } }

            let rewardText = '';
            evt.rewards.forEach(r => {
                if(r.type === 'spiritStones') {
                    const val = Math.floor(Math.random() * (r.max - r.min + 1)) + r.min;
                    if(val > 0) { GameData.player.spiritStones += val; this.gainedSpiritStones += val; rewardText += `💰 +${val} 灵石 `; }
                    else { GameData.player.spiritStones = Math.max(0, GameData.player.spiritStones + val); rewardText += `💰 ${val} 灵石 `; }
                } else if(r.type === 'exp') {
                    const val = Math.floor(Math.random() * (r.max - r.min + 1)) + r.min;
                    GameData.tree.exp += val; rewardText += `✨ +${val} 经验 `;
                }
            });

            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;';
            const card = document.createElement('div');
            card.style.cssText = 'background:rgba(15,10,25,0.97);border:2px solid #9B7ED9;border-radius:16px;padding:24px;text-align:center;max-width:300px;animation:destinyIn 0.3s ease;';
            card.innerHTML = `
                <div style="font-size:36px;margin-bottom:8px">${evt.icon}</div>
                <div style="font-size:18px;color:#9B7ED9;font-weight:bold;margin-bottom:8px">${evt.name}</div>
                <div style="font-size:13px;color:#ccc;margin-bottom:8px">${evt.desc}</div>
                <div style="font-size:14px;color:#5CBF7C;margin-bottom:12px">${rewardText || '无事发生'}</div>
                <button style="background:#9B7ED9;color:#fff;border:none;padding:8px 24px;border-radius:8px;font-size:14px;cursor:pointer">继续</button>
            `;
            overlay.appendChild(card);
            document.body.appendChild(overlay);
            this.input.enabled = false;
            card.querySelector('button').addEventListener('click', () => {
                overlay.remove();
                this.input.enabled = true;
                room.cleared = true;
                this.roomsCleared++;
                this.drawMap();
            });
        }

        // ===== 灵脉房间 =====
        collectVein(room) {
            const stoneGain = 30 + Math.floor(Math.random() * 40) * this.realmCfg.difficulty;
            this.gainedSpiritStones += stoneGain;
            GameData.player.spiritStones += stoneGain;
            // 也给灵材
            const possibleMats = this.realmCfg.rewards.materials;
            let matGain = '';
            if(possibleMats && possibleMats.length > 0) {
                const matId = possibleMats[Math.floor(Math.random() * possibleMats.length)];
                const matCfg = SPIRIT_MATERIALS[matId];
                if(matCfg && Math.random() < 0.7) {
                    if(!this.gainedMaterials[matId]) this.gainedMaterials[matId] = 0;
                    this.gainedMaterials[matId] += 2;
                    if(!GameData.materials[matId]) GameData.materials[matId] = 0;
                    GameData.materials[matId] += 2;
                    matGain = `${matCfg.icon} ${matCfg.name} x2`;
                }
            }
            this.showMsg(`💎 灵脉采集! +${stoneGain}灵石 ${matGain}`);
            room.cleared = true;
            this.roomsCleared++;
            this.drawMap();
        }

        // ===== 灵兽房间 =====
        encounterBeast(room) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;';
            const card = document.createElement('div');
            card.style.cssText = 'background:rgba(15,10,25,0.97);border:2px solid #DAA520;border-radius:16px;padding:24px;text-align:center;max-width:320px;animation:destinyIn 0.3s ease;';

            // 随机一只灵兽
            const availableBeasts = SPIRIT_BEASTS.filter(b => !GameData.spiritBeast.contracted || b.id !== GameData.spiritBeast.contracted.id);
            const beast = availableBeasts[Math.floor(Math.random() * availableBeasts.length)];
            
            if(!beast) {
                card.innerHTML = `<div style="font-size:36px;margin-bottom:8px">🐾</div>
                    <div style="font-size:16px;color:#888">没有发现灵兽...</div>
                    <button style="margin-top:12px;background:#555;color:#fff;border:none;padding:8px 24px;border-radius:8px;font-size:14px;cursor:pointer">离开</button>`;
                overlay.appendChild(card);
                document.body.appendChild(overlay);
                this.input.enabled = false;
                card.querySelector('button').addEventListener('click', () => { overlay.remove(); this.input.enabled = true; room.cleared = true; this.roomsCleared++; this.drawMap(); });
                return;
            }

            const canAfford = GameData.player.spiritStones >= Math.floor(beast.cost * 0.5);
            card.innerHTML = `
                <div style="font-size:36px;margin-bottom:8px">${beast.icon}</div>
                <div style="font-size:18px;color:#DAA520;font-weight:bold;margin-bottom:4px">发现 ${beast.name}!</div>
                <div style="font-size:12px;color:#aaa;margin-bottom:8px">${beast.passiveDesc}</div>
                <div style="font-size:12px;color:#9B7ED9;margin-bottom:8px">${beast.skillName}: ${beast.skillDesc}</div>
                <div style="font-size:13px;color:${canAfford ? '#5CBF7C' : '#FF4444'};margin-bottom:12px">契约费用: 💎${Math.floor(beast.cost * 0.5)} 灵石</div>
                <div style="display:flex;gap:8px;justify-content:center">
                    <button id="beast-tame" style="background:${canAfford ? '#DAA520' : '#555'};color:#000;border:none;padding:8px 20px;border-radius:8px;font-size:13px;cursor:${canAfford ? 'pointer' : 'not-allowed'};font-weight:bold">契约</button>
                    <button id="beast-leave" style="background:#555;color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer">离开</button>
                </div>
            `;
            overlay.appendChild(card);
            document.body.appendChild(overlay);
            this.input.enabled = false;

            card.querySelector('#beast-leave').addEventListener('click', () => { overlay.remove(); this.input.enabled = true; room.cleared = true; this.roomsCleared++; this.drawMap(); });
            if(canAfford) {
                card.querySelector('#beast-tame').addEventListener('click', () => {
                    // 契约灵兽（半价）
                    GameData.player.spiritStones -= Math.floor(beast.cost * 0.5);
                    GameData.spiritBeast.contracted = { id: beast.id, name: beast.name, icon: beast.icon, element: beast.element, level: 1, exp: 0, skillCooldown: 0 };
                    GameData.spiritBeast.unlocked = true;
                    if(!GameData.lobby.beasts.includes(beast.id)) GameData.lobby.beasts.push(beast.id);
                    overlay.remove();
                    this.input.enabled = true;
                    this.showMsg(`🐯 与${beast.name}缔结契约!`);
                    room.cleared = true;
                    this.roomsCleared++;
                    this.drawMap();
                });
            }
        }

        clearRoom(room) {
            room.cleared = true;
            this.roomsCleared++;
            this.drawMap();
        }

        showMsg(text) {
            const t = this.add.text(this.cameras.main.width/2, this.cameras.main.height * 0.5, text, {
                fontSize: '18px', color: '#FFD700', fontStyle: 'bold', stroke: '#000', strokeThickness: 4
            }).setOrigin(0.5).setDepth(1000);
            this.tweens.add({ targets: t, y: t.y - 40, alpha: 0, duration: 2000, onComplete: () => t.destroy() });
        }

        // ===== 返回仙府 =====
        returnToGame() {
            if(this.battleTimer) this.battleTimer.remove();
            // 🔥 v4.1 顿悟持久化：高品质顿悟转化为永久奖励
            this.persistEnlightenments();
            // 清理DOM弹窗
            document.querySelectorAll('body > div[style*="position:fixed"]').forEach(el => {
                if(el.id !== 'dialog-overlay' && el.id !== 'talisman-bar' && el.id !== 'system-bar' && el.id !== 'time-indicator' && el.id !== 'game-container') {
                    el.remove();
                }
            });
            GameData.expedition.inProgress = false;
            savePlayerProfile();
            this.scene.start('Game');
        }

        // ===== 顿悟持久化：将高品质顿悟写入GameData永久生效 =====
        persistEnlightenments() {
            if(!this.enlightenments || this.enlightenments.length === 0) return;

            // 初始化永久顿悟存储
            if(!GameData.permanentEnlightenments) GameData.permanentEnlightenments = [];

            const permanentList = []; // 用于展示的列表

            this.enlightenments.forEach(enl => {
                // 仙品(quality>=3)和神品(quality>=4) 永久保留
                if(enl.quality >= 3) {
                    // 防止重复添加同ID的顿悟（叠加效果）
                    const existing = GameData.permanentEnlightenments.find(p => p.id === enl.id);
                    if(existing) {
                        // 叠加：数值类效果累加
                        existing.stacks = (existing.stacks || 1) + 1;
                        existing.value = (existing.value || enl.effect.value) * 1.5; // 叠加时效果增强50%
                    } else {
                        GameData.permanentEnlightenments.push({
                            id: enl.id,
                            name: enl.name,
                            icon: enl.icon,
                            desc: enl.desc,
                            quality: enl.quality,
                            type: enl.type,
                            effect: enl.effect, // 保留完整effect对象供伤害公式读取
                            value: enl.effect.value,
                            stacks: 1,
                            obtainedAt: new Date().toISOString()
                        });
                    }
                    // 叠加时也确保effect存在
                    if(existing && !existing.effect) {
                        // 从原始配置中恢复effect
                        const origEnl = ENLIGHTENMENTS.find(e => e.id === existing.id);
                        if(origEnl) existing.effect = origEnl.effect;
                    }
                    permanentList.push(`✨${enl.name}[${enl.quality === 4 ? '神品' : '仙品'}]`);
                }
            });

            if(permanentList.length > 0) {
                // 存储本次永久化信息用于返回GameScene后展示
                window._lastExpeditionBonus = {
                    enlightenments: permanentList,
                    materials: Object.entries(this.gainedMaterials).map(([id, count]) => {
                        const cfg = SPIRIT_MATERIALS[id];
                        return cfg ? `${cfg.icon}${cfg.name}x${count}` : null;
                    }).filter(Boolean),
                    spiritStones: this.gainedSpiritStones
                };
                console.log('[v4.1] 顿悟持久化:', permanentList.join(', '));
            }

            // 清空临时顿悟（探索内的已使用）
            this.enlightenments = [];
        }

        // ===== 探索结算面板 =====
        showExpeditionSummary(isComplete = true) {
            this.phase = 'summary';
            const w = this.cameras.main.width, h = this.cameras.main.height;
            this.children.removeAll();
            this.add.rectangle(w/2, h/2, w, h, 0x0a0a1a);

            // 标题
            const titleText = isComplete ? `🏆 ${this.realmCfg.name} 探索完成!` : '📋 探览结算';
            const titleColor = isComplete ? '#FFD700' : '#9B7ED9';
            this.add.text(w/2, 30, titleText, {
                fontSize: '24px', color: titleColor, fontStyle: 'bold', stroke: '#000', strokeThickness: 5
            }).setOrigin(0.5);

            // 评级计算
            const totalRooms = this.rooms.length - 1; // 不算起始房间
            const clearRate = totalRooms > 0 ? this.roomsCleared / totalRooms : 0;
            let rank = 'D', rankColor = '#888', rankDesc = '初入秘境';
            if(clearRate >= 1.0) { rank = 'SSS'; rankColor = '#FFD700'; rankDesc = '秘境主宰'; }
            else if(clearRate >= 0.8) { rank = 'SS'; rankColor = '#FF6347'; rankDesc = '登峰造极'; }
            else if(clearRate >= 0.6) { rank = 'S'; rankColor = '#FF8C00'; rankDesc = '出类拔萃'; }
            else if(clearRate >= 0.4) { rank = 'A'; rankColor = '#9B7ED9'; rankDesc = '小有成就'; }
            else if(clearRate >= 0.2) { rank = 'B'; rankColor = '#5CBF7C'; rankDesc = '略有收获'; }

            // 评级展示区
            this.add.rectangle(w/2, 95, 120, 70, 0x1a1a2e).setStrokeStyle(2, parseInt(rankColor.replace('#',''),16));
            this.add.text(w/2, 78, rank, {
                fontSize: '32px', color: rankColor, fontStyle: 'bold'
            }).setOrigin(0.5);
            this.add.text(w/2, 108, rankDesc, {
                fontSize: '11px', color: '#aaa'
            }).setOrigin(0.5);

            // 统计面板
            const statsY = 150;
            const stats = [
                ['⚔️ 房间进度', `${this.roomsCleared}/${totalRooms}`],
                ['💰 获得灵石', `+${this.gainedSpiritStones}`],
                ['✨ 获得经验', `+${this.gainedExp}`],
                ['🔮 顿悟数量', `${this.enlightenments.length}个`],
            ];
            
            // 灵材列表
            const matEntries = Object.entries(this.gainedMaterials);
            if(matEntries.length > 0) {
                matEntries.forEach(([id, count]) => {
                    const matCfg = SPIRIT_MATERIALS[id];
                    if(matCfg) stats.push([`${matCfg.icon} ${matCfg.name}`, `x${count}`]);
                });
            } else {
                stats.push(['📦 灵材', '无']);
            }

            // 顿悟列表（区分临时和永久）
            if(this.enlightenments.length > 0) {
                const tempEnls = this.enlightenments.filter(e => e.quality < 3);
                const permEnls = this.enlightenments.filter(e => e.quality >= 3);
                if(permEnls.length > 0) {
                    stats.push(['🌟 永久顿悟', permEnls.map(e => e.name + (e.quality === 4 ? '⭐' : '✨')).join('、')]);
                }
                if(tempEnls.length > 0) {
                    stats.push(['💨 探索顿悟(本次)', tempEnls.map(e => e.name).join('、')]);
                }
            }

            stats.forEach((stat, i) => {
                const sy = statsY + i * 26;
                this.add.text(w/2 - 100, sy, stat[0], {
                    fontSize: '13px', color: '#ccc', stroke: '#000', strokeThickness: 1
                }).setOrigin(0, 0.5);
                this.add.text(w/2 + 100, sy, stat[1], {
                    fontSize: '13px', color: '#5CBF7C', stroke: '#000', strokeThickness: 1
                }).setOrigin(1, 0.5);
                
                // 分割线
                if(i < stats.length - 1) {
                    this.add.rectangle(w/2, sy + 14, w - 80, 1, 0x333355, 0.3);
                }
            });

            // 返回按钮
            const btnY = h - 60;
            const returnBtn = this.add.rectangle(w/2, btnY, 160, 38, 0x1a1a3a, 1)
                .setStrokeStyle(2, 0x9B7ED9).setInteractive({ useHandCursor: true }).setDepth(30);
            this.add.text(w/2, btnY, '🏠 返回仙府', {
                fontSize: '15px', color: '#9B7ED9', fontStyle: 'bold'
            }).setOrigin(0.5).setDepth(31);
            returnBtn.on('pointerdown', () => this.returnToGame());
            returnBtn.on('pointerover', () => returnBtn.setFillStyle(0x2a2a5e, 1));
            returnBtn.on('pointerout', () => returnBtn.setFillStyle(0x1a1a3a, 1));
        }
    }

    /* ========================================
       Phaser游戏配置
       ======================================== */
    const config = {
        type: Phaser.AUTO,
        width: 1280,
        height: 720,
        parent: 'game-container',
        backgroundColor: '#0a0a1a',
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [MainMenuScene, GameScene, ExploreScene]
    };

    // 全局错误捕获，方便调试
    window.onerror = function(msg, url, line, col, err) {
        console.error('JS Error:', msg, 'at line', line);
        const errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:#fff;padding:8px;z-index:9999;font-size:12px;';
        errDiv.textContent = 'Error at line ' + line + ': ' + msg;
        document.body.appendChild(errDiv);
    };
    window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled Promise:', e.reason);
        const errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed;top:40px;left:0;width:100%;background:darkred;color:#fff;padding:8px;z-index:9999;font-size:12px;';
        errDiv.textContent = 'Promise Error: ' + (e.reason && e.reason.message || e.reason);
        document.body.appendChild(errDiv);
    });

    try {
        console.log('Starting game initialization...');
        const game = new Phaser.Game(config);
        console.log('Phaser.Game created with', game.scene.getScenes(true).length, 'scenes');
        // 游戏启动成功，移除诊断面板
        const diagPanel = document.getElementById('boot-diag');
        if(diagPanel) diagPanel.remove();
    } catch(e) {
        console.error('Init Error:', e);
        const errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:#fff;padding:8px;z-index:9999;font-size:14px;';
        errDiv.textContent = 'Init Error: ' + e.message;
        document.body.appendChild(errDiv);
    }
    </script>
