        setupOverlay(overlay, card) {
            document.body.appendChild(overlay);
            // зҰҒз”ЁPhaser canvasзҡ„pointerдәӢд»¶пјҢйҳІжӯўз©ҝйҖҸ
            const canvas = document.querySelector('canvas');
            if(canvas) canvas.style.pointerEvents = 'none';
            // з»ҹдёҖе…ій—ӯж–№жі•пјҡз§»йҷӨoverlayпјҢе»¶иҝҹжҒўеӨҚcanvasдәӨдә’пјҲйҳІжӯўclickз©ҝйҖҸеҲ°PhaserжҢүй’®пјү
            overlay._close = () => {
                overlay.remove();
                setTimeout(() => { if(canvas) canvas.style.pointerEvents = 'auto'; }, 300);
            };
            // йҳ»жӯўcardеҶ…йғЁзӮ№еҮ»з©ҝйҖҸ

    class GameScene extends Phaser.Scene {
        constructor() { super({ key: 'Game' }); }

        init() {
            this.slots = [];
            this.formations = [];
            this.monsters = [];
            this.isWaveActive = false;
            this.waveTimer = 30;
            this.dialogShown = false;
            this.monsterAttackTimer = null;
            this.waveEndTimer = null;
            this.msgQueue = [];
            this.spawnTimers = [];   // жң¬жіўжүҖжңүspawnе»¶иҝҹе®ҡж—¶еҷЁ
            this.currentWaveId = 0;  // жіўж¬Ўе”ҜдёҖIDпјҢйҳІжӯўи·Ёжіўе№Іжү°
            this.isGameOver = false; // жёёжҲҸжҳҜеҗҰз»“жқҹ
            this.isPaused = false;   // жёёжҲҸжҳҜеҗҰжҡӮеҒңпјҲеӨ©е‘Ҫеј№зӘ—зӯүпјү
            this.waveDamageTaken = 0; // жң¬жіўеҸ—еҲ°зҡ„дјӨе®іпјҲз”ЁдәҺе®ҢзҫҺйҳІе®ҲеҲӨе®ҡпјү
            this.bgObjects = [];     // иғҢжҷҜеҜ№иұЎеј•з”ЁпјҲз”ЁдәҺжҳјеӨңеҸҳиүІпјү
            this.spiritParticles = []; // зҒөж°”зІ’еӯҗеј•з”Ё
            this.treeGlow = null;    // зҒөжңЁе…үжҷ•еј•з”Ё
        }

        create() {
            try {
            // жё…зҗҶж®Ӣз•ҷзҡ„DOMеј№зӘ—overlayпјҲд№ӢеүҚеңәжҷҜеҸҜиғҪйҒ—з•ҷпјү
            const preserveIds = ['game-container', 'dialog-overlay', 'talisman-bar', 'system-bar', 'time-indicator'];
            document.querySelectorAll('body > div').forEach(el => {
                const s = el.style;
                // еҸӘз§»йҷӨжЁЎжҖҒеј№зӘ—overlayпјҲжңүеҚҠйҖҸжҳҺиғҢжҷҜ+й«ҳzIndexзҡ„пјүпјҢдҝқз•ҷеёёй©»UIе…ғзҙ 
                if(s.position === 'fixed' && s.zIndex && parseInt(s.zIndex) >= 100 && !preserveIds.includes(el.id)) {
                    el.remove();
                }
            });

            const w = this.cameras.main.width, h = this.cameras.main.height;

            // жҳҫзӨәжёёжҲҸUIе…ғзҙ 
            const talismanBar = document.getElementById('talisman-bar');
            const timeIndicator = document.getElementById('time-indicator');
            const systemBar = document.getElementById('system-bar');
            if(talismanBar) talismanBar.style.display = 'flex';
            if(timeIndicator) timeIndicator.style.display = 'flex';
            if(systemBar) systemBar.style.display = 'flex';

            // ===== иғҢжҷҜжёІжҹ“ =====
            this.renderBackground(w, h);

            // ===== зҒөжңЁ =====
            this.treeX = w / 2;
            this.treeY = h * 0.48;
            this.renderSpiritTree(w, h);

            // ===== йҳөжі•ж§ҪдҪҚ =====
            this.createSlots(w, h);

            // ===== UIйқўжқҝ =====
            this.createUI(w, h);

            // ===== и®Ўж—¶еҷЁ =====
            this.time.addEvent({ delay: 1000, callback: this.tick, callbackScope: this, loop: true });

            // ===== з¬Ұз®“зі»з»ҹеҲқе§ӢеҢ– =====
            this.initTalismans();

            // ===== жҳјеӨңзі»з»ҹеҲқе§ӢеҢ– =====
            this.updateTimeUI();
            this.updateSkyColors();

            // ===== еҠҹиғҪзі»з»ҹжҢүй’®еҲқе§ӢеҢ– =====
            this.initSystemButtons();
            } catch(err) {
                console.error('вқҢ create() error:', err);
                const errDiv = document.createElement('div');
                errDiv.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);max-width:80%;background:rgba(255,0,0,0.95);color:#fff;padding:16px;z-index:9999;font-size:13px;border-radius:10px;word-break:break-all;';
                errDiv.textContent = 'вқҢ еҲқе§ӢеҢ–й”ҷиҜҜ: ' + err.message + '\n' + (err.stack || '');
                document.body.appendChild(errDiv);
            }
        }

        renderBackground(w, h) {
            this.bgObjects = [];
            // еӨ©з©әжёҗеҸҳ - еӯҳеӮЁеј•з”Ёд»ҘдҫҝжҳјеӨңеҸҳиүІ
            for(let y = 0; y < h; y += 4) {
                const ratio = y / h;
                const rect = this.add.rectangle(w/2, y, w, 6, 0x0a0a1a);
                rect.setData('baseRatio', ratio);
                this.bgObjects.push(rect);
            }
            this.updateSkyColors();

            // иҝңжҷҜеұұеіҰ
            this.drawMountain(w, h, h * 0.52, 0x12122a, 0.8);
            this.drawMountain(w, h, h * 0.58, 0x161630, 0.9);

            // ең°йқў
            const groundY = h * 0.68;
            this.add.rectangle(w/2, (groundY + h) / 2, w, h - groundY, 0x1a1a2a);
            // ең°йқўзә№зҗҶзәҝ
            for(let y = groundY; y < h; y += 24) {
                this.add.rectangle(w/2, y, w, 1, 0x222240, 0.3);
            }

            // иЈ…йҘ°зҒөж°”зІ’еӯҗ
            this.spiritParticles = [];
            for(let i = 0; i < 12; i++) {
                const px = Phaser.Math.Between(w * 0.1, w * 0.9);
                const py = Phaser.Math.Between(h * 0.15, h * 0.55);
                const size = Phaser.Math.Between(1, 4);
                const alpha = Phaser.Math.FloatBetween(0.15, 0.4);
                const p = this.add.circle(px, py, size, 0x9B7ED9, alpha);
                this.tweens.add({
                    targets: p, y: py - Phaser.Math.Between(30, 80), alpha: 0,
                    duration: Phaser.Math.Between(3000, 6000), repeat: -1,
                    delay: Phaser.Math.Between(0, 4000)
                });
                this.spiritParticles.push(p);
            }

            // жңҲдә®/еӨӘйҳіпјҲж №жҚ®жҳјеӨңеҲҮжҚўжҳҫзӨәпјүвҖ” еҸідҫ§еҖ’и®Ўж—¶дёҺжіўж¬Ўйқўжқҝд№Ӣй—ҙ
            const celX = w * 0.85, celY = 105;
            this.celestialBody = this.add.circle(celX, celY, 30, 0xFFD700, 0.9).setDepth(8);
            this.celestialIcon = this.add.text(celX, celY, 'вҳҖпёҸ', { fontSize: '34px' }).setOrigin(0.5).setDepth(8);
            this.celestialGlow = this.add.circle(celX, celY, 50, 0xFFD700, 0.15).setDepth(7);
            this.tweens.add({ targets: this.celestialGlow, scale: 1.4, alpha: 0.06, duration: 2000, yoyo: true, repeat: -1 });

            // еӨ©дҪ“еҲӣе»әеҗҺеҗҢжӯҘзҠ¶жҖҒпјҲжӯӨж—¶starsе°ҡжңӘеҲӣе»әпјҢдҪҶforEachжңүз©әеҖјдҝқжҠӨпјү
            this.updateSkyColors();

            // еӨңй—ҙжҳҹжҳҹпјҲй»ҳи®Өйҡҗи—Ҹпјү
            this.stars = [];
            for(let i = 0; i < 20; i++) {
                const sx = Phaser.Math.Between(w * 0.05, w * 0.95);
                const sy = Phaser.Math.Between(h * 0.02, h * 0.3);
                const star = this.add.circle(sx, sy, Phaser.Math.Between(1, 3), 0xFFFFFF, 0);
                star.setStrokeStyle(0);
                this.stars.push(star);
                // жҳҹжҳҹй—ӘзғҒ
                this.tweens.add({
                    targets: star, alpha: { from: 0, to: Phaser.Math.FloatBetween(0.2, 0.7) },
                    duration: Phaser.Math.Between(1500, 3000), yoyo: true, repeat: -1, delay: Phaser.Math.Between(0, 2000)
                });
            }
        }

        // жҳјеӨңеӨ©з©әйўңиүІжӣҙж–°
        updateSkyColors() {
            const period = getCurrentPeriod(GameData.time.hour);
            const skyTop = Phaser.Display.Color.HexStringToColor(period.skyTop);
            const skyBot = Phaser.Display.Color.HexStringToColor(period.skyBot);

            this.bgObjects.forEach(rect => {
                if(!rect || !rect.active) return;
                const ratio = rect.getData('baseRatio');
                const r = Math.floor(skyTop.red + (skyBot.red - skyTop.red) * ratio);
                const g = Math.floor(skyTop.green + (skyBot.green - skyTop.green) * ratio);
                const b = Math.floor(skyTop.blue + (skyBot.blue - skyTop.blue) * ratio);
                rect.setFillStyle(Phaser.Display.Color.GetColor(r, g, b));
            });

            // жӣҙж–°еӨ©дҪ“жҳҫзӨә
            if(this.celestialBody && this.celestialBody.active) {
                const isNight = period.key === 'night';
                const isDusk = period.key === 'dusk';
                this.celestialBody.setFillStyle(isNight ? 0xE8E8FF : 0xFFD700, isNight ? 0.7 : 0.9);
                this.celestialIcon.setText(isNight ? 'рҹҢҷ' : (period.key === 'dawn' || isDusk ? 'рҹҢ…' : 'вҳҖпёҸ'));
                if(this.celestialGlow && this.celestialGlow.active) {
                    this.celestialGlow.setFillStyle(isNight ? 0x8888CC : 0xFFD700, isNight ? 0.06 : 0.1);
                }
                // жҳҹжҳҹеңЁеӨңй—ҙе’Ңй»„жҳҸжҳҫзӨә
                if(this.stars) this.stars.forEach(s => {
                    if(s && s.active) {
                        const showStars = isNight || isDusk;
                        if(!showStars) {
                            s.setAlpha(0);
                            this.tweens.killTweensOf(s);
                        } else if(showStars && s.alpha === 0) {
                            // д»ҺзҷҪеӨ©еҲҮжҚўеӣһеӨңй—ҙ/й»„жҳҸж—¶пјҢйҮҚж–°еҗҜеҠЁжҳҹжҳҹй—ӘзғҒtween
                            this.tweens.add({
                                targets: s, alpha: { from: 0, to: Phaser.Math.FloatBetween(0.2, 0.7) },
                                duration: Phaser.Math.Between(1500, 3000), yoyo: true, repeat: -1, delay: Phaser.Math.Between(0, 2000)
                            });
                        }
                    }
                });
            }
        }

        drawMountain(w, h, baseY, color, alpha) {
            const points = [];
            const segments = 12;
            for(let i = 0; i <= segments; i++) {
                const x = (i / segments) * w;
                const peakOffset = Math.sin(i * 0.8) * 40 + Math.sin(i * 1.5) * 20;
                const y = baseY - 30 - Math.abs(Math.sin(i * 0.6)) * 60 - peakOffset;
                points.push({ x, y });
            }
            const gfx = this.add.graphics();
            gfx.fillStyle(color, alpha);
            gfx.beginPath();
            gfx.moveTo(0, h);
            points.forEach(p => gfx.lineTo(p.x, p.y));
            gfx.lineTo(w, h);
            gfx.closePath();
            gfx.fillPath();
        }

        renderSpiritTree(w, h) {
            // зҒөжңЁи§Ҷи§үеҜ№иұЎе®№еҷЁпјҲз”ЁдәҺеҚҮзә§ж—¶жё…зҗҶпјү
            this.treeVisuals = [];

            // зҒөжңЁеӨ–еұӮд»ҷж°”е…үжҷ•пјҲеӨ§иҢғеӣҙпјү
            this.treeGlow = this.add.circle(this.treeX, this.treeY, 80, 0x4A7C59, 0.08);
            this.tweens.add({ targets: this.treeGlow, scaleX: 1.2, scaleY: 1.2, alpha: 0.04, duration: 2000, yoyo: true, repeat: -1 });

            // зҒөжңЁз¬¬дәҢеұӮе…үжҷ•пјҲзҙ«иүІзҒөж°”пјү
            const auraGlow = this.add.circle(this.treeX, this.treeY, 65, 0x9B7ED9, 0.05);
            this.tweens.add({ targets: auraGlow, scaleX: 1.15, scaleY: 1.15, alpha: 0.02, duration: 2500, yoyo: true, repeat: -1, delay: 500 });
            this.treeVisuals.push(auraGlow);

            // зҒөжңЁзҒөж°”зҺҜпјҲж—ӢиҪ¬з¬Ұж–ҮеңҲпјү
            const spiritRing = this.add.circle(this.treeX, this.treeY, 60, 0x4A7C59, 0);
            spiritRing.setStrokeStyle(1, 0x9B7ED9, 0.3);
            this.tweens.add({ targets: spiritRing, angle: -360, duration: 12000, repeat: -1 });
            this.tweens.add({ targets: spiritRing, scaleX: 1.1, scaleY: 1.1, alpha: 0.15, duration: 3000, yoyo: true, repeat: -1 });
            this.treeVisuals.push(spiritRing);

            // ж №жҚ®зҒөжңЁзӯүзә§жёІжҹ“дёҚеҗҢеҪўжҖҒ
            this.renderTreeByLevel();

            // зҒөжңЁж ҮиҜҶпјҲдҝқеӯҳеј•з”Ёд»ҘдҫҝеҚҮзә§ж—¶жӣҙж–°пјү
            this.treeLabel = this.add.text(this.treeX, this.treeY + 65, `Lv.${GameData.tree.level} ${TREE_LEVELS[GameData.tree.level].name}`, {
                fontSize: '15px', color: '#6BAF7D', fontStyle: 'bold',
                stroke: '#0a0a1a', strokeThickness: 3
            }).setOrigin(0.5);
        }

        // ж №жҚ®зҒөжңЁзӯүзә§жёІжҹ“и§Ҷи§үеҪўжҖҒ
        renderTreeByLevel() {
            const lv = GameData.tree.level;
            const tx = this.treeX, ty = this.treeY;

            // зҒөжңЁеҪўжҖҒй…ҚзҪ®пјҡеӨ§е°Ҹ/йўңиүІ/е…үж•Ҳ/иЈ…йҘ°йҡҸзӯүзә§йҖ’иҝӣ
            const FORMS = {
                1: { radius: 25, color: 0x3D6B4C, stroke: 0x5CA06C, strokeW: 2, glowR: 50, glowA: 0.05, coreR: 4, coreA: 0.3, particles: 4, name: 'зҒөз§Қ' },
                2: { radius: 30, color: 0x4A7C59, stroke: 0x6BAF7D, strokeW: 2, glowR: 55, glowA: 0.06, coreR: 5, coreA: 0.35, particles: 5, name: 'е№јиӢ—' },
                3: { radius: 35, color: 0x4A7C59, stroke: 0x6BAF7D, strokeW: 3, glowR: 60, glowA: 0.07, coreR: 6, coreA: 0.4, particles: 6, name: 'е°ҸзҒөжңЁ' },
                4: { radius: 40, color: 0x4A7C59, stroke: 0x7DC08E, strokeW: 3, glowR: 70, glowA: 0.08, coreR: 7, coreA: 0.45, particles: 6, name: 'дёӯзҒөжңЁ' },
                5: { radius: 45, color: 0x5CA06C, stroke: 0x8DD09E, strokeW: 3, glowR: 80, glowA: 0.1, coreR: 8, coreA: 0.5, particles: 8, name: 'еӨ§зҒөжңЁ' },
                6: { radius: 50, color: 0x4A9C5C, stroke: 0xA0E0B0, strokeW: 4, glowR: 90, glowA: 0.12, coreR: 10, coreA: 0.6, particles: 10, name: 'д»ҷжңЁ' },
                7: { radius: 55, color: 0x5CBF7C, stroke: 0xC0F0D0, strokeW: 4, glowR: 100, glowA: 0.15, coreR: 12, coreA: 0.7, particles: 12, name: 'еӨ©зҒөжңЁ' },
            };
            const form = FORMS[Math.min(lv, 7)] || FORMS[7];

            // жё…зҗҶж—§и§Ҷи§үпјҲдҝқз•ҷtreeGlow/tree/treeLabelпјү
            if(this.treeDetailObjects) {
                this.treeDetailObjects.forEach(obj => {
                    if(obj && obj.active) {
                        this.tweens.killTweensOf(obj);
                        obj.destroy();
                    }
                });
            }
            this.treeDetailObjects = [];

            // жӣҙж–°е…үжҷ•
            if(this.treeGlow && this.treeGlow.active) {
                this.treeGlow.setRadius(form.glowR);
            }

            // зҒөжңЁдё»дҪ“
            if(this.tree && this.tree.active) {
                this.tree.setRadius(form.radius);
                this.tree.setFillStyle(form.color, 1);
                this.tree.setStrokeStyle(form.strokeW, form.stroke);
            } else {
                // йҰ–ж¬ЎеҲӣе»әзҒөжңЁдё»дҪ“
                this.tree = this.add.circle(tx, ty, form.radius, form.color, 1);
                this.tree.setStrokeStyle(form.strokeW, form.stroke);
                this.tree.setDepth(10);
            }

            // ж ‘е№Ізә№зҗҶпјҲж•°йҮҸйҡҸзӯүзә§еўһеҠ пјү
            const textureCount = 2 + Math.floor(lv / 2);
            for(let i = 0; i < textureCount; i++) {
                const ox = Phaser.Math.Between(-form.radius * 0.6, form.radius * 0.6);
                const oy = Phaser.Math.Between(-form.radius * 0.6, form.radius * 0.6);
                const tr = Phaser.Math.Between(4, form.radius * 0.4);
                const tex = this.add.circle(tx + ox, ty + oy, tr, 0x3D6B4C, 0.3 + (i % 3) * 0.1);
                this.treeDetailObjects.push(tex);
            }

            // жһқеҸ¶е»¶дјёпјҲж•°йҮҸйҡҸзӯүзә§еўһеҠ пјү
            const branchCount = Math.min(2 + lv, 8);
            for(let i = 0; i < branchCount; i++) {
                const angle = (i / branchCount) * Math.PI * 2 - Math.PI / 3;
                const dist = form.radius * 0.7;
                const sx = tx + Math.cos(angle) * dist;
                const sy = ty + Math.sin(angle) * dist;
                const extLen = form.radius * 0.8 + lv * 3;
                const ex = sx + Math.cos(angle) * extLen;
                const ey = sy + Math.sin(angle) * extLen;
                const branchColor = [0x6BAF7D, 0x5CA06C, 0x7DC08E][i % 3];
                const branch = this.add.rectangle(sx, sy, 2, Phaser.Math.Distance.Between(sx, sy, ex, ey), branchColor, 0.4);
                branch.setRotation(Phaser.Math.Angle.Between(sx, sy, ex, ey) - Math.PI / 2);
                this.treeDetailObjects.push(branch);
            }

            // зҒөж ёпјҲдёӯеҝғеҸ‘е…үзӮ№пјү
            const core = this.add.circle(tx, ty, form.coreR, 0xFFD700, form.coreA);
            this.tweens.add({ targets: core, alpha: form.coreA * 0.4, scaleX: 1.3, scaleY: 1.3, duration: 1500, yoyo: true, repeat: -1 });
            this.treeDetailObjects.push(core);

            // д»ҷж°”зҺҜз»•зІ’еӯҗ
            this.spiritParticles = [];
            for(let i = 0; i < form.particles; i++) {
                const angle = (i / form.particles) * Math.PI * 2;
                const r = form.radius + 15 + (i % 2) * 8;
                const px = tx + Math.cos(angle) * r;
                const py = ty + Math.sin(angle) * r;
                const pColor = i % 2 === 0 ? 0xFFD700 : 0x9B7ED9;
                const sp = this.add.circle(px, py, 2, pColor, 0.6);
                this.spiritParticles.push(sp);
                this.treeDetailObjects.push(sp);
                this.tweens.add({
                    targets: sp,
                    x: { from: px, to: tx + Math.cos(angle + Math.PI * 2) * r },
                    y: { from: py, to: ty + Math.sin(angle + Math.PI * 2) * r },
                    duration: 4000 + i * 500, repeat: -1, ease: 'Linear'
                });
                this.tweens.add({ targets: sp, alpha: 0.1, duration: 1200, yoyo: true, repeat: -1, delay: i * 200 });
            }

            // йЈҳиҗҪеҸ¶зүҮж•Ҳжһң
            const leafColors = [0x6BAF7D, 0x5CA06C, 0x8DD09E, 0x4A9C5C];
            const leafCount = 3 + Math.floor(lv / 2);
            for(let i = 0; i < leafCount; i++) {
                const lx = tx + Phaser.Math.Between(-70, 70);
                const ly = ty + Phaser.Math.Between(-70, 10);
                const leaf = this.add.circle(lx, ly, Phaser.Math.Between(2, 4), leafColors[i % leafColors.length], 0.5);
                this.treeDetailObjects.push(leaf);
                this.tweens.add({
                    targets: leaf, y: ly + 100, x: lx + Phaser.Math.Between(-30, 30),
                    alpha: 0, duration: Phaser.Math.Between(3000, 6000),
                    repeat: -1, delay: i * 1000,
                    onRepeat: (tween, target) => {
                        target.x = tx + Phaser.Math.Between(-70, 70);
                        target.y = ty + Phaser.Math.Between(-70, 10);
                        target.alpha = 0.5;
                    }
                });
            }

            // Lv.4+ зҙ«иүІз¬Ұж–ҮеңҲпјҲзӯ‘еҹәжңҹејҖе§Ӣпјү
            if(lv >= 4) {
                const runeRing = this.add.circle(tx, ty, form.radius + 25, 0x9B7ED9, 0);
                runeRing.setStrokeStyle(1, 0x9B7ED9, 0.4);
                this.tweens.add({ targets: runeRing, angle: 360, duration: 15000, repeat: -1 });
                this.tweens.add({ targets: runeRing, scaleX: 1.15, scaleY: 1.15, alpha: 0.2, duration: 2500, yoyo: true, repeat: -1 });
                this.treeDetailObjects.push(runeRing);
            }

            // Lv.6+ д»ҷж°”е…үзҺҜпјҲйҮ‘дё№жңҹејҖе§Ӣпјү
            if(lv >= 6) {
                const goldenRing = this.add.circle(tx, ty, form.radius + 40, 0xFFD700, 0);
                goldenRing.setStrokeStyle(2, 0xFFD700, 0.3);
                this.tweens.add({ targets: goldenRing, angle: -360, duration: 20000, repeat: -1 });
                this.tweens.add({ targets: goldenRing, scaleX: 1.2, scaleY: 1.2, alpha: 0.15, duration: 3000, yoyo: true, repeat: -1 });
                this.treeDetailObjects.push(goldenRing);
            }

            // Lv.7 еӨ©зҒөжңЁзү№ж•ҲпјҡеҸҢеұӮйҮ‘иүІж—ӢиҪ¬з¬Ұж–Ү+еӨ§йҮҸзІ’еӯҗ
            if(lv >= 7) {
                const outerRing = this.add.circle(tx, ty, form.radius + 55, 0xFFD700, 0);
                outerRing.setStrokeStyle(1, 0xFFD700, 0.2);
                this.tweens.add({ targets: outerRing, angle: 360, duration: 25000, repeat: -1 });
                this.tweens.add({ targets: outerRing, scaleX: 1.1, scaleY: 1.1, alpha: 0.1, duration: 2000, yoyo: true, repeat: -1 });
                this.treeDetailObjects.push(outerRing);

                // йўқеӨ–ж•ЈеҸ‘йҮ‘иүІзІ’еӯҗ
                for(let i = 0; i < 4; i++) {
                    const gp = this.add.circle(tx, ty, 3, 0xFFD700, 0.6);
                    this.treeDetailObjects.push(gp);
                    this.tweens.add({
                        targets: gp,
                        x: tx + Phaser.Math.Between(-80, 80),
                        y: ty + Phaser.Math.Between(-80, 80),
                        alpha: 0, duration: 2000 + i * 300,
                        repeat: -1, delay: i * 500,
                        onRepeat: (tween, target) => {
                            target.x = tx; target.y = ty; target.alpha = 0.6;
                        }
                    });
                }
            }

            // жө®еҠЁз¬Ұж–Үж•ҲжһңпјҲж•°йҮҸйҡҸзӯүзә§еўһеҠ пјү
            const runeTexts = ['вңҰ', 'в—Ү', 'вң§', 'вҳҜ', 'вңҙ', 'вқӢ', 'вҳё', 'вңә'];
            const runeCount = 3 + Math.floor(lv / 2);
            for(let i = 0; i < runeCount; i++) {
                const rx = tx + Phaser.Math.Between(-55, 55);
                const ry = ty + Phaser.Math.Between(-55, 55);
                const rune = this.add.text(rx, ry, runeTexts[i % runeTexts.length], { fontSize: '14px', color: '#9B7ED9' }).setOrigin(0.5);
                this.treeDetailObjects.push(rune);
                this.tweens.add({
                    targets: rune, y: ry - 30, alpha: 0, duration: Phaser.Math.Between(2000, 4000),
                    repeat: -1, delay: i * 800
                });
            }
        }

        createSlots(w, h) {
            const count = 6, cx = this.treeX, cy = this.treeY, r = 120;
            const unlockedSlots = this.getUnlockedSlotCount();
            for(let i = 0; i < count; i++) {
                // иө·е§Ӣи§’еәҰд»ҺеҸідёҠж–№ејҖе§ӢпјҢйҒҝе…Қе·ҰдёҠи§’дёҺйқўжқҝйҮҚеҸ 
                const angle = (i / count) * Math.PI * 2 - Math.PI / 6;
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r;
                const isLocked = i >= unlockedSlots;

                // ж§ҪдҪҚеә•еә§е…үж•ҲпјҲжӣҙеӨ§иҢғеӣҙгҖҒжӣҙжҹ”е’Ңпјү
                const glow = this.add.circle(x, y, 48, 0x9B7ED9, isLocked ? 0 : 0.04);
                if(!isLocked) {
                    this.tweens.add({ targets: glow, alpha: 0.10, scaleX: 1.1, scaleY: 1.1, duration: 1800, yoyo: true, repeat: -1, delay: i * 250 });
                }

                // ж§ҪдҪҚеӨ–еңҲиЈ…йҘ°
                const outerDeco = this.add.circle(x, y, 38, 0x9B7ED9, 0);
                outerDeco.setStrokeStyle(1, isLocked ? 0x444466 : 0x9B7ED9, isLocked ? 0.15 : 0.25);

                // ж§ҪдҪҚиғҢжҷҜ
                const bg = this.add.circle(x, y, 34, isLocked ? 0x111122 : 0x222240, isLocked ? 0.5 : 0.85)
                    .setStrokeStyle(2, isLocked ? 0x444466 : 0x9B7ED9);

                // ж§ҪдҪҚеҶ…е®№пјҡй”Ғе®ҡжҳҫзӨәрҹ”’+и§Јй”Ғзӯүзә§пјҢжңӘй”Ғе®ҡжҳҫзӨә+
                let plus;
                if(isLocked) {
                    const lvNeeded = this.getLevelNeededForSlot(i);
                    plus = this.add.text(x, y - 4, 'рҹ”’', { fontSize: '16px' }).setOrigin(0.5);
                    const lockLabel = this.add.text(x, y + 16, `Lv.${lvNeeded}`, {
                        fontSize: '9px', color: '#666', stroke: '#000', strokeThickness: 1
                    }).setOrigin(0.5);
                    // й”Ғе®ҡж§ҪдҪҚд№ҹж·»еҠ дәӨдә’еҢәеҹҹпјҢзӮ№еҮ»жҳҫзӨәи§Јй”ҒжҸҗзӨә
                    const hit = this.add.circle(x, y, 40, 0x000000, 0.001).setInteractive({ useHandCursor: true });
                    hit.on('pointerover', () => { bg.setStrokeStyle(2, 0xFF6347, 0.6); });
                    hit.on('pointerout', () => { bg.setStrokeStyle(2, 0x555555, 0.5); });
                    hit.on('pointerdown', () => this.onSlotClick(i));
                    this.slots.push({ x, y, occupied: false, locked: true, formation: null, bg, plus, hit, glow, outerDeco, lockLabel });
                } else {
                    plus = this.add.text(x, y, '+', { fontSize: '24px', color: '#9B7ED9' }).setOrigin(0.5);
                    // дәӨдә’еҢәеҹҹ
                    const hit = this.add.circle(x, y, 40, 0x000000, 0.001).setInteractive({ useHandCursor: true });
                    hit.on('pointerover', () => { if(!this.slots[i].occupied) { bg.setFillStyle(0x4A7C59, 0.4); outerDeco.setStrokeStyle(2, 0xFFD700, 0.5); } });
                    hit.on('pointerout', () => { if(!this.slots[i].occupied) { bg.setFillStyle(0x222240, 0.85); outerDeco.setStrokeStyle(1, 0x9B7ED9, 0.25); } });
                    hit.on('pointerdown', () => this.onSlotClick(i));
                    this.slots.push({ x, y, occupied: false, locked: false, formation: null, bg, plus, hit, glow, outerDeco, lockLabel: null });
                }
            }
        }

        // иҺ·еҸ–еҪ“еүҚзҒөжңЁзӯүзә§еҸҜи§Јй”Ғзҡ„йҳөжі•ж§Ҫж•°йҮҸ
        getUnlockedSlotCount() {
            const level = GameData.tree.level;
            if(level >= TREE_LEVELS.length) return 6;
            return TREE_LEVELS[level] ? TREE_LEVELS[level].slots : 2;
        }

        // иҺ·еҸ–жҹҗдёӘж§ҪдҪҚи§Јй”ҒжүҖйңҖзҒөжңЁзӯүзә§
        getLevelNeededForSlot(slotIndex) {
            // slot 0,1 -> Lv.1, slot 2 -> Lv.3, slot 3 -> Lv.5, slot 4 -> Lv.7, slot 5 -> Lv.9
            const slotUnlockMap = [1, 1, 3, 5, 7, 9];
            return slotUnlockMap[slotIndex] || 1;
        }

        // зҒөжңЁеҚҮзә§еҗҺжЈҖжҹҘе№¶и§Јй”Ғж–°йҳөжі•дҪҚ
        checkSlotUnlock() {
            const unlockedSlots = this.getUnlockedSlotCount();
            for(let i = 0; i < this.slots.length; i++) {
                const slot = this.slots[i];
                if(slot.locked && i < unlockedSlots) {
                    // и§Јй”ҒиҝҷдёӘж§ҪдҪҚпјҒ
                    slot.locked = false;

                    // и§Ҷи§үжӣҙж–°пјҡз§»йҷӨй”Ғе®ҡж Үи®°пјҢж·»еҠ +еҸ·е’ҢдәӨдә’
                    if(slot.lockLabel && slot.lockLabel.active) slot.lockLabel.destroy();
                    if(slot.plus && slot.plus.active) slot.plus.destroy();
                    if(slot.glow && slot.glow.active) {
                        slot.glow.setFillStyle(0x9B7ED9, 0.04);
                        this.tweens.add({ targets: slot.glow, alpha: 0.10, scaleX: 1.1, scaleY: 1.1, duration: 1800, yoyo: true, repeat: -1, delay: i * 250 });
                    }
                    if(slot.outerDeco && slot.outerDeco.active) {
                        slot.outerDeco.setStrokeStyle(1, 0x9B7ED9, 0.25);
                    }
                    if(slot.bg && slot.bg.active) {
                        slot.bg.setFillStyle(0x222240, 0.85).setStrokeStyle(2, 0x9B7ED9);
                    }

                    slot.plus = this.add.text(slot.x, slot.y, '+', { fontSize: '24px', color: '#9B7ED9' }).setOrigin(0.5);
                    const hit = this.add.circle(slot.x, slot.y, 40, 0x000000, 0.001).setInteractive({ useHandCursor: true });
                    hit.on('pointerover', () => { if(!this.slots[i].occupied) { slot.bg.setFillStyle(0x4A7C59, 0.4); slot.outerDeco.setStrokeStyle(2, 0xFFD700, 0.5); } });
                    hit.on('pointerout', () => { if(!this.slots[i].occupied) { slot.bg.setFillStyle(0x222240, 0.85); slot.outerDeco.setStrokeStyle(1, 0x9B7ED9, 0.25); } });
                    hit.on('pointerdown', () => this.onSlotClick(i));
                    slot.hit = hit;

                    // и§Јй”ҒзҲҶеҸ‘зү№ж•Ҳ
                    const unlockFx = this.add.circle(slot.x, slot.y, 40, 0xFFD700, 0.6);
                    this.tweens.add({ targets: unlockFx, scale: 2.5, alpha: 0, duration: 600, onComplete: () => unlockFx.destroy() });
                    for(let j = 0; j < 8; j++) {
                        const a = (j / 8) * Math.PI * 2;
                        const p = this.add.circle(slot.x, slot.y, 3, 0xFFD700, 0.8);
                        this.tweens.add({ targets: p, x: slot.x + Math.cos(a) * 60, y: slot.y + Math.sin(a) * 60, alpha: 0, duration: 500, onComplete: () => p.destroy() });
                    }

                    this.showMsg(`вңҰ зҒөжңЁеҚҮйҳ¶! ж–°йҳөжі•дҪҚе·Іи§Јй”Ғ!`);

                    // е…ҘеңәеҠЁз”»
                    [slot.plus].forEach(obj => {
                        obj.setScale(0);
                        this.tweens.add({ targets: obj, scale: 1, duration: 350, ease: 'Back.easeOut' });
                    });
                }
            }
        }

        initSystemButtons() {
            const btnBeast = document.getElementById('btn-beast');
            const btnTrib = document.getElementById('btn-tribulation');
            const btnExplore = document.getElementById('btn-explore');
            const btnArts = document.getElementById('btn-arts');

            // жё…йҷӨж—§зҡ„дәӢд»¶зӣ‘еҗ¬еҷЁпјҲйҒҝе…ҚйҮҚеӨҚз»‘е®ҡпјүвҖ” дҪҝз”ЁcloneжӣҝжҚў
            [btnArts, btnBeast, btnTrib, btnExplore].forEach(btn => {
                if(btn) {
                    const clone = btn.cloneNode(true);
                    btn.parentNode.replaceChild(clone, btn);
                }
            });

            // йҮҚж–°иҺ·еҸ–cloneеҗҺзҡ„еј•з”Ё
            const btnArts2 = document.getElementById('btn-arts');
            const btnBeast2 = document.getElementById('btn-beast');
            const btnTrib2 = document.getElementById('btn-tribulation');
            const btnExplore2 = document.getElementById('btn-explore');

            if(btnArts2) {
                btnArts2.style.display = 'flex';
                btnArts2.addEventListener('click', () => this.showArtsPanel());
            }
            if(btnBeast2) {
                btnBeast2.style.display = 'flex';
                btnBeast2.addEventListener('click', () => this.showBeastPanel());
            }
            if(btnTrib2) {
                btnTrib2.style.display = 'flex';
                btnTrib2.addEventListener('click', () => {
                    if(GameData.tribulation.inProgress) { this.showMsg('жёЎеҠ«иҝӣиЎҢдёӯ...'); return; }
                    const nextTrib = TRIBULATION_CONFIG.find(t => !GameData.tribulation.completed.find(c => c.level === t.level));
                    if(!nextTrib) { this.showMsg('е·Іж— еҠ«еҸҜжёЎ!'); return; }
                    if(GameData.tree.level < nextTrib.level) { this.showMsg(`йңҖзҒөжңЁLv.${nextTrib.level}ж–№еҸҜжёЎ${nextTrib.name}`); return; }
                    this.checkTribulation();
                });
            }
            if(btnExplore2) {
                btnExplore2.style.display = 'flex';
                btnExplore2.addEventListener('click', () => this.showExplorePanel());
            }

            // зҒөе…Ҫеӣҫж ҮпјҲеҰӮжһңе·ІеҘ‘зәҰпјү
            if(GameData.spiritBeast.contracted) {
                this.createBeastSprite();
            }
        }

        onSlotClick(index) {
            if(this.dialogShown) return;
            const slot = this.slots[index];
            if(slot.locked) {
                const lvNeeded = this.getLevelNeededForSlot(index);
                const currentLv = GameData.tree.level;
                this.showLockTip(lvNeeded, currentLv);
                return;
            }
            this.dialogShown = true;
            if(slot.occupied) {
                showUpgradeDialog(index, this);
            } else {
                showFormationDialog(index, this);
            }
        }

        showLockTip(lvNeeded, currentLv) {
            this.dialogShown = true; // йҳІжӯўеҸ еҠ еӨҡдёӘеј№зӘ—
            // йҶ’зӣ®зҡ„йҳөжі•дҪҚи§Јй”ҒжҸҗзӨәеј№зӘ—
            const overlay = document.createElement('div');
            overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;`;
            const card = document.createElement('div');
            card.style.cssText = `background:rgba(30,20,40,0.95);border:2px solid #9B7ED9;border-radius:14px;padding:20px 28px;text-align:center;max-width:280px;animation:destinyIn 0.3s ease;box-shadow:0 0 20px #9B7ED940;`;
            const diff = lvNeeded - currentLv;
            card.innerHTML = `
                <div style="font-size:28px;margin-bottom:6px">рҹ”’</div>
                <div style="font-size:16px;color:#9B7ED9;font-weight:bold;margin-bottom:6px">йҳөжі•дҪҚжңӘи§Јй”Ғ</div>
                <div style="font-size:13px;color:#ccc;margin-bottom:4px">зҒөжңЁиҫҫеҲ° <span style="color:#FFD700;font-weight:bold">Lv.${lvNeeded}</span> еҗҺи§Јй”ҒжӯӨйҳөжі•дҪҚ</div>
                <div style="font-size:12px;color:#888;margin-bottom:14px">еҪ“еүҚзҒөжңЁзӯүзә§пјҡLv.${currentLv}${diff > 0 ? `пјҲиҝҳйңҖ${diff}зә§пјү` : ''}</div>
                <button style="background:#9B7ED9;color:#fff;border:none;padding:6px 20px;border-radius:6px;font-size:13px;cursor:pointer">зҹҘйҒ“дәҶ</button>
            `;
            overlay.appendChild(card);
            document.body.appendChild(overlay);
            card.querySelector('button').addEventListener('click', () => { overlay.remove(); this.dialogShown = false; });
            overlay.addEventListener('click', (e) => { if(e.target === overlay) { overlay.remove(); this.dialogShown = false; } });
        }

        placeFormation(slotIndex, elementKey) {
            // з¬¬дёҖдёӘжі•йҳөе…Қиҙ№пјҲеӨ©жҒ©иөҗйҳөпјүпјҢд№ӢеҗҺ50зҒөзҹі
            // дҪҝз”ЁbattleиҝҪиёӘж Үи®°пјҢйҳІжӯўйҳөжі•иў«ж‘§жҜҒеҗҺйҮҚеӨҚзҷҪе«–

                this.tweens.add({
                    targets: particle,
                    x: { from: px, to: slot.x + Math.cos(angle + Math.PI * 2) * 22 },

                });

            }).setOrigin(0.5);

            slot.formation = { type: elementKey, sprite: formation, icon: icon, levelBadge: levelBadge, level: 1, orbitRing: orbitRing, particles: particles, runeText: runeText, durability: this.getFormationBaseDurability(), maxDurability: this.getFormationBaseDurability() };
            slot.plus.setVisible(false);
            slot.bg.setFillStyle(colorNum, 0.9);
            slot.bg.setStrokeStyle(2, 0xFFFFFF);
            this.formations.push(slot);

            // еҮәеңәеҠЁз”»
            [formation, icon, levelBadge, orbitRing, runeText, ...particles].forEach(obj => {
                obj.setScale(0);
                this.tweens.add({ targets: obj, scale: 1, duration: 350, ease: 'Back.easeOut' });

            const durBarWidth = 36;

            const durBarFill = this.add.rectangle(slot.x - durBarWidth/2 + 1, slot.y + 30, Math.max(1, durBarWidth - 2), 3, 0x5CBF7C, 1).setOrigin(0, 0.5).setDepth(15);
            slot.formation.durBarBg = durBarBg;
            slot.formation.durBarFill = durBarFill;
            slot.formation.durBarWidth = durBarWidth;

            // ж”ҫзҪ®е…үж•Ҳ

            this.tweens.add({ targets: ef, scale: 3, alpha: 0, duration: 500, onComplete: () => ef.destroy() });

        getFormationBaseDurability() {
            let base = 100;
            if(GameData.spiritBeast.contracted) {
                const bDef = SPIRIT_BEASTS.find(b => b.id === GameData.spiritBeast.contracted.id);
                if(bDef && bDef.passiveType === 'durability_boost') {
                    base = Math.floor(base * (1 + bDef.passiveMult));
                }
            }
            return base;
        }

        startWave() {
            if(this.isGameOver) return;
            if(this.isWaveActive) { this.showMsg('жіўж¬ЎиҝӣиЎҢдёӯ!'); return; }

            // жӯ»дәЎиһәж—ӢдҝқжҠӨпјҡжүҖжңүйҳөжі•иў«жҜҒдё”зҒөзҹідёҚи¶іж—¶пјҢе…Қиҙ№иөҗдәҲдёҖеә§йҳөжі•
            const hasAnyFormation = this.formations.length > 0;
            if(!hasAnyFormation) {
                const elements = ['METAL', 'WOOD', 'WATER', 'FIRE', 'EARTH'];
                const randomElement = elements[Math.floor(Math.random() * elements.length)];
                const firstEmptySlot = this.slots.find(s => !s.occupied);
                if(firstEmptySlot) {
                    const slotIndex = this.slots.indexOf(firstEmptySlot);
                    this.autoPlaceFormation(slotIndex, randomElement);
                    this.showMsg(`вңҰ еӨ©жҒ©иөҗйҳө! е…Қиҙ№ж”ҫзҪ®${ELEMENTS[randomElement].name}йҳөжі•!`);
                    this.updateUI();
                }
            }

            this.isWaveActive = true;
            GameData.battle.weakenActive = false; // ж–°жіўж¬Ўжё…йҷӨеҰ–ж°”иЎ°йҖҖж Үи®°
            this.waveDamageTaken = 0; // йҮҚзҪ®жіўж¬ЎдјӨе®іиҝҪиёӘ
            this.currentWaveNum = GameData.battle.currentWave + 1;
            GameData.battle.currentWave = this.currentWaveNum;
            this.updateTimerDisplay();

            // 5жіўеҫӘзҺҜпјҡжҜҸ5жіўдёҖдёӘе‘ЁжңҹпјҢз¬¬5жіўдёәеҰ–зҺӢжіў
            GameData.battle.waveCycle = Math.ceil(this.currentWaveNum / 5);
            const isInCycle = this.currentWaveNum % 5 === 0; // жҳҜеҗҰдёәеҰ–зҺӢжіў

            if(isInCycle) {
                this.showMsg(`вҡЎ з¬¬${GameData.battle.waveCycle}иҪ®В·еҰ–зҺӢжқҘиўӯ!`);
            } else {
                this.showMsg(`з¬¬${this.currentWaveNum}жіўеҰ–е…ҪжқҘиўӯ!`);
            }

            // жіўж¬ЎиҝҪиёӘпјҡи®°еҪ•жң¬жіўе”ҜдёҖIDгҖҒеә”з”ҹжҲҗжҖ»ж•°гҖҒе·Із”ҹжҲҗ/е·ІеҮ»жқҖ
            this.currentWaveId++;
            const waveId = this.currentWaveId;
            const w = this.cameras.main.width, h = this.cameras.main.height;
            let count = 5 + Math.floor(this.currentWaveNum / 3);

            // еҰ–зҺӢжіўпјҡжҖӘзү©ж•°йҮҸзҝ»еҖҚ
            if(isInCycle) {
                count = Math.floor(count * 1.5);
            }

            // еӨңй—ҙйўқеӨ–еҠ жҲҗ
            const period = getCurrentPeriod(GameData.time.hour);
            if(period.key === 'night') {
                count += 2;
                this.showMsg('рҹҢҷ еӨңй—ҙеҰ–е…ҪеҠ жҲҗ!');
            }

            GameData.battle.totalThisWave = count;
            GameData.battle.spawnedThisWave = 0;
            GameData.battle.killedThisWave = 0;

            // жё…йҷӨдёҠдёҖжіўж®Ӣз•ҷзҡ„spawnе®ҡж—¶еҷЁ
            this.spawnTimers.forEach(t => { if(t) t.remove(); });
            this.spawnTimers = [];

            for(let i = 0; i < count; i++) {
                const timer = this.time.delayedCall(i * 1200, () => {
                    if(this.currentWaveId === waveId && this.isWaveActive) {
                        this.spawnMonster(w, h, isInCycle && i === count - 1); // жңҖеҗҺдёҖеҸӘдёәеҰ–зҺӢ
                        GameData.battle.spawnedThisWave++;
                    }
                });
                this.spawnTimers.push(timer);
            }

            this.monsterAttackTimer = this.time.addEvent({
                delay: 1000, callback: this.formationsAttack, callbackScope: this, loop: true
            });
            // е®үе…ЁдёҠйҷҗпјҡ60з§’еҗҺејәеҲ¶з»“жқҹжіўж¬Ў
            this.waveEndTimer = this.time.delayedCall(60000, () => {
                if(this.isWaveActive) this.endWave();
            });
        }

        updateTimerDisplay() {
            if(this.isWaveActive) {
                this.timerText.setText('вҡ” жҲҳж–—дёӯ');
                this.timerText.setColor('#5CBF7C');
                if(this.startCountdownText && this.startCountdownText.active) {
                    this.startCountdownText.setText('вҡ” жҲҳж–—дёӯ');
                    this.startCountdownText.setColor('#5CBF7C');
                    this.startCountdownBg.setStrokeStyle(2, 0x5CBF7C);
                }
            } else {
                this.timerText.setText(`вҸұ ${this.waveTimer}з§’`);
                this.timerText.setColor('#FF6347');
                if(this.startCountdownText && this.startCountdownText.active) {
                    this.startCountdownText.setText(`вҡ” ${this.waveTimer}з§’еҗҺеҮәжҲҳ`);
                    this.startCountdownText.setColor('#FFD700');
                    this.startCountdownBg.setStrokeStyle(2, 0xFF6347);
                    // еҖ’и®Ўж—¶5з§’еҶ…еҸҳзәўе№¶еҠ йҖҹи„үеҠЁ
                    if(this.waveTimer <= 5) {
                        this.startCountdownText.setColor('#FF4444');
                        this.startCountdownBg.setStrokeStyle(2, 0xFF4444);
                    }
                }
            }
        }

        spawnMonster(w, h, isBoss = false) {
            const side = Math.random() < 0.5 ? 0 : 1;
            const x = side === 0 ? -30 : w + 30;
            const y = Phaser.Math.Between(h * 0.2, h * 0.45);

            let typeIdx = Math.min(Math.floor(GameData.battle.currentWave / 5), MONSTER_TYPES.length - 1);
            let mt = MONSTER_TYPES[typeIdx];

            // еҰ–зҺӢжіўпјҡеҝ…е®ҡдёәиӣҹйҫҷ
            if(isBoss) {
                mt = MONSTER_TYPES[MONSTER_TYPES.length - 1]; // иӣҹйҫҷ
            }

            const eColorNum = parseInt(ELEMENTS[mt.element].color.replace('#', ''), 16);

            // жіўж¬Ўзј©ж”ҫ
            let waveScale = 1 + (Math.max(1, GameData.battle.currentWave) - 1) * 0.08;
            let scaledHp = Math.floor(mt.hp * waveScale);
            let scaledDamage = Math.floor(mt.damage * waveScale);

            // жҳјеӨңзі»з»ҹпјҡеӨңй—ҙжҖӘзү©еҠ жҲҗ
            const period = getCurrentPeriod(GameData.time.hour);
            scaledHp = Math.floor(scaledHp * period.monsterMult);
            scaledDamage = Math.floor(scaledDamage * period.monsterMult);

            // еҰ–зҺӢйўқеӨ–еұһжҖ§
            if(isBoss) {
                scaledHp = Math.floor(scaledHp * 2.5);
                scaledDamage = Math.floor(scaledDamage * 1.8);
            }

            // еӨ©е‘ҪдәӢд»¶пјҡеҰ–ж°”иЎ°йҖҖпјҲжң¬жіўжҖӘзү©HPеҮҸеҚҠпјү
            if(GameData.battle.weakenActive) {
                scaledHp = Math.floor(scaledHp * 0.5);
            }

            // жҖӘзү©еӨ§е°Ҹ
            const monsterRadius = isBoss ? 32 : 22;
            const iconSize = isBoss ? '32px' : '22px';

            // еҰ–е…Ҫдё»дҪ“ - еӨ–еұӮе…ғзҙ е…үзҺҜпјҲж—ӢиҪ¬пјү
            const outerGlow = this.add.circle(x, y, monsterRadius + 8, eColorNum, 0.15);
            this.tweens.add({ targets: outerGlow, scaleX: 1.3, scaleY: 1.3, alpha: 0.05, duration: 1000, yoyo: true, repeat: -1 });

            // еҰ–е…Ҫдё»дҪ“
            const monster = this.add.circle(x, y, monsterRadius, eColorNum, 1)
                .setStrokeStyle(isBoss ? 4 : 2, isBoss ? 0xFFD700 : eColorNum);

            // еҶ…еұӮзә№зҗҶпјҲи®©жҖӘзү©дёҚеҶҚзәҜиүІпјү
            const innerRing = this.add.circle(x, y, monsterRadius * 0.5, 0x000000, 0.2);

            // жҖӘзү©еӣҫж Ү
            const monsterIcon = this.add.text(x, y, mt.icon, { fontSize: iconSize }).setOrigin(0.5);

            // иЎҖжқЎ
            const hpBarWidth = isBoss ? 50 : 36, hpBarHeight = isBoss ? 7 : 5;
            const hpBg = this.add.rectangle(x, y - (isBoss ? 42 : 32), hpBarWidth + 2, hpBarHeight + 2, 0x000000, 0.7).setOrigin(0.5);
            const hpBar = this.add.rectangle(x - hpBarWidth/2, y - (isBoss ? 42 : 32), hpBarWidth, hpBarHeight, 0x44FF44, 1).setOrigin(0, 0.5);

            // еҰ–е…ҪеҗҚеӯ—пјҲеҰ–зҺӢжҳҫзӨәз§°еҸ·пјү
            const displayName = isBoss ? 'еҰ–зҺӢВ·' + mt.name : mt.name;
            const nameTag = this.add.text(x, y - (isBoss ? 54 : 42), displayName, {
                fontSize: isBoss ? '13px' : '11px', color: isBoss ? '#FFD700' : '#FFF',
                stroke: '#000', strokeThickness: 2,
                fontStyle: isBoss ? 'bold' : 'normal'
            }).setOrigin(0.5);

            monster.setData('hp', scaledHp);
            monster.setData('maxHp', scaledHp);
            monster.setData('damage', scaledDamage);
            monster.setData('reward', isBoss ? mt.reward * 3 : mt.reward);
            monster.setData('element', mt.element);
            monster.setData('spiritDrop', mt.spiritDrop);
            monster.setData('expDrop', isBoss ? [mt.expDrop[0] * 3, mt.expDrop[1] * 3] : mt.expDrop);
            monster.setData('icon', monsterIcon);
            monster.setData('hpBar', hpBar);
            monster.setData('hpBg', hpBg);
            monster.setData('nameTag', nameTag);
            monster.setData('isBoss', isBoss);
            monster.setData('hpBarWidth', hpBarWidth);
            monster.setData('outerGlow', outerGlow);
            monster.setData('innerRing', innerRing);
            monster.setData('side', side);
            monster.setData('startX', x);
            monster.setData('progress', 0);
            monster.setData('special', mt.special);
            monster.setData('speed', mt.speed); // дҝқеӯҳеҰ–е…ҪйҖҹеәҰж•°жҚ®

            // еҰ–зҺӢе…үзҺҜж•Ҳжһң
            if(isBoss) {
                const bossGlow = this.add.circle(x, y, 40, 0xFFD700, 0.15);
                this.tweens.add({ targets: bossGlow, scale: 1.3, alpha: 0.05, duration: 800, yoyo: true, repeat: -1 });
                monster.setData('bossGlow', bossGlow);
            }

            // з¬Ұз®“ж•Ҳжһңпјҡе®ҡиә«з¬Ұ - ж–°жҖӘзү©д№ҹиў«еҶ»з»“
            const slowEffect = GameData.talismans.activeEffects.find(e => e.type === 'slow');
            const moveDuration = slowEffect ? 6000 : 3000; // еҶ»з»“ж—¶з§»еҠЁжһҒж…ў

            this.tweens.add({
                targets: [monster, monsterIcon, hpBar, hpBg, nameTag, outerGlow, innerRing].concat(isBoss ? [monster.getData('bossGlow')] : []).filter(Boolean),
                x: this.treeX + (side === 0 ? 60 : -60),
                duration: moveDuration, ease: 'Sine.easeIn',
                onUpdate: () => {
                    // з§»еҠЁжӢ–е°ҫзІ’еӯҗ
                    if(monster.active && Math.random() < 0.3) {
                        const trail = this.add.circle(monster.x, monster.y, isBoss ? 5 : 3, eColorNum, 0.5);
                        this.tweens.add({ targets: trail, alpha: 0, scale: 0.2, duration: 400, onComplete: () => trail.destroy() });
                    }
                    // жӣҙж–°йҷ„еұһзү©дҪҚзҪ®пјҲзЎ®дҝқи·ҹйҡҸпјү
                    const icon = monster.getData('icon');
                    const bar = monster.getData('hpBar');
                    const bg = monster.getData('hpBg');
                    const tag = monster.getData('nameTag');
                    const oGlow = monster.getData('outerGlow');
                    const iRing = monster.getData('innerRing');
                    const bGlow = monster.getData('bossGlow');
                    // жӣҙж–°иЎҢиҝӣиҝӣеәҰпјҲ0=еҮәеҸ‘пјҢ1=еҲ°иҫҫзҒөжңЁпјү
                    const startX = monster.getData('startX') || x;
                    const endX = this.treeX + (side === 0 ? 60 : -60);
                    const totalDist = Math.abs(endX - startX);
                    const currentDist = Math.abs(monster.x - startX);
                    monster.setData('progress', totalDist > 0 ? currentDist / totalDist : 0);
                    // tweenе·Із»ҸеңЁз§»еҠЁиҝҷдәӣеҜ№иұЎпјҢж— йңҖжүӢеҠЁи·ҹйҡҸ
                },
                onComplete: () => this.monsterAttack(monster)
            });

            // е…Ҙеңәзү№ж•ҲпјҡеҰ–е…ҪеҮәз”ҹй—Әе…ү
            const spawnFx = this.add.circle(x, y, monsterRadius, 0xFFFFFF, 0.8);
            this.tweens.add({ targets: spawnFx, scale: 2.5, alpha: 0, duration: 400, onComplete: () => spawnFx.destroy() });

            // еҰ–зҺӢе…Ҙеңәзү№ж®Ҡзү№ж•ҲпјҡзәўиүІиӯҰе‘Ҡжіўзә№
            if(isBoss) {
                const warnRing = this.add.circle(x, y, 10, 0xFF0000, 0.6);
                this.tweens.add({ targets: warnRing, scale: 8, alpha: 0, duration: 1000, onComplete: () => warnRing.destroy() });
                const warnRing2 = this.add.circle(x, y, 10, 0xFFD700, 0.4);
                this.tweens.add({ targets: warnRing2, scale: 6, alpha: 0, duration: 800, delay: 200, onComplete: () => warnRing2.destroy() });
            }

            this.monsters.push(monster);
        }

        monsterAttack(monster) {
            if(!monster || !monster.active || this.isGameOver) return;

            // жёёжҲҸжҡӮеҒңж—¶пјҲеӨ©е‘Ҫ/жёЎеҠ«еј№зӘ—пјүпјҢе»¶иҝҹйҮҚиҜ•иҖҢдёҚжҳҜз»§з»ӯж”»еҮ»
            if(this.isPaused) {
                this.time.delayedCall(500, () => { if(monster && monster.active && !this.isGameOver) this.monsterAttack(monster); });
                return;
            }

            // зҒөе…ҪжҠҖиғҪпјҡзң©жҷ•дёӯпјҢе»¶иҝҹйҮҚиҜ•
            if(monster.getData('stunned')) {
                this.time.delayedCall(500, () => { if(monster && monster.active) this.monsterAttack(monster); });
                return;
            }

            // з¬Ұз®“ж•Ҳжһңпјҡе®ҡиә«з¬Ұ - жҖӘзү©иў«еҶ»з»“пјҢе»¶иҝҹйҮҚиҜ•
            const slowEffect = GameData.talismans.activeEffects.find(e => e.type === 'slow');
            if(slowEffect) {
                this.time.delayedCall(1000, () => {
                    if(monster && monster.active) this.monsterAttack(monster);
                });
                return;
            }

            // з¬Ұз®“ж•ҲжһңпјҡйҮ‘й’ҹз¬Ұ - е…Қз–«дјӨе®іпјҢе»¶иҝҹйҮҚиҜ•
            const shieldEffect = GameData.talismans.activeEffects.find(e => e.type === 'shield');
            if(shieldEffect) {
                this.time.delayedCall(1000, () => {
                    if(monster && monster.active) this.monsterAttack(monster);
                });
                return;
            }

            let dmg = monster.getData('damage');
            // жҖӘзү©зү№ж®ҠжҠҖиғҪпјҡжҜ’йӣҫ(poiseon)йўқеӨ–зҒөжңЁдјӨе®і
            const special = monster.getData('special');

            // еҰ–е…Ҫдјҳе…Ҳж”»еҮ»и·Ҝеҫ„дёҠзҡ„йҳөжі•
            let attackedFormation = false;
            const mSide = monster.getData('side');
            const mProgress = monster.getData('progress') || 0;
            // еҸӘеңЁжҺҘиҝ‘йҳөжі•ж—¶ж”»еҮ»пјҲprogress > 0.5 иЎЁзӨәиҝҮдәҶеҚҠзЁӢпјү
            if(mProgress > 0.4) {
                for(const slot of this.formations) {
                    if(!slot.formation || slot.formation.durability <= 0) continue;
                    const dist = Phaser.Math.Distance.Between(monster.x, monster.y, slot.x, slot.y);
                    if(dist < 80) { // йҳөжі•ж”»еҮ»иҢғеӣҙ
                        // ж”»еҮ»йҳөжі•
                        slot.formation.durability = Math.max(0, slot.formation.durability - dmg);
                        attackedFormation = true;

                        // йҳөжі•еҸ—еҮ»йңҮеҠЁ
                        if(slot.formation.sprite && slot.formation.sprite.active) {
                            this.tweens.add({ targets: slot.formation.sprite, x: slot.x + 3, duration: 50, yoyo: true, repeat: 2,
                                onComplete: () => { if(slot.formation.sprite.active) slot.formation.sprite.x = slot.x; }
                            });
                        }

                        // жӣҙж–°иҖҗд№…еәҰжқЎ
                        this.updateDurabilityBar(slot);

                        // йҳөжі•иў«ж‘§жҜҒ
                        if(slot.formation.durability <= 0) {
                            this.destroyFormation(slot);
                        }
                        break; // жҜҸж¬ЎеҸӘж”»еҮ»дёҖдёӘйҳөжі•
                    }
                }
            }

            // жІЎжңүеҸҜж”»еҮ»зҡ„йҳөжі•ж—¶пјҢж”»еҮ»зҒөжңЁ
            if(!attackedFormation) {
                GameData.tree.spirit -= dmg;
                this.waveDamageTaken += dmg;

                // жҖӘзү©зү№ж®ҠжҠҖиғҪпјҡжҜ’йӣҫ(poison)йўқеӨ–йҖ жҲҗ50%зҒөж°”дјӨе®і
                if(special === 'poison') {
                    const poisonDmg = Math.floor(dmg * 0.5);
                    GameData.tree.spirit -= poisonDmg;
                    this.waveDamageTaken += poisonDmg;
                    this.showMsg(`вҳ пёҸ жҜ’йӣҫ! йўқеӨ–-${poisonDmg}зҒөж°”`);
                }

                // зҒөжңЁеҸ—еҮ»й—Әзәўж•Ҳжһң
                if(this.tree && this.tree.active) {
                    const origColor = this.tree.fillColor;
                    this.tree.setFillStyle(0xFF0000, 1);
                    this.time.delayedCall(150, () => {
                        if(this.tree && this.tree.active) this.tree.setFillStyle(origColor, 1);
                    });
                }
                this.showMsg(`-${dmg} зҒөж°”`);
            }

            this.updateUI();

            if(GameData.tree.spirit <= 0) {
                this.gameOver();
                return;
            }

            this.time.delayedCall(1000, () => {
                if(monster && monster.active && !this.isGameOver) this.monsterAttack(monster);
            });
        }

        formationsAttack() {
            if(this.monsters.length === 0 || this.isPaused) return;

            this.formations.forEach(slot => {
                if(!slot.formation) return;
                const fElement = slot.formation.type;
                const level = slot.formation.level;

                // ===== еҚҮзә§еұһжҖ§ =====
                // дјӨе®іпјҡ15 + 10*зӯүзә§ + 5*зӯүзә§ВІпјҲдәҢж¬Ўж–№еўһй•ҝпјҢеҗҺжңҹеҸҜи·ҹдёҠжҖӘзү©HPзј©ж”ҫпјү
                const damage = 15 + 10 * level + 5 * level * level;
                // ж”»еҮ»иҢғеӣҙпјҡ400 + 80 * зӯүзә§пјҲзӯүзә§и¶Ҡй«ҳжү“еҫ—и¶Ҡиҝңпјү
                const range = 400 + 80 * level;
                // ж”»еҮ»зӣ®ж Үж•°пјҡ1 + floor(зӯүзә§/2)пјҲ1зә§1зӣ®ж ҮпјҢ2-3зә§2зӣ®ж ҮпјҢ4-5зә§3зӣ®ж Ү...пјү
                const maxTargets = 1 + Math.floor(level / 2);
                // еј№йҒ“еӨ§е°Ҹпјҡ5 + зӯүзә§ * 2пјҲзӯүзә§и¶Ҡй«ҳеј№дёёи¶ҠеӨ§пјү
                const projSize = 5 + level * 2;
                // еј№йҒ“йҖҹеәҰпјҡ250 - level * 15пјҲзӯүзә§и¶Ҡй«ҳи¶Ҡеҝ«пјҢжңҖдҪҺ120пјү
                const projSpeed = Math.max(120, 250 - level * 15);

                const inRange = this.monsters.filter(m => {
                    if(!m || !m.active) return false;
                    return Phaser.Math.Distance.Between(slot.x, slot.y, m.x, m.y) < range;
                });

                inRange.sort((a, b) =>
                    Phaser.Math.Distance.Between(slot.x, slot.y, a.x, a.y) -
                    Phaser.Math.Distance.Between(slot.x, slot.y, b.x, b.y)
                );

                inRange.slice(0, maxTargets).forEach(target => {
                    if(!target || !target.active) return;
                    const mElement = target.getData('element');
                    const isEffective = ELEMENTS[fElement].beats === mElement;
                    // иў«е…ӢеҲ¶пјҡйҳөжі•е…ғзҙ иў«жҖӘзү©е…ғзҙ е…ӢеҲ¶
                    const isResisted = ELEMENTS[mElement] && ELEMENTS[mElement].beats === fElement;
                    let finalDamage = damage;
                    if(isEffective) finalDamage = Math.floor(damage * 1.5);
                    else if(isResisted) finalDamage = Math.floor(damage * 0.5);

                    // зҒөжңЁзӯүзә§еҠ жҲҗпјҡжҜҸзә§+8%дјӨе®іпјҲеҗҺжңҹж ёеҝғиҫ“еҮәжқҘжәҗпјү
                    finalDamage = Math.floor(finalDamage * (1 + (GameData.tree.level - 1) * 0.08));

                    // жҳјеӨңзі»з»ҹпјҡеӨңй—ҙйҳөжі•ж•ҲзҺҮйҷҚдҪҺ
                    const period = getCurrentPeriod(GameData.time.hour);
                    finalDamage = Math.floor(finalDamage * period.formationMult);

                    // жҖӘзү©зү№ж®ҠжҠҖиғҪпјҡйӯ…жғ‘(charm)дҪҝйҳөжі•дјӨе®ійҷҚдҪҺ50%
                    if(target.getData('special') === 'charm') {
                        finalDamage = Math.floor(finalDamage * 0.5);
                    }

                    // зҒөе…Ҫиў«еҠЁпјҡдјӨе®іеҠ жҲҗ
                    if(GameData.spiritBeast.contracted) {
                        const bDef = SPIRIT_BEASTS.find(b => b.id === GameData.spiritBeast.contracted.id);
                        if(bDef && bDef.passiveType === 'damage_boost') {
                            if(bDef.passiveElement === 'ALL' || bDef.passiveElement === fElement) {
                                finalDamage = Math.floor(finalDamage * (1 + bDef.passiveMult));
                            }
                        }
                    }

                    // еҠҹжі•еҠ жҲҗпјҡдёҮеү‘иҜҖпјҲйҳөжі•дјӨе®і+25%пјү
                    const artDmgBonus = this.getArtBonus('formationDamage');
                    if(artDmgBonus > 0) finalDamage = Math.floor(finalDamage * (1 + artDmgBonus));

                    // еҠҹжі•еҠ жҲҗпјҡдә”иЎҢеҪ’е…ғпјҲе…ӢеҲ¶дјӨе®ійўқеӨ–+50%пјү
                    if(isEffective && this.getArtBonus('elementalBonus') > 0) {
                        finalDamage = Math.floor(finalDamage * (1 + this.getArtBonus('elementalBonus')));
                    }

                    const eColorNum = parseInt(ELEMENTS[fElement].color.replace('#', ''), 16);

                    // ж”»еҮ»е…үжқҹпјҲиҝһзәҝж•ҲжһңпјҢд»Һйҳөжі•еҲ°зӣ®ж Үж–№еҗ‘пјү
                    const beamDist = Math.min(range, Phaser.Math.Distance.Between(slot.x, slot.y, target.x, target.y));
                    if(beamDist > 5) {
                        const beamAngle = Phaser.Math.Angle.Between(slot.x, slot.y, target.x, target.y);
                        const beam = this.add.rectangle(slot.x, slot.y, beamDist, 3 + level, eColorNum, 0.4);
                        beam.setRotation(beamAngle);
                        beam.setOrigin(0, 0.5);
                        this.tweens.add({ targets: beam, alpha: 0, duration: 200, onComplete: () => beam.destroy() });
                    }

                    // еј№йҒ“еҸ‘е°„ж•Ҳжһң - д»Һйҳөжі•дёӯеҝғе°„еҮә
                    const proj = this.add.circle(slot.x, slot.y, projSize, eColorNum, 1);

                    // й«ҳзӯүзә§еј№дёёж·»еҠ е°ҫз„°
                    if(level >= 3) {
                        const trail = this.add.circle(slot.x, slot.y, projSize * 0.6, eColorNum, 0.4);
                        this.tweens.add({
                            targets: trail, x: target.x, y: target.y, duration: projSpeed + 50,
                            alpha: 0, onComplete: () => trail.destroy()
                        });
                    }

                    // е‘ҪдёӯзҲҶзӮёж•Ҳжһң
                    const hitEffect = () => {
                        // жЈҖжҹҘзӣ®ж ҮжҳҜеҗҰиҝҳеӯҳеңЁ
                        if(!target || !target.active) {
                            proj.destroy();
                            return;
                        }
                        // е‘ҪдёӯзҲҶзӮёеңҶ
                        const boom = this.add.circle(target.x, target.y, projSize * 1.5, eColorNum, 0.7);
                        this.tweens.add({ targets: boom, scale: 2, alpha: 0, duration: 200, onComplete: () => boom.destroy() });

                        // е…ӢеҲ¶ж•ҲжһңйўқеӨ–е…үзҺҜ
                        if(isEffective) {
                            const effectiveBoom = this.add.circle(target.x, target.y, 20, 0xFFD700, 0.8);
                            this.tweens.add({ targets: effectiveBoom, scale: 3, alpha: 0, duration: 300, onComplete: () => effectiveBoom.destroy() });
                        }
                    };

                    this.tweens.add({
                        targets: proj, x: target.x, y: target.y, duration: projSpeed,
                        onComplete: () => {
                            proj.destroy();
                            if(!target || !target.active) return; // зӣ®ж Үе·Іжӯ»дәЎпјҢдёҚеӨ„зҗҶ
                            hitEffect();
                            this.damageMonster(target, finalDamage, isEffective);
                        }
                    });

                    // йҳөжі•ж”»еҮ»ж—¶еҸ‘е…үеҸҚйҰҲ
                    if(slot.formation.sprite && slot.formation.sprite.active) {
                        slot.formation.sprite.setStrokeStyle(3 + level, 0xFFFFFF);
                    }
                    this.time.delayedCall(150, () => {
                        if(slot.formation && slot.formation.sprite && slot.formation.sprite.active) {
                            slot.formation.sprite.setStrokeStyle(2, 0xFFFFFF);
                        }
                    });
                });
            });
        }

        // жӣҙж–°йҳөжі•иҖҗд№…еәҰжқЎ
        updateDurabilityBar(slot) {
            if(!slot.formation) return;
            const dur = slot.formation.durability;
            const maxDur = slot.formation.maxDurability;
            const pct = Math.max(0, dur / maxDur);
            const barWidth = slot.formation.durBarWidth || 36;

            if(slot.formation.durBarFill && slot.formation.durBarFill.active) {
                slot.formation.durBarFill.setDisplaySize(Math.max(1, (barWidth - 2) * pct), 3);
                // йўңиүІйҡҸиҖҗд№…еәҰеҸҳеҢ–пјҡз»ҝвҶ’й»„вҶ’зәў
                if(pct > 0.5) {
                    slot.formation.durBarFill.setFillStyle(0x5CBF7C); // з»ҝ
                } else if(pct > 0.25) {
                    slot.formation.durBarFill.setFillStyle(0xFFD700); // й»„
                } else {
                    slot.formation.durBarFill.setFillStyle(0xFF4444); // зәў
                }
            }
        }

        // йҳөжі•иў«ж‘§жҜҒ
        destroyFormation(slot) {
            if(!slot.formation) return;

            // еҰӮжһңеҚҮзә§еј№зӘ—жӯЈжү“ејҖпјҲdialogShownпјүпјҢејәеҲ¶е…ій—ӯ
            if(this.dialogShown) {
                dialogOverlay.classList.remove('active');
                this.dialogShown = false;
            }

            // ж‘§жҜҒзҲҶзӮёзү№ж•Ҳ
            const fx = this.add.circle(slot.x, slot.y, 40, 0xFF4444, 0.8);
            this.tweens.add({ targets: fx, scale: 2, alpha: 0, duration: 500, onComplete: () => fx.destroy() });

            // зўҺзүҮзІ’еӯҗ
            for(let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const p = this.add.circle(slot.x, slot.y, 3, 0xFF6347, 0.8);
                this.tweens.add({
                    targets: p,
                    x: slot.x + Math.cos(angle) * 50,
                    y: slot.y + Math.sin(angle) * 50,
                    alpha: 0, duration: 400,
                    onComplete: () => p.destroy()
                });
            }

            this.showMsg('вҡ пёҸ йҳөжі•иў«ж‘§жҜҒ!');

            // жё…зҗҶйҳөжі•и§Ҷи§ү
            const f = slot.formation;
            if(f.sprite && f.sprite.active) f.sprite.destroy();
            if(f.icon && f.icon.active) f.icon.destroy();
            if(f.levelBadge && f.levelBadge.active) f.levelBadge.destroy();
            if(f.orbitRing && f.orbitRing.active) f.orbitRing.destroy();
            if(f.runeText && f.runeText.active) f.runeText.destroy();
            if(f.durBarBg && f.durBarBg.active) f.durBarBg.destroy();
            if(f.durBarFill && f.durBarFill.active) f.durBarFill.destroy();
            if(f.particles) f.particles.forEach(p => { if(p && p.active) p.destroy(); });

            // йҮҚзҪ®ж§ҪдҪҚ
            slot.occupied = false;
            slot.formation = null;
            slot.bg.setFillStyle(0x1a1a3a, 0.6);
            slot.bg.setStrokeStyle(2, 0x6B6B9B);
            slot.plus.setVisible(true);
            slot.plus.setAlpha(1);

            // д»Һformationsж•°з»„з§»йҷӨ
            const idx = this.formations.indexOf(slot);
            if(idx >= 0) this.formations.splice(idx, 1);
        }

        // ===== йҳөжі•еҚҮзә§зі»з»ҹ =====
        upgradeFormation(slot) {
            if(!slot.formation) return;
            const level = slot.formation.level;
            if(level >= 5) { this.showMsg('йҳөжі•е·Іж»Ўзә§!'); return; }
            const cost = level * 30 + 20;
            if(GameData.player.spiritStones < cost) { this.showMsg('зҒөзҹідёҚи¶і!'); return; }
            GameData.player.spiritStones -= cost;
            slot.formation.level++;
            // иҖҗд№…еәҰе…¬ејҸпјҡеҹәзЎҖеҖј+зӯүзә§йҖ’еўһпјҢеҗҢж—¶дҝқз•ҷзҺ„жӯҰзҒөе…ҪеҠ жҲҗ
            const baseDur = this.getFormationBaseDurability();
            slot.formation.maxDurability = baseDur + (slot.formation.level - 1) * 20;
            slot.formation.durability = slot.formation.maxDurability; // еҚҮзә§еӣһж»ЎиҖҗд№…
            slot.formation.levelBadge.setText('Lv.' + slot.formation.level);
            this.updateDurabilityBar(slot);
            this.updateUI();
            // еҚҮзә§зү№ж•Ҳ
            const fx = this.add.circle(slot.x, slot.y, 15, 0xFFD700, 0.7);
            this.tweens.add({ targets: fx, scale: 3, alpha: 0, duration: 500, onComplete: () => fx.destroy() });
            // еҚҮзә§еј№и·і
            if(slot.formation.sprite && slot.formation.sprite.active) {
                this.tweens.add({ targets: slot.formation.sprite, scaleX: 1.3, scaleY: 1.3, duration: 150, yoyo: true });
            }
            this.showMsg(`${ELEMENTS[slot.formation.type].name}йҳөжі•еҚҮиҮі Lv.${slot.formation.level}!`);
        }

        onFormationClick(slot) {
            if(!slot.formation) return;
            const level = slot.formation.level;
            if(level >= 5) { this.showMsg('йҳөжі•е·Іж»Ўзә§!'); return; }
            const cost = level * 30 + 20;
            // жҳҫзӨәеҚҮзә§зЎ®и®Өеј№зӘ—
            const overlay = document.createElement('div');
            overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;`;
            const card = document.createElement('div');
            const eName = ELEMENTS[slot.formation.type].name;
            card.style.cssText = `background:rgba(20,20,30,0.95);border:2px solid #FFD700;border-radius:14px;padding:20px 28px;text-align:center;max-width:280px;animation:destinyIn 0.3s ease;box-shadow:0 0 20px #FFD70040;`;
            card.innerHTML = `
                <div style="font-size:24px;margin-bottom:4px">${ELEMENTS[slot.formation.type].icon}</div>
                <div style="font-size:16px;color:#FFD700;font-weight:bold;margin-bottom:4px">${eName}йҳөжі• Lv.${level} вҶ’ Lv.${level+1}</div>
                <div style="font-size:12px;color:#aaa;margin-bottom:4px">дјӨе®і ${15+10*level+5*level*level} вҶ’ ${15+10*(level+1)+5*(level+1)*(level+1)} | ж”»еҮ»ж•° ${1+Math.floor(level/2)} вҶ’ ${1+Math.floor((level+1)/2)}</div>
                <div style="font-size:12px;color:#aaa;margin-bottom:4px">иҖҗд№… ${100+(level-1)*20} вҶ’ ${100+level*20}пјҲеҚҮзә§еӣһж»Ўпјү</div>
