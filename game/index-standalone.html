            for(let i = 0; i < 3; i++) {
                const angle = (i / 3) * Math.PI * 2;
                const px = slot.x + Math.cos(angle) * 22;
                const py = slot.y + Math.sin(angle) * 22;
                const particle = this.add.circle(px, py, 3, colorNum, 0.7);
                particles.push(particle);
                this.tweens.add({
                    targets: particle,
                    x: { from: px, to: slot.x + Math.cos(angle + Math.PI * 2) * 22 },
                    y: { from: py, to: slot.y + Math.sin(angle + Math.PI * 2) * 22 },
                    duration: 2000 + i * 400, repeat: -1, ease: 'Linear'
                });
                this.tweens.add({ targets: particle, alpha: 0.2, duration: 800, yoyo: true, repeat: -1, delay: i * 300 });
            }

            const icon = this.add.text(slot.x, slot.y, e.icon, { fontSize: '18px' }).setOrigin(0.5);
            const levelBadge = this.add.text(slot.x + 20, slot.y - 20, 'Lv.1', {
                fontSize: '10px', color: '#FFD700', stroke: '#000', strokeThickness: 2
            }).setOrigin(0.5);

            slot.occupied = true;
            slot.formation = { type: elementKey, sprite: formation, icon: icon, levelBadge: levelBadge, level: 1, orbitRing: orbitRing, particles: particles, runeText: runeText, durability: this.getFormationBaseDurability(), maxDurability: this.getFormationBaseDurability() };
            slot.plus.setVisible(false);
            slot.bg.setFillStyle(colorNum, 0.9);
            slot.bg.setStrokeStyle(2, 0xFFFFFF);
            this.formations.push(slot);

            [formation, icon, levelBadge, orbitRing, runeText, ...particles].forEach(obj => {
                obj.setScale(0);
                this.tweens.add({ targets: obj, scale: 1, duration: 350, ease: 'Back.easeOut' });
            });

            // 耐久度条
            const durBarWidth = 36;
            const durBarBg = this.add.rectangle(slot.x, slot.y + 30, durBarWidth, 4, 0x333333, 0.8).setDepth(15);
            const durBarFill = this.add.rectangle(slot.x - durBarWidth/2 + 1, slot.y + 30, Math.max(1, durBarWidth - 2), 3, 0x5CBF7C, 1).setOrigin(0, 0.5).setDepth(15);
            slot.formation.durBarBg = durBarBg;
            slot.formation.durBarFill = durBarFill;
            slot.formation.durBarWidth = durBarWidth;
        }

        startWave() {
            if(this.isGameOver) return;
            if(this.isWaveActive) { this.showMsg('波次进行中!'); return; }

            // 50波上限检查
            if(GameData.battle.currentWave >= 50) { this.showMsg('已通关50波!'); return; }

            // 死亡螺旋保护：所有阵法被毁且灵石不足时，免费赐予一座阵法
            const hasAnyFormation = this.formations.length > 0;
            if(!hasAnyFormation) {
                const elements = ['METAL', 'WOOD', 'WATER', 'FIRE', 'EARTH'];
                const randomElement = elements[Math.floor(Math.random() * elements.length)];
                const firstEmptySlot = this.slots.find(s => !s.occupied);
                if(firstEmptySlot) {
                    const slotIndex = this.slots.indexOf(firstEmptySlot);
                    this.autoPlaceFormation(slotIndex, randomElement);
                    this.showMsg(`✦ 天恩赐阵! 免费放置${ELEMENTS[randomElement].name}阵法!`);
                    this.updateUI();
                }
            }

            this.isWaveActive = true;
            GameData.battle.weakenActive = false;
            this.waveDamageTaken = 0;
            this.currentWaveNum = GameData.battle.currentWave + 1;
            GameData.battle.currentWave = this.currentWaveNum;
            this.updateTimerDisplay();

            // 10波一大循环（对应Boss波）
            GameData.battle.waveCycle = Math.ceil(this.currentWaveNum / 10);

            // 获取波次配置
            const waveCfg = WAVE_CONFIGS[this.currentWaveNum];
            const bossKey = waveCfg ? (waveCfg.find(e => e.boss) || {}).boss : null;
            const isBossWave = !!bossKey;
            const bossCfg = isBossWave ? BOSS_CONFIGS[bossKey] : null;

            // 波次提示
            if(isBossWave) {
                this.showMsg(`⚡ BOSS来袭! ${bossCfg.icon}${bossCfg.name}!`);
                // Boss战特殊提示：3秒后开始
                this.showMsg(`⚡ 第${this.currentWaveNum}波·${bossCfg.name}降临!`);
            } else if(this.currentWaveNum % 5 === 0) {
                this.showMsg(`⚔ 第${this.currentWaveNum}波·精英来袭!`);
            } else {
                this.showMsg(`第${this.currentWaveNum}波妖兽来袭!`);
            }

            // 波次追踪
            this.currentWaveId++;
            const waveId = this.currentWaveId;
            const w = this.cameras.main.width, h = this.cameras.main.height;

            // 计算本波总怪物数
            let totalCount = 0;
            if(waveCfg) {
                for(const group of waveCfg) {
                    if(group.count) totalCount += group.count;
                }
            } else {
                totalCount = 5 + Math.floor(this.currentWaveNum / 3);
            }

            // 夜间额外加成
            const period = getCurrentPeriod(GameData.time.hour);
            if(period.key === 'night') {
                totalCount += 2;
                this.showMsg('🌙 夜间妖兽加成!');
            }

            GameData.battle.totalThisWave = totalCount;
            GameData.battle.spawnedThisWave = 0;
            GameData.battle.killedThisWave = 0;

            // 清除上一波残留的spawn定时器
            this.spawnTimers.forEach(t => { if(t) t.remove(); });
            this.spawnTimers = [];

            // Boss技能状态初始化
            this.activeBossSkillEffects = [];
            this.currentBossRef = null;

            // P2-1 灵兽被动：威压（四星·入场眩晕最近妖兽3秒）
            this._auraFearUsed = false;
            const passives = this.getBeastStarPassives();
            const auraFear = passives.find(p => p.type === 'aura_fear');
            if(auraFear) {
                // 延迟2秒（等第一只妖兽入场后触发）
                this.time.delayedCall(2000, () => {
                    if(this.isWaveActive && !this._auraFearUsed && this.monsters.length > 0) {
                        // 找最近的妖兽
                        let nearest = null;
                        let nearestDist = Infinity;
                        this.monsters.forEach(m => {
                            if(!m || !m.active || m.getData('stunned')) return;
                            const d = Phaser.Math.Distance.Between(m.x, m.y, this.treeX, this.treeY);
                            if(d < nearestDist) { nearestDist = d; nearest = m; }
                        });
                        if(nearest) {
                            this._auraFearUsed = true;
                            const stunDuration = (auraFear.value || 3) * 1000;
                            // 眩晕目标
                            this.tweens.killTweensOf(nearest);
                            nearest.setData('stunned', true);
                            const stunIcon = this.add.text(nearest.x, nearest.y - 25, '😱', { fontSize: '16px' }).setOrigin(0.5).setDepth(50);
                            nearest.setData('stunIcon', stunIcon);
                            // 威压特效：紫色冲击波
                            const fearFx = this.add.circle(nearest.x, nearest.y, 30, 0x9B7ED9, 0.7).setDepth(45);
                            this.tweens.add({ targets: fearFx, scale: 5, alpha: 0, duration: 600, onComplete: () => fearFx.destroy() });
                            // 恢复移动
                            this.time.delayedCall(stunDuration, () => {
                                if(nearest && nearest.active) {
                                    nearest.setData('stunned', false);
                                    if(stunIcon && stunIcon.active) stunIcon.destroy();
                                    this.resumeMonster(nearest);
                                }
                            });
                            this.showMsg(`🌀 威压! ${nearest.name || '妖兽'}被震慑${auraFear.value}秒!`);
                        }
                    }
                });
            }

            // 按波次配置生成怪物
            let spawnDelay = 0;
            if(waveCfg) {
                for(const group of waveCfg) {
                    if(group.boss) {
                        // Boss在最后单独生成（延迟到最后）
                        const bossSpawnDelay = totalCount * 1000; // Boss最后出场
                        const timer = this.time.delayedCall(bossSpawnDelay, () => {
                            if(this.currentWaveId === waveId && this.isWaveActive) {
                                this.spawnBoss(w, h, group.boss);
                                GameData.battle.spawnedThisWave++;
                            }
                        });
                        this.spawnTimers.push(timer);
                    } else {
                        const typeIdx = group.type;
                        for(let i = 0; i < group.count; i++) {
                            const delay = spawnDelay;
                            const capturedType = typeIdx;
                            const timer = this.time.delayedCall(delay, () => {
                                if(this.currentWaveId === waveId && this.isWaveActive) {
                                    this.spawnMonsterByType(w, h, capturedType);
                                    GameData.battle.spawnedThisWave++;
                                }
                            });
                            this.spawnTimers.push(timer);
                            spawnDelay += 1000 + Math.random() * 400; // 随机间隔1-1.4秒
                        }
                    }
                }
            } else {
                // 兜底：无配置时用旧逻辑
                for(let i = 0; i < totalCount; i++) {
                    const timer = this.time.delayedCall(i * 1200, () => {
                        if(this.currentWaveId === waveId && this.isWaveActive) {
                            this.spawnMonster(w, h, false);
                            GameData.battle.spawnedThisWave++;
                        }
                    });
                    this.spawnTimers.push(timer);
                }
            }

            this.monsterAttackTimer = this.time.addEvent({
                delay: 1000, callback: this.formationsAttack, callbackScope: this, loop: true
            });
            // Boss波安全上限120秒，普通波60秒
            const waveTimeout = isBossWave ? 120000 : 60000;
            this.waveEndTimer = this.time.delayedCall(waveTimeout, () => {
                if(this.isWaveActive) this.endWave();
            });
        }

        updateTimerDisplay() {
            if(this.isWaveActive) {
                this.timerText.setText('⚔ 战斗中');
                this.timerText.setColor('#5CBF7C');
                if(this.startCountdownText && this.startCountdownText.active) {
                    this.startCountdownText.setText('⚔ 战斗中');
                    this.startCountdownText.setColor('#5CBF7C');
                    this.startCountdownBg.setStrokeStyle(2, 0x5CBF7C);
                }
            } else {
                this.timerText.setText(`⏱ ${this.waveTimer}秒`);
                this.timerText.setColor('#FF6347');
                if(this.startCountdownText && this.startCountdownText.active) {
                    this.startCountdownText.setText(`⚔ ${this.waveTimer}秒后出战`);
                    this.startCountdownText.setColor('#FFD700');
                    this.startCountdownBg.setStrokeStyle(2, 0xFF6347);
                    // 倒计时5秒内变红并加速脉动
                    if(this.waveTimer <= 5) {
                        this.startCountdownText.setColor('#FF4444');
                        this.startCountdownBg.setStrokeStyle(2, 0xFF4444);
                    }
                }
            }
        }

        // 兜底生成方法（旧逻辑，无波次配置时使用）
        spawnMonster(w, h, isBoss = false) {
            this.spawnMonsterByType(w, h, -3, isBoss);
        }

        // 按类型索引生成妖兽
        // typeIdx: MONSTER_TYPES索引，-1=随机，-2=仅精英(7-10)，-3=按波次自动选择（旧逻辑）
        spawnMonsterByType(w, h, typeIdx, isBoss = false) {
            const side = Math.random() < 0.5 ? 0 : 1;
            const x = side === 0 ? -30 : w + 30;
            const y = Phaser.Math.Between(h * 0.2, h * 0.45);

            let mt;
            if(typeIdx === -1) {
                // 随机妖兽
                mt = MONSTER_TYPES[Math.floor(Math.random() * MONSTER_TYPES.length)];
            } else if(typeIdx === -2) {
                // 仅精英(索引7-10: 雷豹/鬼母/玄龟/天魔)
                const eliteIdx = 7 + Math.floor(Math.random() * 4);
                mt = MONSTER_TYPES[eliteIdx];
            } else if(typeIdx === -3) {
                // 旧逻辑：按波次递进
                const idx = Math.min(Math.floor(GameData.battle.currentWave / 5), MONSTER_TYPES.length - 1);
                mt = MONSTER_TYPES[idx];
            } else if(typeIdx >= 0 && typeIdx < MONSTER_TYPES.length) {
                mt = MONSTER_TYPES[typeIdx];
            } else {
                mt = MONSTER_TYPES[0]; // 兜底
            }

            this._createMonsterEntity(x, y, side, mt, isBoss, false, null);
        }

        // 生成Boss
        spawnBoss(w, h, bossKey) {
            const bossCfg = BOSS_CONFIGS[bossKey];
            if(!bossCfg) return;

            const side = Math.random() < 0.5 ? 0 : 1;
            const x = side === 0 ? -30 : w + 30;
            const y = Phaser.Math.Between(w ? this.cameras.main.height * 0.25 : h * 0.25, w ? this.cameras.main.height * 0.4 : h * 0.4);

            // Boss基于对应五行元素的外观色
            const eColorNum = parseInt(ELEMENTS[bossCfg.element].color.replace('#', ''), 16);

            // 波次缩放
            let waveScale = 1 + (Math.max(1, GameData.battle.currentWave) - 1) * 0.08;
            let scaledHp = Math.floor(500 * bossCfg.hpMult * waveScale); // Boss基础HP 500 × 倍率
            let scaledDamage = Math.floor(20 * bossCfg.dmgMult * waveScale); // Boss基础伤害 20 × 倍率

            // 昼夜系统
            const period = getCurrentPeriod(GameData.time.hour);
            scaledHp = Math.floor(scaledHp * period.monsterMult);
            scaledDamage = Math.floor(scaledDamage * period.monsterMult);

            // 天命事件
            if(GameData.battle.weakenActive) {
                scaledHp = Math.floor(scaledHp * 0.5);
            }

            // Boss大小
            const monsterRadius = 38;
            const iconSize = '36px';

            // 外层元素光环
            const outerGlow = this.add.circle(x, y, monsterRadius + 12, eColorNum, 0.2);
            this.tweens.add({ targets: outerGlow, scaleX: 1.4, scaleY: 1.4, alpha: 0.05, duration: 800, yoyo: true, repeat: -1 });

            // Boss主体
            const monster = this.add.circle(x, y, monsterRadius, eColorNum, 1)
                .setStrokeStyle(5, 0xFFD700);

            const innerRing = this.add.circle(x, y, monsterRadius * 0.5, 0x000000, 0.25);

            // Boss图标
            const monsterIcon = this.add.text(x, y, bossCfg.icon, { fontSize: iconSize }).setOrigin(0.5);

            // 血条（更宽）
            const hpBarWidth = 64, hpBarHeight = 8;
            const hpBg = this.add.rectangle(x, y - 50, hpBarWidth + 2, hpBarHeight + 2, 0x000000, 0.8).setOrigin(0.5);
            const hpBar = this.add.rectangle(x - hpBarWidth/2, y - 50, hpBarWidth, hpBarHeight, 0xFF4444, 1).setOrigin(0, 0.5);

            // Boss名字
            const nameTag = this.add.text(x, y - 64, `👑 ${bossCfg.name}`, {
                fontSize: '14px', color: '#FFD700', stroke: '#000', strokeThickness: 3, fontStyle: 'bold'
            }).setOrigin(0.5);

            // Boss技能名称显示
            const skillDesc = bossCfg.skills.map(s => s.name).join('/');
            const skillTag = this.add.text(x, y + 48, `[${skillDesc}]`, {
                fontSize: '10px', color: '#FF8C00', stroke: '#000', strokeThickness: 2
            }).setOrigin(0.5);

            monster.setData('hp', scaledHp);
            monster.setData('maxHp', scaledHp);
            monster.setData('damage', scaledDamage);
            monster.setData('reward', bossCfg.reward);
            monster.setData('element', bossCfg.element);
            monster.setData('spiritDrop', [Math.floor(bossCfg.reward * 0.4), Math.floor(bossCfg.reward * 0.6)]);
            monster.setData('expDrop', [bossCfg.expReward, bossCfg.expReward]);
            monster.setData('icon', monsterIcon);
            monster.setData('hpBar', hpBar);
            monster.setData('hpBg', hpBg);
            monster.setData('nameTag', nameTag);
            monster.setData('isBoss', true);
            monster.setData('hpBarWidth', hpBarWidth);
            monster.setData('outerGlow', outerGlow);
            monster.setData('innerRing', innerRing);
            monster.setData('side', side);
            monster.setData('startX', x);
            monster.setData('progress', 0);
            monster.setData('special', 'boss');
            monster.setData('speed', 3500); // Boss移速较慢
            monster.setData('isRealBoss', true); // 区分真假Boss
            monster.setData('bossKey', bossKey);
            monster.setData('skillTag', skillTag);
            monster.setData('bossSkillCooldowns', {}); // Boss技能冷却追踪

            // Boss光环
            const bossGlow = this.add.circle(x, y, 50, 0xFFD700, 0.12);
            this.tweens.add({ targets: bossGlow, scale: 1.4, alpha: 0.03, duration: 600, yoyo: true, repeat: -1 });
            monster.setData('bossGlow', bossGlow);

            // 第二层光环（五行色）
            const elementGlow = this.add.circle(x, y, 55, eColorNum, 0.08);
            this.tweens.add({ targets: elementGlow, scale: 1.5, alpha: 0.02, duration: 1000, yoyo: true, repeat: -1, delay: 300 });
            monster.setData('elementGlow', elementGlow);

            // 保存Boss引用
            this.currentBossRef = monster;

            // 符箓效果
            const slowEffect = GameData.talismans.activeEffects.find(e => e.type === 'slow');
            const moveDuration = slowEffect ? 8000 : 4000; // Boss移动较慢

            this.tweens.add({
                targets: [monster, monsterIcon, hpBar, hpBg, nameTag, outerGlow, innerRing, bossGlow, elementGlow, skillTag].filter(Boolean),
                x: this.treeX + (side === 0 ? 60 : -60),
                duration: moveDuration, ease: 'Sine.easeIn',
                onUpdate: () => {
                    if(monster.active && Math.random() < 0.4) {
                        const trail = this.add.circle(monster.x, monster.y, 5, 0xFFD700, 0.6);
                        this.tweens.add({ targets: trail, alpha: 0, scale: 0.2, duration: 500, onComplete: () => trail.destroy() });
                    }
                    const startX = monster.getData('startX') || x;
                    const endX = this.treeX + (side === 0 ? 60 : -60);
                    const totalDist = Math.abs(endX - startX);
                    const currentDist = Math.abs(monster.x - startX);
                    monster.setData('progress', totalDist > 0 ? currentDist / totalDist : 0);
                },
                onComplete: () => this.monsterAttack(monster)
            });

            // Boss入场特效
            const spawnFx = this.add.circle(x, y, monsterRadius, 0xFFFFFF, 0.9);
            this.tweens.add({ targets: spawnFx, scale: 3, alpha: 0, duration: 500, onComplete: () => spawnFx.destroy() });
            const warnRing = this.add.circle(x, y, 10, 0xFF0000, 0.7);
            this.tweens.add({ targets: warnRing, scale: 10, alpha: 0, duration: 1200, onComplete: () => warnRing.destroy() });
            const warnRing2 = this.add.circle(x, y, 10, 0xFFD700, 0.5);
            this.tweens.add({ targets: warnRing2, scale: 8, alpha: 0, duration: 1000, delay: 200, onComplete: () => warnRing2.destroy() });

            // Boss技能定时器
            this._startBossSkillLoop(monster, bossCfg);

            this.monsters.push(monster);
        }

        // Boss技能循环
        _startBossSkillLoop(monster, bossCfg) {
            if(!monster.active) return;
            for(const skill of bossCfg.skills) {
                if(skill.cooldown <= 0) continue; // 被动技能跳过
                const cdKey = skill.id;
                monster.getData('bossSkillCooldowns')[cdKey] = 0;
                const skillTimer = this.time.addEvent({
                    delay: skill.cooldown * 1000,
                    callback: () => {
                        if(!monster.active || !this.isWaveActive || this.isGameOver) {
                            skillTimer.remove();
                            return;
                        }
                        this._executeBossSkill(monster, bossCfg, skill);
                    },
                    callbackScope: this,
                    loop: true
                });
                if(!this.bossSkillTimers) this.bossSkillTimers = [];
                this.bossSkillTimers.push(skillTimer);
            }
        }

        // 执行Boss技能
        _executeBossSkill(monster, bossCfg, skill) {
            if(!monster.active) return;

            // 技能特效提示
            this.showMsg(`⚡ ${bossCfg.name}释放【${skill.name}】!`);

            // 技能视觉效果
            const fxColor = skill.color || 0xFFD700;
            const skillFx = this.add.circle(monster.x, monster.y, 20, fxColor, 0.6);
            this.tweens.add({ targets: skillFx, scale: 4, alpha: 0, duration: 600, onComplete: () => skillFx.destroy() });

            switch(skill.id) {
                case 'howl': // 狼嚎：全体妖兽攻击+20%持续10秒
                    this.activeBossSkillEffects.push({ type: 'howl', expires: Date.now() + 10000 });
                    this.showMsg('🐺 全体妖兽攻击+20%!');
                    break;
                case 'charm_field': // 魅惑领域：阵法攻击间隔+80%持续8秒
                    this.activeBossSkillEffects.push({ type: 'charm_field', expires: Date.now() + 8000 });
                    this.showMsg('🦊 阵法攻速大幅降低!');
                    break;
                case 'ice_breath': // 冰息：冻结2个阵法2秒
                    const activeFormations = this.formations.filter(f => f.active && f.formation);
                    const targets = Phaser.Utils.Array.Shuffle(activeFormations).slice(0, 2);
                    targets.forEach(f => {
                        if(f && f.active && f.formation) {
                            f.formation.frozen = true;
                            const iceFx = this.add.circle(f.x, f.y, 20, 0x4169E1, 0.4);
                            this.tweens.add({ targets: iceFx, scale: 1.5, alpha: 0.1, duration: 500, yoyo: true, repeat: 3, onComplete: () => { iceFx.destroy(); if(f.formation) f.formation.frozen = false; } });
                        }
                    });
                    break;
                case 'ghost_gate': // 鬼门大开：召唤2只鬼母
                    for(let i = 0; i < 2; i++) {
                        this.time.delayedCall(i * 800, () => {
                            if(monster.active && this.isWaveActive) {
                                this.spawnMonsterByType(this.cameras.main.width, this.cameras.main.height, 8); // 鬼母=索引8
                            }
                        });
                    }
                    break;
                case 'thunder_strike': // 天雷：对灵木造成雷击伤害（扣灵气，不是HP）
                    const thunderDmg = Math.floor(monster.getData('damage') * 1.5);
                    GameData.tree.spirit = Math.max(0, GameData.tree.spirit - thunderDmg);
                    const thunderFx = this.add.circle(this.treeX, this.treeY, 30, 0xFFD700, 0.8);
                    this.tweens.add({ targets: thunderFx, scale: 3, alpha: 0, duration: 500, onComplete: () => thunderFx.destroy() });
                    this.showMsg(`⚡ 天雷轰击! 灵木-${thunderDmg}灵气`);
                    this.updateUI();
                    if(GameData.tree.spirit <= 0) this.gameOver();
                    break;
                case 'spawn': // 孵化：召唤3只随机妖兽
                    for(let i = 0; i < 3; i++) {
                        this.time.delayedCall(i * 500, () => {
                            if(monster.active && this.isWaveActive) {
                                this.spawnMonsterByType(this.cameras.main.width, this.cameras.main.height, -1);
                            }
                        });
                    }
                    break;
                case 'element_shift': // 五行轮转：切换五行免疫
                    const elements = ['METAL', 'WOOD', 'WATER', 'FIRE', 'EARTH'];
                    const immune = elements[Math.floor(Math.random() * elements.length)];
                    monster.setData('elementImmune', immune);
                    this.showMsg(`🐲 混沌魔龙免疫${ELEMENTS[immune].name}攻击!`);
                    // 5秒后清除免疫
                    this.time.delayedCall(5000, () => { if(monster.active) monster.setData('elementImmune', null); });
                    break;
                case 'chaos_breath': // 混沌吐息：直线伤害
                    const breathDmg = Math.floor(monster.getData('damage') * 0.8);
                    this.formations.forEach(f => {
                        if(f && f.formation) {
                            const dist = Phaser.Math.Distance.Between(monster.x, monster.y, f.x, f.y);
                            if(dist < 200) {
                                const fDur = f.formation.durability || 100;
                                f.formation.durability = Math.max(0, fDur - breathDmg);
                                this.updateDurabilityBar(f);
                            }
                        }
                    });
                    this.showMsg('🐲 混沌吐息! 阵法受损!');
                    break;
                case 'all_skills': // 万妖朝拜：随机释放前Boss技能
                    const allBossKeys = Object.keys(BOSS_CONFIGS).filter(k => k !== 'demon_emperor');
                    const randomKey = allBossKeys[Math.floor(Math.random() * allBossKeys.length)];
                    const randomBoss = BOSS_CONFIGS[randomKey];
                    const randomSkill = randomBoss.skills[Math.floor(Math.random() * randomBoss.skills.length)];
                    this._executeBossSkill(monster, randomBoss, randomSkill);
                    break;
                case 'tribulation': // 天劫：HP每降25%触发
                    // 在damageMonster中处理
                    break;
            }
        }

        // 通用创建妖兽实体（被spawnMonsterByType调用）
        _createMonsterEntity(x, y, side, mt, isBoss, isRealBoss, bossCfg) {
            const eColorNum = parseInt(ELEMENTS[mt.element].color.replace('#', ''), 16);

            // 波次缩放
            let waveScale = 1 + (Math.max(1, GameData.battle.currentWave) - 1) * 0.08;
            let scaledHp = Math.floor(mt.hp * waveScale);
            let scaledDamage = Math.floor(mt.damage * waveScale);

            // 昼夜系统
            const period = getCurrentPeriod(GameData.time.hour);
            scaledHp = Math.floor(scaledHp * period.monsterMult);
            scaledDamage = Math.floor(scaledDamage * period.monsterMult);

            // 妖王额外属性
            if(isBoss) {
                scaledHp = Math.floor(scaledHp * 2.5);
                scaledDamage = Math.floor(scaledDamage * 1.8);
            }

            // 天命事件
            if(GameData.battle.weakenActive) {
                scaledHp = Math.floor(scaledHp * 0.5);
            }

            // 怪物大小
            const monsterRadius = isBoss ? 32 : 22;
            const iconSize = isBoss ? '32px' : '22px';

            // 外层元素光环
            const outerGlow = this.add.circle(x, y, monsterRadius + 8, eColorNum, 0.15);
            this.tweens.add({ targets: outerGlow, scaleX: 1.3, scaleY: 1.3, alpha: 0.05, duration: 1000, yoyo: true, repeat: -1 });

            const monster = this.add.circle(x, y, monsterRadius, eColorNum, 1)
                .setStrokeStyle(isBoss ? 4 : 2, isBoss ? 0xFFD700 : eColorNum);

            const innerRing = this.add.circle(x, y, monsterRadius * 0.5, 0x000000, 0.2);

            const monsterIcon = this.add.text(x, y, mt.icon, { fontSize: iconSize }).setOrigin(0.5);

            const hpBarWidth = isBoss ? 50 : 36, hpBarHeight = isBoss ? 7 : 5;
            const hpBg = this.add.rectangle(x, y - (isBoss ? 42 : 32), hpBarWidth + 2, hpBarHeight + 2, 0x000000, 0.7).setOrigin(0.5);
            const hpBar = this.add.rectangle(x - hpBarWidth/2, y - (isBoss ? 42 : 32), hpBarWidth, hpBarHeight, 0x44FF44, 1).setOrigin(0, 0.5);

            const displayName = isBoss ? '妖王·' + mt.name : mt.name;
            const nameTag = this.add.text(x, y - (isBoss ? 54 : 42), displayName, {
                fontSize: isBoss ? '13px' : '11px', color: isBoss ? '#FFD700' : '#FFF',
                stroke: '#000', strokeThickness: 2, fontStyle: isBoss ? 'bold' : 'normal'
            }).setOrigin(0.5);

            monster.setData('hp', scaledHp);
            monster.setData('maxHp', scaledHp);
            monster.setData('damage', scaledDamage);
            monster.setData('reward', isBoss ? mt.reward * 3 : mt.reward);
            monster.setData('element', mt.element);
            monster.setData('spiritDrop', mt.spiritDrop);
            monster.setData('expDrop', isBoss ? [mt.expDrop[0] * 3, mt.expDrop[1] * 3] : mt.expDrop);
            monster.setData('icon', monsterIcon);
            monster.setData('hpBar', hpBar);
            monster.setData('hpBg', hpBg);
            monster.setData('nameTag', nameTag);
            monster.setData('isBoss', isBoss);
            monster.setData('hpBarWidth', hpBarWidth);
            monster.setData('outerGlow', outerGlow);
            monster.setData('innerRing', innerRing);
            monster.setData('side', side);
            monster.setData('startX', x);
            monster.setData('progress', 0);
            monster.setData('special', mt.special);
            monster.setData('speed', mt.speed);
            monster.setData('isRealBoss', false);

            if(isBoss) {
                const bossGlow = this.add.circle(x, y, 40, 0xFFD700, 0.15);
                this.tweens.add({ targets: bossGlow, scale: 1.3, alpha: 0.05, duration: 800, yoyo: true, repeat: -1 });
                monster.setData('bossGlow', bossGlow);
            }

            const slowEffect = GameData.talismans.activeEffects.find(e => e.type === 'slow');
            const moveDuration = slowEffect ? 6000 : 3000;

            this.tweens.add({
                targets: [monster, monsterIcon, hpBar, hpBg, nameTag, outerGlow, innerRing].concat(isBoss ? [monster.getData('bossGlow')] : []).filter(Boolean),
                x: this.treeX + (side === 0 ? 60 : -60),
                duration: moveDuration, ease: 'Sine.easeIn',
                onUpdate: () => {
                    if(monster.active && Math.random() < 0.3) {
                        const trail = this.add.circle(monster.x, monster.y, isBoss ? 5 : 3, eColorNum, 0.5);
                        this.tweens.add({ targets: trail, alpha: 0, scale: 0.2, duration: 400, onComplete: () => trail.destroy() });
                    }
                    const startX = monster.getData('startX') || x;
                    const endX = this.treeX + (side === 0 ? 60 : -60);
                    const totalDist = Math.abs(endX - startX);
                    const currentDist = Math.abs(monster.x - startX);
                    monster.setData('progress', totalDist > 0 ? currentDist / totalDist : 0);
                },
                onComplete: () => this.monsterAttack(monster)
            });

            const spawnFx = this.add.circle(x, y, monsterRadius, 0xFFFFFF, 0.8);
            this.tweens.add({ targets: spawnFx, scale: 2.5, alpha: 0, duration: 400, onComplete: () => spawnFx.destroy() });

            if(isBoss) {
                const warnRing = this.add.circle(x, y, 10, 0xFF0000, 0.6);
                this.tweens.add({ targets: warnRing, scale: 8, alpha: 0, duration: 1000, onComplete: () => warnRing.destroy() });
                const warnRing2 = this.add.circle(x, y, 10, 0xFFD700, 0.4);
                this.tweens.add({ targets: warnRing2, scale: 6, alpha: 0, duration: 800, delay: 200, onComplete: () => warnRing2.destroy() });
            }

            this.monsters.push(monster);
        }

        monsterAttack(monster) {
            if(!monster || !monster.active || this.isGameOver) return;

            // 游戏暂停时（天命/渡劫弹窗），延迟重试而不是继续攻击
            if(this.isPaused) {
                this.time.delayedCall(500, () => { if(monster && monster.active && !this.isGameOver) this.monsterAttack(monster); });
                return;
            }

            // 灵兽技能：眩晕中，延迟重试
            if(monster.getData('stunned')) {
                this.time.delayedCall(500, () => { if(monster && monster.active) this.monsterAttack(monster); });
                return;
            }

            // 符箓效果：定身符 - 怪物被冻结，延迟重试
            const slowEffect = GameData.talismans.activeEffects.find(e => e.type === 'slow');
            if(slowEffect) {
                this.time.delayedCall(1000, () => {
                    if(monster && monster.active) this.monsterAttack(monster);
                });
                return;
            }

            // 符箓效果：金钟符 - 免疫伤害，延迟重试
            const shieldEffect = GameData.talismans.activeEffects.find(e => e.type === 'shield');
            if(shieldEffect) {
                this.time.delayedCall(1000, () => {
                    if(monster && monster.active) this.monsterAttack(monster);
                });
                return;
            }

            let dmg = monster.getData('damage');
            // 怪物特殊技能：毒雾(poiseon)额外灵木伤害
            const special = monster.getData('special');

            // Boss技能效果：狼嚎(howl)全体妖兽攻击+20%
            const howlEffect = this.activeBossSkillEffects && this.activeBossSkillEffects.find(e => e.type === 'howl' && e.expires > Date.now());
            if(howlEffect) {
                dmg = Math.floor(dmg * 1.2);
            }

            // Boss技能效果：帝威(emperor_aura)全场妖兽攻击+30%
            if(this.currentBossRef && this.currentBossRef.active && this.currentBossRef.getData('bossKey') === 'demon_emperor') {
                dmg = Math.floor(dmg * 1.3);
            }

            // 新妖兽技能：灼烧(burn)额外30%灵气伤害
            if(special === 'burn') {
                const burnDmg = Math.floor(dmg * 0.3);
                GameData.tree.spirit -= burnDmg;
                this.waveDamageTaken += burnDmg;
            }

            // 新妖兽技能：连击(doubleStrike)伤害×2
            if(special === 'doubleStrike') {
                dmg = Math.floor(dmg * 2);
            }

            // 妖兽优先攻击路径上的阵法
            let attackedFormation = false;
            const mSide = monster.getData('side');
            const mProgress = monster.getData('progress') || 0;
            // 只在接近阵法时攻击（progress > 0.5 表示过了半程）
            if(mProgress > 0.4) {
                for(const slot of this.formations) {
                    if(!slot.formation || slot.formation.durability <= 0) continue;
                    const dist = Phaser.Math.Distance.Between(monster.x, monster.y, slot.x, slot.y);
                    if(dist < 80) { // 阵法攻击范围
                        // 攻击阵法
                        slot.formation.durability = Math.max(0, slot.formation.durability - dmg);
                        attackedFormation = true;

                        // 阵法受击震动
                        if(slot.formation.sprite && slot.formation.sprite.active) {
                            this.tweens.add({ targets: slot.formation.sprite, x: slot.x + 3, duration: 50, yoyo: true, repeat: 2,
                                onComplete: () => { if(slot.formation.sprite.active) slot.formation.sprite.x = slot.x; }
                            });
                        }

                        // 更新耐久度条
                        this.updateDurabilityBar(slot);

                        // 阵法被摧毁
                        if(slot.formation.durability <= 0) {
                            this.destroyFormation(slot);
                        }
                        break; // 每次只攻击一个阵法
                    }
                }
            }

            // 没有可攻击的阵法时，攻击灵木
            if(!attackedFormation) {
                // P2-1 灵兽被动：护主（三星·替身承受20%伤害）
                let actualDmg = dmg;
                const passives = this.getBeastStarPassives();
                const protectMaster = passives.find(p => p.type === 'protect_master');
                if(protectMaster && this._beastPassiveTimers.protectMaster <= 0) {
                    const blockedDmg = Math.floor(dmg * (protectMaster.value || 0.2));
                    if(blockedDmg > 0) {
                        actualDmg -= blockedDmg;
                        this._beastPassiveTimers.protectMaster = protectMaster.interval || 60; // 进入冷却
                        this.showMsg(`🛡️ 护主! 灵兽替你抵挡${blockedDmg}点!`);
                        // 护主特效：灵兽位置闪烁金盾
                        if(this.beastSprite) {
                            const shieldFx = this.add.circle(this.beastSprite.x, this.beastSprite.y - 15, 25, 0xFFD700, 0.5).setDepth(48);
                            this.tweens.add({ targets: shieldFx, scale: 1.5, alpha: 0, duration: 500, onComplete: () => shieldFx.destroy() });
                        }
                    }
                }

                GameData.tree.spirit -= actualDmg;
                this.waveDamageTaken += actualDmg;

                // 怪物特殊技能：毒雾(poison)额外造成50%灵气伤害
                if(special === 'poison') {
                    const poisonDmg = Math.floor(actualDmg * 0.5);
                    GameData.tree.spirit -= poisonDmg;
                    this.waveDamageTaken += poisonDmg;
                    this.showMsg(`☠️ 毒雾! 额外-${poisonDmg}灵气`);
                }

                // 灵木受击闪红效果
                if(this.tree && this.tree.active) {
                    const origColor = this.tree.fillColor;
                    this.tree.setFillStyle(0xFF0000, 1);
                    this.time.delayedCall(150, () => {
                        if(this.tree && this.tree.active) this.tree.setFillStyle(origColor, 1);
                    });
                }
                this.showMsg(`-${dmg} 灵气`);
            }

            this.updateUI();

            if(GameData.tree.spirit <= 0) {
                this.gameOver();
                return;
            }

            // 鬼母召唤技能：每5秒召唤1只游魂
            if(special === 'summon') {
                if(!monster.getData('summonCooldown')) {
                    monster.setData('summonCooldown', 0);
                }
                const cd = monster.getData('summonCooldown');
                if(cd <= 0) {
                    this.spawnMonsterByType(this.cameras.main.width, this.cameras.main.height, 0); // 游魂=索引0
                    this.showMsg('👹 鬼母召唤游魂!');
                    monster.setData('summonCooldown', 5);
                } else {
                    monster.setData('summonCooldown', cd - 1);
                }
            }

            // 新妖兽技能：冰冻(freeze)攻击阵法时冻结1.5秒
            if(special === 'freeze' && attackedFormation) {
                // 查找被攻击的阵法并冻结
                for(const slot of this.formations) {
                    if(!slot.formation || slot.formation.durability <= 0) continue;
                    const dist = Phaser.Math.Distance.Between(monster.x, monster.y, slot.x, slot.y);
                    if(dist < 80) {
                        slot.formation.frozen = true;
                        const iceFx = this.add.circle(slot.x, slot.y, 20, 0x4169E1, 0.3);
                        this.tweens.add({ targets: iceFx, scale: 1.5, alpha: 0.1, duration: 500, yoyo: true, repeat: 2, onComplete: () => { iceFx.destroy(); slot.formation.frozen = false; } });
                        break;
                    }
                }
            }

            this.time.delayedCall(1000, () => {
                if(monster && monster.active && !this.isGameOver) this.monsterAttack(monster);
            });
        }

        formationsAttack() {
            if(this.monsters.length === 0 || this.isPaused) return;

            this.formations.forEach(slot => {
                if(!slot.formation) return;
                // 被冻结的阵法无法攻击
                if(slot.formation.frozen) return;
                const fElement = slot.formation.type;
                const level = slot.formation.level;

                // ===== 升级属性 =====
                // 伤害：15 + 10*等级 + 5*等级²（二次方增长，后期可跟上怪物HP缩放）
                const damage = 15 + 10 * level + 5 * level * level;
                // 攻击范围：400 + 80 * 等级（等级越高打得越远）
                const range = 400 + 80 * level;
                // 攻击目标数：1 + floor(等级/2)（1级1目标，2-3级2目标，4-5级3目标...）
                const maxTargets = 1 + Math.floor(level / 2);
                // 弹道大小：5 + 等级 * 2（等级越高弹丸越大）
                const projSize = 5 + level * 2;
                // 弹道速度：250 - level * 15（等级越高越快，最低120）
                const projSpeed = Math.max(120, 250 - level * 15);

                const inRange = this.monsters.filter(m => {
                    if(!m || !m.active) return false;
                    return Phaser.Math.Distance.Between(slot.x, slot.y, m.x, m.y) < range;
                });

                inRange.sort((a, b) =>
                    Phaser.Math.Distance.Between(slot.x, slot.y, a.x, a.y) -
                    Phaser.Math.Distance.Between(slot.x, slot.y, b.x, b.y)
                );

                inRange.slice(0, maxTargets).forEach(target => {
                    if(!target || !target.active) return;
                    const mElement = target.getData('element');
                    const isEffective = ELEMENTS[fElement].beats === mElement;
                    // 被克制：阵法元素被怪物元素克制
                    const isResisted = ELEMENTS[mElement] && ELEMENTS[mElement].beats === fElement;
                    let finalDamage = damage;
                    if(isEffective) finalDamage = Math.floor(damage * 1.5);
                    else if(isResisted) finalDamage = Math.floor(damage * 0.5);

                    // 灵木等级加成：每级+8%伤害（后期核心输出来源）
                    finalDamage = Math.floor(finalDamage * (1 + (GameData.tree.level - 1) * 0.08));

                    // v4.1 灼炼化加成：炼化阵法获得的永久伤害加成
                    if(GameData._refineBonuses && GameData._refineBonuses.formationDamage) {
                        finalDamage = Math.floor(finalDamage * (1 + GameData._refineBonuses.formationDamage));
                    }

                    // v4.1 永久顿悟加成：攻击类顿悟提升伤害
                    if(GameData.permanentEnlightenments && GameData.permanentEnlightenments.length > 0) {
                        GameData.permanentEnlightenments.forEach(penl => {
                            if(penl.type === 'attack' && penl.effect && penl.effect.stat === 'attack') {
                                finalDamage = Math.floor(finalDamage * (1 + penl.value));
                            }
                        });
                    }

                    // 昼夜系统：夜间阵法效率降低
                    const period = getCurrentPeriod(GameData.time.hour);
                    finalDamage = Math.floor(finalDamage * period.formationMult);

                    // 怪物特殊技能：魅惑(charm)使阵法伤害降低50%
                    if(target.getData('special') === 'charm') {
                        finalDamage = Math.floor(finalDamage * 0.5);
                    }

                    // Boss技能效果：魅惑领域(阵法伤害-40%)
                    const charmField = this.activeBossSkillEffects && this.activeBossSkillEffects.find(e => e.type === 'charm_field' && e.expires > Date.now());
                    if(charmField) {
                        finalDamage = Math.floor(finalDamage * 0.6);
                    }

                    // Boss技能效果：暴风雪(阵法效率额外-20%)
                    const blizzard = this.currentBossRef && this.currentBossRef.active && this.currentBossRef.getData('bossKey') === 'ice_dragon';
                    if(blizzard && this.currentBossRef.getData('hp') / this.currentBossRef.getData('maxHp') < 0.5) {
                        finalDamage = Math.floor(finalDamage * 0.8);
                    }

                    // 灵兽被动：伤害加成
                    if(GameData.spiritBeast.contracted) {
                        const bDef = SPIRIT_BEASTS.find(b => b.id === GameData.spiritBeast.contracted.id);
                        if(bDef && bDef.passiveType === 'damage_boost') {
                            if(bDef.passiveElement === 'ALL' || bDef.passiveElement === fElement) {
                                finalDamage = Math.floor(finalDamage * (1 + bDef.passiveMult));
                            }
                        }
                    }

                    // 功法加成：万剑诀（阵法伤害+25%）
                    const artDmgBonus = this.getArtBonus('formationDamage');
                    if(artDmgBonus > 0) finalDamage = Math.floor(finalDamage * (1 + artDmgBonus));

                    // 功法加成：五行归元（克制伤害额外+50%）
                    if(isEffective && this.getArtBonus('elementalBonus') > 0) {
                        finalDamage = Math.floor(finalDamage * (1 + this.getArtBonus('elementalBonus')));
                    }

                    const eColorNum = parseInt(ELEMENTS[fElement].color.replace('#', ''), 16);

                    // 攻击光束（连线效果，从阵法到目标方向）
                    const beamDist = Math.min(range, Phaser.Math.Distance.Between(slot.x, slot.y, target.x, target.y));
                    if(beamDist > 5) {
                        const beamAngle = Phaser.Math.Angle.Between(slot.x, slot.y, target.x, target.y);
                        const beam = this.add.rectangle(slot.x, slot.y, beamDist, 3 + level, eColorNum, 0.4);
                        beam.setRotation(beamAngle);
                        beam.setOrigin(0, 0.5);
                        this.tweens.add({ targets: beam, alpha: 0, duration: 200, onComplete: () => beam.destroy() });
                    }

                    // 弹道发射效果 - 从阵法中心射出
                    const proj = this.add.circle(slot.x, slot.y, projSize, eColorNum, 1);

                    // 高等级弹丸添加尾焰
                    if(level >= 3) {
                        const trail = this.add.circle(slot.x, slot.y, projSize * 0.6, eColorNum, 0.4);
                        this.tweens.add({
                            targets: trail, x: target.x, y: target.y, duration: projSpeed + 50,
                            alpha: 0, onComplete: () => trail.destroy()
                        });
                    }

                    // 命中爆炸效果
                    const hitEffect = () => {
                        // 检查目标是否还存在
                        if(!target || !target.active) {
                            proj.destroy();
                            return;
                        }
                        // 命中爆炸圆
                        const boom = this.add.circle(target.x, target.y, projSize * 1.5, eColorNum, 0.7);
                        this.tweens.add({ targets: boom, scale: 2, alpha: 0, duration: 200, onComplete: () => boom.destroy() });

                        // 克制效果额外光环
                        if(isEffective) {
                            const effectiveBoom = this.add.circle(target.x, target.y, 20, 0xFFD700, 0.8);
                            this.tweens.add({ targets: effectiveBoom, scale: 3, alpha: 0, duration: 300, onComplete: () => effectiveBoom.destroy() });
                        }
                    };

                    this.tweens.add({
                        targets: proj, x: target.x, y: target.y, duration: projSpeed,
                        onComplete: () => {
                            proj.destroy();
                            if(!target || !target.active) return; // 目标已死亡，不处理
                            hitEffect();
                            this.damageMonster(target, finalDamage, isEffective);
                        }
                    });

                    // 阵法攻击时发光反馈
                    if(slot.formation.sprite && slot.formation.sprite.active) {
                        slot.formation.sprite.setStrokeStyle(3 + level, 0xFFFFFF);
                    }
                    this.time.delayedCall(150, () => {
                        if(slot.formation && slot.formation.sprite && slot.formation.sprite.active) {
                            slot.formation.sprite.setStrokeStyle(2, 0xFFFFFF);
                        }
                    });
                });
            });
        }

        // 更新阵法耐久度条
        updateDurabilityBar(slot) {
            if(!slot.formation) return;
            const dur = slot.formation.durability;
            const maxDur = slot.formation.maxDurability;
            const pct = Math.max(0, dur / maxDur);
            const barWidth = slot.formation.durBarWidth || 36;

            if(slot.formation.durBarFill && slot.formation.durBarFill.active) {
                slot.formation.durBarFill.setDisplaySize(Math.max(1, (barWidth - 2) * pct), 3);
                // 颜色随耐久度变化：绿→黄→红
                if(pct > 0.5) {
                    slot.formation.durBarFill.setFillStyle(0x5CBF7C); // 绿
                } else if(pct > 0.25) {
                    slot.formation.durBarFill.setFillStyle(0xFFD700); // 黄
                } else {
                    slot.formation.durBarFill.setFillStyle(0xFF4444); // 红
                }
            }
        }

        // 阵法被摧毁
        destroyFormation(slot) {
            if(!slot.formation) return;

            // 如果升级弹窗正打开（dialogShown），强制关闭
            if(this.dialogShown) {
                dialogOverlay.classList.remove('active');
                this.dialogShown = false;
            }

            // 摧毁爆炸特效
            const fx = this.add.circle(slot.x, slot.y, 40, 0xFF4444, 0.8);
            this.tweens.add({ targets: fx, scale: 2, alpha: 0, duration: 500, onComplete: () => fx.destroy() });

            // 碎片粒子
            for(let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const p = this.add.circle(slot.x, slot.y, 3, 0xFF6347, 0.8);
                this.tweens.add({
                    targets: p,
                    x: slot.x + Math.cos(angle) * 50,
                    y: slot.y + Math.sin(angle) * 50,
                    alpha: 0, duration: 400,
                    onComplete: () => p.destroy()
                });
            }

            this.showMsg('⚠️ 阵法被摧毁!');

            // 清理阵法视觉
            const f = slot.formation;
            if(f.sprite && f.sprite.active) f.sprite.destroy();
            if(f.icon && f.icon.active) f.icon.destroy();
            if(f.levelBadge && f.levelBadge.active) f.levelBadge.destroy();
            if(f.orbitRing && f.orbitRing.active) f.orbitRing.destroy();
            if(f.runeText && f.runeText.active) f.runeText.destroy();
            if(f.durBarBg && f.durBarBg.active) f.durBarBg.destroy();
            if(f.durBarFill && f.durBarFill.active) f.durBarFill.destroy();
            if(f.particles) f.particles.forEach(p => { if(p && p.active) p.destroy(); });

            // 重置槽位
            slot.occupied = false;
            slot.formation = null;
            slot.bg.setFillStyle(0x1a1a3a, 0.6);
            slot.bg.setStrokeStyle(2, 0x6B6B9B);
            slot.plus.setVisible(true);
            slot.plus.setAlpha(1);

            // 从formations数组移除
            const idx = this.formations.indexOf(slot);
            if(idx >= 0) this.formations.splice(idx, 1);
        }

        // ===== 阵法升级系统 =====
        upgradeFormation(slot) {
            if(!slot.formation) return;
            const level = slot.formation.level;
            if(level >= 5) { this.showMsg('阵法已满级!'); return; }
            const cost = level * 30 + 20;
            if(GameData.player.spiritStones < cost) { this.showMsg('灵石不足!'); return; }
            GameData.player.spiritStones -= cost;
            slot.formation.level++;
            // 耐久度公式：基础值+等级递增，同时保留玄武灵兽加成
            const baseDur = this.getFormationBaseDurability();
            slot.formation.maxDurability = baseDur + (slot.formation.level - 1) * 20;
            slot.formation.durability = slot.formation.maxDurability; // 升级回满耐久
            slot.formation.levelBadge.setText('Lv.' + slot.formation.level);
            this.updateDurabilityBar(slot);
            this.updateUI();
            // 升级特效
            const fx = this.add.circle(slot.x, slot.y, 15, 0xFFD700, 0.7);
            this.tweens.add({ targets: fx, scale: 3, alpha: 0, duration: 500, onComplete: () => fx.destroy() });
            // 升级弹跳
            if(slot.formation.sprite && slot.formation.sprite.active) {
                this.tweens.add({ targets: slot.formation.sprite, scaleX: 1.3, scaleY: 1.3, duration: 150, yoyo: true });
            }
            this.showMsg(`${ELEMENTS[slot.formation.type].name}阵法升至 Lv.${slot.formation.level}!`);
        }

        onFormationClick(slot) {
            if(!slot.formation) return;
            const level = slot.formation.level;
            if(level >= 5) { this.showMsg('阵法已满级!'); return; }
            const cost = level * 30 + 20;
            // 显示升级确认弹窗
            const overlay = document.createElement('div');
            overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;`;
            const card = document.createElement('div');
            const eName = ELEMENTS[slot.formation.type].name;
            card.style.cssText = `background:rgba(20,20,30,0.95);border:2px solid #FFD700;border-radius:14px;padding:20px 28px;text-align:center;max-width:280px;animation:destinyIn 0.3s ease;box-shadow:0 0 20px #FFD70040;`;
            card.innerHTML = `
                <div style="font-size:24px;margin-bottom:4px">${ELEMENTS[slot.formation.type].icon}</div>
                <div style="font-size:16px;color:#FFD700;font-weight:bold;margin-bottom:4px">${eName}阵法 Lv.${level} → Lv.${level+1}</div>
                <div style="font-size:12px;color:#aaa;margin-bottom:4px">伤害 ${15+10*level+5*level*level} → ${15+10*(level+1)+5*(level+1)*(level+1)} | 攻击数 ${1+Math.floor(level/2)} → ${1+Math.floor((level+1)/2)}</div>
                <div style="font-size:12px;color:#aaa;margin-bottom:4px">耐久 ${100+(level-1)*20} → ${100+level*20}（升级回满）</div>
                <div style="font-size:14px;color:#5CBF7C;margin-bottom:12px">升级费用：💎${cost} 灵石</div>
                <div style="display:flex;gap:8px;justify-content:center">
                    <button id="upgrade-confirm" style="background:#FFD700;color:#000;border:none;padding:6px 20px;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer">升级</button>
                    <button id="upgrade-cancel" style="background:#555;color:#fff;border:none;padding:6px 20px;border-radius:6px;font-size:13px;cursor:pointer">取消</button>
                </div>
            `;
            overlay.appendChild(card);
            document.body.appendChild(overlay);
            card.querySelector('#upgrade-confirm').addEventListener('click', () => {
                overlay.remove();
                this.upgradeFormation(slot);
            });
            card.querySelector('#upgrade-cancel').addEventListener('click', () => overlay.remove());
            overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.remove(); });
        }

        // ===== 灵兽契约系统 =====
        showBeastPanel() {

            const overlay = document.createElement('div');
            overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;`;
            const card = document.createElement('div');
            card.style.cssText = `background:rgba(15,10,25,0.97);border:2px solid #9B7ED9;border-radius:16px;padding:24px;max-width:340px;width:90%;max-height:80vh;overflow-y:auto;animation:destinyIn 0.3s ease;`;

            let inner = `<div style="text-align:center;margin-bottom:16px"><span style="font-size:20px;color:#9B7ED9;font-weight:bold">🐯 灵兽契约</span></div>`;

            if(currentBeast) {

                        <div style="font-size:12px;color:#9B7ED9;margin-top:4px">EXP: ${currentBeast.exp}/${currentBeast.level * 100}</div>
                    </div>
                    <button id="beast-skill" style="width:100%;background:${currentBeast.skillCooldown > 0 ? '#555' : '#9B7ED9'};color:#fff;border:none;padding:8px;border-radius:8px;font-size:14px;cursor:${currentBeast.skillCooldown > 0 ? 'not-allowed' : 'pointer'};margin-bottom:8px">

                    inner += `
                        <div class="beast-option" data-id="${b.id}" style="display:flex;align-items:center;gap:10px;padding:10px;margin-bottom:6px;background:rgba(155,126,217,0.08);border:1px solid #9B7ED930;border-radius:10px;cursor:${canAfford ? 'pointer' : 'not-allowed'};opacity:${canAfford ? 1 : 0.5}">
                            <span style="font-size:28px">${b.icon}</span>
                            <div style="flex:1">
                                <div style="font-size:14px;color:#FFD700;font-weight:bold">${b.name} <span style="font-size:11px;color:#aaa">${ELEMENTS[b.element].name}属性</span></div>
                                <div style="font-size:11px;color:#aaa">${b.passiveDesc}</div>
                                <div style="font-size:11px;color:#9B7ED9">${b.skillName}：${b.skillDesc}</div>
                            </div>
                            <div style="font-size:12px;color:#5CBF7C">💎${b.cost}</div>
                        </div>
                    `;
                });
            }

            inner += `<button id="beast-close" style="width:100%;background:#333;color:#fff;border:none;padding:8px;border-radius:8px;font-size:13px;margin-top:8px;cursor:pointer">关闭</button>`;

            overlay.appendChild(card);
            document.body.appendChild(overlay);

            // 绑定事件
            card.querySelector('#beast-close').addEventListener('click', () => overlay.remove());
            if(currentBeast) {
                const skillBtn = card.querySelector('#beast-skill');
                if(skillBtn && currentBeast.skillCooldown <= 0) {
                    skillBtn.addEventListener('click', () => { this.useBeastSkill(); overlay.remove(); });

                card.querySelectorAll('.beast-option').forEach(el => {
                    el.addEventListener('click', () => {

            overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.remove(); });

        contractBeast(beastId) {
            const bDef = SPIRIT_BEASTS.find(b => b.id === beastId);
            if(!bDef) return;
            if(GameData.player.spiritStones < bDef.cost) { this.showMsg('灵石不足!'); return; }
            GameData.player.spiritStones -= bDef.cost;
            GameData.spiritBeast.contracted = { id: beastId, name: bDef.name, icon: bDef.icon, element: bDef.element, level: 1, exp: 0, skillCooldown: 0, star: 0 };
            GameData.spiritBeast.unlocked = true;
            this.updateUI();
            // 契约特效
            const fx = this.add.circle(this.treeX, this.treeY, 30, 0x9B7ED9, 0.8);
            this.tweens.add({ targets: fx, scale: 5, alpha: 0, duration: 800, onComplete: () => fx.destroy() });
            this.showMsg(`🐯 与${bDef.name}缔结契约!`);
            // 灵兽小图标跟随灵木
            this.createBeastSprite();
        }

        createBeastSprite() {
            if(this.beastSprite) this.beastSprite.destroy();
            const beast = GameData.spiritBeast.contracted;
            if(!beast) return;
            this.beastSprite = this.add.text(this.treeX + 35, this.treeY - 25, beast.icon, { fontSize: '20px' }).setDepth(20).setOrigin(0.5);
            // 浮动动画
            this.tweens.add({ targets: this.beastSprite, y: this.treeY - 35, duration: 1200, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
        }

        useBeastSkill() {
            const beast = GameData.spiritBeast.contracted;
            if(!beast || beast.skillCooldown > 0) return;
            const bDef = SPIRIT_BEASTS.find(b => b.id === beast.id);
            if(!bDef) return;

            switch(beast.id) {
                case 'white_tiger': // 虎啸·杀 - 对最近Boss/最强怪造成3倍伤害
                    const target = this.monsters.reduce((best, m) => {
                        if(!m || !m.active) return best;
                        if(!best) return m;
                        return m.getData('hp') > best.getData('hp') ? m : best;
                    }, null);
                    if(target) {
                        const baseDmg = 20 * 3 * (1 + (beast.level - 1) * 0.3);
                        // 功法加成：驭兽心经
                        const beastArtBonus = this.getArtBonus('beastSkill');
                        // 突破星级技能加成（P2）
                        const starSkillBonus = this.getBeastStarBonus('skill');
                        // 突破星级攻击加成（P2）
                        const starAtkBonus = this.getBeastStarBonus('atk');
                        const dmg = baseDmg * (1 + beastArtBonus + starSkillBonus + starAtkBonus);
                        this.damageMonster(target, dmg);
                        // 虎啸特效
                        const fx = this.add.circle(target.x, target.y, 20, 0xC0C0C0, 0.8);
                        this.tweens.add({ targets: fx, scale: 4, alpha: 0, duration: 400, onComplete: () => fx.destroy() });
                    }
                    this.showMsg('🐯 虎啸·杀!');
                    break;
                case 'azure_dragon': // 龙息·生 - 回复30%灵气
                    const healAmt = Math.floor(GameData.tree.spiritCapacity * 0.3 * (1 + (beast.level - 1) * 0.1));
                    GameData.tree.spirit = Math.min(GameData.tree.spiritCapacity, GameData.tree.spirit + healAmt);
                    const healFx = this.add.circle(this.treeX, this.treeY, 20, 0x4A7C59, 0.6);
                    this.tweens.add({ targets: healFx, scale: 4, alpha: 0, duration: 600, onComplete: () => healFx.destroy() });
                    this.showMsg(`🐲 龙息·生! +${healAmt}灵气`);
                    break;
                case 'vermilion_bird': // 凤炎·焚 - 灼烧全场5秒
                    GameData.talismans.activeEffects.push({ type: 'burn', remaining: 5, power: 15 + beast.level * 5 });
                    this.showMsg('🦅 凤炎·焚! 全场灼烧5秒!');
                    break;
                case 'black_tortoise': // 龟盾·守 - 阵法5秒免疫
                    GameData.talismans.activeEffects.push({ type: 'shield', remaining: 5, power: 1 });
                    this.showMsg('🐢 龟盾·守! 阵法免疫5秒!');
                    break;
                case 'qilin': // 圣威·镇 - 眩晕全场3秒
                    this.monsters.slice().forEach(m => {
                        if(m && m.active) {
                            this.tweens.killTweensOf(m);
                            m.setData('stunned', true);
                            const stunIcon = this.add.text(m.x, m.y - 25, '💫', { fontSize: '12px' }).setOrigin(0.5).setDepth(50);
                            m.setData('stunIcon', stunIcon);
                            this.time.delayedCall(3000, () => {
                                if(m && m.active) {
                                    m.setData('stunned', false);
                                    if(stunIcon && stunIcon.active) stunIcon.destroy();
                                    // 恢复移动
                                    this.resumeMonster(m);
                                }
                            });
                        }
                    });
                    this.showMsg('🦁 圣威·镇! 全场眩晕3秒!');
                    break;
            }

            // 基础CD - 等级减免 - 突破星级减免（P2）
            const baseCD = bDef.skillCooldown - (beast.level - 1) * 5;
            const starCDR = this.getBeastTotalCDReduction();
            beast.skillCooldown = Math.max(1, baseCD - starCDR);
            this.updateUI();
        }

        resumeMonster(m) {
            if(!m || !m.active || this.isGameOver) return;
            const side = m.getData('side');
            const speed = m.getData('speed') || 5000;
            const w = this.cameras.main.width, h = this.cameras.main.height;
            let tx = this.treeX, ty = this.treeY;
            const dist = Phaser.Math.Distance.Between(m.x, m.y, tx, ty);
            if(dist < 10) { this.monsterAttack(m); return; }
            this.tweens.add({
                targets: m, x: tx, y: ty, duration: (dist / 400) * speed,
                onUpdate: () => {
                    if(m && m.active) {
                        m.setData('progress', 1 - Phaser.Math.Distance.Between(m.x, m.y, this.treeX, this.treeY) / 400);
                        const hpBar = m.getData('hpBar');
                        if(hpBar) hpBar.setPosition(m.x, m.y - 18);
                        const nameTag = m.getData('nameTag');
                        if(nameTag) nameTag.setPosition(m.x, m.y - 28);
                        const iceOverlay = m.getData('iceOverlay');
                        if(iceOverlay) iceOverlay.setPosition(m.x, m.y);
                        const stunIcon = m.getData('stunIcon');
                        if(stunIcon) stunIcon.setPosition(m.x, m.y - 25);
                    }
                },
                onComplete: () => this.monsterAttack(m)
            });
        }

        addBeastExp(amount) {
            const beast = GameData.spiritBeast.contracted;
            if(!beast) return;
            beast.exp += amount;
            // 处理连续升级
            while(beast.exp >= beast.level * 100) {
                beast.exp -= beast.level * 100;
                beast.level++;
                this.showMsg(`🐯 ${beast.name}升至 Lv.${beast.level}!`);
                if(this.beastSprite) {
                    this.tweens.add({ targets: this.beastSprite, scaleX: 1.5, scaleY: 1.5, duration: 200, yoyo: true });
                }
            }
        }

        // ===== 渡劫系统 =====
        checkTribulation() {
            if(GameData.tribulation.inProgress) return;
            if(this.isPaused || this.tribShown) return; // 已有弹窗时不重复触发
            // 暂避冷却中，不弹窗
            if(GameData.tribulation.declinedUntil > 0) {
                GameData.tribulation.declinedUntil--;
                return;
            }
            const level = GameData.tree.level;
            const nextTrib = TRIBULATION_CONFIG.find(t => t.level <= level && !GameData.tribulation.completed.find(c => c.level === t.level));
            if(!nextTrib) return;
            // 灵木达到渡劫等级，弹出渡劫提示
            // 只在波次进行中暂停游戏；准备阶段不暂停（不影响倒计时）
            if(this.isWaveActive) this.isPaused = true;
            this.tribShown = true; // 防止重复弹出
            const overlay = document.createElement('div');
            overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:700;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;`;
            const card = document.createElement('div');
            card.style.cssText = `background:rgba(20,10,5,0.97);border:2px solid #FF6347;border-radius:16px;padding:24px 32px;text-align:center;max-width:320px;animation:destinyIn 0.5s ease;box-shadow:0 0 30px #FF634740;`;
            card.innerHTML = `
                <div style="font-size:40px;margin-bottom:8px">${nextTrib.icon}</div>
                <div style="font-size:20px;color:#FF6347;font-weight:bold;margin-bottom:6px">${nextTrib.name}来临!</div>
                <div style="font-size:13px;color:#ccc;margin-bottom:8px">${nextTrib.desc}</div>
                <div style="font-size:12px;color:#aaa;margin-bottom:4px">持续 ${nextTrib.duration} 秒 | 每秒伤害 ${nextTrib.dmgPerTick}</div>
                <div style="font-size:12px;color:#5CBF7C;margin-bottom:4px">成功奖励：💎${nextTrib.reward.spiritStones} + ${nextTrib.reward.exp}经验</div>
                <div style="font-size:12px;color:#FF6347;margin-bottom:14px">失败惩罚：损失${Math.floor(nextTrib.failPenalty.spiritLoss*100)}%灵气</div>
                <div style="display:flex;gap:10px;justify-content:center">
                    <button id="trib-accept" style="background:#FF6347;color:#fff;border:none;padding:8px 24px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer">迎劫!</button>
                    <button id="trib-decline" style="background:#555;color:#fff;border:none;padding:8px 24px;border-radius:8px;font-size:14px;cursor:pointer">暂避</button>
                </div>
            `;
            overlay.appendChild(card);
            document.body.appendChild(overlay);

            card.querySelector('#trib-accept').addEventListener('click', () => {
                overlay.remove();
                this.tribShown = false;
                this.startTribulation(nextTrib);
            });
            card.querySelector('#trib-decline').addEventListener('click', () => {
                overlay.remove();
                this.tribShown = false;
                this.isPaused = false; // 无条件恢复，防止竞态条件导致永久冻结
                // 设置暂避冷却60秒（60个tick），避免无限弹窗
                GameData.tribulation.declinedUntil = 60;
                this.showMsg('暂时回避了天劫...60秒后再次提醒');
            });
            // 点击背景关闭时也要恢复isPaused
            overlay.addEventListener('click', (e) => {
                if(e.target === overlay) {
                    overlay.remove();
                    this.tribShown = false;
                    this.isPaused = false; // 无条件恢复，防止竞态条件导致永久冻结
                    GameData.tribulation.declinedUntil = 30; // 随意关闭也给较短冷却
                    this.showMsg('暂时回避了天劫...');
                }
            });
        }

        startTribulation(trib) {
            GameData.tribulation.inProgress = true;
            GameData.tribulation.currentTrib = trib;
            GameData.tribulation.timer = trib.duration;

            const w = this.cameras.main.width, h = this.cameras.main.height;
            // 渡劫全屏特效
            this.tribOverlay = this.add.rectangle(w/2, h/2, w, h, 0xFF0000, 0.05).setDepth(100);
            this.tribText = this.add.text(w/2, 60, `${trib.icon} ${trib.name} · ${trib.duration}秒`, {
                fontSize: '16px', color: '#FF6347', stroke: '#000', strokeThickness: 3
            }).setOrigin(0.5).setDepth(101);

            // 渡劫闪烁效果
            this.tribFlashLoop = this.time.addEvent({
                delay: 1000, repeat: trib.duration - 1,
                callback: () => {
                    if(this.isGameOver || !GameData.tribulation.inProgress) { this.endTribulation(false); return; }
                    // 每秒伤害（天劫心法：有30%概率减免当次伤害）
                    let tickDmg = trib.dmgPerTick;
                    const tribArtBonus = this.getArtBonus('tribulation');
                    if(tribArtBonus > 0 && Math.random() < tribArtBonus) {
                        tickDmg = 0; // 天劫心法：30%概率减免当次伤害
                        this.showMsg('⚡ 天劫心法护体!');
                    }
                    GameData.tree.spirit -= tickDmg;
                    GameData.tribulation.timer--;
                    if(this.tribText && this.tribText.active) {
                        this.tribText.setText(`${trib.icon} ${trib.name} · ${GameData.tribulation.timer}秒`);
                    }
                    // 闪红
                    if(this.tribOverlay && this.tribOverlay.active) {
                        this.tribOverlay.setAlpha(0.15);
                        this.tweens.add({ targets: this.tribOverlay, alpha: 0.05, duration: 500 });
                    }
                    // 灵木受击闪红
                    if(this.tree && this.tree.active) {
                        const origTribColor = this.tree.fillColor;
                        this.tree.setFillStyle(0xFF0000, 1);
                        this.time.delayedCall(150, () => { if(this.tree && this.tree.active) this.tree.setFillStyle(origTribColor, 1); });
                    }

                    this.updateUI();
                    if(GameData.tree.spirit <= 0) { this.endTribulation(false); return; }
                    if(GameData.tribulation.timer <= 0) { this.endTribulation(true); }
                }
            });
            this.isPaused = false;
            this.showMsg(`${trib.icon} ${trib.name}降临!`);
        }

        endTribulation(success) {
            GameData.tribulation.inProgress = false;
            const trib = GameData.tribulation.currentTrib;
            if(!trib) return; // 防止重复调用时trib为null

            // 清理特效
            if(this.tribOverlay && this.tribOverlay.active) this.tribOverlay.destroy();
            if(this.tribText && this.tribText.active) this.tribText.destroy();
            if(this.tribFlashLoop) this.tribFlashLoop.remove();

            // 无论成功失败，都加入completed防止无限重复弹出
            GameData.tribulation.completed.push({ level: trib.level, name: trib.name });

            if(success) {
                GameData.player.spiritStones += trib.reward.spiritStones;
                GameData.tree.exp += trib.reward.exp;
                this.checkTreeLevelUp();
                // 成功特效
                const w = this.cameras.main.width, h = this.cameras.main.height;
                const fx = this.add.circle(this.treeX, this.treeY, 30, 0xFFD700, 0.9);
                this.tweens.add({ targets: fx, scale: 6, alpha: 0, duration: 1000, onComplete: () => fx.destroy() });
                this.showMsg(`✨ ${trib.name}渡劫成功! +💎${trib.reward.spiritStones} +${trib.reward.exp}经验`);
                this.addBeastExp(30);
            } else {
                // 失败惩罚（天劫心法减半惩罚）
                const tribArtBonus = this.getArtBonus('tribulation');
                const lossMult = tribArtBonus > 0 ? 0.5 : 1;
                const lossAmt = Math.floor(GameData.tree.spiritCapacity * trib.failPenalty.spiritLoss * lossMult);
                GameData.tree.spirit = Math.max(1, GameData.tree.spirit - lossAmt);
                this.showMsg(`💀 ${trib.name}渡劫失败! -${lossAmt}灵气`);
            }

            GameData.tribulation.currentTrib = null;
            this.updateUI();
        }

        // 抽卡核心逻辑（返回抽到的灵兽列表）
        _doGacha(count) {
            const results = [];
            for(let i = 0; i < count; i++) {
                const rand = Math.random();
                let pool;
                if(rand < 0.02) {
                    // 2% 神兽
                    pool = SPIRIT_BEASTS.filter(b => b.rarity >= 4);
                    if(pool.length === 0) pool = SPIRIT_BEASTS.filter(b => b.rarity >= 3);
                } else if(rand < 0.20) {
                    // 18% 珍稀
                    pool = SPIRIT_BEASTS.filter(b => b.rarity === 3);
                    if(pool.length === 0) pool = SPIRIT_BEASTS.filter(b => b.rarity >= 2);
                } else {
                    // 80% 普通
                    pool = SPIRIT_BEASTS.filter(b => !b.rarity || b.rarity <= 2);
                }
                const beast = pool[Math.floor(Math.random() * pool.length)];
                results.push(beast);
                // 更新碎片
                if(!GameData.beastShards) GameData.beastShards = {};
                if(!GameData.beastShards[beast.id]) GameData.beastShards[beast.id] = 0;
                GameData.beastShards[beast.id]++;
                // 碎片足够时自动解锁（3碎片=1只灵兽）
                if(GameData.beastShards[beast.id] >= 3 && !GameData.lobby.beasts.includes(beast.id)) {
                    GameData.lobby.beasts.push(beast.id);
                    GameData.beastShards[beast.id] -= 3;
                }
            }
            return results;
        }

            const newUnlocks = results.filter(b => {

            let html = `<div style="font-size:18px;color:#FFD700;font-weight:bold;margin-bottom:16px">🎴 召唤结果</div>`;

            html += `<button id="gacha-result-ok" style="width:100%;background:#DAA520;color:#000;border:none;padding:10px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer">好的！</button>`;

                card.querySelector('#explore-go').style.cursor = 'not-allowed';

            overlay.addEventListener('click', (e) => { if(e.target === overlay) overlay.remove(); });
