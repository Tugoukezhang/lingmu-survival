        contractBeast(beastId) {
            const bDef = SPIRIT_BEASTS.find(b => b.id === beastId);
            if(!bDef) return;
            if(GameData.player.spiritStones < bDef.cost) { this.showMsg('зҒөзҹідёҚи¶і!'); return; }
            GameData.player.spiritStones -= bDef.cost;
            GameData.spiritBeast.contracted = { id: beastId, name: bDef.name, icon: bDef.icon, element: bDef.element, level: 1, exp: 0, skillCooldown: 0 };
            GameData.spiritBeast.unlocked = true;
            this.updateUI();
            // еҘ‘зәҰзү№ж•Ҳ
            const fx = this.add.circle(this.treeX, this.treeY, 30, 0x9B7ED9, 0.8);
            this.tweens.add({ targets: fx, scale: 5, alpha: 0, duration: 800, onComplete: () => fx.destroy() });
            this.showMsg(`рҹҗҜ дёҺ${bDef.name}зј”з»“еҘ‘зәҰ!`);
            // зҒөе…Ҫе°Ҹеӣҫж Үи·ҹйҡҸзҒөжңЁ
            this.createBeastSprite();
        }

        createBeastSprite() {
            if(this.beastSprite) this.beastSprite.destroy();
            const beast = GameData.spiritBeast.contracted;
            if(!beast) return;
            this.beastSprite = this.add.text(this.treeX + 35, this.treeY - 25, beast.icon, { fontSize: '20px' }).setDepth(20).setOrigin(0.5);
            // жө®еҠЁеҠЁз”»
            this.tweens.add({ targets: this.beastSprite, y: this.treeY - 35, duration: 1200, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
        }

        useBeastSkill() {
            const beast = GameData.spiritBeast.contracted;
            if(!beast || beast.skillCooldown > 0) return;
            const bDef = SPIRIT_BEASTS.find(b => b.id === beast.id);
            if(!bDef) return;

            switch(beast.id) {
                case 'white_tiger': // иҷҺе•ёВ·жқҖ - еҜ№жңҖиҝ‘Boss/жңҖејәжҖӘйҖ жҲҗ3еҖҚдјӨе®і
                    const target = this.monsters.reduce((best, m) => {
                        if(!m || !m.active) return best;
                        if(!best) return m;
                        return m.getData('hp') > best.getData('hp') ? m : best;
                    }, null);
                    if(target) {
                        const baseDmg = 20 * 3 * (1 + (beast.level - 1) * 0.3);
                        // еҠҹжі•еҠ жҲҗпјҡй©ӯе…Ҫеҝғз»Ҹ
                        const beastArtBonus = this.getArtBonus('beastSkill');
                        const dmg = baseDmg * (1 + beastArtBonus);
                        this.damageMonster(target, dmg);
                        // иҷҺе•ёзү№ж•Ҳ
                        const fx = this.add.circle(target.x, target.y, 20, 0xC0C0C0, 0.8);
                        this.tweens.add({ targets: fx, scale: 4, alpha: 0, duration: 400, onComplete: () => fx.destroy() });
                    }
                    this.showMsg('рҹҗҜ иҷҺе•ёВ·жқҖ!');
                    break;
                case 'azure_dragon': // йҫҷжҒҜВ·з”ҹ - еӣһеӨҚ30%зҒөж°”
                    const healAmt = Math.floor(GameData.tree.spiritCapacity * 0.3 * (1 + (beast.level - 1) * 0.1));
                    GameData.tree.spirit = Math.min(GameData.tree.spiritCapacity, GameData.tree.spirit + healAmt);
                    const healFx = this.add.circle(this.treeX, this.treeY, 20, 0x4A7C59, 0.6);
                    this.tweens.add({ targets: healFx, scale: 4, alpha: 0, duration: 600, onComplete: () => healFx.destroy() });
                    this.showMsg(`рҹҗІ йҫҷжҒҜВ·з”ҹ! +${healAmt}зҒөж°”`);
                    break;
                case 'vermilion_bird': // еҮӨзӮҺВ·з„ҡ - зҒјзғ§е…Ёеңә5з§’
                    GameData.talismans.activeEffects.push({ type: 'burn', remaining: 5, power: 15 + beast.level * 5 });
                    this.showMsg('рҹҰ… еҮӨзӮҺВ·з„ҡ! е…ЁеңәзҒјзғ§5з§’!');
                    break;
                case 'black_tortoise': // йҫҹзӣҫВ·е®Ҳ - йҳөжі•5з§’е…Қз–«
                    GameData.talismans.activeEffects.push({ type: 'shield', remaining: 5, power: 1 });
                    this.showMsg('рҹҗў йҫҹзӣҫВ·е®Ҳ! йҳөжі•е…Қз–«5з§’!');
                    break;
                case 'qilin': // еңЈеЁҒВ·й•Ү - зң©жҷ•е…Ёеңә3з§’
                    this.monsters.slice().forEach(m => {
                        if(m && m.active) {
                            this.tweens.killTweensOf(m);
                            m.setData('stunned', true);
                            const stunIcon = this.add.text(m.x, m.y - 25, 'рҹ’«', { fontSize: '12px' }).setOrigin(0.5).setDepth(50);
                            m.setData('stunIcon', stunIcon);
                            this.time.delayedCall(3000, () => {
                                if(m && m.active) {
                                    m.setData('stunned', false);
                                    if(stunIcon && stunIcon.active) stunIcon.destroy();
                                    // жҒўеӨҚз§»еҠЁ
                                    this.resumeMonster(m);
                                }
                            });
                        }
                    });
                    this.showMsg('рҹҰҒ еңЈеЁҒВ·й•Ү! е…Ёеңәзң©жҷ•3з§’!');
                    break;
            }

            beast.skillCooldown = Math.max(1, bDef.skillCooldown - (beast.level - 1) * 5);
            this.updateUI();
        }

        resumeMonster(m) {
            if(!m || !m.active || this.isGameOver) return;
            const side = m.getData('side');
            const speed = m.getData('speed') || 5000;
            const w = this.cameras.main.width, h = this.cameras.main.height;
            let tx = this.treeX, ty = this.treeY;
            const dist = Phaser.Math.Distance.Between(m.x, m.y, tx, ty);
            if(dist < 10) { this.monsterAttack(m); return; }
            this.tweens.add({
                targets: m, x: tx, y: ty, duration: (dist / 400) * speed,
                onUpdate: () => {
                    if(m && m.active) {
                        m.setData('progress', 1 - Phaser.Math.Distance.Between(m.x, m.y, this.treeX, this.treeY) / 400);
                        const hpBar = m.getData('hpBar');
                        if(hpBar) hpBar.setPosition(m.x, m.y - 18);
                        const nameTag = m.getData('nameTag');
                        if(nameTag) nameTag.setPosition(m.x, m.y - 28);
                        const iceOverlay = m.getData('iceOverlay');
                        if(iceOverlay) iceOverlay.setPosition(m.x, m.y);
                        const stunIcon = m.getData('stunIcon');
                        if(stunIcon) stunIcon.setPosition(m.x, m.y - 25);
                    }
                },
                onComplete: () => this.monsterAttack(m)
            });
        }

        addBeastExp(amount) {
            const beast = GameData.spiritBeast.contracted;
            if(!beast) return;
            beast.exp += amount;
            // еӨ„зҗҶиҝһз»ӯеҚҮзә§
            while(beast.exp >= beast.level * 100) {
                beast.exp -= beast.level * 100;
                beast.level++;
                this.showMsg(`рҹҗҜ ${beast.name}еҚҮиҮі Lv.${beast.level}!`);
                if(this.beastSprite) {
                    this.tweens.add({ targets: this.beastSprite, scaleX: 1.5, scaleY: 1.5, duration: 200, yoyo: true });
                }
            }
        }

        // ===== жёЎеҠ«зі»з»ҹ =====
        checkTribulation() {
            if(GameData.tribulation.inProgress) return;
            if(this.isPaused || this.tribShown) return; // е·Іжңүеј№зӘ—ж—¶дёҚйҮҚеӨҚи§ҰеҸ‘
            // жҡӮйҒҝеҶ·еҚҙдёӯпјҢдёҚеј№зӘ—
            if(GameData.tribulation.declinedUntil > 0) {
                GameData.tribulation.declinedUntil--;
                return;
            }
            const level = GameData.tree.level;
            const nextTrib = TRIBULATION_CONFIG.find(t => t.level <= level && !GameData.tribulation.completed.find(c => c.level === t.level));
            if(!nextTrib) return;
            // зҒөжңЁиҫҫеҲ°жёЎеҠ«зӯүзә§пјҢеј№еҮәжёЎеҠ«жҸҗзӨә
            // еҸӘеңЁжіўж¬ЎиҝӣиЎҢдёӯжҡӮеҒңжёёжҲҸпјӣеҮҶеӨҮйҳ¶ж®өдёҚжҡӮеҒңпјҲдёҚеҪұе“ҚеҖ’и®Ўж—¶пјү
            if(this.isWaveActive) this.isPaused = true;
            this.tribShown = true; // йҳІжӯўйҮҚеӨҚеј№еҮә
            const overlay = document.createElement('div');
            overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:700;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;`;
            const card = document.createElement('div');
            card.style.cssText = `background:rgba(20,10,5,0.97);border:2px solid #FF6347;border-radius:16px;padding:24px 32px;text-align:center;max-width:320px;animation:destinyIn 0.5s ease;box-shadow:0 0 30px #FF634740;`;
            card.innerHTML = `
                <div style="font-size:40px;margin-bottom:8px">${nextTrib.icon}</div>
                <div style="font-size:20px;color:#FF6347;font-weight:bold;margin-bottom:6px">${nextTrib.name}жқҘдёҙ!</div>
                <div style="font-size:13px;color:#ccc;margin-bottom:8px">${nextTrib.desc}</div>
                <div style="font-size:12px;color:#aaa;margin-bottom:4px">жҢҒз»ӯ ${nextTrib.duration} з§’ | жҜҸз§’дјӨе®і ${nextTrib.dmgPerTick}</div>
                <div style="font-size:12px;color:#5CBF7C;margin-bottom:4px">жҲҗеҠҹеҘ–еҠұпјҡрҹ’Һ${nextTrib.reward.spiritStones} + ${nextTrib.reward.exp}з»ҸйӘҢ</div>
                <div style="font-size:12px;color:#FF6347;margin-bottom:14px">еӨұиҙҘжғ©зҪҡпјҡжҚҹеӨұ${Math.floor(nextTrib.failPenalty.spiritLoss*100)}%зҒөж°”</div>
                <div style="display:flex;gap:10px;justify-content:center">
                    <button id="trib-accept" style="background:#FF6347;color:#fff;border:none;padding:8px 24px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer">иҝҺеҠ«!</button>
                    <button id="trib-decline" style="background:#555;color:#fff;border:none;padding:8px 24px;border-radius:8px;font-size:14px;cursor:pointer">жҡӮйҒҝ</button>
                </div>
            `;
            overlay.appendChild(card);
            document.body.appendChild(overlay);

            card.querySelector('#trib-accept').addEventListener('click', () => {
                overlay.remove();
                this.tribShown = false;
                this.startTribulation(nextTrib);
            });
            card.querySelector('#trib-decline').addEventListener('click', () => {
                overlay.remove();
                this.tribShown = false;
                this.isPaused = false; // ж— жқЎд»¶жҒўеӨҚпјҢйҳІжӯўз«һжҖҒжқЎд»¶еҜјиҮҙж°ёд№…еҶ»з»“
                // и®ҫзҪ®жҡӮйҒҝеҶ·еҚҙ60з§’пјҲ60дёӘtickпјүпјҢйҒҝе…Қж— йҷҗеј№зӘ—
                GameData.tribulation.declinedUntil = 60;
                this.showMsg('жҡӮж—¶еӣһйҒҝдәҶеӨ©еҠ«...60з§’еҗҺеҶҚж¬ЎжҸҗйҶ’');
            });
            // зӮ№еҮ»иғҢжҷҜе…ій—ӯж—¶д№ҹиҰҒжҒўеӨҚisPaused
            overlay.addEventListener('click', (e) => {
                if(e.target === overlay) {
                    overlay.remove();
                    this.tribShown = false;
                    this.isPaused = false; // ж— жқЎд»¶жҒўеӨҚпјҢйҳІжӯўз«һжҖҒжқЎд»¶еҜјиҮҙж°ёд№…еҶ»з»“
                    GameData.tribulation.declinedUntil = 30; // йҡҸж„Ҹе…ій—ӯд№ҹз»ҷиҫғзҹӯеҶ·еҚҙ
                    this.showMsg('жҡӮж—¶еӣһйҒҝдәҶеӨ©еҠ«...');
                }
            });
        }

        startTribulation(trib) {
            GameData.tribulation.inProgress = true;
            GameData.tribulation.currentTrib = trib;
            GameData.tribulation.timer = trib.duration;

            const w = this.cameras.main.width, h = this.cameras.main.height;
            // жёЎеҠ«е…ЁеұҸзү№ж•Ҳ
            this.tribOverlay = this.add.rectangle(w/2, h/2, w, h, 0xFF0000, 0.05).setDepth(100);
            this.tribText = this.add.text(w/2, 60, `${trib.icon} ${trib.name} В· ${trib.duration}з§’`, {
                fontSize: '16px', color: '#FF6347', stroke: '#000', strokeThickness: 3
            }).setOrigin(0.5).setDepth(101);

            // жёЎеҠ«й—ӘзғҒж•Ҳжһң
            this.tribFlashLoop = this.time.addEvent({
                delay: 1000, repeat: trib.duration - 1,
                callback: () => {
                    if(this.isGameOver || !GameData.tribulation.inProgress) { this.endTribulation(false); return; }
                    // жҜҸз§’дјӨе®іпјҲеӨ©еҠ«еҝғжі•пјҡжңү30%жҰӮзҺҮеҮҸе…ҚеҪ“ж¬ЎдјӨе®іпјү
                    let tickDmg = trib.dmgPerTick;
                    const tribArtBonus = this.getArtBonus('tribulation');
                    if(tribArtBonus > 0 && Math.random() < tribArtBonus) {
                        tickDmg = 0; // еӨ©еҠ«еҝғжі•пјҡ30%жҰӮзҺҮеҮҸе…ҚеҪ“ж¬ЎдјӨе®і
                        this.showMsg('вҡЎ еӨ©еҠ«еҝғжі•жҠӨдҪ“!');
                    }
                    GameData.tree.spirit -= tickDmg;
                    GameData.tribulation.timer--;
                    if(this.tribText && this.tribText.active) {
                        this.tribText.setText(`${trib.icon} ${trib.name} В· ${GameData.tribulation.timer}з§’`);
                    }
                    // й—Әзәў
                    if(this.tribOverlay && this.tribOverlay.active) {
                        this.tribOverlay.setAlpha(0.15);
                        this.tweens.add({ targets: this.tribOverlay, alpha: 0.05, duration: 500 });
                    }
                    // зҒөжңЁеҸ—еҮ»й—Әзәў
                    if(this.tree && this.tree.active) {
                        const origTribColor = this.tree.fillColor;
                        this.tree.setFillStyle(0xFF0000, 1);
                        this.time.delayedCall(150, () => { if(this.tree && this.tree.active) this.tree.setFillStyle(origTribColor, 1); });
                    }

                    this.updateUI();
                    if(GameData.tree.spirit <= 0) { this.endTribulation(false); return; }
                    if(GameData.tribulation.timer <= 0) { this.endTribulation(true); }
                }
            });
            this.isPaused = false;
            this.showMsg(`${trib.icon} ${trib.name}йҷҚдёҙ!`);
        }

        endTribulation(success) {
            GameData.tribulation.inProgress = false;
            const trib = GameData.tribulation.currentTrib;
            if(!trib) return; // йҳІжӯўйҮҚеӨҚи°ғз”Ёж—¶tribдёәnull

            // жё…зҗҶзү№ж•Ҳ
            if(this.tribOverlay && this.tribOverlay.active) this.tribOverlay.destroy();
            if(this.tribText && this.tribText.active) this.tribText.destroy();
            if(this.tribFlashLoop) this.tribFlashLoop.remove();

            // ж— и®әжҲҗеҠҹеӨұиҙҘпјҢйғҪеҠ е…ҘcompletedйҳІжӯўж— йҷҗйҮҚеӨҚеј№еҮә
            GameData.tribulation.completed.push({ level: trib.level, name: trib.name });

            if(success) {
                GameData.player.spiritStones += trib.reward.spiritStones;
                GameData.tree.exp += trib.reward.exp;
                this.checkTreeLevelUp();
                // жҲҗеҠҹзү№ж•Ҳ
                const w = this.cameras.main.width, h = this.cameras.main.height;
                const fx = this.add.circle(this.treeX, this.treeY, 30, 0xFFD700, 0.9);
                this.tweens.add({ targets: fx, scale: 6, alpha: 0, duration: 1000, onComplete: () => fx.destroy() });
                this.showMsg(`вңЁ ${trib.name}жёЎеҠ«жҲҗеҠҹ! +рҹ’Һ${trib.reward.spiritStones} +${trib.reward.exp}з»ҸйӘҢ`);
                this.addBeastExp(30);
            } else {
                // еӨұиҙҘжғ©зҪҡпјҲеӨ©еҠ«еҝғжі•еҮҸеҚҠжғ©зҪҡпјү
                const tribArtBonus = this.getArtBonus('tribulation');
                const lossMult = tribArtBonus > 0 ? 0.5 : 1;
                const lossAmt = Math.floor(GameData.tree.spiritCapacity * trib.failPenalty.spiritLoss * lossMult);
                GameData.tree.spirit = Math.max(1, GameData.tree.spirit - lossAmt);
                this.showMsg(`рҹ’Җ ${trib.name}жёЎеҠ«еӨұиҙҘ! -${lossAmt}зҒөж°”`);
            }

            GameData.tribulation.currentTrib = null;
            this.updateUI();
        }

        doExplore() {
            if(GameData.player.spiritStones < 30) { this.showMsg('зҒөзҹідёҚи¶і!'); return; }
            GameData.player.spiritStones -= 30;
            GameData.explore.timesExplored++;
            GameData.explore.cooldown = 20; // 20з§’еҶ·еҚҙ

            // жҢүжқғйҮҚйҡҸжңәйҖүжӢ©дәӢд»¶
            const totalWeight = EXPLORE_EVENTS.reduce((s, e) => s + e.weight, 0);
            let roll = Math.random() * totalWeight;
            let evt = EXPLORE_EVENTS[0];
            for(const e of EXPLORE_EVENTS) {
                roll -= e.weight;
                if(roll <= 0) { evt = e; break; }
            }

            // еә”з”ЁеҘ–еҠұ
            let rewardTexts = [];
            evt.rewards.forEach(r => {
                const val = Math.floor(Math.random() * (r.max - r.min + 1)) + r.min;
                if(val <= 0 && r.type !== 'spiritStones') return;
                switch(r.type) {
                    case 'spiritStones':
                        GameData.player.spiritStones += val;
                        rewardTexts.push(val >= 0 ? `рҹ’Һ+${val}зҒөзҹі` : `рҹ’Һ${val}зҒөзҹі`);
                        break;
                    case 'exp':
                        GameData.tree.exp += val;
                        this.checkTreeLevelUp();
                        rewardTexts.push(`вӯҗ+${val}з»ҸйӘҢ`);
                        break;
                    case 'formationExp':
                        // йҡҸжңәеҚҮзә§дёҖдёӘйҳөжі•
                        if(this.formations.length > 0) {
                            const slot = this.formations[Math.floor(Math.random() * this.formations.length)];
                            if(slot.formation && slot.formation.level < 5) {
                                slot.formation.level += val;
                                if(slot.formation.level > 5) slot.formation.level = 5;
                                slot.formation.levelBadge.setText('Lv.' + slot.formation.level);
                                const expBaseDur = this.getFormationBaseDurability();
                                slot.formation.maxDurability = expBaseDur + (slot.formation.level - 1) * 20;
                                slot.formation.durability = slot.formation.maxDurability;
                                this.updateDurabilityBar(slot);
                                this.updateUI();
                                rewardTexts.push(`рҹ“ң${ELEMENTS[slot.formation.type].name}йҳөжі•+${val}зә§!`);
                            }
                        }
                        break;
                }
            });

            if(rewardTexts.length === 0) rewardTexts.push('пјҲдёҖж— жүҖиҺ·пјү');

            // жҳҫзӨәжҺўзҙўз»“жһң
            const overlay = document.createElement('div');
            overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;`;
            const evtColor = evt.rewards.some(r => r.min < 0) ? '#FF6347' : '#5CBF7C';
            const evtBg = evt.rewards.some(r => r.min < 0) ? 'rgba(60,20,20,0.95)' : 'rgba(20,40,30,0.95)';
            const card = document.createElement('div');
            card.style.cssText = `background:${evtBg};border:2px solid ${evtColor};border-radius:14px;padding:20px 28px;text-align:center;max-width:280px;animation:destinyIn 0.4s ease;box-shadow:0 0 20px ${evtColor}40;`;
            card.innerHTML = `
                <div style="font-size:32px;margin-bottom:6px">${evt.icon}</div>
                <div style="font-size:16px;color:${evtColor};font-weight:bold;margin-bottom:6px">${evt.name}</div>
                <div style="font-size:13px;color:#ccc;margin-bottom:10px">${evt.desc}</div>
                <div style="font-size:14px;color:#FFD700;font-weight:bold;margin-bottom:12px">${rewardTexts.join(' ')}</div>
                <button style="background:${evtColor};color:#000;border:none;padding:6px 20px;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer">ж”¶дёӢ</button>
            `;
            overlay.appendChild(card);
            document.body.appendChild(overlay);
            card.querySelector('button').addEventListener('click', () => overlay.remove());

            this.updateUI();
            this.addBeastExp(5);
        }

            // еҸӮжӮҹжҢүй’®дәӢд»¶
            card.querySelectorAll('.art-btn').forEach(btn => {
                btn.addEventListener('click', () => {

        learnArt(artId) {
            const art = CULTIVATION_ARTS.find(a => a.id === artId);
            if(!art) return;
            if(GameData.arts.learned.includes(artId)) { this.showMsg('е·ІеҸӮжӮҹжӯӨеҠҹжі•!'); return; }
            if(GameData.tree.level < art.levelReq) { this.showMsg(`йңҖзҒөжңЁLv.${art.levelReq}!`); return; }
            if(GameData.player.spiritStones < art.cost) { this.showMsg('зҒөзҹідёҚи¶і!'); return; }

            GameData.player.spiritStones -= art.cost;
            GameData.arts.learned.push(artId);
            this.updateUI();

            // еҸӮжӮҹзү№ж•Ҳ
            const fx = this.add.circle(this.treeX, this.treeY, 20, parseInt(art.color.replace('#', ''), 16), 0.7);
            this.tweens.add({ targets: fx, scale: 4, alpha: 0, duration: 800, onComplete: () => fx.destroy() });

            // еә”з”ЁеҠҹжі•ж•ҲжһңпјҲз«ӢеҚіз”ҹж•Ҳпјү
            this.applyArtEffect(art);
            this.showMsg(`рҹ“– еҸӮжӮҹ${art.name}! ${art.desc}`);
        }

        applyArtEffect(art) {
            switch(art.effect.type) {
                case 'spiritCapacity':
                    GameData.tree.spiritCapacity = Math.floor(GameData.tree.spiritCapacity * (1 + art.effect.value));
                    GameData.tree.spirit = Math.min(GameData.tree.spirit, GameData.tree.spiritCapacity);
                    break;
                // е…¶д»–ж•ҲжһңеңЁеҜ№еә”йҖ»иҫ‘дёӯе®һж—¶жЈҖжҹҘ GameData.arts.learned
            }
        }

        // иҺ·еҸ–еҠҹжі•еҠ жҲҗеҖј
        getArtBonus(type) {
            let bonus = 0;
            GameData.arts.learned.forEach(artId => {
                const art = CULTIVATION_ARTS.find(a => a.id === artId);
                if(art && art.effect.type === type) bonus += art.effect.value;
            });
            return bonus;
        }
        triggerDestinyEvent() {
            if(this.isGameOver) return;

            // еӨ©е‘Ҫеј№зӘ—жңҹй—ҙжҡӮеҒңжёёжҲҸйҖ»иҫ‘
            this.isPaused = true;

            // жҡӮеҒңжүҖжңүжҖӘзү©з§»еҠЁtween
            this.monsters.forEach(m => {
                if(m && m.active) {
                    this.tweens.getAllTweens().forEach(tw => {
                        if(tw.targets && tw.targets.includes(m) && tw.isPlaying()) {
                            tw.pause();
                        }
                    });
                }
            });

            const evt = rollDestinyEvent();
            GameData.destiny.eventsTriggered++;

            // жҳҫзӨәеӨ©е‘ҪдәӢд»¶еј№зӘ—
            const evtColor = evt.type === 'positive' ? '#5CBF7C' : (evt.type === 'negative' ? '#FF4444' : '#FFD700');
            const evtBgColor = evt.type === 'positive' ? 'rgba(20,60,30,0.95)' : (evt.type === 'negative' ? 'rgba(60,20,20,0.95)' : 'rgba(40,40,20,0.95)');

            const overlay = document.createElement('div');
            overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;`;
            const card = document.createElement('div');
            card.style.cssText = `background:${evtBgColor};border:2px solid ${evtColor};border-radius:16px;padding:24px 32px;text-align:center;max-width:320px;animation:destinyIn 0.5s ease;box-shadow:0 0 30px ${evtColor}40;`;
            card.innerHTML = `
                <div style="font-size:36px;margin-bottom:8px">${evt.icon}</div>
                <div style="font-size:20px;color:${evtColor};font-weight:bold;margin-bottom:8px">еӨ©е‘ҪВ·${evt.name}</div>
                <div style="font-size:14px;color:#ccc;margin-bottom:16px">${evt.desc}</div>
                <button style="background:${evtColor};color:#000;border:none;padding:8px 24px;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer">зЎ®и®Ө</button>
            `;
            overlay.appendChild(card);
            document.body.appendChild(overlay);

            // еҠЁз”»ж ·ејҸ
            if(!document.getElementById('destiny-style')) {
                const style = document.createElement('style');
                style.id = 'destiny-style';
                style.textContent = '@keyframes destinyIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}';
                document.head.appendChild(style);
            }

            card.querySelector('button').addEventListener('click', () => {
                overlay.remove();
                this.isPaused = false;
                // жҒўеӨҚжүҖжңүжҖӘзү©з§»еҠЁtweenпјҲеҸӘжҒўеӨҚд»Қз„¶еӯҳжҙ»зҡ„жҖӘзү©зҡ„tweenпјү
                this.monsters.forEach(m => {
                    if(m && m.active) {
                        this.tweens.getAllTweens().forEach(tw => {
                            if(tw.targets && tw.targets.includes(m) && tw.isPaused()) {
                                tw.resume();
                            }
                        });
                    }
                });
                this.applyDestinyEvent(evt);
            });
        }

        applyDestinyEvent(evt) {
            switch(evt.id) {
                case 'spirit_blessing':
                    const spiritGain = Math.floor(GameData.tree.spiritCapacity * 0.3);
                    GameData.tree.spirit = Math.min(GameData.tree.spiritCapacity, GameData.tree.spirit + spiritGain);
                    this.showMsg(`вңЁ зҒөж°”жҒ©иөҗ! +${spiritGain}зҒөж°”`);
                    // зҒөж°”еӣһеӨҚзү№ж•Ҳ
                    const spiritFx = this.add.circle(this.treeX, this.treeY, 20, 0x5CBF7C, 0.6);
                    this.tweens.add({ targets: spiritFx, scale: 3, alpha: 0, duration: 800, onComplete: () => spiritFx.destroy() });
                    break;

                case 'stone_rain':
                    GameData.player.spiritStones += 50;
                    this.showMsg('рҹ’Һ зҒөзҹійӣЁ! +50зҒөзҹі');
                    // зҒөзҹійӣЁзү№ж•Ҳ
                    for(let i = 0; i < 8; i++) {
                        const sx = this.treeX + Phaser.Math.Between(-80, 80);
                        const sy = this.treeY - 100;
                        const stone = this.add.circle(sx, sy, 4, 0xFFD700, 0.9);
                        this.tweens.add({ targets: stone, y: sy + 80, alpha: 0, duration: 600 + i * 100, onComplete: () => stone.destroy() });
                    }
                    break;

                case 'formation_enhance':
                    this.formations.forEach(slot => {
                        if(slot.formation && slot.formation.durability > 0) {
                            slot.formation.durability = slot.formation.maxDurability;
                            this.updateDurabilityBar(slot);
                            // йҳөжі•жҒўеӨҚзү№ж•Ҳ
                            const fxF = this.add.circle(slot.x, slot.y, 15, 0xFFD700, 0.5);
                            this.tweens.add({ targets: fxF, scale: 2, alpha: 0, duration: 500, onComplete: () => fxF.destroy() });
                        }
                    });
                    this.showMsg('вӯ• йҳөжі•еҠ жҢҒ! жүҖжңүйҳөжі•жҒўеӨҚж»ЎиҖҗд№…');
                    break;

                case 'exp_surge':
                    const expGain = 30 + GameData.battle.currentWave * 2;
                    GameData.tree.exp += expGain;
                    this.checkTreeLevelUp();
                    this.showMsg(`рҹ“– жӮҹйҒ“йЎҝжӮҹ! +${expGain}з»ҸйӘҢ`);
                    break;

                case 'talisman_gift':
                    const types = Object.keys(TALISMAN_TYPES);
                    const giftType = types[Math.floor(Math.random() * types.length)];
                    const owned = GameData.talismans.owned.find(t => t.type === giftType);
                    if(owned) { owned.count++; } else { GameData.talismans.owned.push({ type: giftType, count: 1, cooldown: 0, maxCooldown: TALISMAN_TYPES[giftType].cooldown }); }
                    this.showMsg(`рҹ“ң д»ҷз¬ҰйҷҚдё–! иҺ·еҫ—${TALISMAN_TYPES[giftType].name}`);
                    this.updateTalismanUI();
                    break;

                case 'monster_weaken':
                    // и®ҫзҪ®жң¬жіўжҖӘзү©еҮҸеҚҠж Үи®°пјҢеҪұе“ҚеҪ“еүҚеҸҠеҗҺз»ӯж–°з”ҹжҖӘзү©
                    GameData.battle.weakenActive = true;
                    this.monsters.slice().forEach(m => {
                        if(m && m.active) {
                            const hp = m.getData('hp');
                            const newHp = Math.floor(hp * 0.5);
                            m.setData('hp', newHp);
                            // жӣҙж–°иЎҖжқЎ
                            const maxHp = m.getData('maxHp');
                            const hpBar = m.getData('hpBar');
                            const hpBarWidth = m.getData('hpBarWidth');
                            const isBoss = m.getData('isBoss');
                            const hpBarHeight = isBoss ? 7 : 5;
                            if(hpBar && hpBar.active) hpBar.setDisplaySize(Math.max(1, hpBarWidth * (newHp / maxHp)), hpBarHeight);
                        }
                    });
                    this.showMsg('рҹ’« еҰ–ж°”иЎ°йҖҖ! жң¬жіўеҰ–е…ҪHPеҮҸеҚҠ');
                    break;

                case 'spirit_drain':
                    const spiritLoss = Math.floor(GameData.tree.spirit * 0.2);
                    GameData.tree.spirit = Math.max(1, GameData.tree.spirit - spiritLoss);
                    this.showMsg(`рҹҢ‘ зҒөж°”жһҜз«ӯ! -${spiritLoss}зҒөж°”`);
                    // жҡ—иүІзү№ж•Ҳ
                    const drainFx = this.add.circle(this.treeX, this.treeY, 40, 0x333366, 0.5);
                    this.tweens.add({ targets: drainFx, scale: 2, alpha: 0, duration: 600, onComplete: () => drainFx.destroy() });
                    break;

                case 'monster_surge':
                    const sw = this.cameras.main.width, sh = this.cameras.main.height;
                    for(let i = 0; i < 3; i++) {
                        this.time.delayedCall(i * 500, () => {
                            if(!this.isGameOver) this.spawnMonster(sw, sh, false);
                        });
                    }
                    this.showMsg('рҹ‘№ еҰ–ж°”ејҘжј«! йўқеӨ–3еҸӘеҰ–е…ҪжқҘиўӯ!');
                    break;

                case 'formation_decay':
                    this.formations.slice().forEach(slot => {
                        if(slot.formation && slot.formation.durability > 0) {
                            slot.formation.durability = Math.max(0, slot.formation.durability - slot.formation.maxDurability * 0.3);
                            this.updateDurabilityBar(slot);
                            if(slot.formation.durability <= 0) this.destroyFormation(slot);
                        }
                    });
                    this.showMsg('вҡ пёҸ йҳөжі•и…җиҡҖ! жүҖжңүйҳөжі•жҚҹеӨұ30%иҖҗд№…');
                    break;

                case 'cooldown_reset':
                    GameData.talismans.owned.forEach(t => { t.cooldown = 0; });
                    // еҗҢж—¶йҮҚзҪ®зҒөе…ҪжҠҖиғҪеҶ·еҚҙ
                    if(GameData.spiritBeast.contracted) GameData.spiritBeast.contracted.skillCooldown = 0;
                    this.updateTalismanUI();
                    this.showMsg('рҹҢҖ еӨ©йҒ“иҜ•зӮј! з¬Ұз®“дёҺзҒөе…ҪеҶ·еҚҙе·ІйҮҚзҪ®');
                    break;
            }
            this.updateUI();
        }

        damageMonster(monster, damage, isEffective) {
            if(!monster || !monster.active) return;

            // еҰ–е…Ҫзү№ж®ҠжҠҖиғҪпјҡзҹіз”І(armor)еҮҸе°‘30%дјӨе®і
            if(monster.getData('special') === 'armor') {
                damage = Math.floor(damage * 0.7);
            }

            // иҝҪиёӘжҖ»дјӨе®і
            GameData.battle.totalDamageDealt += damage;

            let hp = monster.getData('hp') - damage;
            monster.setData('hp', hp);

            const maxHp = monster.getData('maxHp');
            const hpBar = monster.getData('hpBar');
            const hpBarWidth = monster.getData('hpBarWidth');
            if(hpBar && hpBar.active) {
                const pct = Math.max(0, hp / maxHp);
                const isBossMonster = monster.getData('isBoss');
                const hpBarHeight = isBossMonster ? 7 : 5;
                hpBar.setDisplaySize(hpBarWidth * pct, hpBarHeight);
                if(pct < 0.3) hpBar.setFillStyle(0xFF0000);
                else if(pct < 0.6) hpBar.setFillStyle(0xFFAA00);
                else hpBar.setFillStyle(0x44FF44);
            }

            const icon = monster.getData('icon');
            const hpBg = monster.getData('hpBg');
            const nameTag = monster.getData('nameTag');
            const outerGlow = monster.getData('outerGlow');
            const innerRing = monster.getData('innerRing');

            // еҸ—дјӨй—ӘзҷҪж•Ҳжһң
            monster.setFillStyle(0xFFFFFF, 1);
            this.time.delayedCall(80, () => {
                if(monster && monster.active) {
                    const elColor = parseInt(ELEMENTS[monster.getData('element')].color.replace('#', ''), 16);
                    monster.setFillStyle(elColor, 1);
                }
            });

            // еҸ—еҮ»йңҮеҠЁ
            const origX = monster.x, origY = monster.y;
            this.tweens.add({
                targets: monster, x: origX + Phaser.Math.Between(-4, 4), y: origY + Phaser.Math.Between(-3, 3),
                duration: 50, yoyo: true, repeat: 2,
                onComplete: () => { if(monster && monster.active) monster.setPosition(origX, origY); }
            });

            // дјӨе®іж•°еӯ—йЈҳеӯ—пјҲеўһејәзүҲпјү
            const dmgText = this.add.text(monster.x + Phaser.Math.Between(-10, 10), monster.y - 20, `-${damage}`, {
                fontSize: isEffective ? '18px' : '13px',
                color: isEffective ? '#FFD700' : '#FF6347',
                fontStyle: 'bold',
                stroke: '#000', strokeThickness: isEffective ? 3 : 2
            }).setOrigin(0.5).setDepth(800);
            this.tweens.add({
                targets: dmgText, y: monster.y - 65, alpha: 0, scaleX: isEffective ? 1.3 : 1, scaleY: isEffective ? 1.3 : 1,
                duration: isEffective ? 1000 : 800,
                onComplete: () => dmgText.destroy()
            });

            // дә”иЎҢе…ӢеҲ¶ж—¶йўқеӨ–й—Әе…ү
            if(isEffective) {
                const burstFx = this.add.circle(monster.x, monster.y, 15, 0xFFD700, 0.7);
                this.tweens.add({ targets: burstFx, scale: 3, alpha: 0, duration: 400, onComplete: () => burstFx.destroy() });
            }

            if(isEffective) this.showMsg('вңҰ е…ӢеҲ¶!');

            if(hp <= 0) {
                // е…ҲеҒңжӯўз§»еҠЁtweenпјҢйҒҝе…Қжӯ»дәЎеҗҺд»Қдә§з”ҹжӢ–е°ҫзІ’еӯҗ
                this.tweens.killTweensOf(monster);

                const reward = monster.getData('reward');
                const spiritDropRange = monster.getData('spiritDrop');
                const expDropRange = monster.getData('expDrop');
                const isBoss = monster.getData('isBoss');

                // зҒөзҹіеҘ–еҠұ
                GameData.player.spiritStones += reward;
                GameData.battle.totalSpiritsEarned += reward;

                // зҒөж°”жҺүиҗҪпјҡеңЁиҢғеӣҙеҶ…йҡҸжңә
                const spiritDrop = Phaser.Math.Between(spiritDropRange[0], spiritDropRange[1]);
                GameData.tree.spirit = Math.min(GameData.tree.spirit + spiritDrop, GameData.tree.spiritCapacity);

                // зҒөжңЁз»ҸйӘҢжҺүиҗҪ
                const expDrop = Phaser.Math.Between(expDropRange[0], expDropRange[1]);
                GameData.tree.exp += expDrop;

                GameData.battle.monstersKilled++;
                GameData.battle.killedThisWave++;
                this.updateUI();

                // зҒөе…ҪиҺ·еҸ–з»ҸйӘҢ
                this.addBeastExp(Math.ceil(reward / 3));

                // жЈҖжҹҘзҒөжңЁжҳҜеҗҰеҸҜд»ҘеҚҮзә§
                this.checkTreeLevelUp();

                const hpBar2 = monster.getData('hpBar');
                const hpBg2 = monster.getData('hpBg');
                const nameTag2 = monster.getData('nameTag');
                const bossGlow2 = monster.getData('bossGlow');
                const iceOverlay2 = monster.getData('iceOverlay');
                const outerGlow2 = monster.getData('outerGlow');
                const innerRing2 = monster.getData('innerRing');

                // еҰ–зҺӢеҮ»жқҖзү№ж•Ҳ
                if(isBoss) {
                    const bossFx = this.add.circle(monster.x, monster.y, 20, 0xFFD700, 0.9);
                    this.tweens.add({ targets: bossFx, scale: 5, alpha: 0, duration: 600, onComplete: () => bossFx.destroy() });
                    // еҰ–зҺӢеҮ»жқҖйўқеӨ–еҘ–еҠұз¬Ұз®“
                    const randomType = ['attack', 'slow', 'shield'][Math.floor(Math.random() * 3)];
                    const t = GameData.talismans.owned.find(t => t.type === randomType);
                    if(t) t.count++;
                    this.showMsg(`рҹ‘‘ еҰ–зҺӢйҷЁиҗҪ! иҺ·еҫ—${TALISMAN_TYPES[randomType].icon}!`);
                }

                // жӯ»дәЎзІ’еӯҗзҲҶж•Ј
                const deathElColor = parseInt(ELEMENTS[monster.getData('element')].color.replace('#', ''), 16);
                for(let i = 0; i < (isBoss ? 12 : 6); i++) {
                    const angle = (i / (isBoss ? 12 : 6)) * Math.PI * 2 + Math.random() * 0.5;
                    const speed = isBoss ? 80 : 50;
                    const dp = this.add.circle(monster.x, monster.y, isBoss ? 5 : 3, i % 2 === 0 ? deathElColor : 0xFFFFFF, 0.8);
                    this.tweens.add({
                        targets: dp,
                        x: monster.x + Math.cos(angle) * speed,
                        y: monster.y + Math.sin(angle) * speed,
                        alpha: 0, scale: 0.2, duration: isBoss ? 600 : 400,
                        onComplete: () => dp.destroy()
                    });
                }
                // жӯ»дәЎй—Әе…ү
                const deathFlash = this.add.circle(monster.x, monster.y, isBoss ? 30 : 15, 0xFFFFFF, 0.7);
                this.tweens.add({ targets: deathFlash, scale: 2, alpha: 0, duration: 250, onComplete: () => deathFlash.destroy() });

                this.tweens.add({
                    targets: [monster, icon, hpBar2, hpBg2, nameTag2, bossGlow2, iceOverlay2, outerGlow2, innerRing2].filter(Boolean), alpha: 0, scale: 0, duration: 300,
                    onComplete: () => {
                        [monster, icon, hpBar2, hpBg2, nameTag2, bossGlow2, iceOverlay2, outerGlow2, innerRing2].filter(Boolean).forEach(o => { if(o) o.destroy(); });
                    }
                });

                this.showMsg(`+${reward}рҹ’Һ +${spiritDrop}рҹҢҝ +${expDrop}вңҰ`);

                const idx = this.monsters.indexOf(monster);
                if(idx > -1) this.monsters.splice(idx, 1);

                // еҲӨж–ӯжіўж¬Ўз»“жқҹпјҡжүҖжңүжҖӘзү©йғҪе·Із”ҹжҲҗ && еңәдёҠж— ж®Ӣз•ҷжҖӘзү©
                const allSpawned = GameData.battle.spawnedThisWave >= GameData.battle.totalThisWave;
                if(allSpawned && this.monsters.length === 0) {
                    this.time.delayedCall(500, () => this.endWave());
                }
            }
        }

        endWave() {
            // йҳІжӯўйҮҚеӨҚи°ғз”Ё
            if(!this.isWaveActive) return;

            if(this.monsterAttackTimer) { this.monsterAttackTimer.remove(); this.monsterAttackTimer = null; }
            if(this.waveEndTimer) { this.waveEndTimer.remove(); this.waveEndTimer = null; }

            // жё…йҷӨжүҖжңүж®Ӣз•ҷзҡ„spawnе®ҡж—¶еҷЁ
            this.spawnTimers.forEach(t => { if(t) t.remove(); });
            this.spawnTimers = [];

            // жё…йҷӨеңәдёҠж®Ӣз•ҷжҖӘзү©
            this.monsters.forEach(m => {
                this.tweens.killTweensOf(m);
                const icon = m.getData('icon');
                const hpBar = m.getData('hpBar');
                const hpBg = m.getData('hpBg');
                const nameTag = m.getData('nameTag');
                const bossGlow = m.getData('bossGlow');
                const iceOverlay = m.getData('iceOverlay');
                const outerGlow = m.getData('outerGlow');
                const innerRing = m.getData('innerRing');
                [icon, hpBar, hpBg, nameTag, bossGlow, iceOverlay, outerGlow, innerRing].forEach(o => { if(o) { this.tweens.killTweensOf(o); o.destroy(); } });
                m.destroy();
            });
            this.monsters = [];

            // е®ҢзҫҺйҳІе®ҲеҲӨе®ҡпјҡжң¬жіўжңӘеҸ—дјӨе®і
            if(this.waveDamageTaken === 0) {
                GameData.battle.perfectDefenses++;
                const bonus = 50 * GameData.battle.waveCycle;
                GameData.player.spiritStones += bonus;
                this.showMsg(`вңЁ е®ҢзҫҺйҳІе®Ҳ! +${bonus}зҒөзҹі`);
                // е®ҢзҫҺйҳІе®Ҳзү№ж•Ҳ
                const perfectFx = this.add.circle(this.treeX, this.treeY, 30, 0xFFD700, 0.8);
                this.tweens.add({ targets: perfectFx, scale: 4, alpha: 0, duration: 800, onComplete: () => perfectFx.destroy() });
            }

            this.isWaveActive = false;
            this.waveTimer = 15;
            this.updateUI();
            this.updateTimerDisplay();
            this.showMsg('жіўж¬Ўз»“жқҹ! еҮҶеӨҮдёӢдёҖжіў');

            // еӨ©е‘ҪдәӢд»¶пјҡжҜҸ3жіўи§ҰеҸ‘дёҖж¬Ў
            if(GameData.battle.currentWave > 0 && GameData.battle.currentWave % 3 === 0
               && GameData.battle.currentWave !== GameData.destiny.lastEventWave) {
                GameData.destiny.lastEventWave = GameData.battle.currentWave;
                this.time.delayedCall(800, () => this.triggerDestinyEvent());
            }

            if(GameData.battle.currentWave >= 50) this.victory();
        }

        tick() {
            try {
            // жёёжҲҸе·Із»“жқҹжҲ–жҡӮеҒңпјҢеҒңжӯўжүҖжңүи®Ўж—¶йҖ»иҫ‘
            if(this.isGameOver || this.isPaused) return;

            // ===== зҒөе…ҪжҠҖиғҪеҶ·еҚҙ =====
            if(GameData.spiritBeast.contracted && GameData.spiritBeast.contracted.skillCooldown > 0) {
                GameData.spiritBeast.contracted.skillCooldown--;
            }

            // ===== жҺўзҙўеҶ·еҚҙ =====
            if(GameData.explore.cooldown > 0) {
                GameData.explore.cooldown--;
            }

            // ===== жёЎеҠ«жЈҖжҹҘ =====
            this.checkTribulation();

            // ===== жҳјеӨңеҫӘзҺҜзі»з»ҹ =====
            GameData.time.tickAccum++;
            if(GameData.time.tickAccum >= 6) { // жҜҸ6з§’жҺЁиҝӣ1жёёжҲҸе°Ҹж—¶
                GameData.time.tickAccum = 0;
                GameData.time.hour = (GameData.time.hour + 1) % 24;
                const newPeriod = getCurrentPeriod(GameData.time.hour);

                // жҳјеӨңеҲҮжҚўйҖҡзҹҘ
                const oldPhase = GameData.time.phase;
                GameData.time.phase = newPeriod.key;
                GameData.time.isNight = newPeriod.key === 'night';

                if(oldPhase !== newPeriod.key) {
                    this.updateSkyColors();
                    this.updateTimeUI();
                    const cw = this.cameras.main.width, ch = this.cameras.main.height;
                    if(newPeriod.key === 'night') {
                        this.showMsg('рҹҢҷ е№ҪеӨңйҷҚдёҙ! еҰ–е…ҪГ—1.5 йҳөжі•Г—0.7 ж…Һе®Ҳ!');
                        // еӨңй—ҙиӯҰе‘Ҡй—ӘзғҒ
                        const warn = this.add.rectangle(cw/2, ch/2, cw, ch, 0x1a0030, 0.3).setDepth(100);
                        this.tweens.add({ targets: warn, alpha: 0, duration: 800, onComplete: () => warn.destroy() });
                    } else if(newPeriod.key === 'dawn') {
                        this.showMsg('рҹҢ… з ҙжҷ“! зҒөж°”еӣһеӨҚГ—1.5 жҠ“зҙ§жҒўеӨҚ!');
                        // з ҙжҷ“йҮ‘е…ү
                        const dawnFx = this.add.rectangle(cw/2, ch/2, cw, ch, 0x3a2a00, 0.15).setDepth(100);
                        this.tweens.add({ targets: dawnFx, alpha: 0, duration: 600, onComplete: () => dawnFx.destroy() });
                    } else if(newPeriod.key === 'day') {
                        this.showMsg('вҳҖпёҸ еӨ©жҳҺ! йҳөжі•жҒўеӨҚжӯЈеёёж•ҲзҺҮ!');
                    } else if(newPeriod.key === 'dusk') {
                        this.showMsg('рҹҢҮ ж—Ҙжҡ®! еҰ–е…ҪејҖе§Ӣеўһејә(Г—1.2)пјҢжіЁж„ҸйҳІе®Ҳ!');
                    }
                } else {
                    this.updateSkyColors();
                    this.updateTimeUI();
                }
            }

            // зҒөж°”иҮӘеҠЁжҒўеӨҚпјҲжҳјеӨңеҪұе“ҚжҒўеӨҚйҖҹзҺҮпјү
            const treeLevel = GameData.tree.level;
            let regen = treeLevel < TREE_LEVELS.length ? TREE_LEVELS[treeLevel].regen : 15;
            const period = getCurrentPeriod(GameData.time.hour);
            regen = Math.ceil(regen * period.spiritRegenMult); // дҪҝз”ЁceilйҒҝе…ҚfloorеҗһжҺүз ҙжҷ“Г—1.5еҠ жҲҗ
            // еҚҜж—¶йўқеӨ–жҒўеӨҚпјҲеҚідҪҝеҹәзЎҖжҒўеӨҚдёә0д№ҹиҮіе°‘жҒўеӨҚ1пјү
            if(period.key === 'dawn' && regen === 0) regen = 1;

            if(regen > 0 && GameData.tree.spirit < GameData.tree.spiritCapacity) {
                // зҒөе…Ҫиў«еҠЁпјҡзҒөж°”еӣһеӨҚеҠ жҲҗ
                if(GameData.spiritBeast.contracted) {
                    const bDef = SPIRIT_BEASTS.find(b => b.id === GameData.spiritBeast.contracted.id);
                    if(bDef && bDef.passiveType === 'spirit_regen') {
                        regen = Math.floor(regen * (1 + bDef.passiveMult));
                    }
                }
                // еҠҹжі•еҠ жҲҗпјҡзӮјдё№жңҜпјҲзҒөж°”еӣһеӨҚ+50%пјү
                const regenArtBonus = this.getArtBonus('spiritRegen');
                if(regenArtBonus > 0) regen = Math.floor(regen * (1 + regenArtBonus));
                GameData.tree.spirit = Math.min(GameData.tree.spirit + regen, GameData.tree.spiritCapacity);
                this.spiritText.setText(`${Math.max(0, GameData.tree.spirit)}/${GameData.tree.spiritCapacity}`);
            }

            // ===== зҒөе…Ҫиў«еҠЁпјҡйҳөжі•иҖҗд№…еҠ жҲҗ =====
            // (еңЁеҲӣе»әйҳөжі•ж—¶еә”з”ЁmaxDurabilityеҠ жҲҗ)

            // ===== зҒјзғ§ж•ҲжһңпјҲеҮӨзӮҺВ·з„ҡпјү=====
            GameData.talismans.activeEffects.filter(e => e.type === 'burn').forEach(burn => {
                this.monsters.slice().forEach(m => {
                    if(m && m.active) {
                        this.damageMonster(m, burn.power);
                    }
                });
            });

            // ===== з¬Ұз®“еҶ·еҚҙжӣҙж–° =====
            GameData.talismans.owned.forEach(t => {
                if(t.cooldown > 0) t.cooldown--;
            });
            // з¬Ұз®“ж•ҲжһңжҢҒз»ӯж—¶й—ҙжӣҙж–°
            GameData.talismans.activeEffects = GameData.talismans.activeEffects.filter(e => {
                e.remaining--;
                if(e.remaining <= 0) {
                    // burnзұ»еһӢжқҘиҮӘзҒөе…ҪеҮӨзӮҺВ·з„ҡпјҢTALISMAN_TYPESдёӯж— жӯӨй”®
                    if(e.type === 'burn') {
                        this.showMsg('рҹ”Ҙ зҒјзғ§ж•Ҳжһңз»“жқҹ');
                    } else if(TALISMAN_TYPES[e.type]) {
                        this.showMsg(`${TALISMAN_TYPES[e.type].icon} ${TALISMAN_TYPES[e.type].name}ж•Ҳжһңз»“жқҹ`);
                    }
                    return false;
                }
                return true;
            });
            this.updateTalismanUI();

            if(this.isWaveActive) return;
            this.waveTimer = Math.max(0, this.waveTimer - 1);
            this.updateTimerDisplay();
            if(this.waveTimer <= 0) {
                this.showMsg('вҡ” еҮҶеӨҮж—¶й—ҙз»“жқҹпјҢеҰ–е…ҪжқҘиўӯ!');
                this.startWave();
            }
            } catch(err) {
                console.error('вқҢ tick() error:', err);
                const errDiv = document.createElement('div');
                errDiv.style.cssText = 'position:fixed;bottom:60px;left:10px;max-width:90%;background:rgba(255,0,0,0.9);color:#fff;padding:8px 12px;z-index:9999;font-size:11px;border-radius:6px;word-break:break-all;';
                errDiv.textContent = 'tick Error: ' + err.message + ' (line:' + (err.lineNumber||'?') + ')';
                document.body.appendChild(errDiv);
                setTimeout(() => errDiv.remove(), 10000);
            }
        }

        // жӣҙж–°жҳјеӨңUI
        updateTimeUI() {
            const period = getCurrentPeriod(GameData.time.hour);
            const timeEl = document.getElementById('time-indicator');
            if(timeEl) {
                const iconEl = document.getElementById('time-icon');
                const nameEl = document.getElementById('time-name');
                const hourEl = document.getElementById('time-hour');
                if(iconEl) iconEl.textContent = period.icon;
                if(nameEl) nameEl.textContent = period.name;
                // ж—¶иҫ°еҗҚз§°жҳ е°„
                const hourNames = ['еӯҗ','дё‘','еҜ…','еҚҜ','иҫ°','е·і','еҚҲ','жңӘ','з”і','й…ү','жҲҢ','дәҘ'];
                const hourIdx = Math.floor(GameData.time.hour / 2);
                const suffix = GameData.time.hour % 2 === 0 ? 'ж—¶еҲқ' : 'ж—¶жӯЈ';
                if(hourEl) hourEl.textContent = hourNames[hourIdx] + suffix + ' (' + GameData.time.hour + ':00)';

                // жӣҙж–°и·қзҰ»дёӢдёҖж—¶ж®өжҸҗзӨә
                const progressEl = document.getElementById('time-progress');
                if(progressEl) {
                    const hour = GameData.time.hour;
                    const phaseOrder = [
                        { key: 'dawn', start: 5, label: 'рҹҢ…з ҙжҷ“' },
                        { key: 'day', start: 7, label: 'вҳҖпёҸеӨ©жҳҺ' },
                        { key: 'dusk', start: 17, label: 'рҹҢҮж—Ҙжҡ®' },
                        { key: 'night', start: 19, label: 'рҹҢҷе№ҪеӨң' }
                    ];
                    let nextPhase = phaseOrder.find(p => p.start > hour);
                    if(!nextPhase) nextPhase = phaseOrder[0]; // wrap around
                    const hoursUntil = nextPhase.start > hour ? nextPhase.start - hour : (24 - hour + nextPhase.start);
                    progressEl.textContent = `${hoursUntil}hвҶ’${nextPhase.label}`;
                }

                // жӣҙж–°ж—¶ж®өж ·ејҸзұ»
                timeEl.className = 'period-' + period.key;

                // жӣҙж–°ж•ҲжһңжҸҗзӨә
                const effectsEl = document.getElementById('time-effects');
                if(effectsEl) {
                    const desc = {
                        dawn: 'рҹҢ… з ҙжҷ“ вҖ” зҒөж°”еӣһеҚҮпјҢеҰ–е…Ҫиӣ°дјҸ',
                        day: 'вҳҖпёҸ зҷҪеӨ© вҖ” дёҮиұЎе№ізЁі',
                        dusk: 'рҹҢҮ ж—Ҙжҡ® вҖ” еҰ–е…Ҫжёҗиө·пјҢйҳөжі•еҫ®ејұ',
                        night: 'рҹҢҷ е№ҪеӨң вҖ” еҰ–е…ҪзҢ–зҚ—пјҢйҳөжі•ејҸеҫ®'
                    };
                    const spiritClass = period.spiritRegenMult > 1 ? 'effect-positive' : period.spiritRegenMult < 1 ? 'effect-negative' : 'effect-neutral';
                    const formClass = period.formationMult > 1 ? 'effect-positive' : period.formationMult < 1 ? 'effect-negative' : 'effect-neutral';
                    const monsClass = period.monsterMult < 1 ? 'effect-positive' : period.monsterMult > 1 ? 'effect-negative' : 'effect-neutral';
                    effectsEl.innerHTML = `
                        <div class="effect-neutral">${desc[period.key]}</div>
                        <div class="${spiritClass}">зҒөж°”еӣһеӨҚ Г—${period.spiritRegenMult}</div>
                        <div class="${formClass}">йҳөжі•ж•ҲзҺҮ Г—${period.formationMult}</div>
                        <div class="${monsClass}">еҰ–е…ҪејәеәҰ Г—${period.monsterMult}</div>
                    `;
                }
            }
        }

        // ===== з¬Ұз®“зі»з»ҹ =====
        initTalismans() {
            // еҲқе§Ӣз»ҷ1дёӘеӨ©йӣ·з¬Ұ
            GameData.talismans.owned = [
                { type: 'attack', count: 1, cooldown: 0, maxCooldown: TALISMAN_TYPES.attack.cooldown },
                { type: 'slow',   count: 0, cooldown: 0, maxCooldown: TALISMAN_TYPES.slow.cooldown },
                { type: 'shield', count: 0, cooldown: 0, maxCooldown: TALISMAN_TYPES.shield.cooldown }
            ];
            GameData.talismans.activeEffects = [];
            this.updateTalismanUI();
        }

        updateTalismanUI() {
            const bar = document.getElementById('talisman-bar');
            if(!bar) return;
            bar.innerHTML = '';

            GameData.talismans.owned.forEach((t, idx) => {
                const config = TALISMAN_TYPES[t.type];
                const isOnCooldown = t.cooldown > 0;
                const isUsedUp = t.count <= 0;
                const disabled = isOnCooldown || isUsedUp;

                const slot = document.createElement('div');
                slot.className = 'talisman-slot' + (disabled ? ' on-cooldown' : '');
                slot.innerHTML = `
                    <div class="talisman-icon">${config.icon}</div>
                    <div class="talisman-name">${config.name}</div>
                    <div class="talisman-count">x${t.count}</div>
                    <button class="talisman-shop-btn" data-type="${t.type}">рҹ’Һ${config.cost}</button>
                    ${isOnCooldown ? `<div class="talisman-cooldown-overlay">${t.cooldown}</div>` : ''}
                `;

                // зӮ№еҮ»дҪҝз”Ёз¬Ұз®“
                slot.addEventListener('click', (e) => {
                    if(e.target.classList.contains('talisman-shop-btn')) return;
                    if(disabled) return;
                    this.useTalisman(t.type);
                });

                // иҙӯд№°жҢүй’®
                slot.querySelector('.talisman-shop-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.buyTalisman(t.type);
                });

                bar.appendChild(slot);
            });
        }

        useTalisman(type) {
            if(this.isGameOver) return; // жёёжҲҸе·Із»“жқҹ
            const t = GameData.talismans.owned.find(t => t.type === type);
            if(!t || t.count <= 0 || t.cooldown > 0) return;

            t.count--;
            t.cooldown = t.maxCooldown;

            const config = TALISMAN_TYPES[type];

            if(type === 'attack') {
                // еӨ©йӣ·з¬ҰпјҡеҜ№жүҖжңүеңЁеңәеҰ–е…ҪйҖ жҲҗдјӨе®і
                const dmg = config.power + GameData.tree.level * 20;
                let hitCount = 0;
                this.monsters.slice().forEach(m => {
                    if(m && m.active) {
                        this.damageMonster(m, dmg, true);
                        hitCount++;
                        // йӣ·еҮ»зү№ж•Ҳ
                        const bolt = this.add.circle(m.x, m.y, 30, 0xFFD700, 0.9);
                        this.tweens.add({ targets: bolt, scale: 2, alpha: 0, duration: 400, onComplete: () => bolt.destroy() });
                    }
                });
                this.showMsg(`вҡЎ еӨ©йӣ·з¬Ұ! ${hitCount}еҸӘеҰ–е…ҪеҸ—еҲӣ!`);
                // е…ЁеұҸй—Әе…ү
                const flash = this.add.rectangle(this.cameras.main.width/2, this.cameras.main.height/2,
                    this.cameras.main.width, this.cameras.main.height, 0xFFD700, 0.3).setDepth(999);
                this.tweens.add({ targets: flash, alpha: 0, duration: 300, onComplete: () => flash.destroy() });

            } else if(type === 'slow') {
                // е®ҡиә«з¬ҰпјҡеҶ»з»“жүҖжңүжҖӘзү©3з§’
                GameData.talismans.activeEffects.push({ type: 'slow', remaining: config.power, power: config.power });
                this.monsters.forEach(m => {
                    if(m && m.active) {
                        // жҡӮеҒңжҖӘзү©з§»еҠЁtween
                        this.tweens.getAllTweens().forEach(tw => {
                            if(tw.targets && tw.targets.includes(m)) {
                                tw.pause();
                            }
                        });
                        // еҶ»з»“и§Ҷи§үж•Ҳжһң - и·ҹйҡҸжҖӘзү©
                        const iceOverlay = this.add.circle(m.x, m.y, 25, 0x4169E1, 0.3);
                        m.setData('iceOverlay', iceOverlay);
                        // еҶ°еҶ»overlayи·ҹйҡҸжҖӘзү©з§»еҠЁ
                        const iceFollow = this.time.addEvent({
                            delay: 16, loop: true,
                            callback: () => {
                                if(iceOverlay && iceOverlay.active && m && m.active) {
                                    iceOverlay.setPosition(m.x, m.y);
                                } else {
                                    iceFollow.remove();
                                }
                            }
                        });
                        this.tweens.add({ targets: iceOverlay, alpha: 0.1, duration: 500, yoyo: true, repeat: 5 });
                        // е»¶иҝҹжҒўеӨҚ
                        this.time.delayedCall(config.power * 1000, () => {
                            if(iceOverlay && iceOverlay.active) iceOverlay.destroy();
                            // жҒўеӨҚжҖӘзү©з§»еҠЁtween
                            this.tweens.getAllTweens().forEach(tw => {
                                if(tw.targets && tw.targets.includes(m) && tw.isPaused()) {
                                    tw.resume();
                                }
                            });
                        });
                    }
                });
                this.showMsg(`вқ„пёҸ е®ҡиә«з¬Ұ! еҶ»з»“${config.power}з§’!`);

            } else if(type === 'shield') {
                // йҮ‘й’ҹз¬ҰпјҡзҒөжңЁ3з§’е…Қз–«дјӨе®і
                GameData.talismans.activeEffects.push({ type: 'shield', remaining: config.power, power: config.power });
                // йҮ‘й’ҹи§Ҷи§ү
                if(this.treeGlow) {
                    this.treeGlow.setStrokeStyle(4, 0x5CBF7C);
                    this.treeGlow.setFillStyle(0x5CBF7C, 0.2);
                }
                this.time.delayedCall(config.power * 1000, () => {
                    if(this.treeGlow && this.treeGlow.active) {
                        this.treeGlow.setStrokeStyle(0);
                        this.treeGlow.setFillStyle(0x4A7C59, 0.08);
                    }
                });
                this.showMsg(`рҹӣЎпёҸ йҮ‘й’ҹз¬Ұ! ${config.power}з§’жҠӨдҪ“!`);
            }

            this.updateTalismanUI();
        }

        buyTalisman(type) {
            if(this.isGameOver) return; // жёёжҲҸе·Із»“жқҹ
            const config = TALISMAN_TYPES[type];
            if(GameData.player.spiritStones < config.cost) {
                this.showMsg('зҒөзҹідёҚи¶і!');
                return;
            }
            GameData.player.spiritStones -= config.cost;
            const t = GameData.talismans.owned.find(t => t.type === type);
            if(t) t.count++;
            this.updateUI();
            this.updateTalismanUI();
            this.showMsg(`иҺ·еҫ—${config.icon}${config.name}!`);
        }

        updateUI() {
            this.stoneText.setText(`${GameData.player.spiritStones}`);
            this.spiritText.setText(`${Math.max(0, GameData.tree.spirit)}/${GameData.tree.spiritCapacity}`);
            this.waveText.setText(`жіўж¬Ў ${GameData.battle.currentWave}/50`);

            // жӣҙж–°з»ҸйӘҢжқЎ
            if(this.expBarFill && this.expBarFill.active) {
                const nextLevelData = GameData.tree.level + 1 < TREE_LEVELS.length ? TREE_LEVELS[GameData.tree.level + 1] : null;
                const expPercent = nextLevelData ? Math.min(1, GameData.tree.exp / nextLevelData.expNeeded) : 1;
                this.expBarFill.setDisplaySize(Math.max(1, 68 * expPercent), 6);
                // з»ҸйӘҢжқЎйўңиүІпјҡж»ЎеҸҳйҮ‘иүІ
                if(expPercent >= 1) {
                    this.expBarFill.setFillStyle(0xFFD700);
                } else {
                    this.expBarFill.setFillStyle(0x4A7C59);
                }
            }

            // жӣҙж–°зҒөжңЁзӯүзә§ж–Үжң¬
            if(this.treeLevelText && this.treeLevelText.active) {
                this.treeLevelText.setText(`Lv.${GameData.tree.level} зҒөжңЁ`);
            }

            // жӣҙж–°жёёжҲҸеңәжҷҜдёӯзҒөжңЁдё»дҪ“ж—Ғзҡ„ж Үзӯҫ
            if(this.treeLabel && this.treeLabel.active) {
                this.treeLabel.setText(`Lv.${GameData.tree.level} ${TREE_LEVELS[GameData.tree.level].name}`);
            }

            // жӣҙж–°з»ҸйӘҢж•°еҖј
            this.updateExpText();

            // жӣҙж–°йҳөжі•дҪҚдҝЎжҒҜ
            if(this.slotInfoText && this.slotInfoText.active) {
                const uc = this.getUnlockedSlotCount();
                const pc = this.formations.length;
                this.slotInfoText.setText(`вӯ• йҳөжі•дҪҚ ${pc}/${uc}`);
            }

            // жӣҙж–°йҳөжі•и§Ҷи§ү - зӯүзә§и¶Ҡй«ҳеӨ–и§Ӯи¶Ҡејә
            this.formations.forEach(slot => {
                if(slot.formation && slot.formation.levelBadge) {
                    const lvl = slot.formation.level;
                    slot.formation.levelBadge.setText(`Lv.${lvl}`);

                    // йҳөжі•е°әеҜёйҡҸзӯүзә§еўһй•ҝ
                    const baseSize = 28;
                    const newSize = baseSize + lvl * 3;
                    if(slot.formation.sprite && slot.formation.sprite.active) {
                        slot.formation.sprite.setDisplaySize(newSize * 2, newSize * 2);
                        // й«ҳзӯүзә§йҳөжі•иҫ№жЎҶжӣҙдә®
                        if(lvl >= 5) {
                            slot.formation.sprite.setStrokeStyle(3, 0xFFD700);
                        } else if(lvl >= 3) {
                            slot.formation.sprite.setStrokeStyle(2, 0xCCCCCC);
                        }
                    }

                    // ж§ҪдҪҚеә•еә§д№ҹйҡҸд№ӢеҸҳеӨ§
                    if(slot.bg && slot.bg.active) {
                        slot.bg.setDisplaySize((newSize + 6) * 2, (newSize + 6) * 2);
                    }

                    // ж—ӢиҪ¬е…үзҺҜд№ҹйҡҸд№ӢеҸҳеӨ§
                    if(slot.formation.orbitRing && slot.formation.orbitRing.active) {
                        const ringSize = newSize + 8;
                        slot.formation.orbitRing.setDisplaySize(ringSize * 2, ringSize * 2);
                        // й«ҳзӯүзә§еҠ йҖҹж—ӢиҪ¬
                        if(lvl >= 5) {
                            this.tweens.killTweensOf(slot.formation.orbitRing, 'angle');
                            this.tweens.add({ targets: slot.formation.orbitRing, angle: 360, duration: 4000, repeat: -1 });
                        }
                    }

                    // зІ’еӯҗд№ҹйҡҸд№ӢеҸҳеӨ§
                    if(slot.formation.particles) {
                        const particleRadius = 3 + Math.floor(lvl / 3);
                        slot.formation.particles.forEach(p => {
                            if(p && p.active) p.setDisplaySize(particleRadius * 2, particleRadius * 2);
                        });
                    }
                }
            });
        }

        // ===== зҒөжңЁеҚҮзә§зі»з»ҹ =====
        checkTreeLevelUp() {
            const currentLevel = GameData.tree.level;
            if(currentLevel >= TREE_LEVELS.length - 1) return; // е·Іж»Ўзә§
            const nextLevelData = TREE_LEVELS[currentLevel + 1];
            if(!nextLevelData) return;

            if(GameData.tree.exp >= nextLevelData.expNeeded) {
                GameData.tree.exp -= nextLevelData.expNeeded;
                GameData.tree.level++;
                GameData.tree.spiritCapacity = nextLevelData.capacity;
                // еҚҮзә§ж—¶зҒөж°”иЎҘж»Ў
                GameData.tree.spirit = nextLevelData.capacity;
                this.updateUI();

                // зҒөжңЁеҪўжҖҒи§Ҷи§үиҝӣеҢ–
                this.renderTreeByLevel();

                // еҚҮзә§зү№ж•Ҳ
                this.showTreeLevelUpEffect();
                this.showMsg(`зҒөжңЁеҚҮзә§! вҶ’ ${nextLevelData.name}`);

                // жЈҖжҹҘжҳҜеҗҰи§Јй”Ғж–°йҳөжі•дҪҚ
                this.checkSlotUnlock();

                // жӣҙж–°еўғз•Ң
                this.updateRealm();
                // йҖ’еҪ’жЈҖжҹҘжҳҜеҗҰеҸҜд»Ҙиҝһз»ӯеҚҮзә§
                this.checkTreeLevelUp();
            }
        }

        // жӣҙж–°еўғз•ҢжҳҫзӨәпјҲзҒөжңЁзӯүзә§вҶ’дҝ®д»ҷеўғз•Ңпјү
        updateRealm() {
            const level = GameData.tree.level;
            const tribulations = GameData.tribulation.completed.length;
            let realm = 'зӮјж°”жңҹ';
            if(tribulations >= 3) realm = 'е…ғе©ҙжңҹ';
            else if(tribulations >= 2) realm = 'йҮ‘дё№жңҹ';
            else if(tribulations >= 1) realm = 'зӯ‘еҹәжңҹ';
            else if(level >= 5) realm = 'зӯ‘еҹәжңҹ';
            else if(level >= 3) realm = 'зӮјж°”еҗҺжңҹ';
            GameData.player.realm = realm;
            if(this.realmText && this.realmText.active) {
                this.realmText.setText('вңҰ ' + realm);
            }
        }

        updateExpText() {
            if(!this.expText || !this.expText.active) return;
            const nextLevelData = GameData.tree.level + 1 < TREE_LEVELS.length ? TREE_LEVELS[GameData.tree.level + 1] : null;
            if(nextLevelData) {
                this.expText.setText(`${GameData.tree.exp}/${nextLevelData.expNeeded}`);
            } else {
                this.expText.setText('MAX');
            }
        }

        showTreeLevelUpEffect() {
            // зҒөжңЁеҚҮзә§е…үж•Ҳ
            const glow = this.add.circle(this.treeX, this.treeY, 60, 0xFFD700, 0.6);
            this.tweens.add({ targets: glow, scale: 3, alpha: 0, duration: 800, onComplete: () => glow.destroy() });

            // зІ’еӯҗж•Је°„
            for(let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const p = this.add.circle(this.treeX, this.treeY, 4, 0xFFD700, 0.8);
                this.tweens.add({
                    targets: p,
                    x: this.treeX + Math.cos(angle) * 120,
                    y: this.treeY + Math.sin(angle) * 120,
                    alpha: 0, scale: 0.3, duration: 600,
                    onComplete: () => p.destroy()
                });
            }
        }

        showTreeUpgradeDialog() {
            const currentLevel = GameData.tree.level;
            if(currentLevel >= TREE_LEVELS.length || !TREE_LEVELS[currentLevel]) { this.dialogShown = false; return; }
            const currentData = TREE_LEVELS[currentLevel];
            const nextLevel = currentLevel + 1;
            const isMaxLevel = nextLevel >= TREE_LEVELS.length;
            const nextData = isMaxLevel ? null : TREE_LEVELS[nextLevel];

            if(isMaxLevel) {
                dialogContent.innerHTML = `
                    <div class="dialog-title" style="color:#FFD700">рҹҢі зҒөжңЁе·Іж»Ўзә§</div>
                    <div style="font-size:32px; margin:12px 0">рҹҢҹ</div>
                    <div style="font-size:18px; color:#FFD700; margin:8px 0">${currentData.name} Lv.${currentLevel}</div>
                    <div style="font-size:14px; color:#999; margin:6px 0">зҒөжңЁе·ІиҫҫжңҖй«ҳеўғз•Ң!</div>
                    <button class="dialog-close" id="dialog-close-btn">е…ій—ӯ</button>
                `;
                dialogOverlay.classList.add('active');
                document.getElementById('dialog-close-btn').addEventListener('click', () => {
                    dialogOverlay.classList.remove('active');
                    this.dialogShown = false;

            const canLevelUp = expProgress >= expNeeded;

            dialogContent.innerHTML = `
                <div class="dialog-title" style="color:#4A7C59">рҹҢі зҒөжңЁдҝ®зӮј</div>
                <div style="font-size:20px; color:#6BAF7D; font-weight:bold; margin:8px 0">${currentData.name} Lv.${currentLevel}</div>
                <div style="background:rgba(255,255,255,0.04); border-radius:8px; padding:12px 16px; margin:12px 0; text-align:left; font-size:14px; line-height:2">
                    <div>рҹҢҝ зҒөж°”: <span style="color:#5CBF7C">${GameData.tree.spirit}</span> / <span style="color:#5CBF7C">${GameData.tree.spiritCapacity}</span></div>
                    <div>вңҰ з»ҸйӘҢ: <span style="color:#9B7ED9">${expProgress}</span> / <span style="color:#9B7ED9">${expNeeded}</span> (${expPercent}%)</div>
                    <div>рҹ’ҡ жҒўеӨҚ: <span style="color:#5CBF7C">${currentData.regen}/з§’</span></div>
                </div>
                <div style="margin:12px 0; padding:12px 16px; background:rgba(255,215,0,0.06); border:1px solid rgba(255,215,0,0.2); border-radius:8px; text-align:left; font-size:14px; line-height:2">
                    <div style="color:#FFD700; font-weight:bold; margin-bottom:4px">вҶ’ ${nextData.name} Lv.${nextLevel}</div>
                    <div>рҹҢҝ зҒөж°”дёҠйҷҗ: <span style="color:#9B7ED9">${GameData.tree.spiritCapacity}</span> вҶ’ <span style="color:#5CBF7C;font-weight:bold">${nextData.capacity}</span></div>
                    <div>рҹ’ҡ жҒўеӨҚйҖҹзҺҮ: <span style="color:#9B7ED9">${currentData.regen}/з§’</span> вҶ’ <span style="color:#5CBF7C;font-weight:bold">${nextData.regen}/з§’</span></div>
                    <div>вӯ• йҳөжі•дҪҚ: <span style="color:#9B7ED9">${currentData.slots}</span> вҶ’ <span style="color:#5CBF7C;font-weight:bold">${nextData.slots}</span>${nextData.slots > currentData.slots ? ' рҹҶ•' : ''}</div>

                    : `<div style="font-size:14px; color:#888; margin:8px 0">иҝҳйңҖ <span style="color:#9B7ED9">${expNeeded - expProgress}</span> зӮ№з»ҸйӘҢзӘҒз ҙ</div>`
                }
                <button class="dialog-close" id="dialog-close-btn">е…ій—ӯ</button>
            `;

            document.getElementById('dialog-close-btn').addEventListener('click', () => {
                dialogOverlay.classList.remove('active');

        showMsg(text) {
            // ж¶ҲжҒҜеҗ‘дёҠжө®еҠЁе№¶ж¶Ҳж•ЈпјҢеёҰйҡҸжңәеҒҸз§»йҒҝе…ҚйҮҚеҸ 
            const offsetX = Phaser.Math.Between(-30, 30);
            const offsetY = Phaser.Math.Between(-10, 10);
            const t = this.add.text(this.treeX + offsetX, this.treeY - 90 + offsetY, text, {
                fontSize: '20px', color: '#FFF', fontStyle: 'bold',
                stroke: '#000', strokeThickness: 4
            }).setOrigin(0.5).setDepth(1000);
            this.tweens.add({ targets: t, y: t.y - 50, alpha: 0, duration: 2200, onComplete: () => t.destroy() });
        }

        // з”ҹжҲҗиҜ„зә§
        getRating() {
            const wave = GameData.battle.currentWave;
            const kills = GameData.battle.monstersKilled;
            const perfects = GameData.battle.perfectDefenses;
            let score = wave * 10 + kills * 2 + perfects * 20 + GameData.tribulation.completed.length * 50 + GameData.arts.learned.length * 30;
            if(GameData.spiritBeast.contracted) score += 40;
            if(score >= 800) return { grade: 'SSS', color: '#FF44FF', title: 'еӨ©йҖүд№Ӣдәә' };

            if(score >= 180) return { grade: 'B', color: '#4A90D9', title: 'еҲқзӘҘй—Ёеҫ„' };
